nte**, pas chaude.","## Un mot sur le thon","| Le thon albacore (yellowfin) est le choix classique. Chercher **\u00ab sashimi grade \u00bb** (congel\u00e9 pour consommation crue), **MSC** ou **pole-and-line caught**. Steaks de 2-3 cm minimum. Si h\u00e9sitant, la ni\u00e7oise fonctionne aussi avec du **thon en bo\u00eete \u00e0 l'huile d'olive de qualit\u00e9** (Ortiz, Callipo, Rio Mare).","## Avant tout (mise en place \u2014 5 min)","Sortir le thon **20 min avant**. **Pr\u00e9chauffer le four \u00e0 220 \u00b0C (425 \u00b0F).** Tapisser une plaque pour les pommes de terre.","Sortir : casserole pour \u0153ufs, grande casserole pour haricots, po\u00eale en fonte pour le thon, grand plat pour l'assemblage. Pr\u00e9parer un grand bol d'eau glac\u00e9e (\u0153ufs ET haricots).","## Cuire les \u0153ufs mollets ou durs (12 min)","Placer 5 \u0153ufs dans la casserole, couvrir d'eau froide (d\u00e9passer de 2-3 cm). Optionnel : ajouter 1 c. \u00e0 th\u00e9 de bicarbonate de soude \u00e0 l'eau (facilite l'\u00e9caillage).","Porter \u00e0 \u00e9bullition. **Minuterie d\u00e8s l'\u00e9bullition** : 9 min (durs, jaune cr\u00e9meux \u2014 standard ni\u00e7ois), 7 min (mollets, jaune coulant), 12 min (bien cuits).","**Transf\u00e9rer imm\u00e9diatement dans l'eau glac\u00e9e 5 minutes minimum.** **\u00c9caler** sous un filet d'eau froide. R\u00e9server au frigo.","## Enfourner les pommes de terre grenailles (25 min)","Rincer 850 g de pommes de terre grenailles. **Ne pas peler.** Couper les grosses en deux.","Sur la plaque, m\u00e9langer avec 2 \u00bd c. \u00e0 soupe d'huile d'olive, 1 c. \u00e0 th\u00e9 bomb\u00e9e de thym s\u00e9ch\u00e9, sel, poivre. **\u00c9taler c\u00f4t\u00e9 coup\u00e9 vers le bas.** **Enfourner sur la grille du milieu.** R\u00e9gler **20 minutes**, +5-8 min si besoin.","## Blanchir les haricots verts (10 min)","Remplir la casserole d'eau sal\u00e9e (1 c. \u00e0 soupe pour 3 L), porter \u00e0 \u00e9bullition. **Parer 600 g de haricots verts fins** (les servir entiers pour l'esth\u00e9tique).","Plonger, **cuire 4-5 minutes exactement**. **\u00c9goutter et plonger dans l'eau glac\u00e9e 2 minutes** (choc thermique). \u00c9goutter, essuyer. R\u00e9server.","## Pr\u00e9parer la salade et la vinaigrette (5 min)","S\u00e9parer 2 c\u0153urs de romaine (ou 1 grosse fris\u00e9e), rincer, essorer, d\u00e9chirer. Trancher 1 gros concombre anglais en demi-lunes de 5 mm. Trancher \u00bd oignon rouge tr\u00e8s fin (tremper 5 min si piquant). Couper 310 g de tomates cerises en deux.","Vinaigrette dijonnaise aux c\u00e2pres : 6 c. \u00e0 soupe d'huile d'olive, 2 \u00bd c. \u00e0 soupe de vinaigre de vin rouge, 1 c. \u00e0 soupe de moutarde de Dijon, 1 gousse d'ail r\u00e2p\u00e9e, 1 c. \u00e0 soupe de c\u00e2pres hach\u00e9es, sel l\u00e9ger, poivre. Fouetter.","## V\u00e9rifier et sortir les pommes de terre (5 min)","\u00c0 20 min, retourner. +5-8 min si besoin. Pr\u00eates : peau dor\u00e9e-croustillante, int\u00e9rieur tendre. **Laisser ti\u00e9dir** \u2014 la ni\u00e7oise se sert ti\u00e8de.","## Po\u00ealer le thon (5 min \u2014 juste avant de servir)","**\u00c9ponger les steaks \u00e0 fond.** Frotter chaque steak avec 1 \u00bd c. \u00e0 th\u00e9 d'huile d'olive, 1 c. \u00e0 th\u00e9 de poivre concass\u00e9, une pinc\u00e9e de sel. **Cro\u00fbte de s\u00e9same optionnelle** : presser dans 2 \u00bd c. \u00e0 soupe de graines de s\u00e9same.","Chauffer la po\u00eale en fonte \u00e0 feu **tr\u00e8s vif** 3 min (elle fume l\u00e9g\u00e8rement). Ajouter 1 c. \u00e0 soupe d'huile de canola. D\u00e9poser les steaks. **Ne pas bouger.**","**Saisir 1 \u00e0 2 minutes maximum** par c\u00f4t\u00e9. **Cible : 45-50 \u00b0C \u00e0 c\u0153ur (rare) ou 50-55 \u00b0C (mi-saignant)** \u2014 c\u0153ur rouge-rose vif, mince bordure saisie. Retirer imm\u00e9diatement.","Transf\u00e9rer sur une planche, **reposer 2-3 minutes**. **Trancher en lani\u00e8res de 1 cm, contre le grain.**","## Assemblage (5 min)","**Utiliser un grand plat de service.** **Composer par groupes s\u00e9par\u00e9s** (style ni\u00e7oise, pas m\u00e9lang\u00e9) sur un lit de laitue : pommes de terre ti\u00e8des, haricots verts, tomates, concombre, oignon rouge, \u0153ufs en quartiers, 150 g d'olives, 8 filets d'anchois (optionnel).","**Disposer les tranches de thon en \u00e9ventail** par-dessus. **Arroser g\u00e9n\u00e9reusement de vinaigrette** (\u00be sur la salade, \u00bc \u00e0 part). Parsemer d'herbes fra\u00eeches. Servir ti\u00e8de.","**Garder la 5\u1d49 portion** \u2014 excellent lunch. **Vinaigrette \u00e0 part**, thon \u00e0 part si possible. 1 jour au frigo (les \u0153ufs limitent).","## Substitutions et hors saison","- **Thon albacore frais** : ou surgel\u00e9 sashimi grade, steaks de saumon (2-3 min/c\u00f4t\u00e9), ou **thon en bo\u00eete \u00e0 l'huile d'olive de qualit\u00e9** (Ortiz, Callipo, Rio Mare) \u2014 sans po\u00ealer.","- **Pommes de terre grenailles** : ou mini Yukon, rattes, charlottes.","- **Haricots verts fins** : ou standards en tron\u00e7ons de 5 cm.","- **Laitue** : romaine, fris\u00e9e, mesclun, Boston.","- **Olives Ni\u00e7oises ou Kalamata** : d\u00e9noyaut\u00e9es.","- **Anchois \u00e0 l'huile** : Ortiz, Roland. Ou 1 c. \u00e0 th\u00e9 de p\u00e2te d'anchois dans la vinaigrette, ou omettre.","- **Vinaigre de vin rouge** : ou x\u00e9r\u00e8s, cidre.","## Sur le thon durable","| Thon albacore : chercher MSC ou pole-and-line. Bonite (skipjack) : le plus durable. **Thon rouge (bluefin) : \u00e0 \u00e9viter compl\u00e8tement** (en danger critique). Ressource : Ocean Wise Canada (oceanwise.ca)."],"nut":[{"l":"\u00c9nergie","v":"680 kcal"},{"l":"Prot\u00e9ines","v":"48 g"},{"l":"Fibres","v":"10 g"},{"l":"Om\u00e9ga-3 EPA+DHA","v":"1,2 g"}],"ing_raw":["5 steaks de thon albacore (longe de thon) (140 g chacun, \u2248 700 g) \u2014 frais ou d\u00e9congel\u00e9, comptoir poissonnerie","2 1/2 c. \u00e0 soupe d'huile d'olive, 1 1/4 c. \u00e0 th\u00e9 de poivre concass\u00e9, sel, 2 1/2 c. \u00e0 soupe de graines de s\u00e9same (optionnel pour cro\u00fbte)","850 g de pommes de terre grenailles (mini Yukon ou rattes) lav\u00e9es et coup\u00e9es en 2 si grosses","2 1/2 c. \u00e0 soupe d'huile d'olive, 1 1/4 c. \u00e0 th\u00e9 de thym s\u00e9ch\u00e9, sel/poivre","5 gros \u0153ufs (pour \u0153ufs durs)","600 g de haricots verts fins par\u00e9s","Salade : 2 c\u0153urs de laitue romaine ou 1 grosse fris\u00e9e, 310 g de tomates cerises, 1 gros concombre anglais, 1/2 oignon rouge en fines tranches, 150 g d'olives noires Ni\u00e7oises ou Kalamata, 8 filets d'anchois \u00e0 l'huile (optionnel mais authentique)","Vinaigrette : 6 c. \u00e0 soupe d'huile d'olive extra vierge, 2 1/2 c. \u00e0 soupe de vinaigre de vin rouge, 1 1/4 c. \u00e0 soupe de moutarde de Dijon, 1 gousse d'ail r\u00e2p\u00e9e, 1 c. \u00e0 soupe de c\u00e2pres, sel/poivre"]},{"d":23,"w":4,"n":"Mar","wd":1,"t":"Boulettes de viande \u00e0 la su\u00e9doise (k\u00f6tbullar), pur\u00e9e pomme de terre - c\u00e9leri-rave, chou rouge brais\u00e9, confiture de canneberges","tt":"40 min","pt":"20 min","ct":"30 min","ing":["B\u0153uf hach\u00e9 extra-maigre (500 g)","Porc hach\u00e9 (250 g)","##","Chapelure panko (75 g)","Lait (75 ml)","1 oignon finement r\u00e2p\u00e9 (essor\u00e9)","1 gros \u0153uf","Muscade (1 1/4 c. \u00e0 th\u00e9)","Piment de la Jama\u00efque / allspice (1 1/4 c. \u00e0 th\u00e9)","Sel (1 1/4 c. \u00e0 th\u00e9)","Poivre blanc (1/2 c. \u00e0 th\u00e9)","##","Beurre (2 1/2 c. \u00e0 soupe)","Huile pour la cuisson (2 1/2 c. \u00e0 soupe)","## Sauce","Beurre (50 g)","Farine (50 g)","Bouillon de b\u0153uf (750 ml)","Cr\u00e8me 15 % \u00e0 cuisson (250 ml)","Sauce soya (2 1/2 c. \u00e0 soupe)","Moutarde de Dijon (1 1/4 c. \u00e0 soupe)","Sel et poivre","## Pur\u00e9e","Pommes de terre Yukon Gold (700 g)","1 c\u00e9leri-rave (\u2248 600 g) pel\u00e9 en cubes","Beurre (75 g)","Lait (180 ml)","Sel, poivre et muscade","## Chou rouge","1 petit chou rouge (\u2248 800 g) \u00e9minc\u00e9","1 oignon en lani\u00e8res","Beurre (2 1/2 c. \u00e0 soupe)","Vinaigre de cidre (2 1/2 c. \u00e0 soupe)","Sirop d'\u00e9rable (2 1/2 c. \u00e0 soupe)","Cumin (1 1/4 c. \u00e0 th\u00e9)","Sel et poivre","##","Confiture de canneberges (180 ml \u00b7 Bonne Maman, ou maison)"],"inst":["## Un mot sur cette recette","| Les **k\u00f6ttbullar** su\u00e9doises ne sont pas de simples boulettes : m\u00e9lange b\u0153uf + porc, une \u00ab panade \u00bb de panko tremp\u00e9 dans du lait (texture a\u00e9rienne), un profil d'\u00e9pices distinctif (muscade + piment de la Jama\u00efque + poivre blanc), une sauce cr\u00e9meuse brune, et un accompagnement de confiture aigrelette. \u00c9quilibre magnifique : richesse cr\u00e9meuse + acidit\u00e9 des canneberges.","## Avant tout (mise en place \u2014 4 min)","Sortir les viandes hach\u00e9es pour temp\u00e9rer 15 min. Sortir le beurre. Sortir une grande casserole (pur\u00e9e), une casserole moyenne \u00e0 couvercle (chou rouge), une grande po\u00eale (boulettes et sauce).","## D\u00e9marrer le chou rouge brais\u00e9 (5 min prep + 25 min)","**\u00c9mincer le chou rouge** (~800 g) : quartiers, retirer le c\u0153ur, trancher en lani\u00e8res de 3-4 mm (~10 tasses). \u00c9mincer 1 oignon en lani\u00e8res.","Dans la casserole, faire fondre 2 \u00bd c. \u00e0 soupe de beurre \u00e0 feu moyen. Ajouter l'oignon, cuire 5 min jusqu'\u00e0 translucide.","Ajouter le chou, 2 \u00bd c. \u00e0 soupe de vinaigre de cidre, 2 \u00bd c. \u00e0 soupe de sirop d'\u00e9rable, 1 c. \u00e0 th\u00e9 bomb\u00e9e de cumin, sel, poivre, 60 ml d'eau.","> **Sur le vinaigre et la couleur** : sans acide, le chou rouge cuit en devenant bleu-gris. L'acide du vinaigre conserve la couleur pourpre vive.","M\u00e9langer, couvrir, **mijoter \u00e0 feu doux 20-25 minutes** en remuant. Tendre mais gardant un l\u00e9ger croquant.","## D\u00e9marrer la pur\u00e9e (5 min prep + 20 min)","**Peler 700 g de pommes de terre Yukon Gold**, couper en cubes de 3 cm.","**Peler le c\u00e9leri-rave** (~600 g) au grand couteau (peau \u00e9paisse et noueuse) : couper haut et bas, pel\u00e9 en descendant. **R\u00e9server dans l'eau citronn\u00e9e** \u2014 il brunit tr\u00e8s vite. Couper en cubes de 3 cm.","Mettre pommes de terre + c\u00e9leri-rave dans la casserole, couvrir d'eau froide, 1 c. \u00e0 soupe de gros sel. Porter \u00e0 \u00e9bullition, **cuire 18-20 minutes**.","## Pr\u00e9parer les boulettes (15 min)","**Faire la panade** : m\u00e9langer 75 g de panko + 75 ml de lait, laisser reposer 5 minutes (devient une p\u00e2te souple \u2014 rend les boulettes l\u00e9g\u00e8res).","**R\u00e2per 1 oignon jaune** (gros trous). **Essorer l'oignon r\u00e2p\u00e9** fermement dans un torchon \u2014 sinon les boulettes se d\u00e9literaient.","Dans un grand bol, combiner : 500 g de b\u0153uf hach\u00e9 extra-maigre, 250 g de porc hach\u00e9, la panade, l'oignon essor\u00e9, 1 \u0153uf, 1 c. \u00e0 th\u00e9 bomb\u00e9e de muscade, 1 c. \u00e0 th\u00e9 bomb\u00e9e de piment de la Jama\u00efque, 1 c. \u00e0 th\u00e9 bomb\u00e9e de sel, \u00bd c. \u00e0 th\u00e9 de poivre blanc.","**M\u00e9langer d\u00e9licatement \u00e0 la fourchette \u2014 PAS de long p\u00e9trissage** (sinon dense et caoutchouteux). 30-45 secondes maximum.","**Former 25-30 boulettes** de la taille d'une grosse noix (~2,5 cm). Astuce : mouiller les mains entre chaque.","## V\u00e9rifier la pur\u00e9e et l'\u00e9craser (5 min)","Quand cuit (pointe entre facilement), **\u00e9goutter \u00e0 fond**, remettre dans la casserole chaude \u00e0 feu doux 1 minute pour \u00e9vaporer l'humidit\u00e9.","Chauffer 180 ml de lait. Ajouter 75 g de beurre, le lait chaud, sel, poivre, une bonne pinc\u00e9e de muscade. **\u00c9craser au presse-pur\u00e9e** (pas au robot). Le c\u00e9leri-rave apporte une l\u00e9g\u00e8re fibrosit\u00e9 agr\u00e9able. R\u00e9server couvert.","## Cuire les boulettes (10 min \u2014 en 2-3 lots)","Chauffer la grande po\u00eale \u00e0 feu moyen-vif, ajouter 1 \u00bc c. \u00e0 soupe de beurre + 1 \u00bc c. \u00e0 soupe d'huile de canola. **D\u00e9poser 10-12 boulettes** en une couche (ne pas surcharger).","**Cuire 6-8 minutes par lot** en les retournant toutes les 90 sec \u2014 brunes-dor\u00e9es \u00e0 l'ext\u00e9rieur, cuites \u00e0 c\u0153ur (74 \u00b0C). R\u00e9server couvert. Refaire les lots.","## Faire la sauce cr\u00e9meuse (8 min \u2014 m\u00eame po\u00eale)","**Dans la m\u00eame po\u00eale** (sucs de boulettes), \u00e0 feu moyen, ajouter 50 g de beurre. **Incorporer 50 g de farine en fouettant** \u2014 c'est un **roux** blond. Cuire 1-2 min jusqu'\u00e0 dor\u00e9 et parfum de noisette.","**Verser 750 ml de bouillon de b\u0153uf en filet, en fouettant \u00e9nergiquement.** Le m\u00e9lange \u00e9paissit puis se fluidifie. Fouetter jusqu'\u00e0 lisse, amener \u00e0 fr\u00e9missement.","Ajouter 250 ml de cr\u00e8me 15 %, 2 \u00bd c. \u00e0 soupe de sauce soya (secret d'umami), 1 c. \u00e0 soupe de moutarde de Dijon. **Mijoter 3-5 minutes** jusqu'\u00e0 nappant. Go\u00fbter, ajuster.","## Remettre les boulettes dans la sauce (3 min)","**Remettre les boulettes** avec leur jus, enfouir. **R\u00e9chauffer 2-3 minutes** en secouant la po\u00eale \u2014 elles s'impr\u00e8gnent de sauce.","## Assemblage et service (2 min)","**Dans chaque assiette creuse** : un lit de pur\u00e9e pomme de terre-c\u00e9leri-rave (\u2155), 5-6 boulettes en sauce avec beaucoup de sauce, chou rouge brais\u00e9, **une cuiller\u00e9e de confiture de canneberges**. Facultatif : aneth ou persil.","**Servir imm\u00e9diatement** \u2014 la sauce \u00e9paissit en refroidissant (ajouter du bouillon chaud au besoin).","**Garder la 5\u1d49 portion.** **Les boulettes sont encore meilleures le lendemain.** 3 jours au frigo. Chou rouge 5 jours. Pur\u00e9e 3 jours. Confiture 2 semaines.","## Confiture de canneberges maison (10 min \u2014 optionnel)","| Dans une petite casserole : 200 g de canneberges (fra\u00eeches ou surgel\u00e9es), 80 g de sucre, 60 ml d'eau, le zeste de 1 orange, une pinc\u00e9e de cannelle. Mijoter 10-12 min jusqu'\u00e0 \u00e9paissi. Bien meilleure qu'achet\u00e9e.","## Substitutions et hors saison","- **B\u0153uf + porc hach\u00e9** (2:1) : ou veau \u00e0 la place du porc, poulet/dinde (+ 1 c. \u00e0 soupe d'huile), agneau (plus scandinave).","- **Panko** : ou chapelure ordinaire, pain rassis \u00e9miett\u00e9 tremp\u00e9.","- **Piment de la Jama\u00efque (allspice)** : ou \u2153 c. \u00e0 th\u00e9 chacun de cannelle + clou + muscade.","- **Poivre blanc** : ou poivre noir (profil moins pur).","- **C\u00e9leri-rave** : ou chou-fleur, panais, navet, ou 1 kg de pommes de terre au total.","- **Chou rouge** : ou chou blanc, chou de Savoie, choux de Bruxelles \u00e9minc\u00e9s.","- **Cr\u00e8me 15 %** : ou 35 % (plus velout\u00e9e), 10 %, cr\u00e8me s\u00fbre en fin de cuisson.","- **Confiture de canneberges** : Bonne Maman, ou lingonberries (IKEA), ou maison.","## Sur la panade","| Technique universelle : le liquide absorb\u00e9 par la chapelure cr\u00e9e une matrice qui retient l'humidit\u00e9 pendant la cuisson. Sans panade : boulettes denses et s\u00e8ches. Avec : l\u00e9g\u00e8res et juteuses."],"nut":[{"l":"\u00c9nergie","v":"780 kcal"},{"l":"Prot\u00e9ines","v":"42 g"},{"l":"Fibres","v":"12 g"},{"l":"Vitamine D","v":"0,5 \u03bcg"}],"ing_raw":["500 g de b\u0153uf hach\u00e9 extra-maigre + 250 g de porc hach\u00e9","75 g de chapelure panko, 75 ml de lait, 1 oignon finement r\u00e2p\u00e9 (essor\u00e9), 1 gros \u0153uf, 1 1/4 c. \u00e0 th\u00e9 chacun de muscade, piment de la Jama\u00efque (allspice) et sel; 1/2 c. \u00e0 th\u00e9 de poivre blanc","2 1/2 c. \u00e0 soupe de beurre + 2 1/2 c. \u00e0 soupe d'huile pour la cuisson","Sauce : 50 g de beurre, 50 g de farine, 750 ml de bouillon de b\u0153uf, 250 ml de cr\u00e8me 15 % \u00e0 cuisson, 2 1/2 c. \u00e0 soupe de sauce soya, 1 1/4 c. \u00e0 soupe de moutarde de Dijon, sel/poivre","Pur\u00e9e : 700 g de pommes de terre Yukon Gold + 1 c\u00e9leri-rave (\u2248 600 g) pel\u00e9 en cubes, 75 g de beurre, 180 ml de lait, sel/poivre/muscade","Chou rouge : 1 petit chou rouge (\u2248 800 g) \u00e9minc\u00e9, 1 oignon en lani\u00e8res, 2 1/2 c. \u00e0 soupe de beurre, 2 1/2 c. \u00e0 soupe de vinaigre de cidre, 2 1/2 c. \u00e0 soupe de sirop d'\u00e9rable, 1 1/4 c. \u00e0 th\u00e9 de cumin, sel/poivre","180 ml de confiture de canneberges (Bonne Maman, ou maison)"]},{"d":24,"w":4,"n":"Mer","wd":1,"t":"Shakshuka au b\u0153uf hach\u00e9 \u00e9pic\u00e9 maison (style merguez), f\u00e9ta, pain pita, salade","tt":"40 min","pt":"15 min","ct":"25 min","ing":["B\u0153uf hach\u00e9 extra-maigre 5 % (500 g \u00b7 Costco grand pack 1,5 kg pratique pour \u00e9taler sur la semaine)","## M\u00e9lange \u00e9pices style merguez maison","2 c. \u00e0 th\u00e9 ras-el-hanout","1 c. \u00e0 th\u00e9 harissa en p\u00e2te (ou 1/2 c. \u00e0 th\u00e9 en poudre)","1 c. \u00e0 th\u00e9 cumin","1 c. \u00e0 th\u00e9 paprika fum\u00e9","1/2 c. \u00e0 th\u00e9 cannelle","1/2 c. \u00e0 th\u00e9 sel","Poivre","##","10 gros \u0153ufs","##","Huile d'olive (2 1/2 c. \u00e0 soupe)","2 oignons","5 gousses d'ail","2 poivrons rouges en lani\u00e8res","## \u00c9pices sauce","1 c. \u00e0 soupe cumin moulu","1 c. \u00e0 th\u00e9 paprika fum\u00e9","1 c. \u00e0 th\u00e9 paprika doux","1/2 c. \u00e0 th\u00e9 cannelle","##","1 bo\u00eete (796 ml)","1 bo\u00eete (398 ml) de tomates en d\u00e9s","P\u00e2te de tomate (2 1/2 c. \u00e0 soupe)","##","F\u00e9ta \u00e9miett\u00e9e (150 g)","Coriandre (1/3 tasse)","Persil (1/3 tasse)","##","6 pains pita complets (Pita Royal bl\u00e9 entier)","## Salade","1 gros concombre anglais","4 tomates italiennes","1/2 oignon rouge","Menthe (1/4 tasse)","Persil (1/4 tasse)","Vinaigrette citron-huile d'olive"],"inst":["## Un mot sur la shakshuka","| **Shakshuka** signifie \u00ab m\u00e9lange \u00bb en arabe : des \u0153ufs poch\u00e9s dans une sauce tomate \u00e9pic\u00e9e, servie de la po\u00eale avec du pita. La version traditionnelle est v\u00e9g\u00e9tarienne; la n\u00f4tre ajoute du b\u0153uf hach\u00e9 \u00ab style merguez \u00bb. Profil : piquant mod\u00e9r\u00e9 (harissa), \u00e9pic\u00e9 chaud (cumin, cannelle, paprika), fum\u00e9, riche mais frais.","## Un mot sur les \u00e9pices \u00ab style merguez \u00bb","| La merguez est une saucisse d'agneau/b\u0153uf \u00e9pic\u00e9e nord-africaine. On imite son profil en \u00e9pi\u00e7ant le b\u0153uf hach\u00e9 avec ras-el-hanout, harissa, cumin, paprika fum\u00e9 et cannelle. Le r\u00e9sultat a le profil de la merguez sans la saucisse.","## Avant tout (mise en place \u2014 4 min)","Sortir le b\u0153uf 15 min avant. Sortir les \u0153ufs. **Pr\u00e9chauffer le four \u00e0 175 \u00b0C (350 \u00b0F)** pour les pitas. Sortir une **grande po\u00eale (32 cm min, avec couvercle)** \u2014 essentiel pour 10 \u0153ufs en une couche.","## Assaisonner le b\u0153uf \u00ab style merguez \u00bb (5 min)","**M\u00e9lange d'\u00e9pices** : 2 c. \u00e0 th\u00e9 de ras-el-hanout, 1 c. \u00e0 th\u00e9 de harissa en p\u00e2te (ou \u00bd c. \u00e0 th\u00e9 en poudre), 1 c. \u00e0 th\u00e9 de cumin, 1 c. \u00e0 th\u00e9 de paprika fum\u00e9, \u00bd c. \u00e0 th\u00e9 de cannelle, \u00bd c. \u00e0 th\u00e9 de sel, poivre.","Ajouter les 500 g de b\u0153uf hach\u00e9, m\u00e9langer d\u00e9licatement (20-30 sec). **Laisser reposer 5 minutes.**","## Pr\u00e9parer la salade m\u00e9diterran\u00e9enne (10 min)","Trancher 1 gros concombre anglais en demi-lunes. Couper 4 tomates italiennes \u00e9p\u00e9pin\u00e9es en d\u00e9s de 1,5 cm. Trancher \u00bd oignon rouge tr\u00e8s fin. Hacher \u00bc tasse de menthe + \u00bc tasse de persil. Combiner.","Vinaigrette : 4 c. \u00e0 soupe d'huile d'olive, 2 c. \u00e0 soupe de jus de citron, sel, poivre. Fouetter. \u00c0 ajouter juste avant de servir.","## Cuire le b\u0153uf \u00e9pic\u00e9 (6 min)","Chauffer la grande po\u00eale \u00e0 feu moyen-vif, ajouter 1 c. \u00e0 soupe d'huile. Ajouter le b\u0153uf \u00e9pic\u00e9. **D\u00e9faire \u00e0 la spatule** en grains de la taille d'un pois. Cuire **5-6 minutes** jusqu'\u00e0 bruni.","**Transf\u00e9rer dans un bol**, laisser ~1 c. \u00e0 soupe de gras dans la po\u00eale (ne pas nettoyer).","## Faire la base aromatique (10 min)","Ajouter 1 c. \u00e0 soupe d'huile, 2 oignons \u00e9minc\u00e9s avec une pinc\u00e9e de sel. Cuire 5 min. Ajouter 5 gousses d'ail et 2 poivrons rouges en lani\u00e8res, cuire 4 min.","Ajouter les **\u00e9pices de la sauce** : 1 c. \u00e0 soupe de cumin, 1 c. \u00e0 th\u00e9 de paprika fum\u00e9, 1 c. \u00e0 th\u00e9 de paprika doux, \u00bd c. \u00e0 th\u00e9 de cannelle. **Remuer 30 secondes** pour fleurir. Ne pas br\u00fbler.","## Monter la sauce et mijoter (12 min)","Ajouter : 1 grande bo\u00eete (796 ml) + 1 petite (398 ml) de tomates en d\u00e9s, 2 \u00bd c. \u00e0 soupe de p\u00e2te de tomate, **remettre le b\u0153uf** avec ses jus.","Porter \u00e0 \u00e9bullition, **baisser \u00e0 feu doux-moyen. Mijoter \u00e0 d\u00e9couvert 10-12 minutes** \u2014 quand la spatule passe au centre, on voit le fond 2-3 secondes. Go\u00fbter, ajuster (sel, pinc\u00e9e de sucre si acide).","## R\u00e9chauffer les pitas (5 min)","**Envelopper les 6 pitas en pile dans du papier alu.** Enfourner 5-8 minutes \u00e0 175 \u00b0C. Garder au chaud envelopp\u00e9s.","## Pocher les \u0153ufs dans la sauce (6-8 min \u2014 \u00e9tape finale)","**Creuser 10 puits dans la sauce** avec la spatule, en cercle. **Casser un \u0153uf dans chaque puits** (d\u00e9licatement \u2014 ou d'abord dans un bol si nerveux). Saler et poivrer l\u00e9g\u00e8rement chaque \u0153uf.","**Couvrir la po\u00eale. Cuire 6-8 minutes** \u00e0 feu doux-moyen. \u00c0 6 min : blancs pris (opaques), jaunes coulants. Pour jaunes cuits, +2-3 min. Retirer du feu d\u00e8s qu'\u00e0 ton go\u00fbt.","## Finaliser et servir (2 min)","**\u00c9mietter 150 g de f\u00e9ta** sur la shakshuka. Parsemer \u2153 tasse de coriandre + \u2153 tasse de persil.","**Servir la po\u00eale au centre de la table.** Chacun prend : 2 \u0153ufs, sauce et b\u0153uf, f\u00e9ta et herbes, 1-2 pitas, salade. Assembler la salade avec la vinaigrette.","**Garder la 5\u1d49 portion** \u2014 mais **les \u0153ufs cuits ne se conservent pas bien**. Garder la sauce au b\u0153uf \u00e0 part, cuire un \u0153uf frais au lunch. Salade 1 jour.","## Substitutions et hors saison","- **B\u0153uf hach\u00e9** : ou agneau (plus authentique), dinde (plus l\u00e9ger), ou version v\u00e9g\u00e9tarienne (pois chiches/haricots blancs).","- **Harissa en p\u00e2te** : Le Cabanon, Mina, Cortas. Ou harissa en poudre (doubler), sambal oelek, sriracha (2 c. \u00e0 th\u00e9). Sans piquant : omettre.","- **Ras-el-hanout** : voir tajine.","- **\u0152ufs** : Natur\u0153uf om\u00e9ga-3 id\u00e9alement.","- **F\u00e9ta** : grecque en saumure.","- **Pains pita complets** : Pita Royal, Kontos. Ou naans complets, pain crusty.","## Version v\u00e9g\u00e9tarienne","Traditionnellement sans viande. Omettre le b\u0153uf, ajouter 1 bo\u00eete (540 ml) de pois chiches ou haricots blancs rinc\u00e9s avec les tomates, augmenter les \u00e9pices de la sauce de 25 %.","## Sur la cuisson des \u0153ufs poch\u00e9s dans une sauce","| Technique universelle : shakshuka (Afrique du Nord), \u0153ufs au purgatoire (Italie), huevos rancheros (Mexique), menemen (Turquie). Deux cl\u00e9s : sauce tr\u00e8s chaude et d\u00e9j\u00e0 r\u00e9duite, et couvercle (la vapeur cuit le dessus du blanc)."],"nut":[{"l":"\u00c9nergie","v":"700 kcal"},{"l":"Prot\u00e9ines","v":"42 g"},{"l":"Fibres","v":"11 g"},{"l":"Vitamine D","v":"3 \u03bcg"}],"ing_raw":["500 g de b\u0153uf hach\u00e9 extra-maigre 5 % (Costco grand pack 1,5 kg pratique pour \u00e9taler sur la semaine)","M\u00e9lange \u00e9pices style merguez maison : 2 c. \u00e0 th\u00e9 ras-el-hanout, 1 c. \u00e0 th\u00e9 harissa en p\u00e2te (ou 1/2 c. \u00e0 th\u00e9 en poudre), 1 c. \u00e0 th\u00e9 cumin, 1 c. \u00e0 th\u00e9 paprika fum\u00e9, 1/2 c. \u00e0 th\u00e9 cannelle, 1/2 c. \u00e0 th\u00e9 sel, poivre","10 gros \u0153ufs","2 1/2 c. \u00e0 soupe d'huile d'olive, 2 oignons, 5 gousses d'ail, 2 poivrons rouges en lani\u00e8res","\u00c9pices sauce : 1 c. \u00e0 soupe cumin moulu, 1 c. \u00e0 th\u00e9 paprika fum\u00e9, 1 c. \u00e0 th\u00e9 paprika doux, 1/2 c. \u00e0 th\u00e9 cannelle","1 bo\u00eete (796 ml) + 1 bo\u00eete (398 ml) de tomates en d\u00e9s, 2 1/2 c. \u00e0 soupe de p\u00e2te de tomate","150 g de f\u00e9ta \u00e9miett\u00e9e, 1/3 tasse de coriandre, 1/3 tasse de persil","6 pains pita complets (Pita Royal bl\u00e9 entier)","Salade : 1 gros concombre anglais, 4 tomates italiennes, 1/2 oignon rouge, 1/4 tasse de menthe, 1/4 tasse de persil, vinaigrette citron-huile d'olive"]},{"d":25,"w":4,"n":"Jeu","wd":1,"t":"Truite saumon\u00e9e po\u00eal\u00e9e aux herbes, quinoa-canneberges-noix, asperges r\u00f4ties","tt":"35 min","pt":"15 min","ct":"20 min","ing":["5 filets de truite saumon\u00e9e avec peau (170 g chacun, \u2248 850 g) \u2014 Mer & Monde id\u00e9al","##","Huile d'olive (2 1/2 c. \u00e0 soupe)","Beurre (2 1/2 c. \u00e0 soupe)","Estragon ou persil (3 c. \u00e0 soupe)","Aneth","Zeste de 1 citron","Sel et poivre","## Quinoa","Quinoa (300 g \u00b7 tricolore si possible)","Eau (625 ml)","Sel","## Salade","1 orange navel en supr\u00eames (ou simplement 1 orange tranch\u00e9e)","Canneberges s\u00e9ch\u00e9es (80 g \u00b7 Patience Fruit & Co)","Noix de Grenoble hach\u00e9es grill\u00e9es (75 g)","1/2 oignon rouge finement hach\u00e9","Menthe (1/3 tasse)","Persil (1/3 tasse)","## Vinaigrette","Huile d'olive (5 c. \u00e0 soupe)","Jus d'orange frais (3 c. \u00e0 soupe)","Vinaigre de cidre (1 1/4 c. \u00e0 soupe)","Miel (1 1/4 c. \u00e0 th\u00e9)","Cumin moulu (1 1/4 c. \u00e0 th\u00e9)","Sel et poivre","##","Asperges (625 g)","Huile d'olive (2 1/2 c. \u00e0 soupe)","Parmesan en copeaux (30 g)","Sel et poivre"],"inst":["## Un mot sur cette recette","| La truite saumon\u00e9e (ou l'omble chevalier) po\u00eal\u00e9e peau croustillante est une technique de restaurant simple \u00e0 ma\u00eetriser : peau bien \u00e9pong\u00e9e, po\u00eale chaude, on presse doucement les 30 premi\u00e8res secondes, on ne retourne qu'une fois. Le quinoa aux canneberges, noix de Grenoble et supr\u00eames d'orange apporte croquant et une touche sucr\u00e9e-acidul\u00e9e; la truite se finit avec un beurre d'herbes citronn\u00e9.","## Avant tout (mise en place \u2014 4 min)","Sortir les filets 15 min avant. Sortir le beurre pour qu'il ramollisse. **Pr\u00e9chauffer le four \u00e0 220 \u00b0C (425 \u00b0F)** pour les asperges. Sortir une po\u00eale en fonte ou inox (surtout pas anti-adh\u00e9sive pour une vraie peau croustillante), une casserole pour le quinoa, une plaque tapiss\u00e9e pour les asperges.","## Cuire le quinoa (5 min prep + 20 min)","**Rincer 300 g de quinoa** au tamis fin 30 sec (enl\u00e8ve la saponine am\u00e8re). \u00c9goutter.","Dans la casserole, combiner avec 625 ml d'eau et 1 pinc\u00e9e de sel. Couvrir, porter \u00e0 \u00e9bullition, **baisser \u00e0 feu tr\u00e8s doux, minuterie 15 minutes.** Couper le feu, laisser couvert 5 min, \u00e9grainer \u00e0 la fourchette.","## Pr\u00e9parer la garniture du quinoa (8 min \u2014 pendant la cuisson)","Griller 75 g de noix de Grenoble \u00e0 sec 4-5 min dans une po\u00eale en remuant (surveiller \u2014 elles br\u00fblent vite). Hacher grossi\u00e8rement.","**Lever les supr\u00eames de l'orange navel** : couper les deux p\u00f4les, poser l'orange \u00e0 plat, retirer la peau et la membrane blanche au couteau en suivant la courbe du fruit, puis glisser la lame entre les membranes pour d\u00e9tacher chaque quartier \u00ab nu \u00bb \u2014 travailler au-dessus d'un bol pour r\u00e9cup\u00e9rer le jus. (Ou simplement peler et trancher l'orange en demi-rondelles, c'est tr\u00e8s bien aussi.)","Hacher finement \u00bd oignon rouge (tremper 5 min \u00e0 l'eau froide s'il est piquant, puis \u00e9goutter). Hacher \u2153 tasse de menthe et \u2153 tasse de persil.","## Vinaigrette orange-cumin (2 min)","Fouetter : 5 c. \u00e0 soupe d'huile d'olive, 3 c. \u00e0 soupe de jus d'orange frais (le jus r\u00e9cup\u00e9r\u00e9 des supr\u00eames + presser les membranes), 1\u00bc c. \u00e0 soupe de vinaigre de cidre, 1\u00bc c. \u00e0 th\u00e9 de miel, 1\u00bc c. \u00e0 th\u00e9 de cumin moulu, 1 pinc\u00e9e de sel, 3-4 tours de poivre. Go\u00fbter \u2014 franche, fruit\u00e9e, l\u00e9g\u00e8rement \u00e9pic\u00e9e.","## Assembler la salade de quinoa (3 min)","Au quinoa \u00e9grain\u00e9, incorporer : 80 g de canneberges s\u00e9ch\u00e9es, les noix grill\u00e9es, l'oignon rouge, la menthe et le persil. Verser la vinaigrette, m\u00e9langer. **Ajouter les supr\u00eames d'orange en dernier**, d\u00e9licatement, pour ne pas les briser. Servir ti\u00e8de ou \u00e0 temp\u00e9rature ambiante.","## Asperges r\u00f4ties (5 min prep + 8-10 min)","**Casser les bases ligneuses des asperges** (625 g) en pliant. Sur la plaque, m\u00e9langer avec 2\u00bd c. \u00e0 soupe d'huile d'olive, sel, poivre. \u00c9taler en une seule couche.","**Enfourner sur la grille du milieu 8-10 minutes** \u2014 tendres-croquantes, l\u00e9g\u00e8rement dor\u00e9es aux pointes. \u00c0 la sortie, parsemer de 30 g de copeaux de parmesan (ils fondent \u00e0 peine sur les asperges chaudes).","## Beurre aux herbes (2 min)","M\u00e9langer \u00e0 la fourchette : 2\u00bd c. \u00e0 soupe de beurre mou, 3 c. \u00e0 soupe d'estragon ou de persil hach\u00e9, quelques brins d'aneth cisel\u00e9s, le zeste de 1 citron, 2-3 tours de poivre. R\u00e9server \u00e0 temp\u00e9rature ambiante.","## Pr\u00e9parer les filets de truite (3 min)","**\u00c9ponger les 5 filets \u00e0 fond, surtout la peau** \u2014 c'est LE secret d'une peau croustillante. Saler la peau g\u00e9n\u00e9reusement (extrait l'humidit\u00e9). Juste avant la cuisson, saler et poivrer la chair.","## Po\u00ealer la truite peau croustillante (8 min \u2014 technique cl\u00e9)","Chauffer la po\u00eale \u00e0 feu moyen-vif 2 min. Ajouter 2\u00bd c. \u00e0 soupe d'huile d'olive \u2014 elle doit onduler et briller.","**D\u00e9poser les filets peau vers le bas.** **Presser doucement chaque filet avec une spatule pendant 30 secondes** \u2014 emp\u00eache la peau de gondoler et assure un contact uniforme.","**Cuire 4-5 minutes sans bouger, c\u00f4t\u00e9 peau.** On voit la cuisson remonter sur les c\u00f4t\u00e9s (la chair passe de translucide \u00e0 opaque des \u2154). La peau devient dor\u00e9e et croustillante.","**Retourner d\u00e9licatement, cuire 1-2 minutes c\u00f4t\u00e9 chair seulement** \u2014 la truite doit rester juste cuite (opaque, se d\u00e9fait \u00e0 la fourchette). Ne pas trop cuire.","Retirer, **reposer 2 minutes** peau vers le haut (garde le croustillant).","## Assemblage et service (3 min)","**Dans chaque assiette** : un lit de salade de quinoa \u00e0 l'orange (\u2155), 1 filet de truite peau vers le haut coiff\u00e9 d'une noisette de beurre aux herbes (il fond au contact), asperges r\u00f4ties au parmesan. Quartier de citron si d\u00e9sir\u00e9.","**Garder la 5\u1d49 portion.** La truite 2 jours (la peau perd son croustillant \u2014 d\u00e9licieuse froide \u00e9miett\u00e9e sur la salade de quinoa). Le quinoa 3-4 jours (se bonifie). Les asperges 2 jours. Emballer le beurre d'herbes \u00e0 part.","## Substitutions et hors saison","- **Truite saumon\u00e9e / omble chevalier** : \u00e9levage qu\u00e9b\u00e9cois, souvent moins cher que le saumon. Ou saumon (cuisson +2 min), truite arc-en-ciel.","- **Orange navel** : ou 2-3 cl\u00e9mentines en quartiers, ou pamplemousse rose en supr\u00eames (plus acidul\u00e9).","- **Quinoa** : ou tricolore, boulgour, couscous complet, riz sauvage.","- **Noix de Grenoble** : ou amandes effil\u00e9es grill\u00e9es, pistaches non sal\u00e9es, graines de tournesol.","- **Canneberges s\u00e9ch\u00e9es** : ou cerises s\u00e9ch\u00e9es, raisins secs dor\u00e9s, abricots secs hach\u00e9s.","- **Menthe fra\u00eeche** : ou basilic frais, ou coriandre.","- **Estragon** : ou persil seul, ou ciboulette. L'aneth s'accorde naturellement avec la truite.","- **Asperges** : en saison mai-juin au Qu\u00e9bec. Hors saison : haricots verts (12-15 min), brocolini.","## Sur la peau croustillante du poisson","| Trois r\u00e8gles absolues : peau tr\u00e8s s\u00e8che (\u00e9ponger + saler), po\u00eale bien chaude (surtout pas anti-adh\u00e9sive), et presser 30 sec au d\u00e9but pour un contact uniforme. Valable pour saumon, truite, bar, dorade, maquereau. Ne retourner qu'une seule fois."],"nut":[{"l":"\u00c9nergie","v":"730 kcal"},{"l":"Prot\u00e9ines","v":"45 g"},{"l":"Fibres","v":"11 g"},{"l":"Om\u00e9ga-3 EPA+DHA","v":"1,8 g"}],"ing_raw":["5 filets de truite saumon\u00e9e avec peau (170 g chacun, \u2248 850 g) \u2014 Mer & Monde id\u00e9al","2 1/2 c. \u00e0 soupe d'huile d'olive, 2 1/2 c. \u00e0 soupe de beurre, 3 c. \u00e0 soupe d'estragon ou persil + aneth (beurre aux herbes), zeste de 1 citron, sel/poivre","Quinoa : 300 g de quinoa (tricolore si possible) + 625 ml d'eau + sel","Salade : 1 orange navel en supr\u00eames (ou simplement 1 orange tranch\u00e9e), 80 g de canneberges s\u00e9ch\u00e9es (Patience Fruit & Co), 75 g de noix de Grenoble hach\u00e9es grill\u00e9es, 1/2 oignon rouge finement hach\u00e9, 1/3 tasse de menthe, 1/3 tasse de persil","Vinaigrette : 5 c. \u00e0 soupe d'huile d'olive, 3 c. \u00e0 soupe de jus d'orange frais, 1 1/4 c. \u00e0 soupe de vinaigre de cidre, 1 1/4 c. \u00e0 th\u00e9 de miel, 1 1/4 c. \u00e0 th\u00e9 de cumin moulu, sel/poivre","625 g d'asperges, 2 1/2 c. \u00e0 soupe d'huile d'olive, sel/poivre, 30 g de parmesan en copeaux"]},{"d":26,"w":4,"n":"Ven","wd":1,"t":"Bol bouddha au tofu marin\u00e9, edamame, l\u00e9gumes r\u00f4tis arc-en-ciel, riz brun, sauce arachide-gingembre","tt":"40 min","pt":"20 min","ct":"30 min","ing":["Tofu ferme set au calcium (750 g \u00b7 Soyganic, Sol Cuisine ou Unisoya \u2014 \u00e9viter le tofu mou)","## Marinade","Sauce soya (5 c. \u00e0 soupe)","Sirop d'\u00e9rable (2 1/2 c. \u00e0 soupe)","Huile de s\u00e9same grill\u00e9 (2 1/2 c. \u00e0 soupe)","Vinaigre de riz (2 1/2 c. \u00e0 soupe)","Gingembre r\u00e2p\u00e9 (3 cm)","2 gousses d'ail","F\u00e9cule de ma\u00efs (1 1/4 c. \u00e0 soupe)","##","2 patates douces moyennes (\u2248 700 g) en cubes","1 grosse couronne de brocoli en bouquets","1/2 chou rouge moyen (\u2248 400 g) en quartiers fins","5 carottes (orange, jaune, mauve si possible \u2014 march\u00e9 public) en b\u00e2tonnets","##","Huile d'olive (3 c. \u00e0 soupe)","Cumin (1 1/4 c. \u00e0 th\u00e9)","Sel et poivre","##","1 grosse betterave crue (\u2248 200 g) pel\u00e9e et r\u00e2p\u00e9e fin (pour topping cru)","##","Edamame surgel\u00e9s en cosses ou d\u00e9cortiqu\u00e9s (500 g)","## Riz brun","2 tasses Zojirushi (gobelet 180 ml) de riz brun \u00e0 grain court/moyen","Programme BROWN (~90 min)","## Sauce arachide-gingembre","Beurre d'arachide naturel (3 c. \u00e0 soupe)","Sauce soya r\u00e9duite (2 c. \u00e0 soupe)","Vinaigre de riz (1 c. \u00e0 soupe)","Sirop d'\u00e9rable (1 c. \u00e0 soupe)","Huile de s\u00e9same (1 c. \u00e0 th\u00e9)","Gingembre r\u00e2p\u00e9 (1 c. \u00e0 th\u00e9)","1 gousse d'ail r\u00e2p\u00e9e; d\u00e9tendre \u00e0 l'eau chaude","## Garnitures","Graines de s\u00e9same grill\u00e9es","Graines de chanvre (2 c. \u00e0 soupe)","Microverdures ou germes (1 barquette)","Coriandre (1/4 tasse)"],"inst":["## Un mot sur cette recette","| Un bol bouddha est un repas complet en bol : une base de c\u00e9r\u00e9ale, des l\u00e9gumes r\u00f4tis, une prot\u00e9ine, et une sauce qui lie le tout. Notre version : tofu marin\u00e9-r\u00f4ti croustillant, un arc-en-ciel de l\u00e9gumes r\u00f4tis (patate douce, brocoli, chou rouge, carottes) rehauss\u00e9 de betterave crue r\u00e2p\u00e9e, de l'edamame et une sauce cr\u00e9meuse arachide-gingembre. Le riz brun cuit au Zojirushi (programme BROWN).","## Sur le pressage du tofu","| Le tofu ferme contient beaucoup d'eau. **Le presser** avant de le mariner permet \u00e0 la marinade de p\u00e9n\u00e9trer et au tofu de dorer croustillant au lieu de cuire \u00e0 la vapeur. 20-30 minutes de pressage font une vraie diff\u00e9rence.","## Avant tout (mise en place \u2014 4 min)","**Presser le tofu en premier** (voir \u00e9tape suivante) et **lancer le riz brun au Zojirushi** \u2014 son cycle BROWN prend ~90 minutes. **Pr\u00e9chauffer le four \u00e0 220 \u00b0C (425 \u00b0F).** Tapisser deux plaques (tofu et l\u00e9gumes). Sortir le gobelet Zojirushi de 180 ml.","## Presser et couper le tofu (25 min \u2014 \u00e0 d\u00e9marrer en premier)","Sortir 750 g de tofu ferme (2 blocs), **\u00e9ponger et presser** : envelopper chaque bloc dans plusieurs \u00e9paisseurs d'essuie-tout ou un torchon propre, poser une planche dessus avec un poids (bo\u00eetes de conserve), **laisser 20-30 minutes.**","Apr\u00e8s pressage, **couper le tofu en cubes de 2,5 cm.**","## D\u00e9marrer le riz brun au Zojirushi","Mesurer **2 tasses Zojirushi** de riz brun \u00e0 grain court ou moyen. Rincer au tamis 30 sec, \u00e9goutter.","Verser dans le bol, ajouter de l'eau jusqu'\u00e0 la ligne **BROWN 2 cups**. S\u00e9lectionner le programme **BROWN**, START. Le cycle prend ~90 minutes \u2014 **le lancer en premier** (ou utiliser la fonction de d\u00e9part diff\u00e9r\u00e9 si on planifie).","## Mariner le tofu (5 min + r\u00f4tissage)","Marinade : 5 c. \u00e0 soupe de sauce soya, 2 \u00bd c. \u00e0 soupe de sirop d'\u00e9rable, 2 \u00bd c. \u00e0 soupe d'huile de s\u00e9same grill\u00e9, 2 \u00bd c. \u00e0 soupe de vinaigre de riz, 1 morceau de gingembre de 3 cm r\u00e2p\u00e9, 2 gousses d'ail r\u00e2p\u00e9es, 1 \u00bc c. \u00e0 soupe de f\u00e9cule de ma\u00efs (donne le croustillant). Fouetter.","M\u00e9langer d\u00e9licatement les cubes de tofu dans la marinade (ne pas les casser). Laisser 5-10 min, en remuant une fois \u00e0 mi-chemin.","\u00c9taler le tofu sur une plaque tapiss\u00e9e, en une seule couche, bien espac\u00e9 (garder la marinade non absorb\u00e9e pour arroser les l\u00e9gumes \u00e0 mi-cuisson si d\u00e9sir\u00e9). **Enfourner sur la grille du haut.** R\u00e9gler **25-30 minutes**, retourner \u00e0 mi-cuisson \u2014 dor\u00e9 et croustillant sur plusieurs faces.","## Pr\u00e9parer et r\u00f4tir les l\u00e9gumes arc-en-ciel (10 min prep + 25 min)","**Couper** : 2 patates douces moyennes (\u2248 700 g, non pel\u00e9es) en cubes de 2 cm, 1 grosse couronne de brocoli en bouquets, \u00bd chou rouge moyen (\u2248 400 g) en quartiers fins de 2 cm (retirer le c\u0153ur), 5 carottes en b\u00e2tonnets (orange, jaune, mauve si tu en trouves au march\u00e9 \u2014 l'effet arc-en-ciel).","Sur la deuxi\u00e8me plaque, m\u00e9langer avec 3 c. \u00e0 soupe d'huile d'olive, 1 \u00bc c. \u00e0 th\u00e9 de cumin, sel, poivre. \u00c9taler en une seule couche (utiliser deux plaques si trop serr\u00e9 \u2014 sinon \u00e7a cuit \u00e0 la vapeur au lieu de r\u00f4tir).","**Enfourner sur la grille du milieu.** R\u00e9gler **25 minutes**, retourner \u00e0 mi-cuisson. Tendres et caram\u00e9lis\u00e9s. Le chou rouge r\u00f4ti devient sucr\u00e9 et croustillant aux bords \u2014 souvent la surprise du bol.","## R\u00e2per la betterave crue (3 min)","Peler 1 grosse betterave crue (\u2248 200 g) et la r\u00e2per finement (gros trous ou robot). **Attention aux taches.** R\u00e9server \u2014 elle se sert crue en topping : croquant, couleur et fra\u00eecheur.","## Cuire l'edamame (6 min)","Porter une casserole d'eau sal\u00e9e \u00e0 \u00e9bullition. Ajouter 500 g d'edamame surgel\u00e9s (d\u00e9cortiqu\u00e9s de pr\u00e9f\u00e9rence pour un bol; si en cosses, les \u00e9cosser apr\u00e8s cuisson), cuire 4-5 min. \u00c9goutter. R\u00e9server.","## Pr\u00e9parer la sauce cr\u00e9meuse arachide-gingembre (5 min)","Fouetter : 3 c. \u00e0 soupe de beurre d'arachide naturel, 2 c. \u00e0 soupe de sauce soya r\u00e9duite, 1 c. \u00e0 soupe de vinaigre de riz, 1 c. \u00e0 soupe de sirop d'\u00e9rable, 1 c. \u00e0 th\u00e9 d'huile de s\u00e9same, 1 c. \u00e0 th\u00e9 de gingembre r\u00e2p\u00e9, 1 gousse d'ail r\u00e2p\u00e9e.","**D\u00e9tendre avec de l'eau chaude, 1 c. \u00e0 soupe \u00e0 la fois**, jusqu'\u00e0 consistance nappante et coulante (3-4 c. \u00e0 soupe d'eau). Go\u00fbter, ajuster.","## Pr\u00e9parer les garnitures fra\u00eeches (2 min)","Hacher \u00bc tasse de coriandre. Sortir les graines de s\u00e9same grill\u00e9es, 2 c. \u00e0 soupe de graines de chanvre et, optionnel, 1 barquette de micro-pousses ou de germes.","## V\u00e9rifier le riz et assembler (3 min)","Quand le Zojirushi a sonn\u00e9, **laisser reposer 5 min**, \u00e9grainer \u00e0 la fourchette.","**Dans chaque bol** : un lit de riz brun (\u2155), dispos\u00e9s en secteurs distincts (esth\u00e9tique arc-en-ciel) \u2014 l\u00e9gumes r\u00f4tis, tofu croustillant, edamame, et une poign\u00e9e de betterave crue r\u00e2p\u00e9e. **Arroser g\u00e9n\u00e9reusement de sauce arachide-gingembre.** Parsemer de coriandre, graines de s\u00e9same, graines de chanvre et micro-pousses.","**Garder la 5\u1d49 portion** \u2014 excellent lunch (assembler froid ou ti\u00e8de). Tout se conserve 3-4 jours s\u00e9par\u00e9ment. **Garder la sauce \u00e0 part** (elle \u00e9paissit \u2014 d\u00e9tendre avec un peu d'eau). Le tofu perd un peu de croustillant mais reste bon.","## Substitutions et hors saison","- **Tofu ferme/extra-ferme** : Unisoya (qu\u00e9b\u00e9cois), Sunrise. Ou tempeh (plus ferme, go\u00fbt de noix), edamame suppl\u00e9mentaire, ou poulet/crevettes pour une version non v\u00e9g\u00e9.","- **Riz brun** : au Zojirushi programme BROWN. Ou quinoa (casserole 15 min), riz sauvage, farro, orge.","- **Beurre d'arachide** : naturel sans sucre. Ou beurre d'amande, tahini (sans arachide), beurre de tournesol (sans noix).","- **L\u00e9gumes arc-en-ciel** : adapter \u00e0 la saison \u2014 courge, chou-fleur, choux de Bruxelles, panais en hiver.","- **Betterave crue** : ou carotte r\u00e2p\u00e9e suppl\u00e9mentaire, ou radis en fines tranches.","- **Edamame** : ou pois chiches r\u00f4tis, haricots noirs.","- **Huile de s\u00e9same grill\u00e9** : Kadoya, Lee Kum Kee.","- **Micro-pousses** : ou germes de luzerne, jeunes \u00e9pinards, coriandre extra.","## Sur l'assemblage des bols bouddha","| La formule universelle : \u2153 c\u00e9r\u00e9ale + \u2153 l\u00e9gumes + \u2153 prot\u00e9ine, une sauce qui lie, un \u00e9l\u00e9ment croquant (noix, graines), un \u00e9l\u00e9ment frais (herbes, pousses). Une fois la formule ma\u00eetris\u00e9e, on improvise avec ce qu'on a. Id\u00e9al pour vider le frigo."],"nut":[{"l":"\u00c9nergie","v":"720 kcal"},{"l":"Prot\u00e9ines","v":"34 g"},{"l":"Fibres","v":"19 g (70 %)"},{"l":"Fer","v":"8 mg"}],"ing_raw":["750 g de tofu ferme set au calcium (Soyganic, Sol Cuisine ou Unisoya \u2014 \u00e9viter le tofu mou)","Marinade : 5 c. \u00e0 soupe de sauce soya, 2 1/2 c. \u00e0 soupe de sirop d'\u00e9rable, 2 1/2 c. \u00e0 soupe d'huile de s\u00e9same grill\u00e9, 2 1/2 c. \u00e0 soupe de vinaigre de riz, 3 cm de gingembre r\u00e2p\u00e9, 2 gousses d'ail, 1 1/4 c. \u00e0 soupe de f\u00e9cule de ma\u00efs","2 patates douces moyennes (\u2248 700 g) en cubes, 1 grosse couronne de brocoli en bouquets, 1/2 chou rouge moyen (\u2248 400 g) en quartiers fins, 5 carottes (orange, jaune, mauve si possible \u2014 march\u00e9 public) en b\u00e2tonnets","3 c. \u00e0 soupe d'huile d'olive, 1 1/4 c. \u00e0 th\u00e9 de cumin, sel/poivre","1 grosse betterave crue (\u2248 200 g) pel\u00e9e et r\u00e2p\u00e9e fin (pour topping cru)","500 g d'edamame surgel\u00e9s en cosses ou d\u00e9cortiqu\u00e9s","Riz brun : 2 tasses Zojirushi (gobelet 180 ml) de riz brun \u00e0 grain court/moyen, programme BROWN (~90 min)","Sauce arachide-gingembre : 3 c. \u00e0 soupe de beurre d'arachide naturel, 2 c. \u00e0 soupe de sauce soya r\u00e9duite, 1 c. \u00e0 soupe de vinaigre de riz, 1 c. \u00e0 soupe de sirop d'\u00e9rable, 1 c. \u00e0 th\u00e9 d'huile de s\u00e9same, 1 c. \u00e0 th\u00e9 de gingembre r\u00e2p\u00e9, 1 gousse d'ail r\u00e2p\u00e9e; d\u00e9tendre \u00e0 l'eau chaude","Garnitures : graines de s\u00e9same grill\u00e9es, graines de chanvre (2 c. \u00e0 soupe), microverdures ou germes (1 barquette), 1/4 tasse de coriandre"]},{"d":27,"w":4,"n":"Sam","wd":0,"t":"Tajine de b\u0153uf \u00e0 braiser aux \u00e9pices nord-africaines, semoule compl\u00e8te aux herbes, courgettes et tomates r\u00f4ties \u00e0 l'ail","tt":"2 h 40 (mains: 30 min)","pt":"25 min","ct":"2 h 15","ing":["1,5 kg de paleron ou macreuse de b\u0153uf d\u00e9soss\u00e9 (Costco b\u0153uf \u00e0 braiser en sac sous-vide, \u00e9conomique) en cubes de 5 cm","## Marinade","Ras-el-hanout (1 1/4 c. \u00e0 soupe)","Cumin moulu (1 1/4 c. \u00e0 soupe)","Coriandre moulue (1 1/4 c. \u00e0 soupe)","Cannelle (1 c. \u00e0 th\u00e9)","Paprika fum\u00e9 (1 c. \u00e0 th\u00e9)","Gingembre moulu (1 c. \u00e0 th\u00e9)","Sel mod\u00e9r\u00e9","Poivre","##","Huile d'olive (3 c. \u00e0 soupe)","2 gros oignons","6 gousses d'ail","Gingembre frais (5 cm)","##","P\u00e2te de tomate (2 1/2 c. \u00e0 soupe)","Bouillon de poulet faible en sodium (750 ml)","1 bo\u00eete (398 ml) de tomates en d\u00e9s","##","Zeste et jus de 1 citron","1 b\u00e2ton de cannelle","Abricots secs (150 g \u00b7 \u2248 12)","1 bo\u00eete (540 ml) de pois chiches rinc\u00e9s","##","Coriandre (1/2 tasse)","Persil (1/2 tasse)","## Semoule compl\u00e8te","375 g","Bouillon faible en sodium (500 ml)","Huile (2 1/2 c. \u00e0 soupe)","Sel mod\u00e9r\u00e9","Menthe (1/4 tasse)","Persil (1/4 tasse)","Zeste de 1 citron","## L\u00e9gumes r\u00f4tis","4 courgettes","6 tomates italiennes","6 gousses d'ail enti\u00e8res","Huile (3 c. \u00e0 soupe)","Origan (1 c. \u00e0 soupe)","Sel et poivre","## Salade","1 grande romaine","1/2 concombre","1 grosse tomate","Vinaigrette citron-huile-cumin"],"inst":["## Un mot sur cette recette","| Ce tajine de b\u0153uf marie la technique du brais\u00e9 lent (comme le b\u0153uf \u00e0 la bi\u00e8re) au profil d'\u00e9pices nord-africain (comme le tajine de poulet). Le b\u0153uf \u00e0 braiser devient fondant apr\u00e8s 1 h 30 de cuisson douce; le ras-el-hanout, les abricots secs et les pois chiches cr\u00e9ent l'\u00e9quilibre sucr\u00e9-sal\u00e9 caract\u00e9ristique. Un plat r\u00e9confortant et parfum\u00e9.","## La veille (optionnel)","**Assaisonner le b\u0153uf \u00e0 l'avance** : couper en cubes, frotter avec le m\u00e9lange d'\u00e9pices, r\u00e9frig\u00e9rer 12-24 h. Approfondit la saveur.","## Avant tout (mise en place \u2014 4 min)","Sortir le b\u0153uf **1 heure avant** pour temp\u00e9rer. **Pr\u00e9chauffer le four \u00e0 160 \u00b0C (325 \u00b0F).** Sortir une grande cocotte en fonte \u00e9maill\u00e9e (5-6 L) avec couvercle.","## Pr\u00e9parer et assaisonner le b\u0153uf (6 min)","**Couper 1,5 kg de b\u0153uf \u00e0 braiser** (paleron ou macreuse) en cubes de 4-5 cm. **\u00c9ponger \u00e0 fond.**","**M\u00e9lange d'\u00e9pices** : 1\u00bc c. \u00e0 soupe de ras-el-hanout, 1\u00bc c. \u00e0 soupe de cumin moulu, 1\u00bc c. \u00e0 soupe de coriandre moulue, 1 c. \u00e0 th\u00e9 de cannelle, 1 c. \u00e0 th\u00e9 de paprika fum\u00e9, 1 c. \u00e0 th\u00e9 de gingembre moulu, sel mod\u00e9r\u00e9, poivre. Frotter les cubes \u00e9nergiquement.","## Saisir le b\u0153uf (15 min \u2014 critique)","Chauffer la cocotte \u00e0 feu vif \u00e0 sec 2 min. Ajouter 2 c. \u00e0 soupe d'huile d'olive. **Saisir le b\u0153uf en 3-4 petits lots** sans surcharger (sinon il bout). Chaque lot : 2-3 min sans bouger, retourner, 2 min. Au moins 2 c\u00f4t\u00e9s bien dor\u00e9s. R\u00e9server.","**Ne pas nettoyer le fond** \u2014 les sucs sont la base de la saveur.","## Faire les aromates (7 min)","\u00c9mincer 2 gros oignons en cubes de 1 cm. Baisser \u00e0 feu moyen, ajouter 1 c. \u00e0 soupe d'huile, les oignons avec une pinc\u00e9e de sel. Cuire **6 minutes** en raclant le fond.","Ajouter 6 gousses d'ail hach\u00e9es et 1 morceau de gingembre frais de 5 cm r\u00e2p\u00e9, cuire 1 min. Ajouter 2\u00bd c. \u00e0 soupe de p\u00e2te de tomate. **Pincer** la p\u00e2te 1 minute \u2014 elle fonce et perd son go\u00fbt cru.","## Monter le tajine et enfourner (5 min + 1 h 30)","Verser 750 ml de bouillon de poulet faible en sodium chaud en raclant le fond. Ajouter : le b\u0153uf r\u00e9serv\u00e9 avec ses jus, 1 bo\u00eete (398 ml) de tomates en d\u00e9s, 1 b\u00e2ton de cannelle.","Le liquide couvre le b\u0153uf aux \u2154. Porter \u00e0 \u00e9bullition, **couvrir, enfourner sur la grille du bas. R\u00e9gler 1 h 30.**","## Pr\u00e9parer la semoule compl\u00e8te (pendant le braisage)","Dans un grand bol, mettre 375 g de semoule de bl\u00e9 compl\u00e8te (couscous complet). Chauffer 500 ml de bouillon faible en sodium (ou d'eau mod\u00e9r\u00e9ment sal\u00e9e) \u00e0 \u00e9bullition avec 2\u00bd c. \u00e0 soupe d'huile d'olive.","**Verser le liquide bouillant sur la semoule, couvrir 5 minutes.** \u00c9grainer \u00e0 la fourchette. Incorporer \u00bc tasse de menthe et \u00bc tasse de persil hach\u00e9s, et le zeste de 1 citron (garder le jus du citron pour la fin). R\u00e9server couvert \u2014 \u00e0 r\u00e9chauffer doucement au service.","## Pr\u00e9parer les courgettes-tomates r\u00f4ties (10 min prep + 25 min)","**Couper 4 courgettes en demi-lunes de 1,5 cm** et 6 tomates italiennes en quartiers (\u00e9p\u00e9pin\u00e9es si tr\u00e8s juteuses). Sur une plaque, m\u00e9langer avec 6 gousses d'ail enti\u00e8res en chemise (l\u00e9g\u00e8rement \u00e9cras\u00e9es du plat du couteau), 3 c. \u00e0 soupe d'huile d'olive, 1 c. \u00e0 soupe d'origan, sel, poivre.","**Aux 25 derni\u00e8res minutes du braisage**, enfourner la plaque sur la grille du haut (le four est \u00e0 160 \u00b0C \u2014 les l\u00e9gumes r\u00f4tiront doucement; monter \u00e0 200 \u00b0C les 10 derni\u00e8res minutes pour caram\u00e9liser). L'ail confit en chemise se presse \u00e0 table \u2014 un d\u00e9lice sur la semoule.","## Pr\u00e9parer la salade (5 min)","Romaine en morceaux, \u00bd concombre en demi-lunes, 1 grosse tomate en quartiers. Vinaigrette citron-huile-cumin : 3 c. \u00e0 soupe d'huile d'olive, 1 c. \u00e0 soupe de jus de citron (la moiti\u00e9 du citron zest\u00e9), \u00bd c. \u00e0 th\u00e9 de cumin, sel, poivre. Fouetter. Assembler au service.","## Ajouter abricots et pois chiches (aux 30 derni\u00e8res minutes)","Quand il reste ~30 min au braisage, sortir la cocotte. Ajouter 150 g d'abricots secs (coup\u00e9s en deux) et 1 bo\u00eete (540 ml) de pois chiches rinc\u00e9s. Remettre au four **sans couvercle les 15 derni\u00e8res minutes** \u2014 la sauce r\u00e9duit et les abricots regonflent.","## V\u00e9rifier le brais\u00e9 (2 min)","\u00c0 1 h 30, le b\u0153uf doit \u00eatre fondant (une fourchette s'y enfonce sans r\u00e9sistance), la sauce \u00e9paisse et parfum\u00e9e, les abricots moelleux. Si trop liquide, r\u00e9duire \u00e0 feu vif sur la cuisini\u00e8re 5-8 min. Retirer le b\u00e2ton de cannelle. **Presser le jus de la moiti\u00e9 restante du citron dans la sauce**, go\u00fbter, ajuster le sel.","## Assemblage et service (3 min)","Hacher grossi\u00e8rement \u00bd tasse de coriandre et \u00bd tasse de persil.","**Dans chaque assiette** : un lit de semoule aux herbes (\u2155), une portion de tajine de b\u0153uf avec abricots et pois chiches, courgettes-tomates r\u00f4ties avec leur ail confit. Parsemer g\u00e9n\u00e9reusement d'herbes fra\u00eeches. Salade \u00e0 c\u00f4t\u00e9.","**Garder la 5\u1d49 portion.** **Le tajine est bien meilleur le lendemain.** Se cong\u00e8le tr\u00e8s bien (3 mois). La semoule 3 jours.","## Substitutions et hors saison","- **B\u0153uf \u00e0 braiser** (paleron, macreuse, palette, jarret) : riches en collag\u00e8ne. **\u00c0 \u00e9viter** : coupes maigres (surlonge, filet).","- **Ras-el-hanout** : Al'Fez, Sadaf, ou en vrac. Ou m\u00e9lange maison : cumin + coriandre moulue + curcuma + cannelle + gingembre + cardamome + poivre.","- **Abricots secs** : ou pruneaux d\u00e9noyaut\u00e9s (variante classique), dattes Medjool, figues s\u00e9ch\u00e9es.","- **Pois chiches** : ou haricots blancs. Ou omettre et servir plus de semoule.","- **Semoule compl\u00e8te** : ou couscous ordinaire, boulgour, quinoa.","- **Courgettes** : en \u00e9t\u00e9. Hors saison : aubergine, courge, carottes en rondelles (r\u00f4tir 10 min de plus).","- **B\u00e2ton de cannelle** : ou \u00bc c. \u00e0 th\u00e9 de cannelle moulue suppl\u00e9mentaire dans les \u00e9pices."],"nut":[{"l":"\u00c9nergie","v":"760 kcal"},{"l":"Prot\u00e9ines","v":"54 g"},{"l":"Fibres","v":"12 g"},{"l":"Fer","v":"8 mg (h\u00e9minique)"}],"ing_raw":["1,5 kg de paleron ou macreuse de b\u0153uf d\u00e9soss\u00e9 (Costco b\u0153uf \u00e0 braiser en sac sous-vide, \u00e9conomique) en cubes de 5 cm","Marinade : 1 1/4 c. \u00e0 soupe de ras-el-hanout, 1 1/4 c. \u00e0 soupe de cumin moulu, 1 1/4 c. \u00e0 soupe de coriandre moulue, 1 c. \u00e0 th\u00e9 de cannelle, 1 c. \u00e0 th\u00e9 de paprika fum\u00e9, 1 c. \u00e0 th\u00e9 de gingembre moulu, sel mod\u00e9r\u00e9, poivre","3 c. \u00e0 soupe d'huile d'olive, 2 gros oignons, 6 gousses d'ail, 5 cm de gingembre frais","2 1/2 c. \u00e0 soupe de p\u00e2te de tomate, 750 ml de bouillon de poulet faible en sodium, 1 bo\u00eete (398 ml) de tomates en d\u00e9s","Zeste et jus de 1 citron, 1 b\u00e2ton de cannelle, 150 g d'abricots secs (\u2248 12), 1 bo\u00eete (540 ml) de pois chiches rinc\u00e9s","1/2 tasse de coriandre + 1/2 tasse de persil","Semoule compl\u00e8te : 375 g + 500 ml de bouillon faible en sodium + 2 1/2 c. \u00e0 soupe d'huile + sel mod\u00e9r\u00e9 + 1/4 tasse de menthe + 1/4 tasse de persil + zeste de 1 citron","L\u00e9gumes r\u00f4tis : 4 courgettes, 6 tomates italiennes, 6 gousses d'ail enti\u00e8res, 3 c. \u00e0 soupe d'huile, 1 c. \u00e0 soupe d'origan, sel/poivre","Salade : 1 grande romaine, 1/2 concombre, 1 grosse tomate, vinaigrette citron-huile-cumin"]},{"d":28,"w":4,"n":"Dim","wd":0,"t":"Crevettes g\u00e9antes \u00e0 l'ail et citron sur orzo cr\u00e9meux aux champignons, haricots verts, salade roquette-poire-parmesan","tt":"45 min","pt":"15 min","ct":"30 min","ing":["Crevettes 21-25 d\u00e9cortiqu\u00e9es et d\u00e9vein\u00e9es (600 g)","Queues laiss\u00e9es (Costco grand sac surgel\u00e9; d\u00e9congeler 30 min eau froide)","##","Huile d'olive (3 c. \u00e0 soupe)","4 gousses d'ail \u00e9minc\u00e9es","Jus de 1 citron","Zeste de 1/2 citron","Persil (2 c. \u00e0 soupe)","Flocons de piment","Sel et poivre","## Orzo","Orzo (400 g \u00b7 p\u00e2tes)","1,2 L de bouillon de poulet faible en sodium (gard\u00e9 fr\u00e9missant)","##","1 oignon hach\u00e9","3 gousses d'ail","Huile d'olive (2 c. \u00e0 soupe)","Beurre (2 c. \u00e0 soupe)","## Champignons","Cremini (250 g)","Portobello (Costco champignons m\u00e9lang\u00e9s) tranch\u00e9s (150 g)","Huile (2 c. \u00e0 soupe)","Thym frais","Sel et poivre","## Finition orzo","Parmesan r\u00e2p\u00e9 (75 g)","Beurre froid (40 g)","Jus de 1/2 citron","## Haricots verts","400 g","Beurre (1 1/2 c. \u00e0 soupe)","2 gousses d'ail","Jus de 1/2 citron","Persil (1 c. \u00e0 soupe)","Sel et poivre","## Salade","Roquette (150 g)","1 poire tranch\u00e9e fin","Parmesan en copeaux (40 g)","Vinaigrette balsamique blanc-miel-Dijon"],"inst":["## Un mot sur cette recette","| Des crevettes saut\u00e9es \u00e0 l'ail et au citron sur un orzo cr\u00e9meux aux champignons \u2014 un plat \u00e9l\u00e9gant qui a l'air compliqu\u00e9 mais se fait en 30 minutes actives. L'orzo (p\u00e2te en forme de grain de riz) cuit fa\u00e7on risotto, en absorbant le bouillon louche par louche, pour une texture cr\u00e9meuse sans cr\u00e8me. Les crevettes se cuisent en 3-4 minutes \u00e0 la toute fin.","## Avant tout (mise en place \u2014 4 min)","**D\u00e9congeler les crevettes** (la veille au frigo, ou 30 min dans l'eau froide, sac \u00e9tanche). \u00c9ponger. Sortir une grande po\u00eale profonde (orzo), une deuxi\u00e8me po\u00eale (crevettes), une casserole pour blanchir les haricots.","## Pr\u00e9parer le bouillon et les champignons (5 min)","Garder 1,2 L de bouillon de poulet faible en sodium **fr\u00e9missant** dans une casserole \u00e0 feu doux (l'orzo l'absorbera progressivement).","**Nettoyer 250 g de cremini et 150 g de portobello** (brosser, pas d'eau), trancher en lamelles de 5 mm. Hacher 1 oignon en petits d\u00e9s, \u00e9mincer 3 gousses d'ail.","## Cuire les champignons (6 min)","Dans la grande po\u00eale profonde, chauffer 2 c. \u00e0 soupe d'huile \u00e0 feu moyen-vif. Ajouter les champignons en une couche, **ne pas remuer 3 minutes** (caram\u00e9lisation). Remuer, ajouter 2-3 branches de thym frais effeuill\u00e9es et une pinc\u00e9e de sel, cuire 2-3 min jusqu'\u00e0 dor\u00e9s et sans humidit\u00e9. **Retirer la moiti\u00e9** pour la garniture.","## Cuire l'orzo fa\u00e7on risotto (18 min)","Dans la m\u00eame po\u00eale (avec la moiti\u00e9 des champignons), ajouter 2 c. \u00e0 soupe d'huile d'olive + 2 c. \u00e0 soupe de beurre. Ajouter l'oignon avec une pinc\u00e9e de sel, cuire 3 min jusqu'\u00e0 translucide. Ajouter l'ail, 30 sec.","Ajouter 400 g d'orzo, **nacrer 1-2 minutes** en remuant (les grains deviennent translucides sur les bords).","**D\u00e9glacer avec une grosse louche de bouillon** en raclant le fond, laisser absorber 1 min.","**Ajouter le bouillon chaud, une louche \u00e0 la fois** (~250 ml), en remuant r\u00e9guli\u00e8rement. Attendre que le liquide soit presque absorb\u00e9 avant la louche suivante. R\u00e9p\u00e9ter **15-18 minutes** \u2014 l'orzo devient tendre et cr\u00e9meux (al dente au c\u0153ur). Il restera peut-\u00eatre un peu de bouillon, c'est normal.","Hors du feu, incorporer 75 g de parmesan r\u00e2p\u00e9, 40 g de beurre froid en d\u00e9s et le jus de \u00bd citron. Remuer vigoureusement \u2014 c'est le **mantecare** du risotto, qui lie et fait briller. Go\u00fbter, ajuster. R\u00e9server couvert (d\u00e9tendre avec un peu de bouillon si \u00e7a \u00e9paissit).","## Blanchir les haricots verts (8 min)","**Parer 400 g de haricots verts.** Porter une casserole d'eau sal\u00e9e \u00e0 \u00e9bullition, pr\u00e9parer un bol d'eau glac\u00e9e. Cuire les haricots **4 minutes**, \u00e9goutter, **choc thermique dans l'eau glac\u00e9e 2 min.** \u00c9goutter, essuyer.","## Finir les haricots verts (ail-citron-persil \u2014 3 min)","Dans une po\u00eale, faire fondre 1\u00bd c. \u00e0 soupe de beurre \u00e0 feu moyen. Ajouter 2 gousses d'ail \u00e9minc\u00e9es, remuer 30 sec (ne pas brunir). Ajouter les haricots blanchis, sauter 2 min. Presser le jus de \u00bd citron, ajouter 1 c. \u00e0 soupe de persil hach\u00e9, sel, poivre. R\u00e9server.","## Pr\u00e9parer la salade roquette-poire-parmesan (5 min)","Dans un saladier, mettre 150 g de roquette, 1 poire tranch\u00e9e fin (arros\u00e9e de jus de citron), 40 g de copeaux de parmesan.","Vinaigrette : 3 c. \u00e0 soupe d'huile d'olive, 1 c. \u00e0 soupe de vinaigre balsamique blanc, \u00bd c. \u00e0 th\u00e9 de moutarde de Dijon, 1 c. \u00e0 th\u00e9 de miel, sel, poivre. Fouetter. Assembler au service.","## Cuire les crevettes ail-citron (5 min \u2014 \u00e9tape finale)","**\u00c9ponger les 600 g de crevettes 21-25** d\u00e9cortiqu\u00e9es d\u00e9vein\u00e9es (queues laiss\u00e9es). Saler, poivrer.","Chauffer la deuxi\u00e8me po\u00eale \u00e0 feu moyen-vif, ajouter 2 c. \u00e0 soupe d'huile d'olive. Ajouter 4 gousses d'ail \u00e9minc\u00e9es, remuer 30 sec.","**Ajouter les crevettes en une seule couche.** Cuire **1\u00bd \u00e0 2 minutes par c\u00f4t\u00e9** \u2014 roses et recourb\u00e9es en **C l\u00e2che** (un O serr\u00e9 = trop cuit). Presser le jus de 1 citron, ajouter le zeste de \u00bd citron, 2 c. \u00e0 soupe de persil, une pinc\u00e9e de flocons de piment et la derni\u00e8re c. \u00e0 soupe d'huile d'olive. Retirer du feu.","## Assemblage et service (3 min)","**Dans chaque assiette** : un lit d'orzo cr\u00e9meux aux champignons (\u2155), les crevettes ail-citron par-dessus avec leur jus, les champignons r\u00e9serv\u00e9s en garniture, haricots verts \u00e0 c\u00f4t\u00e9. Salade roquette-poire \u00e0 part.","**Servir imm\u00e9diatement** \u2014 l'orzo est meilleur cr\u00e9meux et les crevettes juste cuites.","**Garder la 5\u1d49 portion \u2014 1 jour maximum** (les crevettes se conservent mal). R\u00e9chauffer doucement l'orzo avec un peu de bouillon. Les crevettes trop cuites en r\u00e9chauffant : les manger froides sur la salade est pr\u00e9f\u00e9rable.","## Substitutions et hors saison","- **Crevettes 21-25** : Costco grand sac surgel\u00e9. Ou 16-20 (2 min/c\u00f4t\u00e9), p\u00e9toncles (2 min/c\u00f4t\u00e9), morceaux de poisson blanc ferme, poulet en lani\u00e8res.","- **Orzo** : ou riz arborio (cuisson +5 min), petites p\u00e2tes (fregola, ptitim).","- **Champignons cremini-portobello** : ou blancs, shiitakes, m\u00e9lange de sauvages.","- **Envie d'une touche de vin?** Remplacer la premi\u00e8re louche de bouillon par 125 ml de vin blanc sec (Pinot Grigio) \u2014 \u00e0 ajouter \u00e0 l'\u00e9picerie.","- **Roquette** : ou mesclun, jeunes \u00e9pinards, cresson.","- **Poire** : Bartlett, Bosc. Ou pomme croquante, figues fra\u00eeches.","- **Haricots verts** : ou asperges (blanchir 3 min), brocolini, pois mange-tout.","## Sur la cuisson des crevettes","| Les crevettes cuisent en 3-4 minutes total, pas plus. Le signe visuel : elles passent de gris translucide \u00e0 rose opaque et se recourbent. Un **C l\u00e2che = parfait**; un **O serr\u00e9 = trop cuit** (caoutchouteuses). Toujours les cuire en dernier, juste avant de servir."],"nut":[{"l":"\u00c9nergie","v":"720 kcal"},{"l":"Prot\u00e9ines","v":"42 g"},{"l":"Fibres","v":"7 g"},{"l":"Fer","v":"3,5 mg"}],"ing_raw":["600 g de crevettes 21-25 d\u00e9cortiqu\u00e9es et d\u00e9vein\u00e9es, queues laiss\u00e9es (Costco grand sac surgel\u00e9; d\u00e9congeler 30 min eau froide)","3 c. \u00e0 soupe d'huile d'olive, 4 gousses d'ail \u00e9minc\u00e9es, jus de 1 citron, zeste de 1/2 citron, 2 c. \u00e0 soupe de persil, sel/poivre, flocons de piment","Orzo : 400 g d'orzo (p\u00e2tes), 1,2 L de bouillon de poulet faible en sodium (gard\u00e9 fr\u00e9
