<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#2E5F4F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Menu Famille">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<title>Menu Famille — 28 soupers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAF5E9;
  --surface: #FFFFFF;
  --primary: #2E5F4F;
  --primary-soft: rgba(46, 95, 79, 0.08);
  --primary-strong: #1F4337;
  --accent: #B5694B;
  --accent-soft: rgba(181, 105, 75, 0.1);
  --text: #1F2E26;
  --muted: #6B7F75;
  --divider: #E5DECD;
  --warning: #C8893E;
  --success: #5A8A6F;
  --danger: #A04D3A;
  --serif: 'Fraunces', Georgia, serif;
  --sans: 'Hanken Grotesk', system-ui, -apple-system, sans-serif;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html { font-size: 16px; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
  font-feature-settings: "ss01";
  overflow-x: hidden;
}

button, input, textarea, select {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
  border: none;
  background: none;
}

button { cursor: pointer; }

/* Layout container — mobile-first, max 480px on desktop */
#app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
  background: var(--bg);
}

#main {
  padding-bottom: 90px;
  min-height: 100vh;
}

/* Bottom Tab Bar */
#tabbar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: rgba(250, 245, 233, 0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--divider);
  padding-bottom: env(safe-area-inset-bottom);
}
#tabbar-inner {
  max-width: 480px;
  margin: 0 auto;
  display: flex;
  justify-content: space-around;
  padding: 6px 4px;
}
.tab-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 6px 4px;
  border-radius: 8px;
  color: var(--muted);
  transition: all 0.15s;
}
.tab-btn.active { color: var(--primary); }
.tab-btn svg { width: 22px; height: 22px; stroke-width: 1.8; }
.tab-btn.active svg { stroke-width: 2.2; }
.tab-btn span { font-size: 10px; font-weight: 500; line-height: 1; }

/* Common UI */
.view { padding: 16px; padding-bottom: 0; }

.page-title {
  font-family: var(--serif);
  font-size: 30px;
  font-weight: 500;
  line-height: 1.15;
  margin-bottom: 4px;
}
.page-subtitle {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 20px;
}

.eyebrow {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  font-weight: 600;
  margin-bottom: 4px;
}

.section-title {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
  color: var(--muted);
  margin: 24px 4px 12px;
}
.section-title.accent { color: var(--accent); }

/* Card */
.card {
  background: var(--surface);
  border: 1px solid var(--divider);
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 1px 2px rgba(31, 46, 38, 0.04);
  transition: transform 0.15s;
  width: 100%;
  text-align: left;
}
button.card:active { transform: scale(0.985); }

.card + .card { margin-top: 10px; }

/* Badges */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
}
.badge-primary { background: var(--primary-soft); color: var(--primary); }
.badge-accent { background: var(--accent-soft); color: var(--accent); }
.badge-warning { background: rgba(200, 137, 62, 0.1); color: var(--warning); }
.badge-success { background: rgba(90, 138, 111, 0.1); color: var(--success); }

.pill {
  padding: 7px 14px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 500;
  background: var(--surface);
  border: 1px solid var(--divider);
  color: var(--text);
  white-space: nowrap;
  flex-shrink: 0;
}
.pill.active { background: var(--primary); border-color: var(--primary); color: white; }

/* Buttons */
.btn-primary {
  background: var(--primary);
  color: white;
  padding: 12px 16px;
  border-radius: 12px;
  font-weight: 500;
  font-size: 14px;
  text-align: center;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: transform 0.1s, background 0.15s;
}
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled { opacity: 0.4; }

.btn-secondary {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--divider);
  padding: 12px 16px;
  border-radius: 12px;
  font-weight: 500;
  font-size: 14px;
  transition: transform 0.1s;
}
.btn-secondary:active { transform: scale(0.98); }

.btn-ghost {
  color: var(--primary);
  font-size: 13px;
  font-weight: 600;
  padding: 6px 10px;
}

.btn-danger-ghost {
  background: var(--surface);
  color: var(--danger);
  border: 1px solid rgba(160, 77, 58, 0.25);
  padding: 12px;
  border-radius: 12px;
  font-weight: 500;
  font-size: 14px;
  width: 100%;
}

/* Header (sticky) */
.header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--bg);
  padding: 18px 16px 10px;
  border-bottom: 1px solid var(--divider);
  display: flex;
  align-items: center;
  gap: 8px;
}
.header-back { 
  background: transparent; 
  padding: 6px; 
  margin-left: -6px;
  border-radius: 50%;
}
.header-back:active { background: rgba(0,0,0,0.05); }
.header-title-wrap { flex: 1; text-align: center; }
.header-title { font-size: 15px; font-weight: 500; }
.header-subtitle { font-size: 11px; color: var(--muted); }
.header-action { padding: 6px; }

/* Inputs */
.input, .textarea {
  background: var(--bg);
  border: 1px solid var(--divider);
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 16px;
  color: var(--text);
  width: 100%;
  outline: none;
  font-family: inherit;
}
.textarea { resize: vertical; min-height: 80px; }
.input:focus, .textarea:focus { border-color: var(--primary); }

.search-wrap {
  position: relative;
  margin-bottom: 12px;
}
.search-wrap svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  width: 16px;
  height: 16px;
}
.search-wrap input {
  padding-left: 36px;
  background: var(--surface);
  border: 1px solid var(--divider);
  border-radius: 12px;
  padding-top: 10px;
  padding-bottom: 10px;
  width: 100%;
  font-size: 16px;
}

/* Filter scroll */
.filter-scroll {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 4px 0 8px;
  margin: 0 -16px;
  padding-left: 16px;
  padding-right: 16px;
  scrollbar-width: none;
}

/* Tags de la bibliothèque sur deux lignes */
.filter-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 4px 0 8px;
}
.filter-wrap .pill { flex: 0 0 auto; }

/* Indicateurs de « J'aime » sur les cartes */
.card-like-summary { display: inline-flex; align-items: center; gap: 8px; margin-left: auto; }
.card-like { display: inline-flex; align-items: center; gap: 3px; font-size: 12px; }
.card-like svg { width: 13px; height: 13px; }
.card-like.up { color: var(--success, #4a7c59); }
.card-like.down { color: var(--muted); }
.card-fav { color: var(--accent); display: inline-flex; align-items: center; }
.card-fav svg { width: 14px; height: 14px; }
.badge-fav { background: var(--accent-soft); color: var(--accent); display: inline-flex; align-items: center; gap: 4px; }
.badge-fav svg { width: 12px; height: 12px; }
.recipe-meta { flex-wrap: wrap; }

.filter-scroll::-webkit-scrollbar { display: none; }

/* Recipe card */
.recipe-card-content { display: flex; flex-direction: column; gap: 8px; }
.recipe-card-badges { display: flex; gap: 6px; flex-wrap: wrap; }
.recipe-title {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 15px;
  line-height: 1.3;
  color: var(--text);
}
.recipe-title.large { font-size: 20px; }
.recipe-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 12px;
  color: var(--muted);
}

/* Like chips */
.like-chips { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.like-chip {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 4px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  background: var(--surface);
  border: 1px solid var(--divider);
  color: var(--muted);
}
.like-chip.yes { background: var(--success); color: white; border-color: var(--success); }
.like-chip.no { background: var(--danger); color: white; border-color: var(--danger); }
.like-chip svg { width: 11px; height: 11px; }

/* Today block */
.today-eyebrow {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--muted);
  font-weight: 500;
  margin-bottom: 6px;
}
.today-title {
  font-family: var(--serif);
  font-size: 30px;
  font-weight: 500;
  line-height: 1.1;
  margin-bottom: 18px;
}
.today-card-title {
  font-family: var(--serif);
  font-size: 21px;
  font-weight: 500;
  line-height: 1.2;
  margin: 6px 0 12px;
}
.today-why {
  font-size: 13px;
  color: var(--muted);
  font-style: italic;
  line-height: 1.5;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--divider);
}

.action-row { display: flex; gap: 8px; margin-bottom: 24px; }
.action-row .btn-primary { flex: 1; }

/* Day list (upcoming days) */
.day-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.day-num {
  flex-shrink: 0;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: var(--primary-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--serif);
  font-weight: 500;
  font-size: 15px;
  color: var(--primary);
}
.day-num-date { flex-direction: column; gap: 0; line-height: 1; }
.day-num-d { font-size: 17px; font-weight: 600; }
.day-num-m { font-size: 9px; text-transform: lowercase; letter-spacing: 0.02em; margin-top: 1px; }

.day-info { flex: 1; min-width: 0; }
.day-title {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 14px;
  line-height: 1.3;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.day-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
.day-chev { color: var(--muted); flex-shrink: 0; }

/* Portions selector */
.portions-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 12px 14px;
  background: var(--primary-soft);
  border-radius: 14px;
  margin-bottom: 16px;
}
.portions-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--primary);
  font-weight: 600;
}
.portions-value {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 500;
  margin-top: 2px;
}
.portions-multiplier {
  font-size: 11px;
  color: var(--muted);
  font-weight: 400;
  margin-left: 6px;
}
.portions-buttons { display: flex; gap: 6px; }
.portions-btn {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: white;
  border: 1px solid var(--divider);
  font-weight: 500;
  font-size: 14px;
}
.portions-btn.active { background: var(--primary); border-color: var(--primary); color: white; }

/* Tabs (recipe detail) */
.tab-row {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 6px;
  margin-bottom: 14px;
  scrollbar-width: none;
}
.tab-row::-webkit-scrollbar { display: none; }

/* Matériel (fiche recette) : bouton dépliant + pastilles d'appareils */
.mat-btn {
  display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
  width: 100%; margin: 0 0 12px; padding: 10px 12px;
  background: var(--surface); border: 1px solid var(--divider);
  border-radius: 12px; cursor: pointer; font-family: inherit;
  font-size: 13px; color: var(--text); text-align: left;
}
.mat-btn-label { font-weight: 600; }
.mat-chip {
  background: var(--accent-soft); color: var(--accent);
  border-radius: 999px; padding: 2px 9px; font-size: 12px; font-weight: 500;
}
.mat-arrow { margin-left: auto; color: var(--muted); transition: transform .15s; }
.mat-arrow.open { transform: rotate(180deg); }
.mat-card { margin-bottom: 12px; }
.mat-list { list-style: none; margin: 0; padding: 0; }
.mat-list li { padding: 5px 0; font-size: 13px; border-bottom: 1px solid var(--divider); }
.mat-list li:last-child { border-bottom: none; }
.mat-list li.mat-imp { color: var(--accent); font-weight: 600; }

/* Ingredients list */
.ing-list-break { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--divider); }
.ing-hint { font-size: 11px; color: var(--muted); font-style: italic; margin-bottom: 10px; }
.ing-item-check { display: flex; align-items: flex-start; gap: 10px; cursor: pointer; padding: 3px 0; }
.ing-check {
  flex-shrink: 0; width: 20px; height: 20px; margin-top: 1px;
  border: 1.5px solid var(--muted); border-radius: 6px;
  display: flex; align-items: center; justify-content: center; color: #fff;
}
.ing-check.checked { background: var(--primary); border-color: var(--primary); }
.ing-check svg { width: 13px; height: 13px; }
.ing-item-check .ing-text { flex: 1; }
.ing-item-check.checked .ing-text { text-decoration: line-through; color: var(--muted); }

.ing-group-title {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--accent);
  margin: 14px 0 6px;
}
.ing-group-title:first-child { margin-top: 0; }
.ing-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.ing-item {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  font-size: 14px;
  line-height: 1.5;
}
.ing-bullet {
  flex-shrink: 0;
  margin-top: 8px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--primary);
}

/* Instructions */
.inst-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.inst-item {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  font-size: 14px;
  line-height: 1.55;
}
.inst-num {
  flex-shrink: 0;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: var(--primary-soft);
  color: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--serif);
  font-weight: 600;
  font-size: 12px;
}
.inst-section {
  font-family: var(--serif);
  font-weight: 600;
  font-size: 15px;
  color: var(--primary);
  margin-top: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--divider);
}
.inst-section:first-child { margin-top: 0; }
.inst-note {
  background: var(--primary-soft);
  border-left: 3px solid var(--primary);
  border-radius: 6px;
  padding: 10px 12px;
  font-size: 13px;
  line-height: 1.55;
  color: var(--text);
}

/* ---- Glossaire ---- */
.gloss-term {
  border-bottom: 1px dotted var(--accent);
  color: var(--accent);
  cursor: pointer;
  font-weight: inherit;
}
.gloss-term:active { background: var(--accent-soft); }
.gloss-def {
  font-size: 15px;
  line-height: 1.65;
  color: var(--text);
}
.gloss-related-label,
.gloss-row-term ~ .gloss-related-label {
  font-family: var(--sans);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  margin: 18px 0 8px;
}
.gloss-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.gloss-chip {
  background: var(--primary-soft);
  color: var(--primary-strong);
  border: none;
  border-radius: 999px;
  padding: 6px 12px;
  font-size: 13px;
  font-family: var(--sans);
  cursor: pointer;
}
.gloss-chip:active { background: var(--accent-soft); }
.gloss-row {
  display: block;
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  border-bottom: 1px solid var(--divider);
  padding: 12px 2px;
  cursor: pointer;
}
.gloss-row:last-child { border-bottom: none; }
.gloss-row-term {
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 500;
  color: var(--primary-strong);
  margin-bottom: 3px;
}
.gloss-row-def {
  font-size: 13px;
  line-height: 1.5;
  color: var(--muted);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.gloss-arrow { color: var(--muted); display: flex; align-items: center; }
.gloss-arrow svg { width: 18px; height: 18px; }

/* ---- Plan panel (filtrage épicerie par recette) ---- */
.plan-panel {
  background: var(--surface);
  border: 1px solid var(--divider);
  border-radius: 12px;
  padding: 12px;
  margin: 12px 0;
}
.plan-panel-head { display: flex; align-items: center; justify-content: space-between; }
.plan-panel-title { font-family: var(--sans); font-size: 13px; font-weight: 600; color: var(--primary-strong); }
.plan-toggle-all {
  background: none; border: none; color: var(--accent);
  font-size: 12px; font-family: var(--sans); cursor: pointer; padding: 2px 4px;
}
.plan-panel-hint { font-size: 11px; color: var(--muted); margin: 3px 0 10px; }
.plan-chips { display: flex; flex-direction: column; gap: 6px; }
.plan-chip {
  display: flex; align-items: center; gap: 8px;
  width: 100%; text-align: left;
  background: var(--bg); border: 1px solid var(--divider);
  border-radius: 9px; padding: 8px 10px; cursor: pointer;
  font-family: var(--sans);
}
.plan-chip.on { background: var(--primary-soft); border-color: rgba(46,95,79,0.35); }
.plan-chip-check {
  width: 18px; height: 18px; flex-shrink: 0; border-radius: 5px;
  border: 1.5px solid var(--muted); display: flex; align-items: center; justify-content: center;
  color: #fff;
}
.plan-chip.on .plan-chip-check { background: var(--primary); border-color: var(--primary); }
.plan-chip-check svg { width: 12px; height: 12px; }
.plan-chip-day { font-size: 12px; font-weight: 700; color: var(--primary-strong); flex-shrink: 0; white-space: nowrap; min-width: 48px; }
.plan-chip-title { font-size: 12px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.plan-chip:not(.on) .plan-chip-day, .plan-chip:not(.on) .plan-chip-title { color: var(--muted); }

/* ---- Badges de jours sur les items d'épicerie ---- */
.shop-day-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.shop-day-badge {
  font-size: 10px; font-weight: 600; font-family: var(--sans);
  background: var(--accent-soft); color: var(--accent);
  border-radius: 4px; padding: 1px 5px; line-height: 1.5;
}
.shop-day-badge.muted { background: var(--divider); color: var(--muted); font-weight: 500; }
.shop-qty-note { font-size: 10px; color: var(--success); font-weight: 600; margin-top: 2px; }


/* ---- Drag & drop calendrier ---- */
.cal-cell.dragging { opacity: 0.4; }
/* Ligne d'insertion : montre exactement où la recette sera déposée */
.cal-drop-line { height: 3px; background: var(--primary); border-radius: 2px; margin: 3px 2px; pointer-events: none; }
.cal-ghost {
  position: fixed; z-index: 1000; pointer-events: none;
  background: var(--surface); border: 2px solid var(--primary);
  border-radius: 10px; padding: 8px 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  font-size: 12px; max-width: 200px; opacity: 0.95;
}
.drag-hint { font-size: 11px; color: var(--muted); font-style: italic; padding: 2px 4px 8px; }
.toast-btn {
  margin-left: 12px; background: none; border: none; cursor: pointer;
  color: white; font-weight: 700; font-size: 13px; font-family: inherit;
  text-decoration: underline; text-underline-offset: 2px;
}


.inst-sub {
  margin-top: 4px;
}
.inst-sub-title {
  font-family: var(--serif);
  font-weight: 600;
  font-size: 14px;
  color: var(--text);
  margin-bottom: 8px;
}
.inst-para {
  font-size: 14px;
  line-height: 1.55;
  color: var(--text);
}
.inst-item span b, .inst-note b, .inst-para b { font-weight: 600; }

/* Nutrition */
.nut-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px 16px;
}
.nut-item {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-size: 13px;
}
.nut-label { color: var(--muted); }
.nut-value { font-weight: 600; color: var(--primary); font-variant-numeric: tabular-nums; }

/* Like row */
.like-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  background: var(--bg);
  border-radius: 10px;
}
.like-row + .like-row { margin-top: 8px; }
.like-btns { display: flex; gap: 4px; }
.like-btn {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: white;
  border: 1px solid var(--divider);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
}
.like-btn.active-yes { background: var(--success); border-color: var(--success); color: white; }
.like-btn.active-no { background: var(--danger); border-color: var(--danger); color: white; }

/* Shopping */
.shop-summary {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 12px;
}
.shop-counts { font-size: 13px; color: var(--muted); }
.week-selector {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
}
.week-btn {
  flex: 1;
  padding: 10px;
  border-radius: 12px;
  background: var(--surface);
  border: 1px solid var(--divider);
  font-size: 13px;
  font-weight: 500;
}
.week-btn.active { background: var(--primary); border-color: var(--primary); color: white; }

.shop-cat-block { margin-bottom: 16px; }
.shop-cat-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
  color: var(--accent);
  margin: 0 4px 8px;
}
.shop-items-card { background: var(--surface); border: 1px solid var(--divider); border-radius: 14px; overflow: hidden; }
.shop-item {
  display: flex;
  gap: 12px;
  padding: 12px;
  align-items: flex-start;
  text-align: left;
  width: 100%;
  border-bottom: 1px solid var(--divider);
}
.shop-item:last-child { border-bottom: none; }
.shop-item:active { background: rgba(0,0,0,0.03); }
.shop-check {
  flex-shrink: 0;
  width: 20px;
  height: 20px;
  border-radius: 6px;
  border: 1.5px solid var(--muted);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 2px;
}
.shop-check.checked { background: var(--primary); border-color: var(--primary); }
.shop-item-info { flex: 1; min-width: 0; }
.shop-item-name { font-size: 14px; font-weight: 500; line-height: 1.3; }
.shop-item-name.checked { text-decoration: line-through; color: var(--muted); font-weight: 400; }
.shop-item-meta { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.4; }

.stale-banner {
  background: rgba(200, 137, 62, 0.15);
  border: 1px solid rgba(200, 137, 62, 0.3);
  border-radius: 12px;
  padding: 12px 14px;
  font-size: 13px;
  color: var(--warning);
  margin-bottom: 16px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

/* Calendar */
.cal-week { margin-bottom: 20px; }
.cal-list { display: flex; flex-direction: column; gap: 8px; min-height: 44px; border-radius: 12px; }
.cal-cell-header { display: flex; align-items: center; gap: 6px; }
/* Poignée de déplacement : seule zone qui déclenche le glissement (le reste
   de la carte défile normalement). Rendue comme un petit bouton bien visible,
   avec une zone de contact confortable pour le pouce. */
.cal-drag-handle {
  margin: -4px -4px -4px auto; padding: 8px;
  display: flex; align-items: center; justify-content: center;
  align-self: center; flex-shrink: 0;
  background: var(--primary-soft); border: 1px solid var(--divider);
  border-radius: 8px; color: var(--primary);
  cursor: grab; user-select: none; touch-action: none;
}
.cal-drag-handle svg { width: 18px; height: 18px; display: block; }
.cal-cell.today .cal-drag-handle { color: white; background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.35); }
.cal-recipe-title { font-family: var(--serif); font-size: 13px; line-height: 1.3; }

.cal-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.cal-cell {
  text-align: left;
  padding: 12px;
  border-radius: 12px;
  background: var(--surface);
  border: 1px solid var(--divider);
  color: var(--text);
  min-height: 88px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.cal-cell.today {
  background: var(--primary);
  border-color: var(--primary);
  color: white;
}
.cal-cell.skipped {
  background: var(--bg);
  opacity: 0.6;
}
.cal-cell-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.cal-day-label { font-size: 11px; font-weight: 500; color: var(--muted); }
.cal-cell.today .cal-day-label { color: rgba(255,255,255,0.85); }
.cal-today-tag { font-size: 9px; font-weight: 700; text-transform: uppercase; margin-right: auto; }
.cal-recipe-title {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 12px;
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.cal-status-tag {
  font-size: 9px;
  text-transform: uppercase;
  font-weight: 600;
  letter-spacing: 0.05em;
  margin-top: auto;
  color: var(--muted);
}

/* Modal / sheet */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(31, 46, 38, 0.55);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  animation: fadeIn 0.2s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-sheet {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  background: var(--bg);
  border-radius: 24px 24px 0 0;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  animation: slideUp 0.25s;
}
.modal-header {
  padding: 18px 20px 12px;
  border-bottom: 1px solid var(--divider);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-title { font-family: var(--serif); font-size: 18px; font-weight: 500; }
.modal-close {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface);
}
.modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
.modal-actions { padding: 12px 20px 20px; border-top: 1px solid var(--divider); display: flex; gap: 8px; }
.modal-actions > * { flex: 1; }

/* Settings */
.setting-row {
  padding: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--divider);
}
.setting-row:last-child { border-bottom: none; }
.setting-info { flex: 1; min-width: 0; }
.setting-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  font-weight: 600;
}
.setting-value { font-size: 15px; margin-top: 2px; }

.day-control {
  display: flex;
  align-items: center;
  gap: 10px;
}
.day-control-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
}
.shop-week-dates {
  text-align: center;
  font-size: 12px;
  color: var(--muted);
  margin: -4px 0 12px;
  font-family: var(--sans);
}
.day-control-value {
  flex: 1;
  text-align: center;
}
.day-control-num {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 500;
  color: var(--primary);
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  text-align: center;
}
.stat-value {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 500;
}
.stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* Cooking mode (fullscreen) */
.cooking-mode {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 300;
  display: flex;
  flex-direction: column;
  padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
}
.cooking-header {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  border-bottom: 1px solid var(--divider);
  gap: 8px;
}
.cooking-title {
  flex: 1;
  font-family: var(--serif);
  font-size: 14px;
  font-weight: 500;
  text-align: center;
  line-height: 1.3;
}
.cooking-exit {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface);
}
.cooking-progress {
  padding: 16px;
  text-align: center;
}
.cooking-progress-bar {
  height: 4px;
  background: var(--divider);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 8px;
}
.cooking-progress-fill {
  height: 100%;
  background: var(--primary);
  transition: width 0.3s;
}
.cooking-step-num {
  font-size: 12px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
}
.cooking-step-body {
  flex: 1;
  padding: 30px 24px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.cooking-step-text {
  font-family: var(--serif);
  font-size: 22px;
  line-height: 1.45;
  font-weight: 400;
  color: var(--text);
  margin-bottom: 24px;
}
.cooking-timer-section {
  margin-top: auto;
  padding: 16px;
  background: var(--surface);
  border-radius: 16px;
  border: 1px solid var(--divider);
}
.cooking-timer-suggested {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
}
.cooking-timer-controls {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.cooking-timer-btn {
  padding: 10px 14px;
  border-radius: 10px;
  background: var(--primary-soft);
  color: var(--primary);
  font-weight: 500;
  font-size: 13px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.cooking-timer-active {
  text-align: center;
  padding: 16px 0;
}
.cooking-timer-display {
  font-family: var(--serif);
  font-size: 48px;
  font-weight: 500;
  color: var(--primary);
  font-variant-numeric: tabular-nums;
  margin-bottom: 12px;
}
.cooking-timer-actions {
  display: flex;
  gap: 8px;
  justify-content: center;
}
.cooking-timer-action {
  padding: 10px 18px;
  border-radius: 10px;
  background: white;
  border: 1px solid var(--divider);
  font-size: 13px;
  font-weight: 500;
}
.cooking-nav {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  border-top: 1px solid var(--divider);
}
.cooking-nav-btn {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  font-weight: 500;
  font-size: 14px;
  background: var(--surface);
  border: 1px solid var(--divider);
  color: var(--text);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.cooking-nav-btn:disabled { opacity: 0.4; }
.cooking-nav-btn.next { background: var(--primary); border-color: var(--primary); color: white; }

/* Add recipe form */
.form-section { margin-bottom: 12px; }
.form-label {
  display: block;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  font-weight: 600;
  margin-bottom: 6px;
}
.form-row { display: flex; gap: 10px; }
.form-row > * { flex: 1; }

/* Empty states */
.empty {
  text-align: center;
  padding: 32px 16px;
  color: var(--muted);
  font-size: 14px;
}

/* Spinner */
.spinner {
  display: inline-block;
  width: 24px;
  height: 24px;
  border: 2.5px solid var(--primary-soft);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Utilities */
.hidden { display: none !important; }
.row-between { display: flex; align-items: center; justify-content: space-between; }
.row-gap-2 { display: flex; align-items: center; gap: 8px; }
.text-muted { color: var(--muted); }
.text-sm { font-size: 13px; }
.text-xs { font-size: 11px; }
.mb-2 { margin-bottom: 8px; }
.mb-3 { margin-bottom: 12px; }
.mb-4 { margin-bottom: 16px; }
.mt-3 { margin-top: 12px; }
.italic { font-style: italic; }

/* Toast */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: white;
  padding: 10px 16px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 500;
  z-index: 400;
  animation: toastIn 0.2s;
  max-width: calc(100% - 32px);
  text-align: center;
}
@keyframes toastIn { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }
</style>

<script>

const GLOSSARY = {"Nacrer": "Remuer le riz (ou une autre c\u00e9r\u00e9ale) 1-2 minutes dans un corps gras chaud avant d'ajouter le liquide, jusqu'\u00e0 ce que les grains deviennent translucides sur les bords. Le grain s'enrobe de gras, garde sa forme et cuit plus uniform\u00e9ment \u2014 geste-cl\u00e9 du pilaf.", "Fleurir": "Chauffer bri\u00e8vement (30-60 secondes) des \u00e9pices s\u00e8ches ou une p\u00e2te d'\u00e9pices dans un gras chaud pour lib\u00e9rer leurs huiles essentielles et leurs ar\u00f4mes. Attention \u00e0 ne pas br\u00fbler : les \u00e9pices deviendraient am\u00e8res.", "Mijoter": "Cuire \u00e0 petite \u00e9bullition douce \u2014 de petites bulles r\u00e9guli\u00e8res remontent \u00e0 la surface, sans bouillonnement violent. Id\u00e9al pour les brais\u00e9s, les sauces et les plats mijot\u00e9s o\u00f9 l'on veut marier les saveurs sans dess\u00e9cher.", "Fr\u00e9mir": "\u00c9tat juste avant l'\u00e9bullition : de petites bulles se forment sur les bords de la casserole, mais la surface ne bouillonne pas encore. Utile pour les infusions et les pr\u00e9-cuissons d\u00e9licates.", "Blanchir": "Cuire bri\u00e8vement un l\u00e9gume \u00e0 grande eau bouillante sal\u00e9e, puis le plonger imm\u00e9diatement dans l'eau glac\u00e9e. Pr\u00e9serve la couleur vive et le croquant tout en pr\u00e9-cuisant. Suivi du \u00ab choc thermique \u00bb.", "Choc thermique": "Plonger un aliment (l\u00e9gume blanchi, \u0153uf cuit) dans l'eau glac\u00e9e juste apr\u00e8s la cuisson pour l'arr\u00eater net. Fixe la couleur, pr\u00e9serve la texture et facilite l'\u00e9caillage des \u0153ufs.", "D\u00e9glacer": "Verser un liquide (vin, bi\u00e8re, bouillon) dans une po\u00eale ou cocotte chaude et racler vigoureusement le fond pour dissoudre les sucs caram\u00e9lis\u00e9s coll\u00e9s. Ces sucs sont la base d'une sauce riche.", "Braiser": "Cuire longuement (1 h 30 \u00e0 3 h) un morceau de viande \u00e0 couvert dans un liquide, \u00e0 basse temp\u00e9rature au four ou \u00e0 fr\u00e9missement sur la cuisini\u00e8re. Convertit le collag\u00e8ne en g\u00e9latine \u2014 la viande devient fondante.", "Pincer": "Cuire bri\u00e8vement (environ 1 minute) la p\u00e2te de tomate en la remuant dans les aromates chauds, jusqu'\u00e0 ce qu'elle fonce l\u00e9g\u00e8rement et perde son go\u00fbt cru. D\u00e9veloppe une saveur plus profonde et umami.", "Saisir": "Cuire la surface d'une viande \u00e0 feu vif dans une po\u00eale tr\u00e8s chaude pour former une cro\u00fbte brune caram\u00e9lis\u00e9e, sans cuire l'int\u00e9rieur. D\u00e9veloppe la saveur (r\u00e9action de Maillard). Toujours \u00e9ponger la viande d'abord.", "Sauter": "Cuire rapidement \u00e0 feu moyen-vif en remuant ou en faisant sauter les aliments dans un peu de gras. Convient aux l\u00e9gumes verts (kale, bok choy) et aux aliments qui doivent rester croquants.", "Pocher": "Cuire un aliment fragile (poisson, \u0153ufs, fruits) dans un liquide fr\u00e9missant, juste sous l'\u00e9bullition, sans agitation. Plus doux que le mijotage; pr\u00e9serve la d\u00e9licatesse du poisson.", "\u00c9caler": "Retirer la coquille d'un \u0153uf dur ou mollet. Plus facile apr\u00e8s un choc thermique et si l'on cogne doucement l'\u0153uf sur le comptoir avant de peler sous un filet d'eau froide.", "D\u00e9gorger": "Faire perdre son eau \u00e0 un l\u00e9gume (concombre, aubergine, courgette r\u00e2p\u00e9s) en le salant et en le laissant reposer 10-30 minutes, puis en le pressant fermement. Emp\u00eache que le plat final soit trop liquide.", "D\u00e9faire": "Presser et remuer de la viande hach\u00e9e avec le dos d'une spatule pendant qu'elle cuit, pour s\u00e9parer le bloc initial en petits grains de la taille d'un pois. Assure une cuisson uniforme et une texture fine.", "Zester": "R\u00e2per finement la partie color\u00e9e (et parfum\u00e9e) de la peau d'un agrume, en \u00e9vitant la partie blanche en dessous qui est am\u00e8re. Une microplane donne le meilleur r\u00e9sultat.", "Supr\u00eame": "Segment d'agrume compl\u00e8tement lib\u00e9r\u00e9 de sa peau et de ses membranes blanches. On p\u00e8le l'agrume \u00e0 vif, puis on glisse la lame entre chaque membrane pour d\u00e9tacher les segments nus.", "\u00c9mulsion": "M\u00e9lange stable de deux liquides qui ne se m\u00e9langent normalement pas (huile et vinaigre), obtenu en fouettant vigoureusement, souvent avec un liant comme la moutarde. Base d'une vinaigrette.", "Panade": "M\u00e9lange de f\u00e9culent (panko, pain rassis) et de liquide (lait, bouillon) qu'on incorpore aux boulettes ou aux farces. Le liquide absorb\u00e9 cr\u00e9e une matrice qui retient l'humidit\u00e9 \u2014 des boulettes l\u00e9g\u00e8res et juteuses.", "Roux": "M\u00e9lange de gras (beurre) et de farine cuits ensemble, base de nombreuses sauces (b\u00e9chamel, velout\u00e9, sauce brune). Cuire 1-2 minutes en fouettant avant d'ajouter le liquide chaud pour \u00e9viter les grumeaux.", "Al dente": "\u00c9tat de cuisson des p\u00e2tes ou des c\u00e9r\u00e9ales : cuit mais offrant une l\u00e9g\u00e8re r\u00e9sistance sous la dent, avec un c\u0153ur qui n'est plus cru. V\u00e9rifier 1 minute avant la fin indiqu\u00e9e sur le paquet.", "Salage \u00e0 sec": "Saler g\u00e9n\u00e9reusement une viande crue et la laisser au frigo sans couvrir 6-24 h avant la cuisson (\u00ab dry brine \u00bb). Le sel p\u00e9n\u00e8tre la chair en profondeur et la surface s\u00e8che, donnant une peau plus croustillante.", "Saumure": "Tremper une viande (souvent la volaille) dans une solution d'eau sal\u00e9e 15 minutes \u00e0 quelques heures avant la cuisson. La viande absorbe de l'humidit\u00e9 et reste juteuse. Rincer et \u00e9ponger avant de cuire.", "Trusser": "Lier les pattes d'une volaille avec de la ficelle de cuisine pour lui donner une forme compacte. Favorise une cuisson plus uniforme. Optionnel \u2014 un poulet non trouss\u00e9 cuit bien aussi.", "Chiffonnade": "Empiler des feuilles (basilic, kale, laitue), les rouler serr\u00e9 en cigare, puis trancher perpendiculairement en fines lani\u00e8res. Coupe rapide et \u00e9l\u00e9gante pour les herbes et l\u00e9gumes-feuilles.", "Supr\u00eame (volaille)": "Se dit aussi d'un blanc de volaille d\u00e9tach\u00e9 avec soin. \u00c0 ne pas confondre avec le supr\u00eame d'agrume; le contexte de la recette pr\u00e9cise lequel.", "Sunomono": "Salade japonaise vinaigr\u00e9e, g\u00e9n\u00e9ralement \u00e0 base de concombre et souvent d'algue wakame, assaisonn\u00e9e d'une vinaigrette sucr\u00e9e-acidul\u00e9e au vinaigre de riz. Fra\u00eeche et l\u00e9g\u00e8re, elle accompagne le poisson.", "Presser le poisson": "Presser un filet de poisson avec une spatule pendant les 20-30 premi\u00e8res secondes de cuisson c\u00f4t\u00e9 peau. La chair se contracte plus vite que la peau; presser force la peau \u00e0 rester \u00e0 plat et \u00e0 croustiller uniform\u00e9ment.", "Monter au beurre": "Incorporer du beurre froid en petits morceaux \u00e0 une sauce chaude hors du feu, en remuant, pour la lier et lui donner du brillant et de l'onctuosit\u00e9.", "Suer": "Cuire doucement des l\u00e9gumes (oignons, \u00e9chalotes) dans un peu de gras \u00e0 feu moyen-doux, sans les colorer, jusqu'\u00e0 ce qu'ils deviennent translucides et tendres. D\u00e9veloppe la douceur sans caram\u00e9lisation.", "Mirepoix": "M\u00e9lange de base de l\u00e9gumes coup\u00e9s en d\u00e9s \u2014 classiquement oignon, carotte et c\u00e9leri \u2014 qu'on fait suer pour parfumer bouillons, sauces et brais\u00e9s."};

const SEED_DATA = {"r":[{"d":1,"w":1,"n":"Lun","wd":1,"t":"Saumon de l'Atlantique \u00e0 l'\u00e9rable et moutarde, quinoa aux herbes, asperges r\u00f4ties, salade \u00e9pinards-fraises-noix","tt":"25 min","pt":"10 min","ct":"15 min","ing":["5 filets de saumon de l'Atlantique avec peau (170 g chacun, total ~850 g)","## Gla\u00e7age","Sirop d'\u00e9rable (4 c. \u00e0 soupe)","Moutarde de Dijon (2 1/2 c. \u00e0 soupe)","Huile d'olive (1 c. \u00e0 soupe)","Sel et poivre","##","Quinoa sec (300 g \u00b7 1 1/2 tasse)","Bouillon de poulet faible en sodium (625 ml)","Persil frais hach\u00e9 (3 c. \u00e0 soupe)","##","Asperges vertes (625 g \u00b7 \u2248 1 1/4 botte)","Huile d'olive (1 c. \u00e0 soupe)","1 gousse d'ail","Sel et poivre","##","B\u00e9b\u00e9s \u00e9pinards (300 g \u00b7 1 grand sac de 312 g)","Fraises tranch\u00e9es (300 g)","Noix de Grenoble (75 g)","F\u00e9ta (100 g)","## Vinaigrette","Huile d'olive (4 c. \u00e0 soupe)","Vinaigre balsamique (1 1/4 c. \u00e0 soupe)","Sirop d'\u00e9rable (1 1/4 c. \u00e0 th\u00e9)","Sel et poivre"],"inst":["## Avant tout (mise en place)","Sortir les filets de saumon du frigo 15-20 min avant de cuisiner pour qu'ils temp\u00e8rent \u2014 un poisson \u00e0 temp\u00e9rature ambiante cuit plus uniform\u00e9ment.","**Pr\u00e9chauffer le four \u00e0 220 \u00b0C (425 \u00b0F).** Compter 8-10 min de chauffe. Tapisser deux plaques de papier parchemin (une pour le saumon, une pour les asperges).","## Cuire le quinoa (5 min prep + 20 min cuisson)","**Rincer 300 g de quinoa** dans une passoire fine sous l'eau froide 30 secondes en remuant avec les doigts. Ce rin\u00e7age enl\u00e8ve la **saponine**, un enrobage naturel amer et savonneux qui recouvre les grains. Bien \u00e9goutter.","Dans une casserole moyenne, combiner le quinoa avec 625 ml de bouillon de poulet faible en sodium. Couvrir, porter \u00e0 \u00e9bullition \u00e0 feu vif (3-4 min).","D\u00e8s l'\u00e9bullition, baisser \u00e0 feu tr\u00e8s doux (juste de petites bulles), garder couvert, **lancer une minuterie de 15 minutes**. Ne pas soulever le couvercle pendant la cuisson.","**Apr\u00e8s 15 min, couper le feu mais laisser couvert 5 minutes** \u2014 le quinoa finit d'absorber le liquide. Puis passer une fourchette pour **\u00e9grainer** : mouvements l\u00e9gers de bas en haut pour s\u00e9parer les grains sans les \u00e9craser. Le quinoa est pr\u00eat quand chaque grain a lib\u00e9r\u00e9 son petit germe en spirale.","## Pr\u00e9parer le gla\u00e7age et le saumon (5 min)","Dans un petit bol, fouetter le gla\u00e7age : 4 c. \u00e0 soupe de sirop d'\u00e9rable, 2 1/2 c. \u00e0 soupe de moutarde de Dijon, 1 c. \u00e0 soupe d'huile d'olive, 1 pinc\u00e9e de sel, 4-5 tours de poivre.","**\u00c9ponger les filets de saumon** avec du papier essuie-tout \u2014 un poisson humide ne caram\u00e9lise pas bien.","D\u00e9poser les filets **peau vers le bas** sur la plaque tapiss\u00e9e, en laissant 2 cm entre chacun. **Badigeonner g\u00e9n\u00e9reusement** le dessus et les c\u00f4t\u00e9s de chaque filet avec le gla\u00e7age \u00e9rable-moutarde.","## Pr\u00e9parer les asperges (3 min)","**Casser la base ligneuse des asperges** : tenir chaque asperge par les deux extr\u00e9mit\u00e9s et plier \u2014 elle casse naturellement \u00e0 l'endroit exact o\u00f9 la partie tendre commence. Jeter les bases dures (ou les garder pour un bouillon).","Sur la deuxi\u00e8me plaque tapiss\u00e9e, m\u00e9langer les asperges avec 1 c. \u00e0 soupe d'huile d'olive, 1 gousse d'ail \u00e9minc\u00e9e, 1 pinc\u00e9e de sel, 3-4 tours de poivre. \u00c9taler en une seule couche.","## Cuisson au four (10-12 min)","**Enfourner le saumon et les asperges en m\u00eame temps** sur la grille du milieu.","**Saumon** : 10-12 min selon l'\u00e9paisseur. Il est pr\u00eat quand la chair est **opaque rose p\u00e2le** et se d\u00e9fait \u00e0 la fourchette dans la partie la plus \u00e9paisse, mais reste juteuse. Le gla\u00e7age doit \u00eatre caram\u00e9lis\u00e9 et brillant.","**Asperges** : 8-10 min. Elles doivent \u00eatre tendres-croquantes et l\u00e9g\u00e8rement dor\u00e9es aux pointes. Si elles sont fines, les sortir \u00e0 8 min; si \u00e9paisses, laisser jusqu'\u00e0 10-12 min.","## Pr\u00e9parer la salade (5 min \u2014 pendant la cuisson)","Rincer 300 g de b\u00e9b\u00e9s \u00e9pinards, essorer, mettre dans un grand saladier.","Trancher 300 g de fraises (\u00e9queuter, couper en tranches de 5 mm ou en quartiers selon la taille).","Casser grossi\u00e8rement 75 g de noix de Grenoble \u00e0 la main. \u00c9mietter 100 g de f\u00e9ta.","**Vinaigrette balsamique** dans un bocal : 4 c. \u00e0 soupe d'huile d'olive, 1 1/4 c. \u00e0 soupe de vinaigre balsamique, 1 1/4 c. \u00e0 th\u00e9 de sirop d'\u00e9rable, 1 pinc\u00e9e de sel, 3-4 tours de poivre. Fouetter. R\u00e9server.","> **Ne pas assembler la salade tout de suite** \u2014 ajouter la vinaigrette juste avant de servir, sinon les \u00e9pinards ramollissent et rendent leur eau.","## Assemblage et service","Incorporer 3 c. \u00e0 soupe de persil frais hach\u00e9 au quinoa \u00e9grain\u00e9. Go\u00fbter et ajuster le sel.","Assembler la salade : ajouter fraises, noix et f\u00e9ta aux \u00e9pinards, verser la vinaigrette, m\u00e9langer d\u00e9licatement.","**Dans chaque assiette** : un lit de quinoa aux herbes (\u2155), 1 filet de saumon glac\u00e9 par-dessus, une portion d'asperges \u00e0 c\u00f4t\u00e9, une portion de salade \u00e9pinards-fraises.","**Garder la 5\u1d49 portion** dans un contenant herm\u00e9tique pour le lunch. Le saumon se conserve 2 jours au frigo (excellent froid, \u00e9miett\u00e9 sur une salade). Le quinoa 3-4 jours. La salade se garde le jour m\u00eame seulement \u2014 emballer les composants s\u00e9par\u00e9ment pour le lunch.","## Substitutions et hors saison","### Saumon de l'Atlantique","- Costco fait un excellent format \u00e9conomique (grand pav\u00e9 sous vide). Alternatives : **truite arc-en-ciel** (cuisson identique), **omble chevalier** (plus d\u00e9licat), **saumon sockeye** (chair plus ferme et fonc\u00e9e), **filet de porc** en m\u00e9daillons pour une version viande.","### Quinoa","- Disponible partout. Alternatives : **quinoa tricolore** (plus visuel), **boulgour** (go\u00fbt de bl\u00e9, cuisson 12 min), **riz sauvage** (plus long, ~45 min), **couscous complet** (cuisson 5 min).","### Asperges","- En saison au Qu\u00e9bec en mai-juin (moiti\u00e9 moins ch\u00e8res, bien meilleures). Hors saison : **haricots verts** (r\u00f4tir 12-15 min), **brocolini** (10-12 min), **brocoli** en bouquets (15 min).","### Fraises","- En saison au Qu\u00e9bec en juin-juillet. Hors saison : **framboises**, **pomme** en fines tranches, **poire**, ou **canneberges s\u00e9ch\u00e9es** (moins de fra\u00eecheur mais fonctionne).","### F\u00e9ta","- Pr\u00e9f\u00e9rer la **f\u00e9ta grecque en saumure** (plus go\u00fbteuse). Alternatives : **ch\u00e8vre frais** \u00e9miett\u00e9, **bocconcini** en morceaux.","### Noix de Grenoble","- Alternatives : **amandes effil\u00e9es grill\u00e9es**, **pistaches non sal\u00e9es**, **graines de tournesol** grill\u00e9es."],"nut":[{"l":"\u00c9nergie","v":"680 kcal"},{"l":"Prot\u00e9ines","v":"48 g"},{"l":"Fibres","v":"9 g"},{"l":"Om\u00e9ga-3 EPA+DHA","v":"2,2 g"}],"ing_raw":["5 filets de saumon de l'Atlantique avec peau (170 g chacun, total ~850 g)","Gla\u00e7age : 4 c. \u00e0 soupe de sirop d'\u00e9rable, 2 1/2 c. \u00e0 soupe de moutarde de Dijon, 1 c. \u00e0 soupe d'huile d'olive, sel, poivre","300 g de quinoa sec (1 1/2 tasse), 625 ml de bouillon de poulet faible en sodium, 3 c. \u00e0 soupe de persil frais hach\u00e9","625 g d'asperges vertes (\u2248 1 1/4 botte), 1 c. \u00e0 soupe d'huile d'olive, 1 gousse d'ail, sel, poivre","300 g de b\u00e9b\u00e9s \u00e9pinards (1 grand sac de 312 g), 300 g de fraises tranch\u00e9es, 75 g de noix de Grenoble, 100 g de f\u00e9ta","Vinaigrette : 4 c. \u00e0 soupe d'huile d'olive, 1 1/4 c. \u00e0 soupe de vinaigre balsamique, 1 1/4 c. \u00e0 th\u00e9 de sirop d'\u00e9rable, sel, poivre"]},{"d":2,"w":1,"n":"Mar","wd":1,"t":"Hauts de cuisse de poulet au citron et romarin, patates douces r\u00f4ties, brocoli vapeur, salade kale-canneberges-tournesol","tt":"40 min","pt":"10 min","ct":"30 min","ing":["10 hauts de cuisse de poulet d\u00e9soss\u00e9s sans peau (\u2248 1 kg total)","## Marinade","Jus et zeste de 2 citrons","4 gousses d'ail","Romarin frais (2 c. \u00e0 soupe \u00b7 ou 2 c. \u00e0 th\u00e9 s\u00e9ch\u00e9)","Huile d'olive (3 c. \u00e0 soupe)","Sel et poivre","##","1,1 kg de patates douces (4 moyennes) en cubes de 2 cm","Huile d'olive (2 1/2 c. \u00e0 soupe)","Paprika fum\u00e9 (1 1/4 c. \u00e0 th\u00e9)","Cumin (1 1/4 c. \u00e0 th\u00e9)","##","1 grosse couronne de brocoli (\u2248 750 g) en bouquets","##","Chou kale fris\u00e9 hach\u00e9 (200 g)","Canneberges s\u00e9ch\u00e9es (80 g)","Graines de tournesol grill\u00e9es (50 g)","Parmesan en copeaux (50 g)","## Vinaigrette","Huile d'olive (4 c. \u00e0 soupe)","Jus de citron (1 1/4 c. \u00e0 soupe)","Moutarde de Dijon (1 1/4 c. \u00e0 th\u00e9)","Miel (1 1/4 c. \u00e0 th\u00e9)","Sel et poivre"],"inst":["## Avant tout (mise en place \u2014 4 min)","Sortir le poulet du frigo et le laisser temp\u00e9rer 10-15 min pendant la suite. Sortir aussi le parmesan.","**Pr\u00e9chauffer le four \u00e0 220 \u00b0C (425 \u00b0F).** Il met environ 8-10 minutes \u00e0 chauffer \u2014 on pr\u00e9pare les patates douces et le poulet pendant ce temps.","Tapisser deux plaques \u00e0 biscuits de papier parchemin : une pour les patates douces, une pour le poulet.","## Pr\u00e9parer les patates douces (5 min)","Laver les 4 patates douces sous l'eau froide en frottant la peau avec les mains ou une brosse \u00e0 l\u00e9gumes. **Ne pas peler** \u2014 la peau est nutritive, l\u00e9g\u00e8rement caram\u00e9lis\u00e9e \u00e0 la cuisson, et c'est beaucoup moins de travail.","Couper les patates douces en cubes d'environ 2 cm de c\u00f4t\u00e9 : trancher dans le sens de la longueur en planches de 2 cm, empiler 2-3 planches, couper en b\u00e2tonnets de 2 cm, puis couper transversalement en cubes. Pas besoin que ce soit parfaitement r\u00e9gulier, mais essaie de garder une taille similaire pour que tout cuise au m\u00eame rythme.","Mettre les cubes sur la plaque pr\u00e9par\u00e9e. Arroser de 2\u00bd c. \u00e0 soupe d'huile d'olive, saupoudrer le paprika fum\u00e9 et le cumin (1\u00bc c. \u00e0 th\u00e9 chacun), 1 grosse pinc\u00e9e de sel, 5-6 tours de poivre du moulin. M\u00e9langer avec les mains pour enrober chaque cube. \u00c9taler en une seule couche, sans chevauchement (sinon \u00e7a cuit \u00e0 la vapeur au lieu de r\u00f4tir).","**Mettre les patates douces au four sur la grille du milieu** d\u00e8s que le four est \u00e0 temp\u00e9rature. R\u00e9gler une minuterie de **10 minutes** : pendant ce temps, on pr\u00e9pare le poulet.","## Mariner le poulet (5 min \u2014 pendant que les patates r\u00f4tissent)","Avec un zesteur ou la r\u00e2pe la plus fine d'une bo\u00eete \u00e0 r\u00e2per, pr\u00e9lever le zeste des 2 citrons : seulement la partie jaune, jamais la partie blanche en dessous (am\u00e8re). Tourner le citron au fur et \u00e0 mesure pour ne pas repasser au m\u00eame endroit. Mettre le zeste dans un grand bol.","Couper les 2 citrons zest\u00e9s en deux et presser le jus directement dans le bol (\u00e0 travers un tamis ou la main pour bloquer les p\u00e9pins). \u00c7a donne environ 4-6 c. \u00e0 soupe de jus.","\u00c9plucher 4 gousses d'ail et les hacher finement au couteau (presque r\u00e9duites en p\u00e2te) ou passer au presse-ail. Ajouter au bol.","Pour le romarin frais : effeuiller 2 c. \u00e0 soupe de feuilles en glissant les doigts du haut vers le bas le long des branches (les feuilles se d\u00e9tachent toutes seules). Hacher grossi\u00e8rement au couteau et ajouter au bol. (Si romarin s\u00e9ch\u00e9 : 2 c. \u00e0 th\u00e9, pas besoin de hacher.)","Ajouter au bol : 3 c. \u00e0 soupe d'huile d'olive, 1 grosse pinc\u00e9e de sel, 5-6 tours de poivre du moulin. Fouetter \u00e0 la fourchette.","Ajouter les 10 hauts de cuisse de poulet dans le bol. Avec les mains (ou des pinces si tu pr\u00e9f\u00e8res ne pas toucher le poulet cru), retourner les morceaux dans la marinade pour bien les enrober partout. Laisser reposer dans la marinade pendant qu'on continue (au minimum 5 min, l'id\u00e9al 15 min).","## Ajouter le poulet au four (~ 5 min)","**Quand la minuterie des patates sonne** (apr\u00e8s 10 min), sortir la plaque et remuer les cubes avec une spatule pour qu'ils ne br\u00fblent pas d'un c\u00f4t\u00e9. Remettre au four sur la grille du milieu.","Disposer le poulet marin\u00e9 sur la deuxi\u00e8me plaque, en une seule couche, en laissant ~1 cm entre les morceaux. Verser le reste de marinade dessus. **Mettre au four sur la grille du bas.** R\u00e9gler une minuterie de **20 minutes**.","## Pr\u00e9parer la salade kale (8 min \u2014 pendant la cuisson)","Pour pr\u00e9parer le kale : tenir une feuille par la tige avec une main, et de l'autre main, glisser le pouce et l'index de bas en haut le long de la tige pour d\u00e9tacher les feuilles. Jeter les tiges (ou les garder pour un bouillon). Empiler quelques feuilles, rouler en cigare et trancher en lani\u00e8res fines (~1 cm de large) \u2014 c'est la coupe \u00ab chiffonnade \u00bb.","Mettre le kale hach\u00e9 dans un grand saladier. Ajouter 1 bonne pinc\u00e9e de sel et 1 c. \u00e0 th\u00e9 d'huile d'olive. **Masser le kale** avec les mains pendant 1-2 minutes : presser, froisser, masser. Le kale va foncer de couleur, perdre environ la moiti\u00e9 de son volume, et devenir tendre et brillant. C'est l'\u00e9tape cl\u00e9 pour qu'il soit agr\u00e9able \u00e0 manger cru.","Ajouter au saladier : 80 g de canneberges s\u00e9ch\u00e9es, 50 g de graines de tournesol grill\u00e9es (si non grill\u00e9es : les faire dorer 3-4 min dans une po\u00eale s\u00e8che \u00e0 feu moyen en remuant, jusqu'\u00e0 ce qu'elles gonflent l\u00e9g\u00e8rement et embaument \u2014 surveiller de pr\u00e8s, elles br\u00fblent vite), 50 g de parmesan en copeaux. **Ne pas m\u00e9langer la vinaigrette maintenant** \u2014 le kale supporte la vinaigrette \u00e0 l'avance (contrairement aux \u00e9pinards) mais on attend juste avant pour garder la fra\u00eecheur.","## Vinaigrette (2 min)","Dans un petit bocal ou bol, fouetter : 4 c. \u00e0 soupe d'huile d'olive, 1\u00bc c. \u00e0 soupe de jus de citron (ce qu'il reste du citron press\u00e9 pour la marinade, ou un demi-citron suppl\u00e9mentaire), 1\u00bc c. \u00e0 th\u00e9 de moutarde de Dijon, 1\u00bc c. \u00e0 th\u00e9 de miel, 1 pinc\u00e9e de sel, 3-4 tours de poivre. Fouetter jusqu'\u00e0 \u00e9mulsion (m\u00e9lange opaque et homog\u00e8ne). Go\u00fbter \u2014 ajuster sel ou acidit\u00e9 au besoin.","## Brocoli vapeur (8 min total \u2014 dont 6 min de cuisson)","D\u00e9tailler la couronne de brocoli en bouquets de la taille d'une bouch\u00e9e (~3 cm). On coupe \u00e0 l'endroit o\u00f9 la tige principale rejoint chaque petit bouquet. Garder la tige principale aussi : peler la couche ext\u00e9rieure dure au couteau, et couper en rondelles de 1 cm \u2014 c'est tendre et d\u00e9licieux.","Dans une casserole moyenne, mettre 3 cm d'eau et porter \u00e0 \u00e9bullition \u00e0 couvert. D\u00e9poser un panier vapeur (ou simplement les bouquets directement dans l'eau bouillante si pas de panier \u2014 ils seront un peu plus mouill\u00e9s mais aussi bons). Ajouter les bouquets, couvrir, et cuire **5-6 minutes** : ils doivent \u00eatre vert vif et tendre-croquants (la pointe d'un couteau y entre facilement mais ils ne sont pas mous). \u00c9goutter imm\u00e9diatement pour arr\u00eater la cuisson.","## V\u00e9rification cuisson et service","**Quand la minuterie du poulet sonne** (apr\u00e8s 20 min), v\u00e9rifier la cuisson. Au thermom\u00e8tre : 74 \u00b0C dans la partie la plus \u00e9paisse. Sans thermom\u00e8tre : couper le plus gros morceau en deux \u2014 la chair doit \u00eatre blanche/opaque partout, plus rose, et les jus qui s'\u00e9coulent doivent \u00eatre clairs. Si encore rose au centre, ajouter 2-3 minutes.","Sortir les patates douces : elles doivent \u00eatre tendres au centre (la pointe d'un couteau entre sans r\u00e9sistance) et bien dor\u00e9es-caram\u00e9lis\u00e9es sur les bords.","Verser la vinaigrette sur la salade de kale et m\u00e9langer.","Dans chaque assiette : 2 hauts de cuisse de poulet, \u2155 des patates douces, \u2155 du brocoli, une portion de salade kale. **Garder la 5\u1d49 portion** dans un contenant pour le lunch du lendemain (les patates et le poulet se conservent 3 jours au frigo).","## Si hors saison","- **Kale fris\u00e9 (\u00e9t\u00e9 et automne au Qu\u00e9bec)** : disponible toute l'ann\u00e9e en \u00e9picerie via importation (souvent Californie en hiver). La qualit\u00e9 reste bonne. Si vraiment introuvable : remplacer par 200 g de b\u00e9b\u00e9s \u00e9pinards (pas de massage n\u00e9cessaire, juste m\u00e9langer avec la vinaigrette juste avant) ou par de la roquette.","- **Romarin frais** : peut \u00eatre absent en hiver. Le romarin s\u00e9ch\u00e9 (d\u00e9j\u00e0 mentionn\u00e9 dans la marinade : 2 c. \u00e0 th\u00e9) est un substitut parfait. Si vraiment rien : 1 c. \u00e0 th\u00e9 d'herbes de Provence s\u00e9ch\u00e9es.","- **Paprika fum\u00e9** : ingr\u00e9dient sp\u00e9cialis\u00e9 qu'on trouve \u00e0 La Vieille Europe ou dans la section \u00e9pices internationales chez Maxi/IGA. Marque sugg\u00e9r\u00e9e : La Chinata. Si introuvable : 1 c. \u00e0 th\u00e9 de paprika doux + 1 pinc\u00e9e de cumin extra (pas exactement le m\u00eame go\u00fbt, mais \u00e7a reste excellent).","## Note sur la marinade","> Si tu pr\u00e9pares ton souper d'avance, tu peux mariner le poulet jusqu'\u00e0 24 h dans un sac de plastique au frigo. Plus longtemps que \u00e7a et le citron commence \u00e0 \u00ab cuire \u00bb le poulet (comme un ceviche) et la texture devient farineuse."],"nut":[{"l":"\u00c9nergie","v":"640 kcal"},{"l":"Prot\u00e9ines","v":"42 g"},{"l":"Fibres","v":"11 g"},{"l":"Vitamine D","v":"0,5 \u03bcg"}],"ing_raw":["10 hauts de cuisse de poulet d\u00e9soss\u00e9s sans peau (\u2248 1 kg total)","Marinade : jus et zeste de 2 citrons, 4 gousses d'ail, 2 c. \u00e0 soupe de romarin frais (ou 2 c. \u00e0 th\u00e9 s\u00e9ch\u00e9), 3 c. \u00e0 soupe d'huile d'olive, sel, poivre","1,1 kg de patates douces (4 moyennes) en cubes de 2 cm, 2 1/2 c. \u00e0 soupe d'huile d'olive, 1 1/4 c. \u00e0 th\u00e9 de paprika fum\u00e9, 1 1/4 c. \u00e0 th\u00e9 de cumin","1 grosse couronne de brocoli (\u2248 750 g) en bouquets","200 g de chou kale fris\u00e9 hach\u00e9, 80 g de canneberges s\u00e9ch\u00e9es, 50 g de graines de tournesol grill\u00e9es, 50 g de parmesan en copeaux","Vinaigrette : 4 c. \u00e0 soupe d'huile d'olive, 1 1/4 c. \u00e0 soupe de jus de citron, 1 1/4 c. \u00e0 th\u00e9 de moutarde de Dijon, 1 1/4 c. \u00e0 th\u00e9 de miel, sel, poivre"]},{"d":3,"w":1,"n":"Mer","wd":1,"t":"Saut\u00e9 de b\u0153uf au gingembre et brocoli sur riz brun, edamame \u00e0 la fleur de sel","tt":"35 min (riz BROWN: lancer 90 min avant)","pt":"15 min","ct":"20 min","ing":["Bavette ou surlonge de b\u0153uf en lani\u00e8res minces contre le grain (750 g)","## Marinade","Soya \u00e0 teneur r\u00e9duite (2 1/2 c. \u00e0 soupe)","F\u00e9cule (1 1/4 c. \u00e0 soupe)","Huile de s\u00e9same grill\u00e9 (1 1/4 c. \u00e0 soupe)","##","Huile de canola (2 1/2 c. \u00e0 soupe)","Gingembre frais hach\u00e9 (6 cm)","5 gousses d'ail","##","Brocoli (1 grosse couronne + 1/4) en bouquets (875 g)","1 gros poivron rouge","3 oignons verts","## Sauce","Soya (75 ml)","Mirin (2 1/2 c. \u00e0 soupe \u00b7 ou vinaigre de riz)","Miel (1 1/4 c. \u00e0 soupe)","Sambal oelek (1 c. \u00e0 th\u00e9)","Eau (75 ml)","F\u00e9cule (1 1/4 c. \u00e0 th\u00e9)","##","Riz brun \u00e0 grain court (2 1/2 tasses Zojirushi \u00b7 gobelet 180 ml, \u2248 375 g)","Eau jusqu'\u00e0 la ligne BROWN 2 1/2","##","Edamame surgel\u00e9 en cosses (500 g)","##","Graines de s\u00e9same","Fleur de sel"],"inst":["## Avant tout (mise en place \u2014 3 min)","Sortir le b\u0153uf du frigo. **Ne pas temp\u00e9rer trop longtemps** pour un saut\u00e9 : le b\u0153uf l\u00e9g\u00e8rement froid se tranche mieux et garde sa texture au wok.","Sortir tous les ingr\u00e9dients sur le comptoir : c'est la **r\u00e8gle d'or du saut\u00e9**. Une fois le wok chaud, \u00e7a cuit en moins de 8 minutes et on n'aura pas le temps de chercher quoi que ce soit.","Pr\u00e9parer le poste de cuisson : un grand wok ou une grande po\u00eale (id\u00e9alement en fonte ou en acier, **pas anti-adh\u00e9sive** \u2014 la chaleur tr\u00e8s vive endommage l'enduit). Une grande spatule en bois ou en m\u00e9tal. Deux assiettes vides \u00e0 port\u00e9e (une pour le b\u0153uf saisi, une pour les l\u00e9gumes).","## D\u00e9marrer le riz brun au Zojirushi (5 min \u2014 \u00e0 lancer ~90 min avant le repas)","Mesurer **2 \u00bd tasses Zojirushi** (gobelet de 180 ml) de riz brun \u00e0 grain court. Rincer dans un tamis fin sous l'eau froide 30-45 secondes en remuant avec les doigts. Bien \u00e9goutter.","Verser le riz dans le bol du Zojirushi, ajouter de l'eau froide jusqu'\u00e0 la ligne **BROWN 2 \u00bd** et une pinc\u00e9e de sel. S\u00e9lectionner le programme **BROWN**, appuyer sur START. Le cycle prend ~90 minutes, puis bascule en KEEP WARM \u2014 **le lancer en premier** (ou utiliser le d\u00e9part diff\u00e9r\u00e9 pour qu'il sonne \u00e0 l'heure du souper).","Toute la suite de la recette (~35 minutes de travail) se fait pendant que le riz cuit tranquillement \u2014 aucune surveillance n\u00e9cessaire.","## Pr\u00e9parer les l\u00e9gumes (8 min \u2014 pendant que le riz cuit)","D\u00e9tailler 875 g de brocoli en bouquets de la taille d'une bouch\u00e9e (~3 cm). R\u00e9cup\u00e9rer aussi la tige principale : peler la couche dure ext\u00e9rieure au couteau, et trancher en rondelles de 5 mm. Mettre tout sur une assiette.","Couper 1 gros poivron rouge : trancher le haut, retirer les graines et les membranes blanches \u00e0 l'int\u00e9rieur, puis couper en lani\u00e8res de 1 cm de large. Ajouter sur l'assiette des l\u00e9gumes.","Trancher les 3 oignons verts finement en biais (coupe diagonale) en gardant les parties blanches/vert p\u00e2le s\u00e9par\u00e9es des parties vert fonc\u00e9 : les blanches vont au wok, le vert fonc\u00e9 sert de garniture. Mettre les blanches sur l'assiette des l\u00e9gumes, le vert fonc\u00e9 dans un petit bol s\u00e9par\u00e9 pour le service.","\u00c9plucher 5 gousses d'ail et les hacher finement (presque en p\u00e2te). \u00c9plucher un morceau de gingembre de 6 cm \u2014 la fa\u00e7on la plus rapide est de gratter la peau avec le bord d'une cuill\u00e8re \u2014 puis hacher finement aussi. Mettre l'ail et le gingembre **ensemble** dans un petit bol (ils iront au wok en m\u00eame temps).","## Pr\u00e9parer le b\u0153uf et sa marinade (5 min)","Identifier le sens du grain de la bavette : observer la viande, on voit des fibres parall\u00e8les qui courent dans une direction. **Trancher perpendiculairement \u00e0 ces fibres**, en lamelles tr\u00e8s minces de 3-4 mm. Trancher contre le grain raccourcit les fibres et rend le b\u0153uf tendre; trancher dans le sens du grain le rendrait coriace.","Dans un bol, m\u00e9langer la marinade : 2\u00bd c. \u00e0 soupe de sauce soya \u00e0 teneur r\u00e9duite, 1\u00bc c. \u00e0 soupe de f\u00e9cule de ma\u00efs, 1\u00bc c. \u00e0 soupe d'huile de s\u00e9same grill\u00e9 (la fonc\u00e9e, tr\u00e8s parfum\u00e9e). La f\u00e9cule, ce n'est pas pour \u00e9paissir ici \u2014 elle cr\u00e9e une fine couche autour du b\u0153uf qui le prot\u00e8ge de la chaleur extr\u00eame et le garde tendre. C'est une technique chinoise classique.","Ajouter les lani\u00e8res de b\u0153uf dans le bol, m\u00e9langer avec les mains ou des baguettes pour bien enrober chaque morceau. Laisser mariner au moins 10 min (l'id\u00e9al 20 min, peut aller jusqu'\u00e0 30 min).","## Pr\u00e9parer la sauce (2 min)","Dans un autre bol, fouetter ensemble : 75 ml de sauce soya, 2\u00bd c. \u00e0 soupe de mirin (ou vinaigre de riz + 1 c. \u00e0 th\u00e9 de sucre), 1\u00bc c. \u00e0 soupe de miel, 1 c. \u00e0 th\u00e9 de sambal oelek (p\u00e2te de piment, \u00e0 doser selon ta tol\u00e9rance), 75 ml d'eau, et 1\u00bc c. \u00e0 th\u00e9 de f\u00e9cule de ma\u00efs (s\u00e9par\u00e9e de celle de la marinade). Bien m\u00e9langer pour dissoudre la f\u00e9cule. La sauce reste liquide pour l'instant; elle \u00e9paissira au contact de la chaleur.","## Cuire l'edamame (6 min \u2014 \u00e0 d\u00e9marrer ~10 min avant la fin du riz)","Remplir une grande casserole d'eau aux deux tiers et porter \u00e0 \u00e9bullition \u00e0 couvert. Saler l\u00e9g\u00e8rement (1 c. \u00e0 soupe).","Quand l'eau bout, ajouter les 500 g d'edamame **encore congel\u00e9s**. Couvrir et cuire **4-5 minutes** \u00e0 partir du moment o\u00f9 l'eau retrouve son \u00e9bullition.","\u00c9goutter dans une passoire, transf\u00e9rer dans un bol de service, saupoudrer 1 grosse pinc\u00e9e de fleur de sel. L'edamame se mange en pin\u00e7ant la cosse entre les dents pour faire glisser les f\u00e8ves dans la bouche, puis on jette la cosse. Pr\u00e9voir un petit bol pour les cosses vides \u00e0 table.","## Sauter au wok (6-8 min \u2014 moment critique)","**V\u00e9rifier que tout est pr\u00eat avant d'allumer le wok :** assiettes pour le b\u0153uf saisi et les l\u00e9gumes, sauce m\u00e9lang\u00e9e \u00e0 proximit\u00e9, l\u00e9gumes coup\u00e9s, ail-gingembre pr\u00eat, oignons verts (blancs et verts s\u00e9par\u00e9s) pr\u00eats, graines de s\u00e9same \u00e0 port\u00e9e. Une fois le wok chaud, \u00e7a va vite.","Mettre le wok sur le feu le plus puissant, \u00e0 vide, pendant **2 minutes** : on veut qu'il fume l\u00e9g\u00e8rement quand on s'en approche.","Ajouter 1\u00bd c. \u00e0 soupe d'huile de canola \u2014 elle doit se mettre \u00e0 briller et fumer un peu en 5-10 secondes. **Ajouter imm\u00e9diatement environ la moiti\u00e9 du b\u0153uf** en l'\u00e9talant en une couche sans qu'il se chevauche (trop de b\u0153uf d'un coup ferait baisser la temp\u00e9rature et le b\u0153uf bouillirait au lieu de saisir).","Laisser saisir **30 secondes sans toucher** (pour former une cro\u00fbte), puis remuer vigoureusement avec la spatule pendant 1 minute jusqu'\u00e0 ce que le b\u0153uf soit dor\u00e9 \u00e0 l'ext\u00e9rieur mais encore l\u00e9g\u00e8rement ros\u00e9 au centre. Transf\u00e9rer sur l'assiette r\u00e9serv\u00e9e.","Remettre 1 c. \u00e0 soupe d'huile de canola dans le wok, attendre qu'elle fume (10 sec), saisir le **reste du b\u0153uf** de la m\u00eame mani\u00e8re. Transf\u00e9rer aussi sur l'assiette.","Le wok est maintenant tr\u00e8s chaud et parfum\u00e9. Ajouter le m\u00e9lange ail-gingembre et remuer **30 secondes seulement** \u2014 il doit devenir parfum\u00e9 mais pas brunir (l'ail br\u00fbl\u00e9 est amer).","Ajouter imm\u00e9diatement le brocoli, les rondelles de tige, le poivron, et les blancs d'oignons verts. **Sauter 3-4 minutes** en remuant constamment avec la spatule (mouvement de remue-bas-en-haut, pas circulaire). Les l\u00e9gumes doivent rester vert vif et croquants, juste tendres \u00e0 la dent.","Remettre le b\u0153uf saisi dans le wok. Fouetter rapidement la sauce une derni\u00e8re fois (la f\u00e9cule a tendance \u00e0 se d\u00e9poser) et la verser sur le tout. **Remuer constamment 60-90 secondes** : la sauce va passer de liquide \u00e0 brillante et nappante en 30 secondes environ. C'est pr\u00eat quand elle enrobe les ingr\u00e9dients sans couler.","Couper le feu. Go\u00fbter et ajuster (un peu plus de sambal pour piquant, un peu plus de soya si pas assez sal\u00e9).","## Service","Le Zojirushi a sonn\u00e9 et maintient le riz au chaud (KEEP WARM). **Laisser reposer 5 minutes**, ouvrir, puis passer une fourchette dedans en mouvements l\u00e9gers pour l'a\u00e9rer.","Dans chaque bol : \u2155 du riz, \u2155 du saut\u00e9 de b\u0153uf et l\u00e9gumes par-dessus, parsemer du vert d'oignon vert et d'une pinc\u00e9e de graines de s\u00e9same. Servir avec l'edamame en accompagnement (les convives prennent ce qu'ils veulent).","**Garder la 5\u1d49 portion** dans un contenant pour le lunch du lendemain. Le saut\u00e9 se r\u00e9chauffe bien au micro-ondes (1-2 min, ajouter 1 c. \u00e0 soupe d'eau pour \u00e9viter l'ass\u00e8chement).","## Substitutions et hors saison","- **Bavette de b\u0153uf** : si introuvable ou trop ch\u00e8re, remplacer par de la **surlonge** (sirloin), de la **hampe** (skirt steak), ou m\u00eame de la **ronde** maigre tranch\u00e9e tr\u00e8s tr\u00e8s mince. \u00c9viter le faux-filet (trop gras pour cette recette).","- **Mirin** : alcool de riz sucr\u00e9 japonais, dans la section asiatique. Si introuvable : **2\u00bd c. \u00e0 soupe de vinaigre de riz + 1 c. \u00e0 th\u00e9 de sucre**, ou \u00e0 la limite du **x\u00e9r\u00e8s sec + sucre**. \u00c9vite le vin blanc qui n'a pas le m\u00eame profil.","- **Sambal oelek** : p\u00e2te de piment indon\u00e9sienne, dans la section asiatique chez Maxi/IGA, ou \u00e0 La Vieille Europe. Si introuvable : **sauce sriracha** (un peu plus douce et acidul\u00e9e \u2014 augmenter \u00e0 1\u00bd c. \u00e0 th\u00e9) ou **\u00bd c. \u00e0 th\u00e9 de piment rouge en flocons** + 1 c. \u00e0 th\u00e9 d'eau. Ajuster selon ta tol\u00e9rance.","- **Huile de s\u00e9same grill\u00e9** : c'est la version **fonc\u00e9e et tr\u00e8s parfum\u00e9e** (pas l'huile de s\u00e9same claire, qui est neutre). Si seulement la claire est dispo, \u00e7a reste utilisable mais le go\u00fbt sera moins intense. Marques recommand\u00e9es : Kadoya (japonaise), Lee Kum Kee.","- **Sauce soya \u00e0 teneur r\u00e9duite** : si pas dispo, utiliser de la sauce soya r\u00e9guli\u00e8re en **r\u00e9duisant la quantit\u00e9 de 25 %** (donc 2 c. \u00e0 soupe dans la marinade, 60 ml dans la sauce).","- **Edamame en cosses** : se trouve toute l'ann\u00e9e au cong\u00e9lateur. Si introuvable : **edamame \u00e9coss\u00e9** (sans cosse) fait l'affaire \u2014 m\u00eame cuisson, 3-4 min suffisent. Sinon, **f\u00e8ves de soya verts surgel\u00e9s** sont l'\u00e9quivalent g\u00e9n\u00e9rique.","- **Fleur de sel** : sel marin \u00e0 texture en flocons, sert \u00e0 finir un plat avec un croquant salin. Si introuvable : **gros sel de mer ordinaire**, ou simplement omettre \u2014 l'edamame est d\u00e9j\u00e0 saumur\u00e9 par l'eau de cuisson.","- **Riz brun \u00e0 grain court** : si tu n'as que du riz brun \u00e0 grain long, \u00e7a marche aussi (m\u00eame programme BROWN). Du **riz blanc \u00e0 grain court** se fait au programme WHITE (~40-50 min) mais perd les fibres.","## Si tu n'as pas de wok","| Une grande po\u00eale en fonte ou en acier inoxydable fonctionne. Vise une po\u00eale d'au moins 30 cm de diam\u00e8tre pour \u00e9viter que tout se chevauche. **\u00c9vite l'anti-adh\u00e9sive** : \u00e0 la chaleur tr\u00e8s vive n\u00e9cessaire ici, le rev\u00eatement se d\u00e9grade. Compense l'absence du wok en cuisant en **plus petits lots** : s\u00e9pare le b\u0153uf en 3 lots au lieu de 2, et fais les l\u00e9gumes en 2 fois si n\u00e9cessaire."],"nut":[{"l":"\u00c9nergie","v":"660 kcal"},{"l":"Prot\u00e9ines","v":"46 g"},{"l":"Fibres","v":"10 g"},{"l":"Vitamine D","v":"0,5 \u03bcg"}],"ing_raw":["750 g de bavette ou surlonge de b\u0153uf en lani\u00e8res minces contre le grain","Marinade : 2 1/2 c. \u00e0 soupe de soya \u00e0 teneur r\u00e9duite, 1 1/4 c. \u00e0 soupe de f\u00e9cule, 1 1/4 c. \u00e0 soupe d'huile de s\u00e9same grill\u00e9","2 1/2 c. \u00e0 soupe d'huile de canola, 6 cm de gingembre frais hach\u00e9, 5 gousses d'ail","875 g de brocoli (1 grosse couronne + 1/4) en bouquets, 1 gros poivron rouge, 3 oignons verts","Sauce : 75 ml de soya, 2 1/2 c. \u00e0 soupe de mirin (ou vinaigre de riz), 1 1/4 c. \u00e0 soupe de miel, 1 c. \u00e0 th\u00e9 de sambal oelek, 75 ml d'eau, 1 1/4 c. \u00e0 th\u00e9 de f\u00e9cule","Riz brun \u00e0 grain court : 2 1/2 tasses Zojirushi (\u2248 375 g), eau jusqu'\u00e0 la ligne BROWN 2 1/2 \u2014 programme BROWN (~90 min)","500 g d'edamame surgel\u00e9 en cosses","Fleur de sel, graines de s\u00e9same"]},{"d":4,"w":1,"n":"Jeu","wd":1,"t":"Truite arc-en-ciel au four, lentilles vertes du Puy aux herbes, betteraves et carottes r\u00f4ties, salade roquette","tt":"50 min","pt":"15 min","ct":"40 min","ing":["5 filets de truite arc-en-ciel avec peau (150 g chacun, \u2248 750 g)","##","Huile d'olive (2 c. \u00e0 soupe)","1 citron en rondelles","Aneth frais","Sel et poivre","##","Lentilles vertes du Puy s\u00e8ches (375 g)","1 gros oignon","2 carottes en petits d\u00e9s","2 branches de c\u00e9leri","3 gousses d'ail","1 feuille de laurier","1,25 L de bouillon de l\u00e9gumes","##","Persil hach\u00e9 (3 c. \u00e0 soupe)","Huile (2 1/2 c. \u00e0 soupe)","Vinaigre de vin rouge (1 1/4 c. \u00e0 soupe)","##","Betteraves (5 moyennes) en quartiers (750 g)","5 carottes en b\u00e2tonnets","Huile d'olive (2 1/2 c. \u00e0 soupe)","Thym s\u00e9ch\u00e9 (1 1/4 c. \u00e0 th\u00e9)","##","Roquette (150 g)","Parmesan en copeaux (40 g)","Vinaigrette : 3 c. \u00e0 soupe d'huile d'olive","Jus de citron (1 1/4 c. \u00e0 soupe)","Sel et poivre"],"inst":["## Avant tout (mise en place \u2014 4 min)","Sortir les filets de truite du frigo et les laisser temp\u00e9rer 10-15 min pendant la suite. La truite est tr\u00e8s fragile \u2014 un poisson temp\u00e9r\u00e9 cuit plus uniform\u00e9ment et casse moins.","**Pr\u00e9chauffer le four \u00e0 200 \u00b0C (400 \u00b0F).** Il met environ 8-10 minutes \u00e0 chauffer \u2014 on pr\u00e9pare les lentilles pendant ce temps.","Tapisser deux plaques \u00e0 biscuits de papier parchemin : une pour les betteraves-carottes, une pour la truite.","## D\u00e9marrer les lentilles (8 min d'action, puis 25-30 min \u00e0 mijoter)","\u00c9mincer 1 gros oignon jaune : couper les deux extr\u00e9mit\u00e9s, retirer la pelure, couper l'oignon en deux dans le sens de la longueur (racine \u00e0 tige), poser une moiti\u00e9 \u00e0 plat, faire quelques entailles verticales sans traverser la racine, puis trancher perpendiculairement pour obtenir des petits cubes de ~5 mm. R\u00e9p\u00e9ter avec l'autre moiti\u00e9.","\u00c9plucher 2 carottes et les couper en **petits d\u00e9s de 5 mm** (trancher en b\u00e2tonnets, empiler, couper transversalement). Faire de m\u00eame avec les 2 branches de c\u00e9leri (les fils ext\u00e9rieurs peuvent \u00eatre retir\u00e9s \u00e0 l'aide d'un \u00e9conome si on veut une texture plus fine). \u00c9plucher 3 gousses d'ail et les hacher finement.","Cette base aromatique (oignon-carotte-c\u00e9leri) s'appelle un **mirepoix** en cuisine fran\u00e7aise classique \u2014 c'est le fondement de nombreuses soupes, rago\u00fbts et brais\u00e9s.","Dans une casserole moyenne, chauffer 2 c. \u00e0 soupe d'huile d'olive \u00e0 feu moyen. Ajouter l'oignon avec une petite pinc\u00e9e de sel. Cuire **3 minutes** en remuant r\u00e9guli\u00e8rement, jusqu'\u00e0 ce que l'oignon devienne translucide (plus opaque blanc, laisse passer un peu la lumi\u00e8re) \u2014 c'est ce qu'on appelle **suer** l'oignon (sans le colorer).","Ajouter les carottes, le c\u00e9leri et l'ail. Cuire **3 minutes de plus** en remuant, jusqu'\u00e0 ce que le tout embaume.","Ajouter 375 g de lentilles vertes du Puy (les rincer rapidement au tamis avant), 1 feuille de laurier, et 1,25 L de bouillon de l\u00e9gumes. Le liquide doit couvrir les lentilles d'environ 3 cm. Porter \u00e0 \u00e9bullition \u00e0 feu vif, puis **baisser \u00e0 feu doux-moyen pour un mijotage tranquille** (petites bulles r\u00e9guli\u00e8res). **Ne pas couvrir** : les lentilles absorbent le liquide et il faut que la vapeur s'\u00e9chappe. **Lancer une minuterie de 25 minutes.**","## R\u00f4tir les betteraves et carottes (6 min prep + 25-30 min cuisson)","**Attention aux v\u00eatements** : le jus de betterave tache. Enfiler des gants de cuisine (ou accepter les mains ros\u00e9es pendant quelques heures). Poser une planche \u00e0 d\u00e9couper qui ne craint pas les taches.","\u00c9plucher 5 betteraves moyennes \u00e0 l'aide d'un \u00e9conome. Couper chaque betterave en **huiti\u00e8mes** (ou en quartiers si elles sont petites) \u2014 viser des morceaux de 2-3 cm : plus gros, elles n'auront pas le temps de cuire.","\u00c9plucher 5 carottes et les couper en b\u00e2tonnets \u00e9pais (b\u00e2tonnets de 5-6 cm de long \u00d7 1 cm d'\u00e9paisseur). Ne pas les couper trop fins, sinon ils cuiront plus vite que les betteraves.","Sur la plaque pr\u00e9par\u00e9e, m\u00e9langer betteraves et carottes avec 2\u00bd c. \u00e0 soupe d'huile d'olive, 1\u00bc c. \u00e0 th\u00e9 de thym s\u00e9ch\u00e9, 1 grosse pinc\u00e9e de sel, 5-6 tours de poivre du moulin. \u00c9taler en une seule couche, betteraves et carottes bien m\u00e9lang\u00e9es.","**Enfourner sur la grille du bas** d\u00e8s que le four est chaud. R\u00e9gler une minuterie de **15 minutes** pour la mi-cuisson (on remuera \u00e0 ce moment). Les l\u00e9gumes cuiront au total **35-40 minutes** \u2014 la betterave est dense et prend son temps.","## Pr\u00e9parer la truite (3 min \u2014 pendant la cuisson)","Sur la deuxi\u00e8me plaque tapiss\u00e9e, disposer les 5 filets de truite **peau vers le bas**, en laissant ~1 cm entre chaque. Arroser chaque filet de 1-2 c. \u00e0 th\u00e9 d'huile d'olive (2 c. \u00e0 soupe au total), une pinc\u00e9e de sel, 3-4 tours de poivre.","Trancher 1 citron en rondelles fines de 3-4 mm. Poser 2-3 rondelles sur chaque filet. Effeuiller quelques brins d'aneth frais (juste tirer les feuilles de la tige avec les doigts) et parsemer sur la truite. **Ne pas encore mettre au four** \u2014 on l'enfourne dans les 12 derni\u00e8res minutes.","## Pr\u00e9parer la vinaigrette de la salade (2 min)","Dans un petit bol ou bocal, fouetter : 3 c. \u00e0 soupe d'huile d'olive, 1\u00bc c. \u00e0 soupe de jus de citron (utiliser le citron qui reste apr\u00e8s les rondelles), 1 pinc\u00e9e de sel, 3-4 tours de poivre. R\u00e9server \u2014 on n'assemble la salade qu'\u00e0 la derni\u00e8re minute.","## Retourner les l\u00e9gumes r\u00f4tis (1 min)","Quand la minuterie de 15 minutes sonne, sortir la plaque de betteraves-carottes. Remuer avec une spatule pour retourner les l\u00e9gumes (surtout ceux du bord, qui cuisent plus vite). Remettre au four. R\u00e9gler **12 minutes de plus** (les l\u00e9gumes poursuivront ensuite leur cuisson pendant celle de la truite).","## Enfourner la truite (12 min avant la fin)","**Quand la deuxi\u00e8me minuterie des l\u00e9gumes sonne (\u2248 27 min)**, mettre la plaque de truite au four sur la grille du milieu; les betteraves-carottes restent sur la grille du bas et finissent de cuire avec elle (~39-40 min au total). La truite cuit en 10-12 min \u00e0 cette temp\u00e9rature.","## V\u00e9rification et finition (5 min)","Apr\u00e8s 10 min, v\u00e9rifier la truite : la chair doit \u00eatre **opaque rose p\u00e2le** (plus translucide vif) et se **d\u00e9faire facilement \u00e0 la fourchette** quand on l'ins\u00e8re au centre. Si encore translucide, ajouter 1-2 min. La truite \u00e9tant tr\u00e8s mince et d\u00e9licate, elle passe rapidement de \u00ab pas assez \u00bb \u00e0 \u00ab trop cuite \u00bb \u2014 v\u00e9rifier t\u00f4t.","V\u00e9rifier les lentilles vers 25-28 min : elles doivent \u00eatre tendres \u00e0 la dent (al dente, un peu de r\u00e9sistance) mais pas farineuses. Si trop de liquide reste, laisser mijoter encore 3-5 min \u00e0 d\u00e9couvert pour l'\u00e9vaporer. Si presque \u00e0 sec avant que les lentilles soient tendres, ajouter 60 ml d'eau chaude. Retirer et jeter la feuille de laurier.","Assaisonner les lentilles cuites : hors du feu, ajouter 2\u00bd c. \u00e0 soupe d'huile d'olive, 1\u00bc c. \u00e0 soupe de vinaigre de vin rouge, 3 c. \u00e0 soupe de persil frais hach\u00e9, 1 grosse pinc\u00e9e de sel et 5-6 tours de poivre. M\u00e9langer d\u00e9licatement. Go\u00fbter et ajuster.","V\u00e9rifier les betteraves-carottes : la pointe d'un couteau doit entrer facilement d
