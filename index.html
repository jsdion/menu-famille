u\u00e9bec","Sauce : 3 c. \u00e0 soupe de sirop d'\u00e9rable, 2 c. \u00e0 soupe de moutarde \u00e0 l'ancienne, 1 c. \u00e0 soupe de moutarde de Dijon, 1 c. \u00e0 soupe d'huile d'olive, 2 gousses d'ail, 1 c. \u00e0 th\u00e9 de thym s\u00e9ch\u00e9, sel/poivre","1 grosse courge musqu\u00e9e (\u2248 1,5 kg, \u2248 900 g de chair) en cubes, 2 c. \u00e0 soupe de beurre, jus et zeste de 1 orange, muscade, sel/poivre","300 g de kale, 5 tranches de bacon (\u2248 150 g) en lardons, 3 gousses d'ail, jus de 1/2 citron, sel/poivre","3 pommes fermes (Cortland, Empire ou Honeycrisp) en quartiers, 1 c. \u00e0 soupe de sirop d'\u00e9rable, 1/2 c. \u00e0 th\u00e9 de cannelle, pinc\u00e9e de sel","Huile de canola pour la saisie (1 1/2 c. \u00e0 soupe)"]},{"d":13,"w":2,"n":"Sam","wd":0,"t":"Maquereau glac\u00e9 miso-\u00e9rable, riz japonais (Zojirushi), edamame, salade sunomono","tt":"60 min","pt":"20 min","ct":"40 min","ing":["5 filets de maquereau de l'Atlantique (\u2248 150 g chacun) \u2014 frais ou surgel\u00e9 (S\u00e9lection, Compliments); d\u00e9sar\u00eat\u00e9","## Gla\u00e7ure","Miso blanc (3 c. \u00e0 soupe \u00b7 shiro)","Sirop d'\u00e9rable (3 c. \u00e0 soupe)","Mirin (2 c. \u00e0 soupe)","Sauce soya r\u00e9duite (1 c. \u00e0 soupe)","Huile de s\u00e9same grill\u00e9 (1 c. \u00e0 th\u00e9)","Gingembre (3 cm)","1 gousse d'ail","## Riz japonais","2 1/2 tasses Zojirushi (gobelet 180 ml) de riz \u00e0 sushi/grains courts (Nishiki, Botan Calrose)","Programme SUSHI ou WHITE","##","Edamame en cosses surgel\u00e9s (500 g)","Fleur de sel","## Salade sunomono","Wakame s\u00e9ch\u00e9 (15 g)","1 concombre anglais","Vinaigre de riz (3 c. \u00e0 soupe)","Sucre (1 c. \u00e0 soupe)","Sauce soya","Huile de s\u00e9same","Gingembre","Graines de s\u00e9same","## Optionnel","Vinaigre de riz assaisonn\u00e9 pour le riz","Lani\u00e8res de nori"],"inst":["## Un mot sur cette recette","| Le maquereau a un profil nutritionnel exceptionnel : ~2,5 g d'om\u00e9ga-3 par portion de 150 g (pr\u00e8s du double d'un saumon d'\u00e9levage), vitamine D (2 000 UI !), s\u00e9l\u00e9nium, B12 \u2014 \u00e0 un prix modique. Son go\u00fbt est plus marqu\u00e9; la gla\u00e7ure miso-\u00e9rable \u00e9quilibre avec sucr\u00e9-sal\u00e9-umami. C'est la fa\u00e7on id\u00e9ale de l'apprivoiser.","## Un mot sur le miso","| Le miso est une p\u00e2te de soja ferment\u00e9. **Miso blanc (shiro)** : jeune fermentation, doux, l\u00e9g\u00e8rement sucr\u00e9 \u2014 c'est celui qu'on utilise. Une fois ouvert, il se conserve des mois au frigo.","## Avant tout (mise en place \u2014 3 min)","Sortir le maquereau pour qu'il temp\u00e8re 15 min. Sortir le Zojirushi et son gobelet de 180 ml.","Sortir une plaque r\u00e9sistante au broil et la tapisser de papier alu (**pas de parchemin sous le broil** \u2014 il br\u00fble).","## D\u00e9marrer le riz japonais au Zojirushi","Mesurer **2 \u00bd tasses Zojirushi** de riz \u00e0 sushi / japonais \u00e0 grains courts (Nishiki, Kokuho Rose, Botan Calrose).","**Rincer abondamment** (3-4 fois) jusqu'\u00e0 ce que l'eau reste presque claire \u2014 le riz \u00e0 sushi doit \u00eatre bien rinc\u00e9 sinon il devient p\u00e2teux. Bien \u00e9goutter.","Ajouter de l'eau jusqu'\u00e0 la ligne **WHITE 2 \u00bd cups**. Utiliser le programme **SUSHI** s'il est disponible (grains plus fermes), sinon WHITE. Appuyer sur START.","## Pr\u00e9parer la gla\u00e7ure et mariner le maquereau (5 min + 15-30 min)","Fouetter la gla\u00e7ure : 3 c. \u00e0 soupe de miso blanc, 3 c. \u00e0 soupe de sirop d'\u00e9rable, 2 c. \u00e0 soupe de mirin, 1 c. \u00e0 soupe de sauce soya r\u00e9duite, 1 c. \u00e0 th\u00e9 d'huile de s\u00e9same grill\u00e9, 1 morceau de gingembre de 3 cm r\u00e2p\u00e9, 1 gousse d'ail r\u00e2p\u00e9e. La gla\u00e7ure doit avoir la consistance d'un yogourt \u00e9pais.","**Pr\u00e9parer les 5 filets de maquereau** : \u00e9ponger des deux c\u00f4t\u00e9s. V\u00e9rifier les ar\u00eates centrales (demander \u00ab d\u00e9sar\u00eat\u00e9 \u00bb au poissonnier); sinon les retirer \u00e0 la pince en tirant en biais. Saler l\u00e9g\u00e8rement.","**Diviser la gla\u00e7ure en deux** : \u2154 pour mariner, \u2153 pour badigeonner \u00e0 mi-cuisson.","D\u00e9poser les filets **peau vers le bas** sur la plaque, badigeonner la chair avec la moiti\u00e9 de la gla\u00e7ure. **Mariner 15-30 min** (ne pas d\u00e9passer 45 min).","## Pr\u00e9parer la salade sunomono (10 min)","**R\u00e9hydrater 15 g de wakame s\u00e9ch\u00e9** : couvrir d'eau ti\u00e8de, laisser 5-7 min. Il gonfle et devient vert vif. \u00c9goutter, presser. Hacher si les morceaux sont grands.","**Trancher 1 concombre anglais tr\u00e8s finement** (2-3 mm, mandoline avec poussoir). **D\u00e9gorger** : \u00bd c. \u00e0 th\u00e9 de sel, laisser 10 min, puis **presser fermement** pour extraire l'eau \u2014 essentiel sinon la salade devient soupe.","Combiner concombre et wakame dans un saladier.","Vinaigrette sunomono : 3 c. \u00e0 soupe de vinaigre de riz, 1 c. \u00e0 soupe de sucre, 1 c. \u00e0 th\u00e9 de sauce soya, 1 c. \u00e0 th\u00e9 d'huile de s\u00e9same grill\u00e9, \u00bd c. \u00e0 th\u00e9 de gingembre r\u00e2p\u00e9. Verser, m\u00e9langer, parsemer de graines de s\u00e9same. **R\u00e9server au frigo.**","## Pr\u00e9parer les edamame (6 min)","Porter une casserole d'eau sal\u00e9e \u00e0 \u00e9bullition. Ajouter 500 g d'edamame en cosses **congel\u00e9s**, cuire **4-5 min**. \u00c9goutter, parsemer de fleur de sel.","## Pr\u00e9chauffer le broil et cuire le maquereau (7 min)","**R\u00e9gler le four sur BROIL (HAUTE).** Grille \u00e0 10-12 cm de l'\u00e9l\u00e9ment \u2014 assez proche pour caram\u00e9liser, assez loin pour cuire sans br\u00fbler. Attendre 5 min que l'\u00e9l\u00e9ment rougeoie.","**Enfourner la plaque sous l'\u00e9l\u00e9ment. Cuire 4 minutes.**","Sortir, badigeonner avec le reste de la gla\u00e7ure. Remettre sous le broil **1-2 minutes**, en surveillant **constamment** \u2014 de dor\u00e9 \u00e0 br\u00fbl\u00e9 en 30 secondes.","**Pr\u00eat** quand la gla\u00e7ure est brune-caram\u00e9lis\u00e9e bulleuse et la chair opaque se d\u00e9fait en flocons. Sortir, **laisser reposer 2-3 minutes.**","## V\u00e9rifier le riz et servir (2 min)","Le Zojirushi a sonn\u00e9. **Laisser reposer 5 min** avant d'ouvrir. Passer une fourchette (ou shamoji) pour a\u00e9rer.","**Optionnel japonais** : arroser le riz de 1 c. \u00e0 soupe de vinaigre de riz assaisonn\u00e9 (vinaigre + sucre + pinc\u00e9e de sel), m\u00e9langer. Excellent avec le maquereau.","## Assemblage et service (3 min)","**Dans chaque bol** : une portion de riz (\u2155), 1 filet de maquereau, la salade sunomono dans un petit bol s\u00e9par\u00e9, une portion d'edamame. Facultatif : graines de s\u00e9same, lani\u00e8res de nori.","Servir avec un th\u00e9 vert chaud si tu en as (excellent avec le poisson gras).","**Garder la 5\u1d49 portion.** Le maquereau 2 jours. Le riz 2 jours. La salade sunomono 2 jours (elle se bonifie). Les edamame froids au lunch.","## Substitutions et hors saison","- **Maquereau** (atlantique) : frais ou surgel\u00e9 (S\u00e9lection, Compliments). Ou sardines fra\u00eeches, truite arc-en-ciel (plus doux, pour ceux qui trouvent le maquereau trop fort), saumon.","- **Miso blanc (shiro)** : Marukome, Hikari. Si seulement rouge/m\u00e9lang\u00e9 : r\u00e9duire \u00e0 2 c. \u00e0 soupe. Vraiment introuvable : 1 c. \u00e0 soupe de Dijon + 2 c. \u00e0 soupe de soya + 1 c. \u00e0 soupe de tahini.","- **Mirin** : ou 2\u00bd c. \u00e0 soupe de vinaigre de riz + 1 c. \u00e0 th\u00e9 de sucre.","- **Sauce soya r\u00e9duite** : ou tamari (sans gluten).","- **Riz japonais \u00e0 grains courts** : Nishiki, Botan Calrose. **\u00c0 \u00e9viter** : basmati, riz \u00e9tuv\u00e9.","- **Wakame** : Wel-Pac, Eden Foods. Ou nori en lani\u00e8res. En dernier recours, omettre (namasu classique).","- **Vinaigre de riz** : Marukan, Mizkan. Ou vinaigre de cidre dilu\u00e9.","- **Gingembre frais** : se conserve 3-4 semaines au frigo, 6 mois au cong\u00e9lateur.","## Sur le shio-jime (optionnel avanc\u00e9)","| Si tu planifies 6-12 h \u00e0 l'avance : saler l\u00e9g\u00e8rement les filets, r\u00e9frig\u00e9rer. Cette technique japonaise extrait l'humidit\u00e9, raffermit la chair et att\u00e9nue le go\u00fbt trop marqu\u00e9. Rincer et \u00e9ponger avant de glacer. Fait une vraie diff\u00e9rence pour ceux qui trouvent le maquereau trop fort."],"nut":[{"l":"\u00c9nergie","v":"680 kcal"},{"l":"Prot\u00e9ines","v":"42 g"},{"l":"Fibres","v":"6 g"},{"l":"Om\u00e9ga-3 EPA+DHA","v":"2,5 g"}],"ing_raw":["5 filets de maquereau de l'Atlantique (\u2248 150 g chacun) \u2014 frais ou surgel\u00e9 (S\u00e9lection, Compliments); d\u00e9sar\u00eat\u00e9","Gla\u00e7ure : 3 c. \u00e0 soupe de miso blanc (shiro), 3 c. \u00e0 soupe de sirop d'\u00e9rable, 2 c. \u00e0 soupe de mirin, 1 c. \u00e0 soupe de sauce soya r\u00e9duite, 1 c. \u00e0 th\u00e9 d'huile de s\u00e9same grill\u00e9, 3 cm de gingembre, 1 gousse d'ail","Riz japonais : 2 1/2 tasses Zojirushi (gobelet 180 ml) de riz \u00e0 sushi/grains courts (Nishiki, Botan Calrose), programme SUSHI ou WHITE","500 g d'edamame en cosses surgel\u00e9s, fleur de sel","Salade sunomono : 15 g de wakame s\u00e9ch\u00e9, 1 concombre anglais, vinaigre de riz (3 c. \u00e0 soupe), 1 c. \u00e0 soupe de sucre, sauce soya, huile de s\u00e9same, gingembre, graines de s\u00e9same","Optionnel : vinaigre de riz assaisonn\u00e9 pour le riz, lani\u00e8res de nori"]},{"d":14,"w":2,"n":"Dim","wd":0,"t":"Tajine de poulet aux abricots, citrons confits et amandes, couscous complet, salade carottes-cumin","tt":"75 min","pt":"20 min","ct":"55 min","ing":["10 hauts de cuisse de poulet AVEC os et peau (1,5 kg)","## Marinade","Gingembre (1 1/4 c. \u00e0 th\u00e9)","Curcuma (1 1/4 c. \u00e0 th\u00e9)","Cumin (1 1/4 c. \u00e0 th\u00e9)","Paprika (1 1/4 c. \u00e0 th\u00e9)","Cannelle (1/2 c. \u00e0 th\u00e9)","Sel et poivre","##","Huile d'olive (2 1/2 c. \u00e0 soupe)","2 gros oignons","5 gousses d'ail","4 cm gingembre frais","P\u00e2te de tomate (1 1/4 c. \u00e0 soupe)","18 brins de safran infus\u00e9s dans 75 ml d'eau chaude","Bouillon de poulet (750 ml)","##","1 citron confit (ou zeste + jus de 1 citron + 1/4 c. \u00e0 th\u00e9 de sel)","Abricots secs (190 g \u00b7 non sulfur\u00e9s)","Amandes effil\u00e9es grill\u00e9es (75 g)","Pignons grill\u00e9s (40 g)","##","Coriandre","Persil","## Couscous","Couscous complet (375 g)","Bouillon chaud (500 ml)","Huile (1 1/4 c. \u00e0 soupe)","Raisins de Corinthe (2 1/2 c. \u00e0 soupe)","Amandes","Zeste de citron","## L\u00e9gumes","1 grosse courgette","1 grosse carotte","1 1/2 bo\u00eete (540 ml) de pois chiches rinc\u00e9s","Huile (2 1/2 c. \u00e0 soupe)","Ras-el-hanout (1 1/4 c. \u00e0 th\u00e9)","## Salade","5 carottes r\u00e2p\u00e9es","Persil (2 1/2 c. \u00e0 soupe)","Jus de citron (2 1/2 c. \u00e0 soupe)","Huile (2 1/2 c. \u00e0 soupe)","Cumin (1 1/4 c. \u00e0 th\u00e9)","Miel (1 1/4 c. \u00e0 th\u00e9)","Graines de s\u00e9same (40 g)"],"inst":["## Un mot sur cette recette (et sur les \u00e9pices)","| Le tajine est un plat marocain. Ne pas confondre avec la cuisine indienne : bien que certaines \u00e9pices soient partag\u00e9es (cumin, curcuma, cannelle), le profil est tr\u00e8s diff\u00e9rent \u2014 **marocain** : chaud, floral, sucr\u00e9-sal\u00e9 (miel, abricots, cannelle), avec safran et citron confit uniques.","## Un mot sur le safran et le citron confit","| **Le safran** : ingr\u00e9dient signature (18 brins ici). **Le citron confit** : citrons entiers conserv\u00e9s au sel, texture molle, go\u00fbt ferment\u00e9-agrume unique. Rare en \u00e9picerie standard (La Vieille Europe, \u00e9piceries moyen-orientales). Rempla\u00e7able par zeste + jus + sel.","## La veille (optionnel)","**Assaisonner le poulet \u00e0 l'avance** : parer les 10 hauts de cuisse, les frotter avec le m\u00e9lange d'\u00e9pices, mettre au frigo 12-24 h. Transforme le r\u00e9sultat.","## Avant tout (mise en place \u2014 3 min)","Sortir le poulet **30 min avant**. Sortir une grande cocotte en fonte \u00e9maill\u00e9e (5-6 L) avec couvercle. Peser et r\u00e9server tous les ingr\u00e9dients dans des bols.","## Infuser le safran (10 min \u2014 en premier)","\u00c9craser 18 brins de safran entre les doigts. Verser dans un bol, ajouter 75 ml d'eau chaude (60-70 \u00b0C). Laisser infuser au moins 10 min. L'eau devient jaune-orang\u00e9 profond.","## Mariner le poulet (5 min + 15 min)","M\u00e9langer la marinade s\u00e8che : 1 c. \u00e0 th\u00e9 bomb\u00e9e chacun de gingembre en poudre, curcuma, cumin, paprika doux; \u00bd c. \u00e0 th\u00e9 de cannelle; sel; poivre.","**Parer les hauts de cuisse** (garder la peau), \u00e9ponger. Frotter \u00e9nergiquement avec la marinade. Laisser reposer **15 minutes minimum**.","## Pr\u00e9parer les aromates (5 min)","\u00c9mincer 2 gros oignons jaunes en cubes de 5 mm. Hacher 5 gousses d'ail. R\u00e2per un morceau de gingembre de 4 cm.","**Pr\u00e9parer le citron confit** : si tu en as, couper en deux, s\u00e9parer pulpe (dans le tajine) et peau (hach\u00e9e finement, aussi). Sinon : zeste + jus de 1 citron + \u00bc c. \u00e0 th\u00e9 de sel, reposer 5 min.","## Griller les amandes et pignons (5 min)","Dans une po\u00eale s\u00e8che \u00e0 feu moyen, mettre 75 g d'amandes effil\u00e9es + 40 g de pignons. Cuire **4-5 min** en remuant constamment jusqu'\u00e0 dor\u00e9s. Verser imm\u00e9diatement dans une assiette.","## Saisir le poulet (12 min)","Chauffer la cocotte \u00e0 feu moyen-vif, ajouter 1 \u00bd c. \u00e0 soupe d'huile d'olive. Ajouter les hauts de cuisse **peau vers le bas**, sans se toucher (deux lots si besoin).","**Ne pas bouger 5 minutes** (peau dor\u00e9e-croustillante). Retourner, cuire 3 min c\u00f4t\u00e9 chair. R\u00e9server sur une assiette. Garder le gras rendu dans la cocotte.","## Cuire les aromates et la base (7 min)","Baisser \u00e0 feu moyen. Ajouter les oignons avec une pinc\u00e9e de sel, cuire **5 minutes** en raclant le fond. Ajouter ail et gingembre, cuire **1 minute**.","Ajouter 1 \u00bc c. \u00e0 soupe de p\u00e2te de tomate. **Pincer** la p\u00e2te 1 minute \u2014 elle fonce et perd son go\u00fbt cru.","## Monter le tajine et enfourner (5 min + 40 min)","Verser l'infusion de safran (liquide + brins). Ajouter 750 ml de bouillon de poulet chaud. Remuer.","Ajouter : les hauts de cuisse r\u00e9serv\u00e9s avec leur jus, le citron confit (pulpe + peau) ou la substitution, 190 g d'abricots secs (couper en deux si gros).","Le liquide couvre le poulet aux \u2154. Porter \u00e0 \u00e9bullition, **couvrir, baisser \u00e0 feu doux-moyen. Mijoter 35-40 minutes.** (Ou enfourner couvert \u00e0 160 \u00b0C.)","## Pendant le mijotage : l\u00e9gumes saut\u00e9s (10 min)","Couper 1 grosse courgette en demi-lunes de 1 cm, 1 grosse carotte en rondelles de 5 mm. Rincer 1 \u00bd bo\u00eete (540 ml) de pois chiches.","Dans une grande po\u00eale, chauffer 2 \u00bd c. \u00e0 soupe d'huile d'olive. Ajouter carottes, cuire 3 min. Ajouter courgette, cuire 3 min (tendre-croquant).","Ajouter les pois chiches, 1 c. \u00e0 th\u00e9 bomb\u00e9e de ras-el-hanout, sel, poivre. Cuire 3 min jusqu'\u00e0 dor\u00e9s. R\u00e9server couvert.","## Pr\u00e9parer la salade de carottes au cumin (10 min)","**R\u00e2per 5 carottes** (gros trous ou robot). Vinaigrette : 2 \u00bd c. \u00e0 soupe d'huile d'olive, 2 \u00bd c. \u00e0 soupe de jus de citron, 1 c. \u00e0 th\u00e9 de cumin, 1 c. \u00e0 th\u00e9 de miel, sel, poivre. Fouetter.","Ajouter les carottes, 2 \u00bd c. \u00e0 soupe de persil hach\u00e9, m\u00e9langer. Parsemer de 40 g de graines de s\u00e9same avant de servir. R\u00e9server au frigo (se bonifie).","## Pr\u00e9parer le couscous (10 min)","Dans un grand bol, mettre 375 g de couscous complet. Chauffer 500 ml de bouillon ou d'eau sal\u00e9e \u00e0 \u00e9bullition avec 1 \u00bc c. \u00e0 soupe d'huile.","**Verser le liquide bouillant sur le couscous.** Ajouter 2 \u00bd c. \u00e0 soupe de raisins de Corinthe. Remuer une fois. **Couvrir 5 minutes.**","Ouvrir, **\u00e9grainer** \u00e0 la fourchette. Incorporer le zeste de 1 citron et une partie des amandes grill\u00e9es (garder \u2153 pour la garniture).","## V\u00e9rifier le tajine (2 min)","\u00c0 35 min, v\u00e9rifier : le poulet compl\u00e8tement tendre (se d\u00e9tache des os), les abricots regonfl\u00e9s, la sauce r\u00e9duite et \u00e9paisse, le tout jaune-orang\u00e9 dor\u00e9.","**Ajuster** : si trop liquide, retirer le poulet et r\u00e9duire 5-8 min \u00e0 feu vif. Si trop \u00e9pais, ajouter du bouillon. Go\u00fbter, ajuster sel.","## Assemblage et service (3 min)","Hacher grossi\u00e8rement coriandre et persil (~\u00bd tasse total).","**Dans chaque assiette** : un lit de couscous (\u2155), 2 hauts de cuisse (ou 1 gros), une louche de sauce aux abricots, l\u00e9gumes saut\u00e9s, amandes et pignons grill\u00e9s, herbes fra\u00eeches. Salade de carottes \u00e0 c\u00f4t\u00e9.","**Garder la 5\u1d49 portion.** **Le tajine est encore meilleur le lendemain.** Se cong\u00e8le tr\u00e8s bien (3 mois). Couscous et salade se conservent bien.","## Substitutions et hors saison","- **Hauts de cuisse avec os et peau** : plus go\u00fbteux pour ce plat mijot\u00e9. Ou cuisses enti\u00e8res, ou poulet en morceaux.","- **Citron confit** : rare (\u00e9piceries moyen-orientales). Ou zeste + jus + \u00bc c. \u00e0 th\u00e9 de sel. Ou en faire soi-m\u00eame 3-4 semaines \u00e0 l'avance.","- **Safran** : le seul ingr\u00e9dient vraiment cher (~5-10 $ pour ce plat). Budget serr\u00e9 : r\u00e9duire \u00e0 8-10 brins ou omettre.","- **Ras-el-hanout** : Al'Fez, Sadaf. Ou m\u00e9lange maison : cumin + coriandre moulue + curcuma + cannelle + gingembre + cardamome + poivre.","- **Abricots secs** : ou pruneaux (variante classique), ou dattes Medjool.","- **Couscous complet** : ou couscous ordinaire, boulgour, quinoa.","- **Raisins de Corinthe** : ou Sultanine dor\u00e9s, canneberges s\u00e9ch\u00e9es.","- **Courgette** : ou aubergine en d\u00e9s (pr\u00e9cuire 5 min de plus), poivron."],"nut":[{"l":"\u00c9nergie","v":"820 kcal"},{"l":"Prot\u00e9ines","v":"52 g"},{"l":"Fibres","v":"14 g"},{"l":"Fer","v":"6 mg"}],"ing_raw":["10 hauts de cuisse de poulet AVEC os et peau (1,5 kg)","Marinade : 1 1/4 c. \u00e0 th\u00e9 chacun de gingembre, curcuma, cumin, paprika; 1/2 c. \u00e0 th\u00e9 de cannelle; sel/poivre","2 1/2 c. \u00e0 soupe d'huile d'olive, 2 gros oignons, 5 gousses d'ail, 4 cm gingembre frais, 1 1/4 c. \u00e0 soupe de p\u00e2te de tomate, 18 brins de safran infus\u00e9s dans 75 ml d'eau chaude, 750 ml de bouillon de poulet","1 citron confit (ou zeste + jus de 1 citron + 1/4 c. \u00e0 th\u00e9 de sel), 190 g d'abricots secs (non sulfur\u00e9s), 75 g d'amandes effil\u00e9es grill\u00e9es, 40 g de pignons grill\u00e9s","Coriandre, persil","Couscous : 375 g de couscous complet + 500 ml de bouillon chaud + 1 1/4 c. \u00e0 soupe d'huile + 2 1/2 c. \u00e0 soupe de raisins de Corinthe + amandes + zeste de citron","L\u00e9gumes : 1 grosse courgette, 1 grosse carotte, 1 1/2 bo\u00eete (540 ml) de pois chiches rinc\u00e9s, 2 1/2 c. \u00e0 soupe d'huile, 1 1/4 c. \u00e0 th\u00e9 de ras-el-hanout","Salade : 5 carottes r\u00e2p\u00e9es, 2 1/2 c. \u00e0 soupe de persil, 2 1/2 c. \u00e0 soupe de jus de citron, 2 1/2 c. \u00e0 soupe d'huile, 1 1/4 c. \u00e0 th\u00e9 de cumin, 1 1/4 c. \u00e0 th\u00e9 de miel, 40 g de graines de s\u00e9same"]},{"d":15,"w":3,"n":"Lun","wd":1,"t":"Poulet teriyaki maison, nouilles soba au sarrasin, bok choy saut\u00e9 \u00e0 l'ail, salade carottes-pomme-s\u00e9same","tt":"30 min","pt":"10 min (+ d\u00e9cong\u00e9lation)","ct":"20 min","ing":["8-10 hauts de cuisse de poulet d\u00e9soss\u00e9s sans peau (\u2248 1 kg-1,2 kg)","## Teriyaki maison","Sauce soya r\u00e9duite (60 ml)","Mirin (4 c. \u00e0 soupe)","Miel (2 1/2 c. \u00e0 soupe)","Sak\u00e9 (2 1/2 c. \u00e0 soupe \u00b7 ou bouillon)","Gingembre (3 cm)","1 gousse d'ail","F\u00e9cule (1 c. \u00e0 th\u00e9)","##","Nouilles soba 100 % sarrasin (375 g \u00b7 Eden Foods, King Soba)","##","Bok choy (5 petits ou 3 gros) en quartiers (625 g)","4 gousses d'ail","Huile de s\u00e9same grill\u00e9 (2 1/2 c. \u00e0 soupe)","Sauce soya (1 c. \u00e0 soupe)","Graines de s\u00e9same","## Salade","5 carottes r\u00e2p\u00e9es","1 pomme verte (Granny Smith)","Graines de tournesol grill\u00e9es (50 g)","Graines de s\u00e9same (2 c. \u00e0 soupe)","Vinaigrette gingembre-citron-miel","##","3 oignons verts","Huile de canola pour la cuisson"],"inst":["## Un mot sur le teriyaki","| **Teriyaki** vient de teri (brillance) et yaki (grill\u00e9). C'est une technique : cuire un aliment et le glacer en fin de cuisson avec une sauce sucr\u00e9e-sal\u00e9e qui devient brillante et caram\u00e9lis\u00e9e. **La sauce \u00e9paissit dans la po\u00eale en fin de cuisson**, pas vers\u00e9e sur des aliments crus. Deux erreurs : mijoter le poulet d\u00e8s le d\u00e9part (le bout), et utiliser une sauce en bouteille (trop sucr\u00e9e). La sauce maison prend 5 minutes.","## Sur le poulet \u2014 hauts de cuisse vs poitrines","| **Hauts de cuisse d\u00e9soss\u00e9s** fortement recommand\u00e9s : plus juteux, plus tol\u00e9rants, plus go\u00fbteux, moins chers, et c'est la technique japonaise classique (\u00ab momo \u00bb). Si tu pr\u00e9f\u00e8res la poitrine, trancher en escalopes de 1,5 cm et surveiller (elle s\u00e8che vite).","## Avant tout (mise en place \u2014 4 min)","Sortir le poulet du frigo 20-30 min avant. **Pas de four** \u2014 tout \u00e0 la cuisini\u00e8re. Sortir une grande po\u00eale (pas anti-adh\u00e9sive), une casserole pour les soba, une po\u00eale/wok pour le bok choy.","Remplir une grande casserole (4-5 L) d'eau pour les soba, couvrir, feu vif.","## Pr\u00e9parer la sauce teriyaki maison (5 min)","R\u00e2per un morceau de gingembre de 3 cm et 1 gousse d'ail \u00e0 la microplane.","Dans une petite casserole, combiner : 60 ml de sauce soya r\u00e9duite, 4 c. \u00e0 soupe de mirin, 2 \u00bd c. \u00e0 soupe de miel (ou cassonade), 2 \u00bd c. \u00e0 soupe de sak\u00e9 (ou bouillon de poulet), gingembre et ail r\u00e2p\u00e9s.","Chauffer \u00e0 feu moyen jusqu'\u00e0 **fr\u00e9missement** (~3 min). **Ne pas faire bouillir violemment.**","M\u00e9langer 1 c. \u00e0 th\u00e9 de f\u00e9cule de ma\u00efs avec 1 c. \u00e0 soupe d'eau froide (**suspension de f\u00e9cule** \u2014 \u00e9vite les grumeaux). Verser dans la sauce chaude en remuant. Cuire 1-2 min \u2014 la sauce \u00e9paissit et devient brillante. **Diviser en deux** : \u2154 pour le poulet, \u2153 pour les soba.","## Pr\u00e9parer le poulet (5 min)","**\u00c9ponger les 8-10 hauts de cuisse d\u00e9soss\u00e9s** (~1 kg-1,2 kg). Couper chaque haut en 2-3 morceaux (~4-5 cm) si tu veux plus fin, sinon entiers (plus juteux). Saler tr\u00e8s l\u00e9g\u00e8rement.","## Pr\u00e9parer la salade de carottes (10 min)","**R\u00e2per 5 carottes** (gros trous ou robot). Couper 1 pomme verte (Granny Smith) en fine julienne (ou r\u00e2per).","Vinaigrette : 3 c. \u00e0 soupe d'huile de canola, 2 c. \u00e0 soupe de jus de citron, 1 c. \u00e0 th\u00e9 bomb\u00e9e de gingembre r\u00e2p\u00e9, 1 c. \u00e0 th\u00e9 de miel, 1 c. \u00e0 th\u00e9 de sauce soya, \u00bd c. \u00e0 th\u00e9 d'huile de s\u00e9same grill\u00e9, poivre. Fouetter.","Combiner carottes, pomme, 50 g de graines de tournesol grill\u00e9es, 2 c. \u00e0 soupe de graines de s\u00e9same. Verser la vinaigrette, m\u00e9langer. **R\u00e9server au frigo.**","## Pr\u00e9parer le bok choy (3 min)","**Nettoyer 625 g de bok choy** : couper la base, s\u00e9parer les feuilles ou couper en quartiers dans la longueur. **Rincer soigneusement** (retient du sable). Essorer. \u00c9mincer 4 gousses d'ail. R\u00e9server pr\u00e8s de la deuxi\u00e8me po\u00eale.","## Cuire les nouilles soba (5-6 min)","Quand l'eau bout, saler l\u00e9g\u00e8rement (1 c. \u00e0 th\u00e9). Ajouter 375 g de nouilles soba 100 % sarrasin, remuer. Cuire **4-5 minutes** \u2014 tendres avec du mordant.","**\u00c9goutter, puis rincer sous l'eau froide 30 secondes.** Contre-intuitif mais essentiel pour les soba : enl\u00e8ve l'amidon collant. Bien \u00e9goutter. R\u00e9server.","## Cuire le poulet teriyaki (10 min \u2014 moment cl\u00e9)","Chauffer la grande po\u00eale \u00e0 feu **moyen-vif** 2 min, ajouter 1 c. \u00e0 soupe d'huile de canola. D\u00e9poser le poulet en une seule couche. **Ne pas bouger 4-5 minutes** (cro\u00fbte dor\u00e9e).","Retourner, cuire 3-4 min. **V\u00e9rifier : 74 \u00b0C \u00e0 c\u0153ur** \u2014 chair enti\u00e8rement blanche, jus clairs.","**Baisser \u00e0 feu moyen-doux.** Ajouter la portion \u2154 de sauce. Elle bouillonne au contact. Remuer pour enrober. **Cuire 1-2 min** jusqu'\u00e0 gla\u00e7ure brillante brun-dor\u00e9. **Retirer du feu d\u00e8s que la sauce commence \u00e0 cristalliser** (sinon am\u00e8re).","Transf\u00e9rer le poulet glac\u00e9 sur un plat, garder les r\u00e9sidus de sauce dans la po\u00eale (pour les soba).","## Sauter le bok choy (5 min)","Dans la deuxi\u00e8me po\u00eale (ou celle du poulet vid\u00e9e), chauffer 2 \u00bd c. \u00e0 soupe d'huile de s\u00e9same grill\u00e9 \u00e0 feu vif. Ajouter l'ail, remuer 30 sec. Ajouter le bok choy, sauter **3-4 min** \u2014 tiges translucides, feuilles tomb\u00e9es. Ajouter 1 c. \u00e0 soupe de sauce soya, cuire 30 sec. Parsemer de s\u00e9same.","## Glacer les soba (2 min)","Dans la po\u00eale du poulet (sucs de teriyaki caram\u00e9lis\u00e9s), ajouter la portion \u2153 de sauce restante + 3 c. \u00e0 soupe d'eau. Chauffer 30 sec en remuant.","Ajouter les soba \u00e9goutt\u00e9es. **M\u00e9langer vigoureusement 1-2 min** pour enrober et r\u00e9chauffer \u2014 brillantes, ti\u00e8des.","## Assemblage et service (3 min)","**Trancher le poulet en biseau** (2 cm) \u2014 expose la surface glac\u00e9e.","**Dans chaque bol** : nid de soba glac\u00e9es (\u2155), poulet teriyaki tranch\u00e9, bok choy saut\u00e9, salade carottes-pomme. Parsemer d'oignons verts et de s\u00e9same.","Servir imm\u00e9diatement \u2014 le teriyaki est meilleur juste cuit.","**Garder la 5\u1d49 portion.** Le poulet 3 jours (bon froid). Les soba 2 jours (moins bonnes \u2014 le sarrasin gonfle). La salade 2 jours (se bonifie).","## Substitutions et hors saison","- **Hauts de cuisse d\u00e9soss\u00e9s** : ou poitrines en escalopes de 1,5 cm (surveiller), ou cuisses avec peau.","- **Sauce soya r\u00e9duite** : Kikkoman moins de sodium. Ou tamari, shoyu. **\u00c0 \u00e9viter** : soya chinoise fonc\u00e9e.","- **Mirin** : Hon-Mirin, Kikkoman Aji-Mirin.","- **Sak\u00e9** : \u00e0 la SAQ (Ozeki, Gekkeikan). Ou bouillon de poulet, vin blanc sec, ou omettre.","- **Nouilles soba 100 % sarrasin** : Eden Foods, King Soba. **Attention** aux \u00ab style soba \u00bb (surtout du bl\u00e9). Ou udon, ou spaghetti fin.","- **Bok choy** : baby ou r\u00e9gulier. Ou choy sum, kai lan, \u00e9pinards (1 min).","- **F\u00e9cule de ma\u00efs** : Maizena. Ou tapioca, f\u00e9cule de pomme de terre."],"nut":[{"l":"\u00c9nergie","v":"690 kcal"},{"l":"Prot\u00e9ines","v":"50 g"},{"l":"Fibres","v":"8 g"},{"l":"Fer","v":"5 mg"}],"ing_raw":["8-10 hauts de cuisse de poulet d\u00e9soss\u00e9s sans peau (\u2248 1 kg-1,2 kg)","Teriyaki maison : 60 ml de sauce soya r\u00e9duite, 4 c. \u00e0 soupe de mirin, 2 1/2 c. \u00e0 soupe de miel, 2 1/2 c. \u00e0 soupe de sak\u00e9 (ou bouillon), 3 cm de gingembre, 1 gousse d'ail, 1 c. \u00e0 th\u00e9 de f\u00e9cule","375 g de nouilles soba 100 % sarrasin (Eden Foods, King Soba)","625 g de bok choy (5 petits ou 3 gros) en quartiers, 4 gousses d'ail, 2 1/2 c. \u00e0 soupe d'huile de s\u00e9same grill\u00e9, 1 c. \u00e0 soupe de sauce soya, graines de s\u00e9same","Salade : 5 carottes r\u00e2p\u00e9es, 1 pomme verte (Granny Smith), 50 g de graines de tournesol grill\u00e9es, 2 c. \u00e0 soupe de graines de s\u00e9same, vinaigrette gingembre-citron-miel","3 oignons verts, huile de canola pour la cuisson"]},{"d":16,"w":3,"n":"Mar","wd":1,"t":"Poitrines de poulet sheet-pan citron-herbes, \u00e9pinards au beurre et f\u00e9ta, riz sauvage aux champignons, salade roquette","tt":"40 min","pt":"15 min","ct":"30 min","ing":["5 poitrines de poulet d\u00e9soss\u00e9es sans peau (200 g chacune, \u2248 1 kg) \u2014 Costco poitrines sans peau pack \u00e9conomique","## Marinade","Huile d'olive (3 c. \u00e0 soupe)","Jus et zeste de 1 1/2 citron","4 gousses d'ail r\u00e2p\u00e9es","Thym frais (2 c. \u00e0 soupe \u00b7 ou 2 c. \u00e0 th\u00e9 s\u00e9ch\u00e9)","Romarin frais hach\u00e9 (1 c. \u00e0 soupe \u00b7 ou 1 c. \u00e0 th\u00e9 s\u00e9ch\u00e9)","Origan s\u00e9ch\u00e9 (1 c. \u00e0 th\u00e9)","Paprika","Sel et poivre","## \u00c9pinards","B\u00e9b\u00e9s \u00e9pinards (400 g)","Beurre (1 1/4 c. \u00e0 soupe)","Huile d'olive (1 1/4 c. \u00e0 soupe)","2 gousses d'ail","F\u00e9ta \u00e9miett\u00e9e (150 g)","Poivre et muscade","##","M\u00e9lange riz sauvage et long grain (250 g \u00b7 Lundberg Wild Blend)","##","Bouillon de poulet faible en sodium (625 ml)","1 oignon","Champignons cremini tranch\u00e9s (310 g)","Huile d'olive (2 1/2 c. \u00e0 soupe)","Thym frais","## Salade","Roquette (190 g)","Tomates cerises (310 g)","Pignons grill\u00e9s (50 g)","Parmesan (40 g)","Vinaigrette balsamique"],"inst":["## Un mot sur le riz sauvage","| Le \u00ab riz sauvage \u00bb n'est pas vraiment du riz \u2014 c'est la graine d'une gramin\u00e9e aquatique nord-am\u00e9ricaine. Grains longs, minces, noir-brun, qui \u00e9clatent en cuisant. Go\u00fbt noiset\u00e9 et terreux, texture toujours ferme. Les m\u00e9langes commerciaux (Lundberg Wild Blend) combinent riz sauvage, brun, rouge et noir.","## Zojirushi ou casserole pour le riz sauvage ?","Cette recette utilise la **m\u00e9thode casserole traditionnelle** avec pilaf pr\u00e9alable : le programme BROWN du Zojirushi prend plus longtemps (~1 h 30) que la casserole (~45 min), et la technique pilaf (nacrer avec l'oignon) apporte une profondeur essentielle. Le Zojirushi reste possible (BROWN 2 cups + aromates rissol\u00e9s).","## Avant tout (mise en place \u2014 4 min)","Sortir les poitrines **30 min avant** (essentiel \u2014 froide = ext\u00e9rieur sec, int\u00e9rieur cru). **Pr\u00e9chauffer le four \u00e0 200 \u00b0C (400 \u00b0F).** Tapisser une plaque de parchemin.","Sortir une casserole moyenne \u00e0 couvercle, une grande po\u00eale pour les champignons, une po\u00eale pour les \u00e9pinards, un saladier.","## D\u00e9marrer le riz sauvage (5 min prep + 40-45 min)","**Rincer 250 g de m\u00e9lange riz sauvage Lundberg** au tamis 20-30 sec. Bien \u00e9goutter.","\u00c9mincer 1 oignon jaune en cubes de 5 mm. Dans la casserole, chauffer 1 c. \u00e0 soupe d'huile d'olive, ajouter l'oignon avec une pinc\u00e9e de sel, cuire 3 min jusqu'\u00e0 translucide.","Ajouter le riz rinc\u00e9. **Nacrer 2 minutes** \u2014 les grains deviennent translucides sur les bords. Ajoute une profondeur significative.","Ajouter 625 ml de bouillon de poulet, une pinc\u00e9e de sel, 3-4 branches de thym frais. Porter \u00e0 \u00e9bullition, **baisser \u00e0 feu tr\u00e8s doux, couvrir, minuterie 40 minutes.** Ne pas soulever le couvercle.","## Pr\u00e9parer la marinade et les poitrines (5 min)","Zester 1 \u00bd citron, presser le jus. R\u00e2per 4 gousses d'ail. M\u00e9langer : 3 c. \u00e0 soupe d'huile d'olive, zeste et jus, ail, 2 c. \u00e0 soupe de thym frais, 1 c. \u00e0 soupe de romarin frais, 1 c. \u00e0 th\u00e9 d'origan s\u00e9ch\u00e9, sel, poivre, 1 c. \u00e0 th\u00e9 de paprika doux.","**\u00c9ponger les 5 poitrines** (~1 kg). **Uniformiser l'\u00e9paisseur** : papillonner (couper horizontalement presque de part en part, ouvrir en livre) ou aplatir au maillet \u00e0 2 cm. Pour cette recette, aplatir l\u00e9ger \u00e0 2 cm est id\u00e9al.","**Enrober de marinade**, laisser mariner **5-10 minutes** minimum.","## Enfourner les poitrines (22-26 min)","Disposer sur la plaque, 2-3 cm entre chaque. Verser le reste de marinade. **Enfourner sur la grille du milieu.** R\u00e9gler **22 minutes**.","## Pr\u00e9parer la salade (5 min)","Rincer 190 g de roquette, essorer. Couper 310 g de tomates cerises en deux.","**Griller 50 g de pignons** \u00e0 sec 4-5 min. Faire 40 g de copeaux de parmesan.","Vinaigrette balsamique : 3 c. \u00e0 soupe d'huile d'olive, 1 c. \u00e0 soupe de vinaigre balsamique, \u00bd c. \u00e0 th\u00e9 de moutarde de Dijon, sel, poivre. Fouetter.","## Cuire les champignons (8 min)","**Nettoyer 310 g de champignons cremini** (brosser, pas d'eau), trancher en lamelles de 5 mm. Dans une grande po\u00eale, chauffer 2 \u00bd c. \u00e0 soupe d'huile \u00e0 feu moyen-vif. Ajouter les champignons en une couche. **Ne pas remuer 3 minutes** (caram\u00e9lisation).","Remuer, ajouter 2-3 branches de thym et une pinc\u00e9e de sel. Cuire 4-5 min jusqu'\u00e0 dor\u00e9s et sans humidit\u00e9. R\u00e9server couvert.","## V\u00e9rifier la cuisson du poulet (\u00e0 22 min)","**74 \u00b0C \u00e0 c\u0153ur** dans la partie la plus \u00e9paisse. Sans thermom\u00e8tre : chair enti\u00e8rement blanche, jus clairs. Si rose, +3-4 min. **Ne pas d\u00e9passer 76 \u00b0C** (la poitrine se dess\u00e8che).","**Transf\u00e9rer sur une planche, couvrir sans serrer d'alu, reposer 5 minutes.** Non n\u00e9gociable.","## Cuire les \u00e9pinards (5 min)","\u00c9mincer 2 gousses d'ail. Faire fondre 1 c. \u00e0 soupe g\u00e9n\u00e9reuse de beurre + 1 c. \u00e0 soupe d'huile \u00e0 feu moyen. Ajouter l'ail, remuer 30 sec.","**Ajouter 400 g de b\u00e9b\u00e9s \u00e9pinards par poign\u00e9es.** Cuire 2-3 min jusqu'\u00e0 tomb\u00e9s.","**Retirer du feu.** Ajouter 150 g de f\u00e9ta \u00e9miett\u00e9e, une bonne pinc\u00e9e de muscade, poivre. **Ne pas saler** (la f\u00e9ta est sal\u00e9e). M\u00e9langer doucement. R\u00e9server couvert.","## V\u00e9rifier le riz (\u00e0 40 min)","Couper le feu, **laisser couvert 5 minutes**, puis \u00e9grainer. **Incorporer les champignons cuits.** Go\u00fbter, ajuster.","## Assemblage et service (3 min)","**Trancher les poitrines en biais** (2 cm). Verser la vinaigrette sur la salade, ajouter pignons et parmesan.","**Dans chaque assiette** : riz sauvage aux champignons (\u2155), 1 poitrine tranch\u00e9e, \u00e9pinards \u00e0 la f\u00e9ta, salade.","**Garder la 5\u1d49 portion.** Le poulet 3 jours. Le riz 3-4 jours (meilleur le lendemain). Les \u00e9pinards 2 jours. Salade le jour m\u00eame.","## Substitutions et hors saison","- **Poitrines** : Costco format \u00e9conomique. Ou hauts de cuisse d\u00e9soss\u00e9s (18-20 min).","- **M\u00e9lange riz sauvage Lundberg** : ou riz sauvage pur, riz brun long grain (30-35 min), quinoa (15 min).","- **Champignons cremini** : ou blancs de Paris, portobellos.","- **B\u00e9b\u00e9s \u00e9pinards** : ou pousses adultes hach\u00e9es, kale (5-6 min), bettes \u00e0 carde.","- **F\u00e9ta** : pr\u00e9f\u00e9rer grecque en saumure. Ou ch\u00e8vre frais, ricotta salata, halloumi.","- **Roquette** : ou mesclun, jeunes \u00e9pinards, cresson.","- **Pignons** : ou amandes effil\u00e9es, pistaches.","## Sur les poitrines et la s\u00e9cheresse","| Trois r\u00e8gles : temp\u00e9rer 30 min avant, cuire \u00e0 haute temp\u00e9rature rapide (200 \u00b0C, 20-25 min), retirer \u00e0 74 \u00b0C. Alternative pour poitrines toujours juteuses : **saumure rapide** (2 c. \u00e0 soupe de sel dans 500 ml d'eau, 15-30 min, rincer, \u00e9ponger)."],"nut":[{"l":"\u00c9nergie","v":"720 kcal"},{"l":"Prot\u00e9ines","v":"58 g"},{"l":"Fibres","v":"8 g"},{"l":"Vitamine D","v":"0,5 \u03bcg"}],"ing_raw":["5 poitrines de poulet d\u00e9soss\u00e9es sans peau (200 g chacune, \u2248 1 kg) \u2014 Costco poitrines sans peau pack \u00e9conomique","Marinade : 3 c. \u00e0 soupe d'huile d'olive, jus et zeste de 1 1/2 citron, 4 gousses d'ail r\u00e2p\u00e9es, 2 c. \u00e0 soupe de thym frais (ou 2 c. \u00e0 th\u00e9 s\u00e9ch\u00e9), 1 c. \u00e0 soupe de romarin frais hach\u00e9 (ou 1 c. \u00e0 th\u00e9 s\u00e9ch\u00e9), 1 c. \u00e0 th\u00e9 d'origan s\u00e9ch\u00e9, sel, poivre, paprika","\u00c9pinards : 400 g de b\u00e9b\u00e9s \u00e9pinards, 1 1/4 c. \u00e0 soupe de beurre, 1 1/4 c. \u00e0 soupe d'huile d'olive, 2 gousses d'ail, 150 g de f\u00e9ta \u00e9miett\u00e9e, muscade, poivre","250 g de m\u00e9lange riz sauvage et long grain (Lundberg Wild Blend)","625 ml de bouillon de poulet faible en sodium, 1 oignon, 310 g de champignons cremini tranch\u00e9s, 2 1/2 c. \u00e0 soupe d'huile d'olive, thym frais","Salade : 190 g de roquette, 310 g de tomates cerises, 50 g de pignons grill\u00e9s, 40 g de parmesan, vinaigrette balsamique"]},{"d":17,"w":3,"n":"Mer","wd":1,"t":"Tacos au b\u0153uf hach\u00e9 extra-maigre \u00e9pic\u00e9, haricots noirs, guacamole maison, salsa fra\u00eeche, tortillas de bl\u00e9 entier","tt":"35 min","pt":"20 min","ct":"15 min","ing":["B\u0153uf hach\u00e9 extra-maigre (750 g \u00b7 5 % gras max)","## \u00c9pices maison","Poudre de chili (1 1/4 c. \u00e0 soupe)","Cumin (1 1/4 c. \u00e0 th\u00e9)","Paprika fum\u00e9 (1 1/4 c. \u00e0 th\u00e9)","Origan (1/2 c. \u00e0 th\u00e9)","Oignon en poudre (1/2 c. \u00e0 th\u00e9)","Ail en poudre (1/2 c. \u00e0 th\u00e9)","Sel et poivre","##","1 oignon","3 gousses d'ail","Huile (1 1/4 c. \u00e0 soupe)","Eau (75 ml)","P\u00e2te de tomate (1 1/4 c. \u00e0 soupe)","##","1 1/2 bo\u00eete (540 ml) de haricots noirs rinc\u00e9s","Cumin (1 1/4 c. \u00e0 th\u00e9)","## Guacamole","3 avocats m\u00fbrs","1/4 oignon rouge","1 tomate \u00e9p\u00e9pin\u00e9e","Coriandre (3 c. \u00e0 soupe)","Jus de 1 lime","1 jalape\u00f1o \u00e9p\u00e9pin\u00e9 (optionnel)","Sel","## Salsa fra\u00eeche","5 tomates en d\u00e9s","3/4 oignon rouge","Coriandre (1/3 tasse)","Jus de 1 lime","Huile (1 c. \u00e0 th\u00e9)","1 serrano (optionnel)","Sel","##","15 tortillas de bl\u00e9 entier (taille moyenne 20 cm \u2014 Old El Paso bl\u00e9 entier ou Dempsters)","## Pour servir","Cheddar fort r\u00e2p\u00e9 (150 g)","1 grosse laitue romaine \u00e9minc\u00e9e","Yogourt grec 2 % (310 g \u00b7 en remplacement de cr\u00e8me sure)","Quartiers de lime"],"inst":["## Un mot sur cette recette","| Le taco au b\u0153uf hach\u00e9 est une version **texane-mexicaine** (Tex-Mex) plut\u00f4t que mexicaine authentique, mais excellente et bien plus fra\u00eeche et nutritive que les \u00ab kits \u00e0 tacos \u00bb. Le m\u00e9lange d'\u00e9pices maison prend 30 secondes et fait toute la diff\u00e9rence.","## Avant tout (mise en place \u2014 4 min)","Sortir le b\u0153uf. Sortir les avocats \u2014 v\u00e9rifier qu'ils c\u00e8dent **l\u00e9g\u00e8rement** sous le doigt. S'ils sont durs, la recette ne fonctionnera pas.","Sortir tous les ingr\u00e9dients : grande po\u00eale pour le b\u0153uf, casserole pour les haricots, bols pour guacamole et salsa, alu pour les tortillas.","**Pr\u00e9chauffer le four \u00e0 175 \u00b0C (350 \u00b0F)** \u2014 juste pour r\u00e9chauffer les tortillas.","## Pr\u00e9parer les aromates et les \u00e9pices (3 min)","\u00c9mincer 1 oignon jaune en cubes de 5 mm. Hacher 3 gousses d'ail.","**M\u00e9lange d'\u00e9pices maison** : 1 c. \u00e0 soupe g\u00e9n\u00e9reuse de poudre de chili, 1 c. \u00e0 th\u00e9 bomb\u00e9e de cumin, 1 c. \u00e0 th\u00e9 bomb\u00e9e de paprika fum\u00e9, \u00bd c. \u00e0 th\u00e9 d'origan s\u00e9ch\u00e9, \u00bd c. \u00e0 th\u00e9 d'ail en poudre, \u00bd c. \u00e0 th\u00e9 d'oignon en poudre, sel, poivre.","## Cuire le b\u0153uf hach\u00e9 \u00e9pic\u00e9 (10 min)","Chauffer la grande po\u00eale \u00e0 feu moyen-vif, ajouter 1 c. \u00e0 soupe g\u00e9n\u00e9reuse d'huile. Ajouter l'oignon avec une pinc\u00e9e de sel, cuire 3 min. Ajouter l'ail, 30 sec.","Ajouter 750 g de b\u0153uf hach\u00e9 extra-maigre. **D\u00e9faire \u00e0 la spatule** : presser et remuer pour s\u00e9parer le bloc en petits grains de la taille d'un pois. Cette technique cuit uniform\u00e9ment et donne une texture fine.","Cuire **5-6 minutes** jusqu'\u00e0 enti\u00e8rement bruni. Ajouter les \u00e9pices, 1 c. \u00e0 soupe g\u00e9n\u00e9reuse de p\u00e2te de tomate, 75 ml d'eau. **Mijoter 4-5 minutes** \u2014 les \u00e9pices fleurissent et se lient \u00e0 la viande. R\u00e9server couvert.","## R\u00e9chauffer les haricots noirs (5 min)","**Rincer 1 \u00bd bo\u00eete (540 ml) de haricots noirs.** Dans une casserole \u00e0 feu moyen, mettre avec 60 ml d'eau, 1 c. \u00e0 th\u00e9 bomb\u00e9e de cumin, sel, poivre.","**\u00c9craser environ un tiers des haricots \u00e0 la fourchette** (garde texture mais cr\u00e9meux). R\u00e9chauffer 5 min. R\u00e9server couvert.","## Pr\u00e9parer la salsa fra\u00eeche (pico de gallo \u2014 5 min)","**\u00c9p\u00e9piner 5 tomates**, couper en d\u00e9s de 5-8 mm. \u00c9mincer \u00be d'oignon rouge (si piquant, tremper 5 min \u00e0 l'eau froide).","Hacher \u2153 tasse de coriandre. Combiner tomates, oignon, coriandre. Ajouter le jus de 1 lime, 1 c. \u00e0 th\u00e9 d'huile d'olive, sel. **Laisser reposer 10 minutes.**","## Pr\u00e9parer le guacamole (5 min \u2014 en dernier)","> **Point critique** : le guacamole s'oxyde en 15-30 min. Le pr\u00e9parer juste avant de servir.","**Couper 3 avocats**, vider dans un grand bol. **\u00c9craser \u00e0 la fourchette** (pas au robot) en laissant 30 % en morceaux.","**Ajouter imm\u00e9diatement le jus de 1 lime** (arr\u00eate l'oxydation). Ajouter \u00bc d'oignon rouge hach\u00e9, 1 tomate \u00e9p\u00e9pin\u00e9e en d\u00e9s, 3 c. \u00e0 soupe de coriandre, sel. M\u00e9langer doucement. Go\u00fbter \u2014 souvent plus de sel qu'on pense.","## R\u00e9chauffer les tortillas (5 min)","**Envelopper les 15 tortillas de bl\u00e9 entier en pile dans du papier alu.** Enfourner 10 minutes \u00e0 175 \u00b0C. Alternative : po\u00eale s\u00e8che 20-30 sec par c\u00f4t\u00e9 (meilleur go\u00fbt), ou micro-ondes dans un essuie-tout humide 20-30 sec par pile.","## Pr\u00e9parer les garnitures fra\u00eeches (2 min)","**R\u00e2per 150 g de cheddar fort.** \u00c9mincer 1 grosse laitue romaine en lani\u00e8res. Sortir 310 g de yogourt grec 2 % (remplace la cr\u00e8me sure). Couper 1 lime en quartiers.","## Assembler le taco bar (3 min)","**Sur la table**, disposer en \u00ab bar \u00e0 tacos \u00bb : b\u0153uf \u00e9pic\u00e9 chaud, haricots noirs chauds, guacamole, salsa, cheddar, laitue, yogourt, quartiers de lime, tortillas dans un torchon pli\u00e9, coriandre extra.","**Chaque personne assemble ses tacos.** Compter 3 tortillas par adulte, 2 par enfant.","**La 5\u1d49 portion de b\u0153uf-haricots** au lunch (3 jours). Guacamole 24 h max (pellicule press\u00e9e sur la surface). Salsa 3 jours (se bonifie).","## Substitutions et hors saison","- **B\u0153uf hach\u00e9 extra-maigre** : ou dinde/poulet hach\u00e9 (ajouter \u00e9pices), m\u00e9lange b\u0153uf-porc, ou mi-maigre (drainer le gras).","- **Poudre de chili** : c'est un m\u00e9lange d'\u00e9pices, pas le piment fort seul.","- **Paprika fum\u00e9** : La Chinata.","- **Tortillas de bl\u00e9 entier** : Old El Paso, Dempsters. Ou tortillas de ma\u00efs (plus authentiques, chauffer \u00e0 la po\u00eale), ou grandes format burrito.","- **Coriandre** : \u00ab g\u00e9n\u00e9tique savon \u00bb = persil plat.","- **Piments frais** : ou sauce piquante (Cholula, Tapat\u00edo) au service.","- **Haricots noirs** : ou pinto, rouges, blancs.","- **Cheddar fort** : ou Monterey Jack, Colby Jack, Cotija.","- **Yogourt grec** : ou cr\u00e8me sure r\u00e9guli\u00e8re/l\u00e9g\u00e8re."],"nut":[{"l":"\u00c9nergie","v":"710 kcal"},{"l":"Prot\u00e9ines","v":"43 g"},{"l":"Fibres","v":"15 g"},{"l":"Vitamine D","v":"0,4 \u03bcg"}],"ing_raw":["750 g de b\u0153uf hach\u00e9 extra-maigre (5 % gras max)","\u00c9pices maison : 1 1/4 c. \u00e0 soupe de poudre de chili, 1 1/4 c. \u00e0 th\u00e9 chacun de cumin et paprika fum\u00e9, 1/2 c. \u00e0 th\u00e9 chacun d'origan, oignon et ail en poudre, sel/poivre","1 oignon, 3 gousses d'ail, 1 1/4 c. \u00e0 soupe d'huile, 75 ml d'eau, 1 1/4 c. \u00e0 soupe de p\u00e2te de tomate","1 1/2 bo\u00eete (540 ml) de haricots noirs rinc\u00e9s + 1 1/4 c. \u00e0 th\u00e9 de cumin","Guacamole : 3 avocats m\u00fbrs, 1/4 oignon rouge, 1 tomate \u00e9p\u00e9pin\u00e9e, 3 c. \u00e0 soupe de coriandre, jus de 1 lime, sel, 1 jalape\u00f1o \u00e9p\u00e9pin\u00e9 (optionnel)","Salsa fra\u00eeche : 5 tomates en d\u00e9s, 3/4 oignon rouge, 1/3 tasse de coriandre, jus de 1 lime, 1 c. \u00e0 th\u00e9 d'huile, sel, 1 serrano (optionnel)","15 tortillas de bl\u00e9 entier (taille moyenne 20 cm \u2014 Old El Paso bl\u00e9 entier ou Dempsters)","Pour servir : 150 g de cheddar fort r\u00e2p\u00e9, 1 grosse laitue romaine \u00e9minc\u00e9e, 310 g de yogourt grec 2 % (en remplacement de cr\u00e8me sure), quartiers de lime"]},{"d":18,"w":3,"n":"Jeu","wd":1,"t":"Saumon en cro\u00fbte de moutarde et panko aux herbes, l\u00e9gumes-racines r\u00f4tis, salade \u00e9pinards-poire-bleu","tt":"35 min","pt":"10 min","ct":"25 min","ing":["5 filets de saumon de l'Atlantique (170 g chacun, \u2248 850 g) \u2014 Costco saumon Atlantique frais ou Mer & Monde","## Cro\u00fbte","Moutarde de Dijon (5 c. \u00e0 soupe \u00b7 \u00e0 badigeonner)","Panko (100 g)","Zeste de 1 citron","Aneth frais (3 c. \u00e0 soupe)","Persil (3 c. \u00e0 soupe)","2 gousses d'ail","Beurre fondu (2 c. \u00e0 soupe)","Sel et poivre","##","Quartiers de citron pour servir","## L\u00e9gumes-racines","4 carottes","4 panais","4 betteraves","1 gros rutabaga (\u2248 500 g)","Tous en cubes de 2 cm","##","Huile d'olive (3 c. \u00e0 soupe)","Sirop d'\u00e9rable (1 c. \u00e0 soupe)","Thym s\u00e9ch\u00e9 (1 c. \u00e0 th\u00e9)","Sel et poivre","## Salade","B\u00e9b\u00e9s \u00e9pinards (250 g)","1 grosse poire en tranches","Fromage bleu (75 g \u00b7 Bleubec)","Noix de Grenoble (50 g)","Vinaigrette \u00e0 l'huile de noix"],"inst":["## Un mot sur cette recette","| Technique fran\u00e7aise classique adapt\u00e9e au saumon : une couche de moutarde de Dijon fait office de \u00ab colle \u00bb pour une cro\u00fbte de panko-herbes-citron. La moutarde donne de la profondeur, le panko dore et croustille, les herbes lib\u00e8rent leurs huiles. Un saumon qui a du caract\u00e8re sans \u00eatre d\u00e9natur\u00e9.","## Un mot sur le panko","| **Panko** = chapelure japonaise. Miettes plus grosses et irr\u00e9guli\u00e8res, texture plus l\u00e9g\u00e8re, reste croustillante \u00e0 la cuisson, absorbe moins de gras. Un ingr\u00e9dient utile \u00e0 toujours avoir en pantry (dure des mois).","## Avant tout (mise en place \u2014 4 min)","Sortir les 5 filets de saumon pour temp\u00e9rer 15 min. Sortir le beurre. **Pr\u00e9chauffer le four \u00e0 220 \u00b0C (425 \u00b0F).** Tapisser deux plaques de parchemin (l\u00e9gumes-racines et saumon).","## Pr\u00e9parer les l\u00e9gumes-racines (10 min prep + 30-35 min)","**Peler et couper en cubes de 2 cm** : 4 carottes, 4 panais (retirer le c\u0153ur si gros), 4 betteraves, 1 gros rutabaga (~500 g).","**Astuce anti-taches** : couper les betteraves **en dernier**, les garder \u00e0 part jusqu'\u00e0 la plaque (sinon leur jus rougit tout).","Sur la plaque, m\u00e9langer avec 3 c. \u00e0 soupe d'huile d'olive, 1 c. \u00e0 soupe de sirop d'\u00e9rable, 1 c. \u00e0 th\u00e9 de thym s\u00e9ch\u00e9, sel, poivre. \u00c9taler en une seule couche. **Enfourner sur la grille du bas.** R\u00e9gler **15 minutes** pour la mi-cuisson.","## Pr\u00e9parer la cro\u00fbte de moutarde-panko (5 min)","**Faire fondre 2 c. \u00e0 soupe de beurre.** Dans un bol, m\u00e9langer : 100 g de panko, le zeste de 1 citron, 3 c. \u00e0 soupe d'aneth frais, 3 c. \u00e0 soupe de persil, 2 gousses d'ail r\u00e2p\u00e9es, le beurre fondu, sel, poivre.","M\u00e9langer \u00e0 la fourchette : le beurre humidifie le panko sans le d\u00e9tremper \u2014 comme du sable humide qui reste en agr\u00e9gats.","## Pr\u00e9parer la salade et sa vinaigrette (5 min)","Rincer 250 g de b\u00e9b\u00e9s \u00e9pinards, essorer, dans un saladier. Trancher 1 grosse poire en lamelles de 5 mm (arroser de jus de citron). Casser 50 g de noix de Grenoble. \u00c9mietter 75 g de bleu Bleubec.","Vinaigrette \u00e0 l'huile de noix : 3 c. \u00e0 soupe d'huile de noix, 1 c. \u00e0 soupe de vinaigre de cidre, 1 c. \u00e0 th\u00e9 de miel, \u00bd c. \u00e0 th\u00e9 de moutarde de Dijon, sel, poivre. Fouetter. **Ne pas assembler** \u2014 monter au moment du service.","## Retourner les l\u00e9gumes-racines","Quand la minuterie sonne (15 min), retourner les cubes. Remettre sur la grille du bas. R\u00e9gler **12 minutes**.","## Pr\u00e9parer le saumon avec sa cro\u00fbte (5 min)","**\u00c9ponger les 5 filets** des deux c\u00f4t\u00e9s. D\u00e9poser sur la plaque tapiss\u00e9e, 2 cm entre chaque.","**Badigeonner le dessus de moutarde de Dijon** (~1 c. \u00e0 soupe par filet, 5 total). Couche visible mais pas d\u00e9goulinante.","**Presser fermement la cro\u00fbte de panko sur la moutarde** \u2014 poign\u00e9e par filet, presser avec la paume, couche uniforme de 5-8 mm. **Ne pas saler** (moutarde et cro\u00fbte d\u00e9j\u00e0 assaisonn\u00e9es).","## Enfourner le saumon (10-12 min)","**Mettre la plaque de saumon sur la grille du milieu** (au-dessus des l\u00e9gumes). R\u00e9gler **10 minutes**.","\u00c0 10 min : la cro\u00fbte doit \u00eatre **bien dor\u00e9e-brune**; le saumon opaque rose p\u00e2le sur les c\u00f4t\u00e9s, se d\u00e9faisant \u00e0 la fourchette. Si la cro\u00fbte dore trop vite, couvrir d'alu pour la fin.","## Sortir les l\u00e9gumes-racines","Apr\u00e8s 12 min (~27 min total), v\u00e9rifier : tendres \u00e0 c\u0153ur (la pointe entre dans les cubes de betterave \u2014 le plus dense), caram\u00e9lis\u00e9s aux bords. Si fermes, +3-5 min.","## Assemblage et service (3 min)","**Monter la salade** : ajouter poire, noix et bleu aux \u00e9pinards. Verser la vinaigrette juste avant de servir.","**Dans chaque assiette** : 1 filet de saumon en cro\u00fbte, l\u00e9gumes-racines r\u00f4tis (\u2155), salade, quartier de citron.","**Servir imm\u00e9diatement** \u2014 la cro\u00fbte est \u00e0 son meilleur juste sortie du four.","**Garder la 5\u1d49 portion.** Le saumon 2 jours (la cro\u00fbte perd son croustillant). Les l\u00e9gumes-racines 3-4 jours. Salade le jour m\u00eame.","## Substitutions et hors saison","- **Saumon de l'Atlantique** : Costco format \u00e9conomique. Ou truite arc-en-ciel, omble chevalier, saumon sockeye.","- **Panko** : ou chapelure ordinaire (+30 sec pour dorer), mie de pain \u00e9miett\u00e9e, flocons de ma\u00efs \u00e9cras\u00e9s.","- **Moutarde de Dijon** : Maille, Kozlik's. Ou moutarde \u00e0 l'ancienne.","- **Aneth frais** : ou estragon, cerfeuil, ou 2 c. \u00e0 th\u00e9 s\u00e9ch\u00e9.","- **Rutabaga** : ou navets, c\u00e9leri-rave, ou doubler les autres racines.","- **Poire** : Bartlett, Bosc, Anjou selon saison.","- **Bleu Bleubec** : ou \u00c9lizabeth, Roquefort, Stilton, Gorgonzola.","- **Noix de Grenoble** : ou amandes.","- **Huile de noix** : rare. Ou huile d'olive + noix broy\u00e9es.","## Sur la technique de la cro\u00fbte","| La cro\u00fbte panko-herbes-moutarde fonctionne aussi sur poulet (22-25 min), porc (15-18 min), aiglefin ou morue (10-12 min). Technique polyvalente \u00e0 garder dans son r\u00e9pertoire."],"nut":[{"l":"\u00c9nergie","v":"680 kcal"},{"l":"Prot\u00e9ines","v":"44 g"},{"l":"Fibres","v":"11 g"},{"l":"Om\u00e9ga-3 EPA+DHA","v":"2,3 g"}],"ing_raw":["5 filets de saumon de l'Atlantique (170 g chacun, \u2248 850 g) \u2014 Costco saumon Atlantique frais ou Mer & Monde","Cro\u00fbte : 5 c. \u00e0 soupe de moutarde de Dijon (\u00e0 badigeonner), 100 g de panko, zeste de 1 citron, 3 c. \u00e0 soupe d'aneth frais, 3 c. \u00e0 soupe de persil, 2 gousses d'ail, 2 c. \u00e0 soupe de beurre fondu, sel/poivre","Quartiers de citron pour servir","L\u00e9gumes-racines : 4 carottes, 4 panais, 4 betteraves, 1 gros rutabaga (\u2248 500 g), tous en cubes de 2 cm","3 c. \u00e0 soupe d'huile d'olive, 1 c. \u00e0 soupe de sirop d'\u00e9rable, 1 c. \u00e0 th\u00e9 de thym s\u00e9ch\u00e9, sel/poivre","Salade : 250 g de b\u00e9b\u00e9s \u00e9pinards, 1 grosse poire en tranches, 75 g de fromage bleu (Bleubec), 50 g de noix de Grenoble, vinaigrette \u00e0 l'huile de noix"]},{"d":19,"w":3,"n":"Ven","wd":1,"t":"C\u00f4telettes de porc \u00e0 la dijonnaise et pommes, pommes de terre grelot r\u00f4ties, haricots verts aux amandes","tt":"40 min","pt":"15 min","ct":"25 min","ing":["5 c\u00f4telettes de porc \u00e9paisses (200 g chacune, avec os pour saveur) ou 6 minces \u2014 Olymel","## Sauce","Moutarde de Dijon (4 c. \u00e0 soupe)","Moutarde \u00e0 l'ancienne (2 1/2 c. \u00e0 soupe)","Miel (2 1/2 c. \u00e0 soupe)","Jus de citron (1 1/4 c. \u00e0 soupe)","Huile d'olive (1 1/4 c. \u00e0 soupe)","Thym frais (1 1/4 c. \u00e0 soupe \u00b7 ou 1 1/4 c. \u00e0 th\u00e9 s\u00e9ch\u00e9)","Sel et poivre","##","Huile d'olive (2 1/2 c. \u00e0 soupe \u00b7 cuisson)","3 pommes Cortland ou McIntosh en quartiers","1 oignon en tranches","Beurre (1 1/4 c. \u00e0 soupe)","Cidre de pomme (125 ml \u00b7 ou bouillon)","## Pommes de terre grelot","1,2 kg de mini pommes de terre grelot","Huile d'olive (3 c. \u00e0 soupe)","3 gousses d'ail","Thym frais (1 c. \u00e0 soupe)","Sel et poivre","## Haricots verts amandes","Haricots verts par\u00e9s (750 g)","Amandes effil\u00e9es grill\u00e9es (50 g)","Beurre (2 1/2 c. \u00e0 soupe)","2 gousses d'ail","Jus de 1/2 citron","Sel et poivre"],"inst":["## Un mot sur cette recette","| La technique de la sauce \u00e0 la po\u00eale (\u00ab pan sauce \u00bb) est un pilier de la cuisine fran\u00e7aise : on saisit la prot\u00e9ine, on la sort, on utilise les sucs coll\u00e9s au fond pour construire une sauce riche. Une fois ma\u00eetris\u00e9e, on la d\u00e9cline \u00e0 l'infini.","## Un mot sur les c\u00f4telettes de porc","| Les **c\u00f4telettes \u00e9paisses avec os** (2-2,5 cm) sont pr\u00e9f\u00e9rables : l'os lib\u00e8re de la saveur et retient l'humidit\u00e9, l'\u00e9paisseur permet la saisie sans surcuisson. Une c\u00f4telette mince (1 cm) devient s\u00e8che en 90 secondes.","## Avant tout (mise en place \u2014 4 min)","Sortir les c\u00f4telettes **30 min avant** pour temp\u00e9rer. **Pr\u00e9chauffer le four \u00e0 220 \u00b0C (425 \u00b0F).** Tapisser une plaque de parchemin.","Sortir la grande po\u00eale (fonte ou inox) pour les c\u00f4telettes, une casserole moyenne pour blanchir les haricots, un grand bol d'eau glac\u00e9e.","## Pr\u00e9parer les pommes de terre grelot (5 min prep + 25-30 min)","**Rincer 1,2 kg de pommes de terre grelot** (mini de 2-3 cm). **Ne pas peler.** Couper les plus grosses en deux, laisser les petites enti\u00e8res.","Sur la plaque, m\u00e9langer avec 3 c. \u00e0 soupe d'huile d'olive, 3 gousses d'ail \u00e9minc\u00e9es, 1 c. \u00e0 soupe de thym frais, sel, poivre. **\u00c9taler en une seule couche, c\u00f4t\u00e9 coup\u00e9 vers le bas** pour les moiti\u00e9s.","**Enfourner sur la grille du bas.** R\u00e9gler **25 minutes** \u2014 pr\u00eates quand la pointe entre au centre et l'ext\u00e9rieur est dor\u00e9-croustillant.","## Pr\u00e9parer la sauce moutarde-miel-thym (3 min)","Fouetter : 4 c. \u00e0 soupe de moutarde de Dijon, 2 \u00bd c. \u00e0 soupe de moutarde \u00e0 l'ancienne, 2 \u00bd c. \u00e0 soupe de miel, 1 c. \u00e0 soupe de jus de citron, 1 c. \u00e0 soupe d'huile d'olive, 1 c. \u00e0 soupe de thym frais, une pinc\u00e9e de sel, poivre. R\u00e9server.","## Blanchir les haricots verts (8 min)","> **Blanchir** = cuire bri\u00e8vement \u00e0 grande eau bouillante sal\u00e9e, puis stopper dans l'eau glac\u00e9e. Pr\u00e9serve couleur vive et croquant, tout en pr\u00e9-cuisant.","**Parer 750 g de haricots verts** (couper la queue). Remplir la casserole d'eau, saler g\u00e9n\u00e9reusement (1 c. \u00e0 soupe pour 3 L), porter \u00e0 \u00e9bullition. Pr\u00e9parer un grand bol d'eau glac\u00e9e.","Plonger les haricots, **cuire 4 minutes exactement** (tendres-croquants, verts vifs). **\u00c9goutter et plonger dans l'eau glac\u00e9e 2 min** (choc thermique, fixe la couleur).","\u00c9goutter, essuyer dans un torchon. **R\u00e9server** \u2014 on les finira \u00e0 la po\u00eale.","## Pr\u00e9parer les pommes et l'oignon (3 min)","Couper 3 pommes (Cortland ou McIntosh) en quartiers, retirer le c\u0153ur, garder la peau. Trancher 1 oignon jaune en fines demi-lunes de 3 mm.","## Saisir les c\u00f4telettes de porc (8 min)","**\u00c9ponger les c\u00f4telettes \u00e0 fond.** Saler g\u00e9n\u00e9reusement (~\u00be c. \u00e0 th\u00e9 total), poivrer.","Chauffer la grande po\u00eale \u00e0 feu moyen-vif 2 min, ajouter 2 \u00bd c. \u00e0 soupe d'huile d'olive + 1 c. \u00e0 soupe de beurre. **D\u00e9poser les c\u00f4telettes en une couche. Ne pas bouger 3 minutes** (cro\u00fbte). Retourner, cuire 3 min.","**Test : 55-58 \u00b0C \u00e0 c\u0153ur** (elles finiront dans la sauce). Sans thermom\u00e8tre : surface bien brune, int\u00e9rieur c\u00e8de l\u00e9g\u00e8rement sous le doigt.","**Transf\u00e9rer sur une assiette, couvrir d'alu.** Elles reposent pendant la compot\u00e9e.","## Faire la compot\u00e9e pommes-oignon-cidre (7 min)","**Dans la m\u00eame po\u00eale** (sucs de porc), baisser \u00e0 feu moyen, ajouter 1 c. \u00e0 soupe de beurre. Ajouter l'oignon avec une pinc\u00e9e de sel, cuire 3 min en raclant le fond.","Ajouter les quartiers de pommes, cuire 3-4 min (ramollir, dorer aux bords).","**D\u00e9glacer au cidre** : verser 125 ml de cidre de pomme, **racler vigoureusement**. Laisser bouillir 1 minute pour cuire l'alcool.","**Ajouter la moiti\u00e9 de la sauce moutarde.** Mijoter 1-2 min \u2014 la sauce \u00e9paissit et nappe.","## Terminer les c\u00f4telettes dans la sauce (5 min)","**Remettre les c\u00f4telettes**, enfouir dans la compot\u00e9e. Verser leur jus. **Napper avec le reste de la sauce.** Couvrir.","**Cuire 4-5 minutes \u00e0 feu doux** \u2014 les c\u00f4telettes finissent \u00e0 63 \u00b0C tout en s'impr\u00e9gnant. Retirer du feu, **reposer 3 minutes couvert.**","## Finir les haricots verts amandine (3 min)","Dans une autre po\u00eale, faire fondre 2 \u00bd c. \u00e0 soupe de beurre \u00e0 feu moyen-vif. Ajouter 2 gousses d'ail \u00e9minc\u00e9es, remuer 30 sec.","Ajouter les haricots blanchis, sauter 2 min. **Ajouter 50 g d'amandes effil\u00e9es grill\u00e9es**, presser \u00bd citron, sel, poivre. Retirer du feu.","## V\u00e9rifier les pommes de terre grelot","Vers 25-28 min : dor\u00e9es-croustillantes \u00e0 l'ext\u00e9rieur, tendres \u00e0 c\u0153ur. Si fermes, +5 min.","## Assemblage et service (3 min)","**Dans chaque assiette** : 1 c\u00f4telette napp\u00e9e de sauce, compot\u00e9e pommes-oignon, pommes de terre grelot, haricots verts amandine. Facultatif : feuilles de thym.","**Garder la 5\u1d49 portion.** La c\u00f4telette 3 jours (r\u00e9chauffer doucement avec un peu d'eau). La compot\u00e9e 4 jours. Les grelots 3 jours. Les haricots 2 jours.","## Substitutions et hors saison","- **C\u00f4telettes avec os** : Olymel, du Breton. Ou d\u00e9soss\u00e9es \u00e9paisses, hauts de cuisse de poulet (74 \u00b0C), escalopes de veau (90 sec/c\u00f4t\u00e9), filet de porc en m\u00e9daillons.","- **Moutarde de Dijon** : Maille, Kozlik's.","- **Miel** : ou sirop d'\u00e9rable.","- **Cidre de pomme** : Michel Jodoin, Cidrerie du Minot. Ou non alcoolis\u00e9, jus de pomme + vinaigre, ou bouillon + vinaigre + \u00e9rable.","- **Pommes** : Cortland (garde forme + fond), McIntosh (fond plus). Ou Empire, Gala, Honeycrisp.","- **Pommes de terre grelot** : ou mini Yukon Gold, rattes, charlottes, ou r\u00e9guli\u00e8res en cubes de 3 cm.","- **Haricots verts** : ou jaunes, ou asperges (blanchir 3 min).","- **Amandes effil\u00e9es** : ou noisettes concass\u00e9es grill\u00e9es, pignons.","## Sur la technique de la pan sauce","| La logique universelle : saisir la prot\u00e9ine, la r\u00e9server, sauter des aromates dans les sucs, d\u00e9glacer, r\u00e9duire, enrichir (beurre/cr\u00e8me/moutarde), remettre la prot\u00e9ine. Une fois assimil\u00e9e : poulet moutarde-vin blanc, filet marsala-champignons, escalopes piccata, steak au poivre et cognac."],"nut":[{"l":"\u00c9nergie","v":"720 kcal"},{"l":"Prot\u00e9ines","v":"48 g"},{"l":"Fibres","v":"10 g"},{"l":"Fer","v":"3,5 mg"}],"ing_raw":["5 c\u00f4telettes de porc \u00e9paisses (200 g chacune, avec os pour saveur) ou 6 minces \u2014 Olymel","Sauce : 4 c. \u00e0 soupe de moutarde de Dijon, 2 1/2 c. \u00e0 soupe de moutarde \u00e0 l'ancienne, 2 1/2 c. \u00e0 soupe de miel, 1 1/4 c. \u00e0 soupe de jus de citron, 1 1/4 c. \u00e0 soupe d'huile d'olive, 1 1/4 c. \u00e0 soupe de thym frais (ou 1 1/4 c. \u00e0 th\u00e9 s\u00e9ch\u00e9), sel/poivre","2 1/2 c. \u00e0 soupe d'huile d'olive (cuisson), 3 pommes Cortland ou McIntosh en quartiers, 1 oignon en tranches, 1 1/4 c. \u00e0 soupe de beurre, 125 ml de cidre de pomme (ou bouillon)","Pommes de terre grelot : 1,2 kg de mini pommes de terre grelot, 3 c. \u00e0 soupe d'huile d'olive, 3 gousses d'ail, 1 c. \u00e0 soupe de thym frais, sel/poivre","Haricots verts amandes : 750 g de haricots verts par\u00e9s, 50 g d'amandes effil\u00e9es grill\u00e9es, 2 1/2 c. \u00e0 soupe de beurre, 2 gousses d'ail, jus de 1/2 citron, sel/poivre"]},{"d":20,"w":3,"n":"Sam","wd":0,"t":"Marmite portugaise simplifi\u00e9e au cabillaud et crevettes (chorizo r\u00e9duit), riz aux herbes, salade","tt":"45 min","pt":"20 min","ct":"25 min","ing":["Filets de cabillaud (Costco section congel\u00e9e) en gros morceaux (500 g)","##","Crevettes crues 21-25 d\u00e9cortiqu\u00e9es d\u00e9vein\u00e9es (400 g \u00b7 Costco grand sac surgel\u00e9)","##","Chorizo doux en rondelles (Costco ou comptoir traiteur) \u2014 moiti\u00e9 moins que la version originale (100 g)","##","Huile d'olive (3 c. \u00e0 soupe)","1 gros oignon","5 gousses d'ail","2 poivrons (1 rouge + 1 jaune) en lani\u00e8res","##","Paprika fum\u00e9 (1 c. \u00e0 soupe)","Paprika doux (1 c. \u00e0 th\u00e9)","Safran (12-15 brins)","1 feuille de laurier","##","Vin blanc sec (125 ml)","##","1 bo\u00eete (796 ml) de tomates en d\u00e9s","Bouillon de poulet FAIBLE en sodium (250 ml \u00b7 Pacific Foods Organic Low Sodium ou \u00e9quivalent)","##","Persil plat et coriandre frais","Jus de 1 citron","Poivre","## Riz","Basmati (375 g)","Eau (jusqu'\u00e0 la ligne WHITE 2 1/4)","Huile (2 1/2 c. \u00e0 soupe)","Sel mod\u00e9r\u00e9","Zeste de citron","Persil (2 1/2 c. \u00e0 soupe)","## Salade","1 grande romaine","1 concombre anglais","Tomates cerises (200 g)","Vinaigrette \u00e0 l'huile d'olive et vinaigre de X\u00e9r\u00e8s"],"inst":["## Un mot sur cette recette","| Le **cataplana** est un plat portugais nomm\u00e9 d'apr\u00e8s le r\u00e9cipient de cuivre en coquille. On le fait ici dans n'importe quelle cocotte \u00e0 couvercle. Notre version r\u00e9duit le chorizo (100 g au lieu de 200 g classiques) pour \u00e9quilibrer le sel, et utilise cabillaud + crevettes plus faciles \u00e0 trouver que les palourdes.","## La veille (important pour le cabillaud)","**D\u00e9congeler le cabillaud au frigo 24 h \u00e0 l'avance** (jamais \u00e0 temp\u00e9rature ambiante). Les crevettes surgel\u00e9es : la veille au frigo, ou 15-20 min dans l'eau froide (sac \u00e9tanche).","## Avant tout (mise en place \u2014 4 min)","Sortir cabillaud et crevettes 15-20 min avant. **\u00c9ponger les deux \u00e0 fond.** Sortir le Zojirushi (gobelet 180 ml), une grande cocotte (5 L min), un saladier.","## D\u00e9marrer le riz basmati au Zojirushi (5 min + 40-45 min)","Mesurer **2 \u00bc tasses Zojirushi** de basmati (~375 g). Rincer abondamment, \u00e9goutter.","Ajouter de l'eau jusqu'\u00e0 la ligne **WHITE 2 \u00bc cups**, 1 pinc\u00e9e de sel, 1 c. \u00e0 soupe d'huile d'olive. Optionnel : zeste de \u00bd citron. S\u00e9lectionner **WHITE**, START.","## Pr\u00e9parer les l\u00e9gumes (8 min)","\u00c9mincer 1 gros oignon jaune en cubes de 5 mm. Hacher 5 gousses d'ail. Couper 2 poivrons (1 rouge + 1 jaune) en lani\u00e8res de 1 cm.","**Trancher 100 g de chorizo doux** en rondelles de 5 mm. **Doux, pas piquant** \u2014 v\u00e9rifier l'\u00e9tiquette (\u00e9viter \u00ab picante \u00bb/\u00ab fuerte \u00bb).","## Cuire le chorizo et les aromates (10 min)","Chauffer la cocotte \u00e0 feu moyen (pas de gras). Ajouter le chorizo, cuire **2-3 minutes** jusqu'\u00e0 croustillant et gras orange lib\u00e9r\u00e9.","**Retirer l'exc\u00e8s de gras \u00e0 la cuill\u00e8re** \u2014 laisser ~2 c. \u00e0 soupe. R\u00e9duit le sel et le gras.","Ajouter 2 c. \u00e0 soupe d'huile d'olive et l'oignon avec une pinc\u00e9e de sel. Cuire 5 min jusqu'\u00e0 translucide.","Ajouter ail, poivrons, 1 feuille de laurier. Cuire 3 min (poivrons attendris, pas mous).","**Ajouter paprika fum\u00e9 (1 c. \u00e0 soupe) et paprika doux (1 c. \u00e0 th\u00e9), remuer 30 secondes** en \u00e9crasant dans les aromates \u2014 **fleurir** les \u00e9pices. Ne pas br\u00fbler.","## D\u00e9glacer et monter la marmite (2 min + 10-12 min)","Verser 125 ml de vin blanc sec, **racler le fond**. Bouillir 1-2 minutes pour cuire l'alcool.","Ajouter : 1 grande bo\u00eete (796 ml) de tomates en d\u00e9s, 250 ml de bouillon de poulet **faible en sodium**, 12-15 brins de safran \u00e9cras\u00e9s entre les doigts.","Porter \u00e0 \u00e9bullition, **baisser \u00e0 feu doux-moyen. Mijoter \u00e0 d\u00e9couvert 10-12 minutes.** Go\u00fbter et v\u00e9rifier l'\u00e9quilibre (sel souvent suffisant gr\u00e2ce au chorizo, acidit\u00e9, profondeur).","## Pr\u00e9parer la salade (5 min)","Romaine en morceaux dans un saladier. Concombre anglais en demi-lunes de 1 cm (\u00e9p\u00e9piner si juteux). 200 g de tomates cerises en deux.","Vinaigrette au vinaigre de X\u00e9r\u00e8s : 4 c. \u00e0 soupe d'huile d'olive, 1 c. \u00e0 soupe de vinaigre de X\u00e9r\u00e8s, \u00bd c. \u00e0 th\u00e9 de moutarde de Dijon, 1 c. \u00e0 th\u00e9 de miel, sel, poivre. Fouetter.","## Ajouter le cabillaud puis les crevettes (8-10 min)","**Couper le cabillaud en gros morceaux de 5 cm.** Ajouter d\u00e9licatement dans la marmite, enfouir dans la sauce. Couvrir. **Cuire 5 minutes** (il poche).","**Ajouter 400 g de crevettes** d\u00e9cortiqu\u00e9es d\u00e9vein\u00e9es, enfouir. Couvrir. **Cuire 3-4 minutes** jusqu'\u00e0 roses et recourb\u00e9es en **C l\u00e2che** (un C serr\u00e9 = trop cuit).","**V\u00e9rifier le cabillaud** : chair opaque blanche, se d\u00e9fait \u00e0 la fourchette. Si translucide, +1-2 min (surveiller les crevettes).","## Finir avec les herbes fra\u00eeches (2 min)","**Retirer du feu.** Hacher 3 c. \u00e0 soupe de persil plat + 2 c. \u00e0 soupe de coriandre. Ajouter, presser le jus de 1 citron, poivrer g\u00e9n\u00e9reusement. **Ne pas ajouter de sel.** M\u00e9langer doucement. Retirer le laurier.","## V\u00e9rifier et finaliser le riz (2 min)","Le Zojirushi a sonn\u00e9. **Reposer 5 min**, puis \u00e9grainer. Incorporer 2 \u00bd c. \u00e0 soupe de persil, le zeste de citron. Ajuster sel.","## Assemblage et service (3 min)","Assembler la salade avec la vinaigrette.","**Dans chaque assiette creuse** : un lit de riz aux herbes (\u2155), une louche de marmite avec cabillaud et crevettes, du jus g\u00e9n\u00e9reux (il infuse le riz). Salade \u00e0 c\u00f4t\u00e9.","**Servir chaud imm\u00e9diatement** \u2014 le cabillaud continue \u00e0 cuire dans la chaleur r\u00e9siduelle.","**Garder la 5\u1d49 portion \u2014 1 jour maximum** (les fruits de mer se conservent moins bien). R\u00e9chauffer tr\u00e8s doucement avec un peu de bouillon. Le riz 2-3 jours.","## Substitutions et hors saison","- **Cabillaud du Pacifique surgel\u00e9** : Costco Wild Pacific Cod. Ou aiglefin, goberge (4 min), fl\u00e9tan, morue.","- **Crevettes 21-25 surgel\u00e9es** : Costco. Ou 16-20 (4-5 min), p\u00e9toncles (3 min), moules fra\u00eeches (3-4 min \u00e0 couvert).","- **Chorizo doux** : Toledo, Espinho, Compliments. **\u00c0 \u00e9viter** : picante/fuerte, chorizo mexicain.","- **Vin blanc sec** : Sauvignon Blanc, Pinot Grigio, ou **Vinho Verde** (authentique). Sans alcool : cidre sec, vermouth, ou bouillon + vinaigre blanc.","- **Safran** : central ici (couleur). Ne pas remplacer par curcuma; plut\u00f4t r\u00e9duire ou omettre.","- **Paprika fum\u00e9** : La Chinata.","- **Vinaigre de X\u00e9r\u00e8s** : Valdespino. Ou balsamique blanc, cidre, balsamique noir."],"nut":[{"l":"\u00c9nergie","v":"680 kcal"},{"l":"Prot\u00e9ines","v":"50 g"},{"l":"Fibres","v":"7 g"},{"l":"Vitamine D","v":"1,5 \u03bcg"}],"ing_raw":["500 g de filets de cabillaud (Costco section congel\u00e9e) en gros morceaux","400 g de crevettes crues 21-25 d\u00e9cortiqu\u00e9es d\u00e9vein\u00e9es (Costco grand sac surgel\u00e9)","100 g de chorizo doux en rondelles (Costco ou comptoir traiteur) \u2014 moiti\u00e9 moins que la version originale","3 c. \u00e0 soupe d'huile d'olive, 1 gros oignon, 5 gousses d'ail, 2 poivrons (1 rouge + 1 jaune) en lani\u00e8res","1 c. \u00e0 soupe de paprika fum\u00e9, 1 c. \u00e0 th\u00e9 de paprika doux, 12-15 brins de safran, 1 feuille de laurier","125 ml de vin blanc sec","1 bo\u00eete (796 ml) de tomates en d\u00e9s, 250 ml de bouillon de poulet FAIBLE en sodium (Pacific Foods Organic Low Sodium ou \u00e9quivalent)","Persil plat et coriandre frais, jus de 1 citron, poivre","Riz : 375 g de basmati (2 1/4 tasses Zojirushi) + eau jusqu'\u00e0 la ligne WHITE 2 1/4 + 2 1/2 c. \u00e0 soupe d'huile + sel mod\u00e9r\u00e9 + zeste de citron + 2 1/2 c. \u00e0 soupe de persil","Salade : 1 grande romaine, 1 concombre anglais, 200 g de tomates cerises, vinaigrette \u00e0 l'huile d'olive et vinaigre de X\u00e9r\u00e8s"]},{"d":21,"w":3,"n":"Dim","wd":0,"t":"Poulets entiers r\u00f4tis aux herbes citron-ail, courge spaghetti, ratatouille rapide","tt":"95 min","pt":"20 min","ct":"75 min","ing":["2 poulets entiers (\u2248 1,5 kg chacun) \u2014 Costco poulets entiers en sac de 2","Id\u00e9alement","## Marinade","Huile d'olive (4 c. \u00e0 soupe)","Beurre fondu (2 1/2 c. \u00e0 soupe)","Herbes fra\u00eeches (2 1/2 c. \u00e0 soupe \u00b7 thym + romarin + sauge)","Zeste et jus de 1 1/2 citron","6 gousses d'ail r\u00e2p\u00e9es","Sel et poivre","## Pour la cavit\u00e9","1 citron coup\u00e9 en 2","Quelques branches de thym et romarin","1 oignon en quartiers","##","1 grosse courge spaghetti (\u2248 1,8 kg)","##","Huile d'olive (2 1/2 c. \u00e0 soupe)","Parmesan (30 g)","Sel et poivre","## Ratatouille","2 aubergines moyennes","2 courgettes","2 poivrons","1 oignon rouge","5 tomates italiennes","5 gousses d'ail","Huile d'olive (60 ml)","Basilic frais (2 c. \u00e0 soupe)","Herbes de Provence (1 c. \u00e0 soupe)"],"inst":["## Un mot sur cette recette","| Le poulet r\u00f4ti entier est l'un des plats les plus simples et pourtant difficiles \u00e0 r\u00e9ussir vraiment bien. Trois techniques font la diff\u00e9rence : le salage \u00e0 sec 24 h \u00e0 l'avance (chair assaisonn\u00e9e, peau croustillante), s\u00e9parer la peau de la chair pour y glisser un beurre-herbes, et farcir la cavit\u00e9 d'aromates.","## La veille (fortement recommand\u00e9)","**Salage \u00e0 sec (dry brine)** : \u00e9ponger les 2 poulets, retirer les abats. **Saler g\u00e9n\u00e9reusement ext\u00e9rieur ET cavit\u00e9** (~1 c. \u00e0 th\u00e9 de gros sel par kg, ~1\u00bd c. \u00e0 th\u00e9 par poulet), poivrer. D\u00e9poser sur une grille au frigo, **sans couvrir**, 12-24 h. Le sel p\u00e9n\u00e8tre la chair, la peau s\u00e8che (ultra-croustillante). C'est la diff\u00e9rence entre un bon poulet et un poulet spectaculaire.","## Avant tout (mise en place \u2014 4 min)","Sortir les poulets **1 heure avant** pour temp\u00e9rer. **Pr\u00e9chauffer le four \u00e0 200 \u00b0C (400 \u00b0F).** Tapisser deux plaques (courge et ratatouille), sortir une l\u00e8chefrite avec grille pour les poulets.","## Pr\u00e9parer la courge spaghetti (5 min)","Poser la courge sur une planche stable (torchon humide dessous). Couper l'extr\u00e9mit\u00e9 pour une surface plate, puis couper en deux dans la longueur d'un mouvement ferme (grand couteau aiguis\u00e9). Retirer les graines \u00e0 la cuill\u00e8re.","Poser face coup\u00e9e vers le haut, arroser de 2 \u00bd c. \u00e0 soupe d'huile d'olive, sel, poivre, frotter. **Retourner face coup\u00e9e vers le bas** \u2014 cl\u00e9 pour une courge tendre et humide.","## Pr\u00e9parer les poulets (12 min)","**\u00c9ponger les poulets \u00e0 fond** encore une fois. **Marinade herbes-beurre-citron** : 4 c. \u00e0 soupe d'huile d'olive, 2 \u00bd c. \u00e0 soupe de beurre fondu, 2 \u00bd c. \u00e0 soupe d'herbes fra\u00eeches (thym + romarin + sauge), zeste et jus de 1 \u00bd citron, 6 gousses d'ail r\u00e2p\u00e9es, sel, poivre.","**S\u00e9parer la peau de la chair sur les poitrines** : glisser doucement les doigts entre peau et chair en partant de la cavit\u00e9, sans d\u00e9chirer. Cr\u00e9er une poche des deux c\u00f4t\u00e9s.","**\u00c9taler \u2153 de la marinade sous la peau**, directement sur la chair. Appuyer sur la peau pour bien r\u00e9partir.","**Badigeonner le reste sur toute la surface** (dos, ailes, cuisses, poitrines).","**Farcir la cavit\u00e9** de chaque poulet : \u00bd citron, quelques branches de thym et romarin, \u00bc d'oignon en morceaux.","**Trussage optionnel** : lier les pattes avec de la ficelle, glisser les ailes sous le dos. Pas essentiel.","## Enfourner poulets et courge (60-75 min)","**D\u00e9poser les poulets poitrine vers le haut sur la grille** au-dessus de la l\u00e8chefrite. **Enfourner simultan\u00e9ment** sur la grille du milieu : poulets et courge (face vers le bas, grille du bas). R\u00e9gler **30 minutes** pour le premier check.","## Pr\u00e9parer la ratatouille (10 min)","**Couper en cubes de 2 cm** : 2 aubergines, 2 courgettes, 2 poivrons, 1 oignon rouge, 5 tomates italiennes \u00e9p\u00e9pin\u00e9es. Hacher 5 gousses d'ail.","Sur la deuxi\u00e8me plaque, m\u00e9langer avec 60 ml d'huile d'olive, l'ail, 1 c. \u00e0 soupe d'herbes de Provence, sel, poivre. **\u00c9taler en une seule couche.**","## Ajouter la ratatouille au four (\u00e0 30 min)","Quand la minuterie sonne, **enfourner la ratatouille sur la grille du bas.** V\u00e9rifier la couleur des poulets (tourner la grille de 180\u00b0 si un c\u00f4t\u00e9 brunit plus vite). R\u00e9gler **30 minutes de plus** (60 min total pour les poulets).","## V\u00e9rifier la courge (\u00e0 40-45 min)","Piquer la peau avec une fourchette : si elle entre facilement, c'est cuit. Sortir, laisser face vers le bas quelques minutes.","## V\u00e9rifier la cuisson des poulets (\u00e0 60 min)","**Ins\u00e9rer un thermom\u00e8tre dans la partie la plus \u00e9paisse de la cuisse** (sans toucher l'os). Cible : **74 \u00b0C**. Si moins, +10-15 min. Sans thermom\u00e8tre : les jus s'\u00e9coulent clairs, la cuisse bouge facilement. La poitrine sera ~68-70 \u00b0C quand la cuisse atteint 74 \u00b0C \u2014 parfait (elle finit \u00e0 71-72 \u00b0C au repos).","## V\u00e9rifier la ratatouille (\u00e0 30-35 min)","L\u00e9gumes tendres et l\u00e9g\u00e8rement caram\u00e9lis\u00e9s. Remuer. Pour plus de caram\u00e9lisation, +5-8 min. Ajouter 2 c. \u00e0 soupe de basilic frais. R\u00e9server couverte.","## Reposer les poulets et gratter la courge (10 min)","**Sortir les poulets, transf\u00e9rer sur une planche, couvrir sans serrer d'alu. Reposer 10 minutes minimum.** Non n\u00e9gociable.","Pendant ce temps, **gratter la chair de la courge \u00e0 la fourchette** \u2014 les fibres se d\u00e9tachent en filaments comme des spaghettis. Ajouter 1 c. \u00e0 soupe d'huile d'olive, 30 g de parmesan r\u00e2p\u00e9, poivre. M\u00e9langer. R\u00e9server couvert.","## D\u00e9couper les poulets (5 min)","**D\u00e9coupage en 8 morceaux par poulet** : d\u00e9tacher les cuisses (glisser la lame dans la jointure), s\u00e9parer pilon et haut de cuisse, d\u00e9tacher les ailes, extraire les poitrines le long du br\u00e9chet et les trancher en 3-4 morceaux contre les fibres. R\u00e9cup\u00e9rer les jus.","## Assemblage et service (5 min)","**Dans chaque assiette** : un morceau de poulet (id\u00e9alement cuisse/haut de cuisse + tranche de poitrine), courge spaghetti au parmesan, ratatouille au basilic. Arroser de jus.","**Optionnel \u2014 sauce aux sucs** : mettre la l\u00e8chefrite sur le feu, ajouter 125 ml de bouillon + 1 c. \u00e0 soupe de vin blanc, racler, r\u00e9duire 3-4 min.","**Portions et lunchs** : 2 poulets = 3-4 lunchs. Poulet cuit 3-4 jours (salade C\u00e9sar, sandwich, wrap, bol asiatique). Courge 3 jours. Ratatouille 4-5 jours (meilleure le lendemain).","## Substitutions et hors saison","- **Poulets entiers** : Costco format double. Ou 1 tr\u00e8s gros poulet (90-100 min), poulet en morceaux (45-55 min), cornish hens (45 min), pintade.","- **Herbes fra\u00eeches thym-romarin-sauge** : ou s\u00e9ch\u00e9es (r\u00e9duire au tiers). Sauge fra\u00eeche parfois rare : remplacer par plus de thym.","- **Courge spaghetti** : ou p\u00e2tes spaghetti, courge butternut en pur\u00e9e, nouilles de courgette.","- **Aubergines** : ou 1 poivron + 1 courgette de plus.","- **Herbes de Provence** : Club House, McCormick. Ou thym + romarin + sarriette + marjolaine + lavande.","- **Basilic frais** : ou pesto en pot (2-3 c. \u00e0 soupe).","## Sur le repos du poulet","| C'est physiologiquement impossible d'avoir un poulet juteux si on le coupe imm\u00e9diatement. Toujours reposer : poulet entier 10-15 min, poitrines 5-7 min, cuisses 5 min, r\u00f4ti de b\u0153uf 15-20 min, steak 5-7 min.","## Une note sur les carcasses","| **Ne pas jeter les carcasses** \u2014 au cong\u00e9lateur. Avec 2-3, faire un bouillon maison (avec oignon, carottes, c\u00e9leri, poivre, laurier, mijoter 3-4 h). Se conserve 5 jours au frigo ou 6 mois congel\u00e9."],"nut":[{"l":"\u00c9nergie","v":"700 kcal"},{"l":"Prot\u00e9ines","v":"55 g"},{"l":"Fibres","v":"14 g"},{"l":"Fer","v":"4 mg"}],"ing_raw":["2 poulets entiers (\u2248 1,5 kg chacun) \u2014 Costco poulets entiers en sac de 2, id\u00e9alement","Marinade : 4 c. \u00e0 soupe d'huile d'olive, 2 1/2 c. \u00e0 soupe de beurre fondu, 2 1/2 c. \u00e0 soupe d'herbes fra\u00eeches (thym + romarin + sauge), zeste et jus de 1 1/2 citron, 6 gousses d'ail r\u00e2p\u00e9es, sel, poivre","Pour la cavit\u00e9 : 1 citron coup\u00e9 en 2, quelques branches de thym et romarin, 1 oignon en quartiers","1 grosse courge spaghetti (\u2248 1,8 kg)","2 1/2 c. \u00e0 soupe d'huile d'olive, sel/poivre, 30 g de parmesan","Ratatouille : 2 aubergines moyennes, 2 courgettes, 2 poivrons, 1 oignon rouge, 5 tomates italiennes, 5 gousses d'ail, 60 ml d'huile d'olive, 2 c. \u00e0 soupe de basilic frais, 1 c. \u00e0 soupe d'herbes de Provence"]},{"d":22,"w":4,"n":"Lun","wd":1,"t":"Salade ni\u00e7oise compl\u00e8te au thon po\u00eal\u00e9, pommes de terre grenailles, haricots verts, \u0153ufs durs","tt":"40 min","pt":"20 min","ct":"20 min","ing":["5 steaks de thon albacore (longe de thon) (140 g chacun, \u2248 700 g) \u2014 frais ou d\u00e9congel\u00e9","Comptoir poissonnerie","##","Huile d'olive (2 1/2 c. \u00e0 soupe)","Poivre concass\u00e9 (1 1/4 c. \u00e0 th\u00e9)","Graines de s\u00e9same (2 1/2 c. \u00e0 soupe \u00b7 optionnel pour cro\u00fbte)","Sel","##","Pommes de terre grenailles (mini Yukon ou rattes) lav\u00e9es et coup\u00e9es en 2 si grosses (850 g)","##","Huile d'olive (2 1/2 c. \u00e0 soupe)","Thym s\u00e9ch\u00e9 (1 1/4 c. \u00e0 th\u00e9)","Sel et poivre","##","5 gros \u0153ufs (pour \u0153ufs durs)","##","Haricots verts fins par\u00e9s (600 g)","## Salade","2 c\u0153urs de laitue romaine ou 1 grosse fris\u00e9e","Tomates cerises (310 g)","1 gros concombre anglais","1/2 oignon rouge en fines tranches","Olives noires Ni\u00e7oises ou Kalamata (150 g)","8 filets d'anchois \u00e0 l'huile (optionnel mais authentique)","## Vinaigrette","Huile d'olive extra vierge (6 c. \u00e0 soupe)","Vinaigre de vin rouge (2 1/2 c. \u00e0 soupe)","Moutarde de Dijon (1 1/4 c. \u00e0 soupe)","1 gousse d'ail r\u00e2p\u00e9e","C\u00e2pres (1 c. \u00e0 soupe)","Sel et poivre"],"inst":["## Un mot sur cette recette","| D\u00e9bat historique sur la \u00ab vraie \u00bb ni\u00e7oise : les puristes de Nice n'y mettent que des l\u00e9gumes crus + \u0153ufs + anchois + olives, **sans pommes de terre ni haricots verts**. La version internationale (Julia Child) ajoute pommes de terre et haricots. On suit la version internationale \u2014 plus consistante. Se sert **ti\u00e8de ou \u00e0 temp\u00e9rature ambia
