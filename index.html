ans les betteraves (~35-40 min au total). Si encore fermes, prolonger de 5 min. Si pr\u00eates avant la truite, laisser dans le four \u00e9teint pour rester au chaud.","## Assemblage et service (2 min)","Dans un grand saladier, mettre 150 g de roquette et 40 g de parmesan en copeaux (si tu n'as que du parmesan r\u00e2p\u00e9, \u00e7a marche aussi, mais les copeaux sont plus \u00e9l\u00e9gants \u2014 pour en faire : r\u00e2per \u00e0 l'\u00e9conome le long d'un bloc de parmesan). Verser la vinaigrette, m\u00e9langer d\u00e9licatement avec les mains ou des pinces **juste avant de servir**.","Dans chaque assiette : lit de lentilles (\u2155 de la casserole), 1 filet de truite (la peau se d\u00e9tache facilement au couteau si on ne l'aime pas), \u2155 des betteraves et carottes, une portion de salade roquette.","**Garder la 5\u1d49 portion** dans un contenant herm\u00e9tique pour le lunch. Les lentilles et l\u00e9gumes se conservent 3 jours au frigo, la truite 2 jours (\u00e0 manger froide en salade le lendemain, tr\u00e8s bon).","## Substitutions et hors saison","- **Lentilles vertes du Puy** : ce sont des lentilles fran\u00e7aises \u00e0 la texture ferme qui gardent leur forme. Si introuvables : **lentilles vertes ordinaires** (Ontario ou du Canada) marchent aussi, avec 5 min de cuisson suppl\u00e9mentaires (30-35 min au lieu de 25-30). \u00c9viter les lentilles rouges/corail \u2014 elles se d\u00e9font en pur\u00e9e et ne conviennent pas \u00e0 ce plat.","- **Truite arc-en-ciel** : disponible fra\u00eeche toute l'ann\u00e9e en \u00e9picerie (\u00e9levage qu\u00e9b\u00e9cois notamment). Si introuvable, remplacer par **saumon** (m\u00eames filets de 150 g, cuisson allong\u00e9e \u00e0 12-15 min car plus \u00e9pais) ou par **omble chevalier** (cuisson identique \u00e0 la truite).","- **Aneth frais** : disponible presque toute l'ann\u00e9e. Si absent en hiver : **aneth s\u00e9ch\u00e9** (2 c. \u00e0 th\u00e9 au lieu du frais), ou **fenouil frais tranch\u00e9 finement** (parents botaniques, saveur voisine). Sinon, **persil** convient \u2014 un profil diff\u00e9rent mais toujours agr\u00e9able avec la truite.","- **Betteraves** : disponibles toute l'ann\u00e9e (Qu\u00e9bec en \u00e9t\u00e9-automne, importation Ontario/Californie en hiver). Si tu veux varier : **betteraves jaunes** (Chioggia ray\u00e9es, betteraves rouges classiques) \u2014 le r\u00f4tissage fait ressortir leur sucre naturel dans tous les cas.","- **Roquette** : disponible toute l'ann\u00e9e. Si trop poivr\u00e9e pour l'ado : remplacer par **mesclun** ou **jeunes \u00e9pinards**.","- **Vinaigre de vin rouge** : si non disponible, **vinaigre de x\u00e9r\u00e8s** (plus complexe) ou **vinaigre de cidre** (plus fruit\u00e9) \u2014 les deux fonctionnent bien avec les lentilles.","## Note sur la casserole des lentilles","> Si tu as une **cocotte en fonte \u00e9maill\u00e9e** (Le Creuset, Staub) ou une casserole \u00e0 fond \u00e9pais, c'est le contenant id\u00e9al : la chaleur se r\u00e9partit uniform\u00e9ment et les lentilles ne collent pas. Sinon, une casserole ordinaire fait l'affaire \u2014 remuer un peu plus souvent pour \u00e9viter que le fond attache."],"nut":[{"l":"\u00c9nergie","v":"650 kcal"},{"l":"Prot\u00e9ines","v":"47 g"},{"l":"Fibres","v":"16 g (60 %)"},{"l":"Om\u00e9ga-3 EPA+DHA","v":"1,5 g"}],"ing_raw":["5 filets de truite arc-en-ciel avec peau (150 g chacun, \u2248 750 g)","2 c. \u00e0 soupe d'huile d'olive, 1 citron en rondelles, aneth frais, sel, poivre","375 g de lentilles vertes du Puy s\u00e8ches, 1 gros oignon, 2 carottes en petits d\u00e9s, 2 branches de c\u00e9leri, 3 gousses d'ail, 1 feuille de laurier, 1,25 L de bouillon de l\u00e9gumes","3 c. \u00e0 soupe de persil hach\u00e9, 2 1/2 c. \u00e0 soupe d'huile, 1 1/4 c. \u00e0 soupe de vinaigre de vin rouge","750 g de betteraves (5 moyennes) en quartiers, 5 carottes en b\u00e2tonnets, 2 1/2 c. \u00e0 soupe d'huile d'olive, 1 1/4 c. \u00e0 th\u00e9 de thym s\u00e9ch\u00e9","150 g de roquette, 40 g de parmesan en copeaux, vinaigrette : 3 c. \u00e0 soupe d'huile d'olive + 1 1/4 c. \u00e0 soupe de jus de citron + sel + poivre"]},{"d":5,"w":1,"n":"Ven","wd":1,"t":"Chili v\u00e9g\u00e9tarien aux trois haricots, pain de ma\u00efs maison, salade kale-pomme-cheddar","tt":"40 min","pt":"15 min","ct":"25 min","ing":["Huile d'olive (2 1/2 c. \u00e0 soupe)","1 tr\u00e8s gros oignon (ou 2 moyens)","2 poivrons rouges","2 poivrons oranges","5 gousses d'ail","## \u00c9pices","Poudre de chili (2 1/2 c. \u00e0 soupe)","Cumin (1 1/4 c. \u00e0 soupe)","Paprika fum\u00e9 (1 1/4 c. \u00e0 th\u00e9)","Origan (1 1/4 c. \u00e0 th\u00e9)","##","2 bo\u00eetes (540 ml) de haricots noirs","1 bo\u00eete (796 ml) de haricots rouges (ou 1 1/2 \u00d7 540 ml)","1 1/2 bo\u00eete (540 ml) de pois chiches \u2014 toutes rinc\u00e9es","##","1 bo\u00eete (796 ml)","1 petite (398 ml) de tomates en d\u00e9s","1 bo\u00eete (156 ml) de p\u00e2te de tomate","Bouillon de l\u00e9gumes (625 ml)","Cacao non sucr\u00e9 (1 1/4 c. \u00e0 soupe)","## Garnitures","Cheddar fort (100 g)","1-2 avocats","Coriandre","Yogourt grec","Quartiers de lime","## Pain de ma\u00efs (5 portions)","Farine de ma\u00efs (225 g)","Farine de bl\u00e9 entier (110 g)","Poudre \u00e0 p\u00e2te (2 1/2 c. \u00e0 th\u00e9)","Sel (1/2 c. \u00e0 th\u00e9)","Miel (75 ml)","Huile (75 ml)","Lait (310 ml)","1 gros \u0153uf","## Salade","Kale (250 g)","1 grosse pomme verte","Cheddar fort en d\u00e9s (75 g)","Graines de tournesol (50 g)","Vinaigrette \u00e9rable-cidre"],"inst":["## Avant tout (mise en place \u2014 4 min)","**Pr\u00e9chauffer le four \u00e0 200 \u00b0C (400 \u00b0F).** Il met environ 8-10 minutes \u00e0 chauffer.","Beurrer g\u00e9n\u00e9reusement un moule carr\u00e9 de 23 cm (9 pouces) avec du beurre ou de l'huile \u2014 ou tapisser de papier parchemin en laissant d\u00e9passer un peu sur les c\u00f4t\u00e9s (\u00e7a facilitera le d\u00e9moulage).","Sortir tous les ingr\u00e9dients du garde-manger et du frigo sur le comptoir.","## Pr\u00e9parer la p\u00e2te du pain de ma\u00efs (5 min)","**Ingr\u00e9dient \u00e0 pr\u00e9ciser en \u00e9picerie** : la \u00ab farine de ma\u00efs \u00bb utilis\u00e9e ici est de la **semoule de ma\u00efs jaune** (mouture moyenne, texture granuleuse), pas de la f\u00e9cule de ma\u00efs ni de la masa harina (celle-l\u00e0 sert aux tortillas). Marques qu\u00e9b\u00e9coises courantes : Anita's, La Milanaise, ou Bob's Red Mill. Si le sac dit \u00ab polenta \u00bb, c'est aussi bon.","Dans un grand bol, fouetter \u00e0 sec ensemble : 225 g de farine de ma\u00efs (semoule), 110 g de farine de bl\u00e9 entier, 2\u00bd c. \u00e0 th\u00e9 de poudre \u00e0 p\u00e2te, \u00bd c. \u00e0 th\u00e9 de sel. Bien m\u00e9langer pour r\u00e9partir la poudre \u00e0 p\u00e2te uniform\u00e9ment.","Dans un deuxi\u00e8me bol (plus petit), fouetter les liquides : 75 ml de miel, 75 ml d'huile de canola ou tournesol, 310 ml de lait, 1 gros \u0153uf. Fouetter jusqu'\u00e0 obtenir un m\u00e9lange homog\u00e8ne et l\u00e9g\u00e8rement mousseux.","Verser les liquides dans les ingr\u00e9dients secs. **M\u00e9langer \u00e0 peine avec une spatule ou une cuill\u00e8re de bois** : 15-20 mouvements suffisent, juste assez pour que la farine soit humidifi\u00e9e. La p\u00e2te doit rester grumeleuse. **Trop m\u00e9langer active le gluten et rend le pain de ma\u00efs caoutchouteux.**","Verser la p\u00e2te dans le moule pr\u00e9par\u00e9. \u00c9taler grossi\u00e8rement avec le dos d'une cuill\u00e8re \u2014 pas besoin que la surface soit parfaitement lisse. R\u00e9server le moule \u00e0 c\u00f4t\u00e9 du four.","## Enfourner le pain de ma\u00efs (25 min sans surveillance)","D\u00e8s que le four est chaud, mettre le moule sur la **grille du milieu**. R\u00e9gler une minuterie de **24 minutes** (on v\u00e9rifiera \u00e0 ce moment). Le pain est pr\u00eat quand un cure-dent ins\u00e9r\u00e9 au centre en ressort propre ou avec quelques miettes s\u00e8ches (pas de p\u00e2te crue coll\u00e9e).","## D\u00e9marrer le chili \u2014 pr\u00e9parer les l\u00e9gumes (6 min)","\u00c9mincer 1 tr\u00e8s gros oignon jaune (ou 2 moyens) en petits d\u00e9s d'environ 5 mm : couper les extr\u00e9mit\u00e9s, retirer la pelure, couper en deux dans le sens de la longueur, faire quelques entailles verticales sans traverser la racine, puis trancher perpendiculairement.","Couper 2 poivrons rouges et 2 poivrons oranges (ou 4 rouges) en d\u00e9s de 1 cm : couper le haut, retirer les graines et les membranes blanches \u00e0 l'int\u00e9rieur, trancher en lani\u00e8res puis en d\u00e9s.","\u00c9plucher 5 gousses d'ail et les hacher finement.","Ouvrir et **rincer sous l'eau froide dans une passoire** : 2 bo\u00eetes (540 ml chacune) de haricots noirs, 1 bo\u00eete (796 ml) de haricots rouges, 1\u00bd bo\u00eete (540 ml) de pois chiches \u2014 soit une bo\u00eete compl\u00e8te et environ la moiti\u00e9 d'une autre. Bien \u00e9goutter. Le rin\u00e7age enl\u00e8ve environ 40 % du sel ajout\u00e9 par la mise en conserve.","## Cuire le chili (5 min de saisie + 20 min mijotage)","Dans une grande casserole ou cocotte \u00e0 fond \u00e9pais, chauffer 2\u00bd c. \u00e0 soupe d'huile d'olive \u00e0 feu moyen-vif. Ajouter l'oignon avec une pinc\u00e9e de sel. Cuire **4 minutes** en remuant r\u00e9guli\u00e8rement, jusqu'\u00e0 ce que les cubes deviennent translucides et l\u00e9g\u00e8rement dor\u00e9s sur les bords.","Ajouter les poivrons et l'ail. Cuire **3 minutes de plus** en remuant, jusqu'\u00e0 ce que les poivrons commencent \u00e0 s'attendrir.","Ajouter les \u00e9pices directement dans la casserole : 2\u00bd c. \u00e0 soupe de poudre de chili, 1\u00bc c. \u00e0 soupe de cumin moulu, 1\u00bc c. \u00e0 th\u00e9 de paprika fum\u00e9, 1\u00bc c. \u00e0 th\u00e9 d'origan s\u00e9ch\u00e9. Remuer **30 secondes seulement** \u2014 assez pour que les \u00e9pices lib\u00e8rent leurs ar\u00f4mes au contact du gras chaud, pas assez pour br\u00fbler (elles deviendraient am\u00e8res). Cette \u00e9tape s'appelle **fleurir** les \u00e9pices.","Ajouter d'un coup : les haricots rinc\u00e9s (noirs, rouges, pois chiches), 1 bo\u00eete (796 ml) de tomates en d\u00e9s, 1 petite bo\u00eete (398 ml) de tomates en d\u00e9s, 1 bo\u00eete (156 ml) de p\u00e2te de tomate, 625 ml de bouillon de l\u00e9gumes, 1\u00bc c. \u00e0 soupe de cacao non sucr\u00e9 (le vrai cacao \u00e0 p\u00e2tisserie type Fry's ou Cacao Barry \u2014 **jamais** de Nesquik ni de chocolat chaud sucr\u00e9).","Le cacao dans le chili n'est pas l\u00e0 pour le go\u00fbt chocolat\u00e9 \u2014 il ajoute une profondeur, une couleur fonc\u00e9e, et un l\u00e9ger amer qui \u00e9quilibre l'acidit\u00e9 des tomates. C'est une technique classique inspir\u00e9e du mole mexicain. \u00c0 cette quantit\u00e9, on ne per\u00e7oit pas de go\u00fbt de chocolat identifiable.","Bien m\u00e9langer. Porter \u00e0 \u00e9bullition \u00e0 feu vif, puis **baisser \u00e0 feu doux-moyen pour un mijotage tranquille** (des petites bulles r\u00e9guli\u00e8res \u00e0 la surface, pas un bouillonnement violent). **Laisser mijoter \u00e0 d\u00e9couvert 18-22 minutes** en remuant occasionnellement (toutes les 5 min). Le chili s'\u00e9paissira progressivement \u00e0 mesure que le liquide s'\u00e9vapore. **Lancer une minuterie de 20 minutes.**","## V\u00e9rifier le pain de ma\u00efs (\u00e0 ~t=35 min)","Quand la minuterie du pain de ma\u00efs sonne (24 min), tester avec un cure-dent au centre. Si propre ou avec quelques miettes s\u00e8ches : sortir. Si encore de la p\u00e2te humide : remettre 2-3 min et retester. Laisser refroidir 10 min dans le moule avant de d\u00e9couper.","## Pr\u00e9parer la salade kale (5 min \u2014 pendant le mijotage)","Pr\u00e9parer 250 g de kale : d\u00e9tacher les feuilles des tiges (glisser le pouce et l'index le long de chaque tige de bas en haut). Jeter les tiges. Empiler quelques feuilles, rouler en cigare, trancher en lani\u00e8res fines (1 cm de large).","Mettre le kale dans un grand saladier. Ajouter 1 bonne pinc\u00e9e de sel et 1 c. \u00e0 th\u00e9 d'huile d'olive. **Masser 1-2 minutes** avec les mains : presser, froisser, jusqu'\u00e0 ce que le kale fonce, ramollisse et perde environ la moiti\u00e9 de son volume. (Cette \u00e9tape a \u00e9t\u00e9 d\u00e9taill\u00e9e \u00e0 J2 \u00e9tape 17 \u2014 c'est la m\u00eame technique.)","Laver et couper 1 grosse pomme verte (type Granny Smith) : la couper en quartiers, retirer le c\u0153ur, puis couper chaque quartier en petits cubes de 1 cm. Ajouter au saladier.","Couper 75 g de cheddar fort en petits cubes de 5 mm (des cubes plut\u00f4t que du r\u00e2p\u00e9 \u2014 meilleure texture en salade). Ajouter avec 50 g de graines de tournesol grill\u00e9es.","**Vinaigrette \u00e9rable-cidre** : dans un petit bocal, fouetter 3 c. \u00e0 soupe d'huile d'olive, 1 c. \u00e0 soupe de vinaigre de cidre, 1 c. \u00e0 th\u00e9 de sirop d'\u00e9rable, \u00bd c. \u00e0 th\u00e9 de moutarde de Dijon, 1 pinc\u00e9e de sel, 3-4 tours de poivre. Verser sur la salade au moment de servir et m\u00e9langer.","## Pr\u00e9parer les garnitures (5 min)","R\u00e2per 100 g de cheddar fort (r\u00e2pe \u00e0 gros trous) dans un petit bol.","Couper 1-2 avocats en cubes de 1,5 cm : couper l'avocat en deux dans le sens de la longueur autour du noyau, retirer le noyau (en frappant un couteau dedans et en tournant, ou avec une cuill\u00e8re), quadriller la chair en cubes avec la pointe d'un couteau sans percer la peau, puis retourner la peau et racler les cubes avec une cuill\u00e8re. Arroser d'un peu de jus de lime pour \u00e9viter le brunissement.","Hacher grossi\u00e8rement une petite botte de coriandre (feuilles et tiges tendres \u2014 les tiges dures sont plus fibreuses mais toujours parfum\u00e9es).","Sortir un pot de yogourt grec nature (une cuill\u00e8re par assiette suffit \u2014 remplace la cr\u00e8me sure traditionnelle, moins gras et plus prot\u00e9in\u00e9).","Trancher 2-3 limes en quartiers pour servir.","## V\u00e9rification du chili et service (3 min)","Vers 18-20 min de mijotage, go\u00fbter le chili. La consistance doit \u00eatre \u00e9paisse (une cuill\u00e8re y laisse un l\u00e9ger sillon sans que le liquide se remplisse aussit\u00f4t) mais pas s\u00e8che. Si trop liquide : mijoter 5 min de plus. Si trop \u00e9pais : ajouter 60-125 ml d'eau chaude. Ajuster l'assaisonnement (souvent : plus de sel, un tour de poivre, parfois une pinc\u00e9e de sucre pour \u00e9quilibrer l'acidit\u00e9 des tomates).","D\u00e9mouler le pain de ma\u00efs (passer un couteau autour des bords, retourner sur une planche, remettre \u00e0 l'endroit). Couper en 5 gros carr\u00e9s.","**Assemblage** : dans chaque bol, une bonne louche de chili. \u00c0 table, chacun garnit \u00e0 son go\u00fbt \u2014 cheddar r\u00e2p\u00e9, avocat, coriandre, yogourt, quartier de lime \u00e0 presser. Le pain de ma\u00efs et la salade se servent \u00e0 c\u00f4t\u00e9.","**Garder la 5\u1d49 portion de chili** dans un contenant herm\u00e9tique pour le lunch. **Le chili est encore meilleur le lendemain** \u2014 les saveurs continuent de se marier au frigo. Le pain de ma\u00efs se conserve 2 jours \u00e0 temp\u00e9rature ambiante dans un contenant herm\u00e9tique, ou se cong\u00e8le bien en portions individuelles.","## Substitutions et hors saison","- **Poudre de chili** : c'est un **m\u00e9lange d'\u00e9pices** (chili en poudre + cumin + origan + ail + sel), pas le piment fort seul. Marques qu\u00e9b\u00e9coises courantes : McCormick, Club House. Ne pas confondre avec \u00ab piment fort en poudre \u00bb ou \u00ab poudre de cayenne \u00bb qui est purement du piment moulu. Si tu n'as que du cayenne : utiliser 1 c. \u00e0 th\u00e9 de cayenne + 2 c. \u00e0 soupe de cumin suppl\u00e9mentaire + 1 c. \u00e0 soupe d'origan pour approximer.","- **Paprika fum\u00e9** : dans la section \u00e9pices internationales chez Maxi/IGA, ou \u00e0 La Vieille Europe. Marque sugg\u00e9r\u00e9e : La Chinata. Si introuvable : paprika doux + 1 goutte de fum\u00e9e liquide (au rayon marinades), ou simplement plus de paprika doux.","- **Cacao non sucr\u00e9** : Fry's ou Cacao Barry, section p\u00e2tisserie. Ne pas remplacer par du chocolat noir fondu \u2014 la proportion et la nature seraient diff\u00e9rentes.","- **Farine de ma\u00efs / semoule** : Anita's, La Milanaise, Bob's Red Mill. Ne pas utiliser f\u00e9cule de ma\u00efs (Maizena) ni farine \u00e0 masa (P.A.N., Maseca \u2014 pour tortillas). Si vraiment introuvable : **semoule de bl\u00e9 fine** peut d\u00e9panner mais la texture sera diff\u00e9rente (pas la m\u00eame granulosit\u00e9).","- **Coriandre fra\u00eeche** : disponible toute l'ann\u00e9e. Certaines personnes trouvent qu'elle go\u00fbte le savon (question de g\u00e9n\u00e9tique). Si c'est le cas pour toi, ta conjointe ou les enfants : remplacer par persil plat (go\u00fbt moins caract\u00e9ristique mais rafra\u00eechissant).","- **Avocats** : disponibles toute l'ann\u00e9e (import\u00e9s Mexique/Californie). Les choisir avec la peau qui c\u00e8de **l\u00e9g\u00e8rement** sous une pression du doigt, sans \u00eatre trop mous. Si encore fermes en magasin, les acheter 2-3 jours d'avance et les mettre dans un sac de papier avec une banane pour acc\u00e9l\u00e9rer le m\u00fbrissement.","- **Pomme verte** : Granny Smith est classique pour son croquant et son acidit\u00e9. Alternatives : Empire (qu\u00e9b\u00e9coise, moins acide), Honeycrisp (croquante), Cortland. \u00c9viter les Delicious rouges (trop farineuses).","- **Poivrons rouges/oranges** : disponibles toute l'ann\u00e9e (importation Mexique/Serres du Qu\u00e9bec). Les prix montent en janvier-f\u00e9vrier. Si trop chers, remplacer par 2 poivrons verts (go\u00fbt plus v\u00e9g\u00e9tal, moins sucr\u00e9) + 1 c. \u00e0 th\u00e9 de sucre dans le chili pour compenser.","## Note sur la conservation","| Le chili se cong\u00e8le tr\u00e8s bien (jusqu'\u00e0 3 mois) en portions individuelles dans des contenants ou sacs Ziploc \u00e0 cong\u00e9lation. **Le pain de ma\u00efs se cong\u00e8le aussi** \u2014 envelopper chaque carr\u00e9 individuellement dans du plastique + papier alu, d\u00e9congeler \u00e0 temp\u00e9rature ambiante 30 min puis r\u00e9chauffer 8-10 min \u00e0 180 \u00b0C."],"nut":[{"l":"\u00c9nergie","v":"720 kcal"},{"l":"Prot\u00e9ines","v":"32 g"},{"l":"Fibres","v":"24 g (90 %)"},{"l":"Vitamine D","v":"0,8 \u03bcg"}],"ing_raw":["2 1/2 c. \u00e0 soupe d'huile d'olive, 1 tr\u00e8s gros oignon (ou 2 moyens), 2 poivrons rouges, 2 poivrons oranges, 5 gousses d'ail","\u00c9pices : 2 1/2 c. \u00e0 soupe de poudre de chili, 1 1/4 c. \u00e0 soupe de cumin, 1 1/4 c. \u00e0 th\u00e9 de paprika fum\u00e9, 1 1/4 c. \u00e0 th\u00e9 d'origan","2 bo\u00eetes (540 ml) de haricots noirs, 1 bo\u00eete (796 ml) de haricots rouges (ou 1 1/2 \u00d7 540 ml), 1 1/2 bo\u00eete (540 ml) de pois chiches \u2014 toutes rinc\u00e9es","1 bo\u00eete (796 ml) + 1 petite (398 ml) de tomates en d\u00e9s, 1 bo\u00eete (156 ml) de p\u00e2te de tomate, 625 ml de bouillon de l\u00e9gumes, 1 1/4 c. \u00e0 soupe de cacao non sucr\u00e9","Garnitures : 100 g de cheddar fort, 1-2 avocats, coriandre, yogourt grec, quartiers de lime","Pain de ma\u00efs (5 portions) : 225 g de farine de ma\u00efs + 110 g de farine de bl\u00e9 entier + 2 1/2 c. \u00e0 th\u00e9 de poudre \u00e0 p\u00e2te + 1/2 c. \u00e0 th\u00e9 de sel + 75 ml de miel + 75 ml d'huile + 310 ml de lait + 1 gros \u0153uf","Salade : 250 g de kale, 1 grosse pomme verte, 75 g de cheddar fort en d\u00e9s, 50 g de graines de tournesol, vinaigrette \u00e9rable-cidre"]},{"d":6,"w":1,"n":"Sam","wd":0,"t":"Morue du Pacifique au four citron-tomates, gratin dauphinois all\u00e9g\u00e9, brocolini r\u00f4ti, salade compos\u00e9e","tt":"65 min","pt":"20 min","ct":"45 min","ing":["5 pav\u00e9s de morue ou cabillaud du Pacifique (170 g chacun, \u2248 850 g) \u2014 Costco section congel\u00e9e (High Liner Sustainable Seafood ou similaire). D\u00e9congeler 24 h au frigo.","##","Huile d'olive (2 1/2 c. \u00e0 soupe)","12 olives Kalamata d\u00e9noyaut\u00e9es (\u2248 40 g)","15 tomates cerises","Zeste de 2 citrons + jus de 1 1/2","3 gousses d'ail","Origan (1 1/4 c. \u00e0 th\u00e9)","Poivre (PAS de sel ajout\u00e9)","## Gratin all\u00e9g\u00e9","1,25 kg de pommes de terre Yukon Gold tranch\u00e9es 3 mm","Lait 2 % (500 ml)","Cr\u00e8me 15 % (125 ml)","3 gousses d'ail","Thym (1 1/4 c. \u00e0 th\u00e9)","Gruy\u00e8re r\u00e2p\u00e9 (70 g)","Parmesan (30 g)","Muscade","##","Brocolini (500 g \u00b7 2 \u00e0 3 bottes)","Huile d'olive (2 1/2 c. \u00e0 soupe)","3 gousses d'ail","Flocons de piment","## Salade","1 grosse laitue Boston","2 endives","1 petit bulbe de fenouil (\u2248 250 g)","Noix de Grenoble (75 g)","Vinaigrette \u00e0 l'huile de noix"],"inst":["## La veille (planification importante)","**D\u00e9congeler la morue au frigo 24 h \u00e0 l'avance.** Sortir les 5 pav\u00e9s de morue congel\u00e9s de leur emballage, les d\u00e9poser sur une assiette (avec un l\u00e9ger rebord pour retenir le jus), couvrir de pellicule plastique, mettre au frigo la veille au soir. Ne jamais d\u00e9congeler \u00e0 temp\u00e9rature ambiante \u2014 risque bact\u00e9rien r\u00e9el avec le poisson. Si on a oubli\u00e9 : d\u00e9cong\u00e9lation rapide en plongeant les pav\u00e9s (bien emball\u00e9s dans un sac Ziploc \u00e9tanche) dans un bol d'eau froide 30-45 min, en changeant l'eau \u00e0 mi-parcours.","## Avant tout (mise en place \u2014 3 min)","Sortir la morue d\u00e9congel\u00e9e du frigo. Laisser temp\u00e9rer 15-20 min pendant la pr\u00e9paration du gratin.","**Pr\u00e9chauffer le four \u00e0 190 \u00b0C (375 \u00b0F).** Il met environ 8-10 minutes \u00e0 chauffer.","Beurrer un plat \u00e0 gratin de 23 \u00d7 33 cm environ (ou plat rectangulaire \u00e9quivalent) avec du beurre ou de l'huile.","## Pr\u00e9parer le gratin (12 min)","**Trancher les 1,25 kg de pommes de terre Yukon Gold en tranches tr\u00e8s minces de 3 mm.** \u00c0 la mandoline (id\u00e9ale) : r\u00e9gler \u00e0 3 mm et toujours utiliser le poussoir de s\u00e9curit\u00e9. Au couteau : un grand couteau tr\u00e8s bien aiguis\u00e9, en coupant d'abord la pomme de terre en deux pour une surface plate.","\u00c9plucher ou non selon ta pr\u00e9f\u00e9rence \u2014 les Yukon Gold ont une peau fine, comestible et nutritive. Rincer les tranches sous l'eau froide pour enlever l'exc\u00e8s d'amidon, \u00e9goutter.","Dans une casserole large, chauffer \u00e0 feu moyen : 500 ml de lait 2 %, 125 ml de cr\u00e8me 15 %, 3 gousses d'ail hach\u00e9es finement, 1\u00bc c. \u00e0 th\u00e9 de thym s\u00e9ch\u00e9, une bonne pinc\u00e9e de muscade, 1 grosse pinc\u00e9e de sel, 5-6 tours de poivre.","Quand le m\u00e9lange fr\u00e9mit (petites bulles sur les bords, pas d'\u00e9bullition), ajouter les tranches de pomme de terre. Remuer doucement pour que toutes soient immerg\u00e9es. **Cuire 5 minutes \u00e0 feu doux-moyen** en remuant. Cette pr\u00e9-cuisson r\u00e9duit le temps au four et \u00e9paissit naturellement la sauce gr\u00e2ce \u00e0 l'amidon \u2014 c'est le secret du dauphinois all\u00e9g\u00e9.","Verser dans le plat \u00e0 gratin : d'abord les pommes de terre r\u00e9parties uniform\u00e9ment, puis le liquide de cuisson par-dessus jusqu'\u00e0 presque au niveau des tranches sup\u00e9rieures.","R\u00e2per 70 g de gruy\u00e8re et 30 g de parmesan, m\u00e9langer. **R\u00e9server la moiti\u00e9** pour la fin de cuisson. Parsemer la premi\u00e8re moiti\u00e9 sur le gratin.","## Enfourner le gratin (premi\u00e8re phase)","Enfourner le plat sur la **grille du milieu**. R\u00e9gler une minuterie de **25 minutes** \u2014 on rajoutera le reste du fromage \u00e0 ce moment.","## Pr\u00e9parer la morue (5 min)","Dans un plat allant au four (23 \u00d7 33 cm environ), verser 2\u00bd c. \u00e0 soupe d'huile d'olive et l'\u00e9taler.","\u00c9ponger les pav\u00e9s de morue avec du papier essuie-tout (le poisson trop humide \u00ab bout \u00bb au four). Les d\u00e9poser dans le plat.","Autour et par-dessus, disposer : environ 12 olives Kalamata d\u00e9noyaut\u00e9es, 12-15 tomates cerises, 3 gousses d'ail \u00e9minc\u00e9es, le zeste de 2 citrons, 1\u00bc c. \u00e0 th\u00e9 d'origan s\u00e9ch\u00e9.","Presser le jus de 1\u00bd citron sur le tout. **Ne pas ajouter de sel** \u2014 les olives Kalamata sont tr\u00e8s sal\u00e9es. Ajouter 5-6 tours de poivre et un filet d'huile d'olive. **R\u00e9server sur le comptoir.**","## Pr\u00e9parer le brocolini (3 min)","Rincer 500 g de brocolini. Couper la base ligneuse des tiges (2-3 cm). Si tr\u00e8s \u00e9pais, fendre les tiges en deux dans le sens de la longueur.","Sur une plaque tapiss\u00e9e, m\u00e9langer avec 2\u00bd c. \u00e0 soupe d'huile d'olive, 2-3 gousses d'ail \u00e9minc\u00e9es, une pinc\u00e9e de sel, quelques flocons de piment fort, 3-4 tours de poivre. \u00c9taler en une seule couche. **R\u00e9server.**","## Pr\u00e9parer la salade compos\u00e9e (5 min)","S\u00e9parer les feuilles de la laitue Boston, rincer, essorer. D\u00e9chirer en morceaux de la taille d'une bouch\u00e9e dans un grand saladier.","Trancher les 2 endives en biais en tron\u00e7ons de 1 cm. Ajouter au saladier.","Pr\u00e9parer le fenouil (1 petit bulbe, ~250 g) : couper la base et les tiges (garder les frondes vertes), retirer les feuilles dures, couper en deux, retirer le c\u0153ur, trancher tr\u00e8s finement (mandoline id\u00e9ale). Ajouter.","Casser grossi\u00e8rement 75 g de noix de Grenoble. **Ne pas les ajouter maintenant** \u2014 juste avant de servir pour garder le croquant.","Vinaigrette \u00e0 l'huile de noix : 3 c. \u00e0 soupe d'huile de noix, 1 c. \u00e0 soupe de vinaigre de cidre ou de x\u00e9r\u00e8s, \u00bd c. \u00e0 th\u00e9 de moutarde de Dijon, 1 c. \u00e0 th\u00e9 de miel, 1 pinc\u00e9e de sel, 3-4 tours de poivre. Fouetter. R\u00e9server.","## Ajouter le fromage, puis enfourner morue et brocolini","Quand la minuterie sonne (25 min), sortir le gratin. Parsemer la deuxi\u00e8me moiti\u00e9 du fromage. Le gratin devrait commencer \u00e0 dorer sur les bords.","Remettre le gratin au four (grille du milieu). **Enfourner imm\u00e9diatement la morue et les brocolinis** sur la grille du bas. R\u00e9gler une minuterie de **14 minutes**.","## Cuisson finale (14-16 min)","Vers 10 minutes, v\u00e9rifier : le gratin dor\u00e9 sur le dessus, le fromage bouillonnant; les brocolinis l\u00e9g\u00e8rement noircis aux pointes; la morue qui blanchit et dont le jus bout doucement.","\u00c0 14 min, v\u00e9rifier la morue : chair **opaque blanc-ros\u00e9** et **se d\u00e9faisant \u00e0 la fourchette** dans la partie la plus \u00e9paisse. Si encore translucide, +2 min. Sortir d\u00e8s que pr\u00eate \u2014 la morue passe de \u00ab pas assez \u00bb \u00e0 \u00ab caoutchouteuse \u00bb en 2 min.","Sortir les brocolinis : tendres-croquants et l\u00e9g\u00e8rement dor\u00e9s-noircis aux pointes.","V\u00e9rifier le gratin en piquant au centre : le couteau doit entrer sans r\u00e9sistance. Si ferme au c\u0153ur, +5 min. **Le gratin gagne \u00e0 reposer 5-10 min** hors du four avant d'\u00eatre servi.","## Assemblage et service","Verser la vinaigrette sur la salade, ajouter les noix en dernier. Garnir des frondes de fenouil.","**Dans chaque assiette** : 1 pav\u00e9 de morue avec ses tomates-olives et son jus, une portion de gratin (\u2155), une portion de brocolinis, salade \u00e0 c\u00f4t\u00e9.","**Garder la 5\u1d49 portion** pour le lunch. La morue se conserve 2 jours (bonne froide, en salade), le gratin 3 jours (excellent r\u00e9chauff\u00e9), les brocolinis 2 jours, la salade seulement le jour m\u00eame.","## Substitutions et hors saison","- **Morue / cabillaud du Pacifique** : chez Costco souvent \u00ab Wild Pacific Cod \u00bb. Alternatives : aiglefin (cuisson identique), goberge (r\u00e9duire \u00e0 10-12 min), fl\u00e9tan (cuire 15-18 min car plus \u00e9pais). \u00c9viter sole ou plie \u2014 trop minces.","- **Yukon Gold** : disponibles toute l'ann\u00e9e. Alternatives \u00e0 chair ferme : Ratte, Charlotte, Roseval. **\u00c9viter Idaho ou Russet** \u2014 elles se d\u00e9sint\u00e8grent et donnent un gratin p\u00e2teux.","- **Brocolini** : si introuvable, brocoli r\u00e9gulier en petits bouquets fins (cuisson 15-18 min).","- **Huile de noix** : rare (section huiles fines). Si introuvable : huile d'olive + 2 c. \u00e0 th\u00e9 de noix broy\u00e9es dans la vinaigrette.","- **Fenouil** : disponible d'octobre \u00e0 mai. Si introuvable : c\u00e9leri tranch\u00e9 fin + \u00bc c. \u00e0 th\u00e9 de graines de fenouil \u00e9cras\u00e9es.","- **Endives** : alternatives radicchio ou c\u0153urs de romaine hach\u00e9s.","- **Olives Kalamata** : toujours d\u00e9noyaut\u00e9es. Alternatives : olives noires de Nice, Taggiasche.","- **Gruy\u00e8re** : alternatives Comt\u00e9, Emmental, ou cheddar fort + parmesan."],"nut":[{"l":"\u00c9nergie","v":"680 kcal"},{"l":"Prot\u00e9ines","v":"43 g"},{"l":"Fibres","v":"9 g"},{"l":"Vitamine D","v":"3 \u03bcg"}],"ing_raw":["5 pav\u00e9s de morue ou cabillaud du Pacifique (170 g chacun, \u2248 850 g) \u2014 Costco section congel\u00e9e (High Liner Sustainable Seafood ou similaire). D\u00e9congeler 24 h au frigo.","2 1/2 c. \u00e0 soupe d'huile d'olive, 12 olives Kalamata d\u00e9noyaut\u00e9es (\u2248 40 g), 15 tomates cerises, zeste de 2 citrons + jus de 1 1/2, 3 gousses d'ail, 1 1/4 c. \u00e0 th\u00e9 d'origan, poivre (PAS de sel ajout\u00e9)","Gratin all\u00e9g\u00e9 : 1,25 kg de pommes de terre Yukon Gold tranch\u00e9es 3 mm, 500 ml de lait 2 %, 125 ml de cr\u00e8me 15 %, 3 gousses d'ail, 1 1/4 c. \u00e0 th\u00e9 de thym, muscade, 70 g de gruy\u00e8re r\u00e2p\u00e9, 30 g de parmesan","500 g de brocolini (2 \u00e0 3 bottes), 2 1/2 c. \u00e0 soupe d'huile d'olive, 3 gousses d'ail, flocons de piment","Salade : 1 grosse laitue Boston, 2 endives, 1 petit bulbe de fenouil, 75 g de noix de Grenoble, vinaigrette \u00e0 l'huile de noix"]},{"d":7,"w":1,"n":"Dim","wd":0,"t":"B\u0153uf brais\u00e9 \u00e0 la bi\u00e8re brune, l\u00e9gumes-racines glac\u00e9s, pur\u00e9e de pommes de terre et chou-fleur, salade verte","tt":"2 h 50","pt":"20 min","ct":"2 h 30","ing":["1,5 kg de paleron ou jarret de b\u0153uf d\u00e9soss\u00e9 en cubes de 4 cm","Farine (4 c. \u00e0 soupe)","Sel et poivre","##","Huile de canola (3 1/2 c. \u00e0 soupe)","2 gros oignons","5 gousses d'ail","P\u00e2te de tomate (2 1/2 c. \u00e0 soupe)","##","1 grande bouteille (750 ml) ou 2 petites (341 ml \u00d7 2) de bi\u00e8re brune (Bor\u00e9ale Noire, McAuslan)","##","Bouillon de b\u0153uf (625 ml)","Worcestershire (2 1/2 c. \u00e0 soupe)","Moutarde \u00e0 l'ancienne (2 1/2 c. \u00e0 soupe)","2 feuilles de laurier","Thym frais","##","5 carottes","5 panais","15 oignons perl\u00e9s (ou 2 oignons moyens en quartiers)","Champignons cremini (375 g)","## Pur\u00e9e","Yukon Gold (1 kg)","1 chou-fleur moyen (\u2248 600 g)","Beurre (75 g)","Lait (155 ml)","Sel, poivre et muscade","## Salade","1 grosse romaine","\u00c9pinards (75 g)","1 gros concombre","Vinaigrette dijonnaise (4 c. \u00e0 soupe d'huile, 1 1/4 c. \u00e0 soupe de vinaigre de vin rouge, 1 1/4 c. \u00e0 th\u00e9 de moutarde)","Persil"],"inst":["## La veille (optionnel mais recommand\u00e9)","**Assaisonner le b\u0153uf \u00e0 l'avance am\u00e9liore la profondeur de saveur.** Couper les 1,5 kg de paleron ou jarret d\u00e9soss\u00e9 en cubes de 4 cm, saler et poivrer g\u00e9n\u00e9reusement, remettre au frigo dans un contenant herm\u00e9tique. Sinon, l'assaisonnement se fait juste avant la saisie.","## Avant tout (mise en place \u2014 4 min)","Sortir le b\u0153uf du frigo **1 heure** avant de cuisiner. De la viande \u00e0 temp\u00e9rature ambiante saisit mieux et cuit plus uniform\u00e9ment \u2014 la r\u00e8gle \u00ab pas de viande \u00e0 temp\u00e9rature ambiante \u00bb vaut pour la volaille et le porc, pas pour le b\u0153uf en morceaux qu'on cuira \u00e0 c\u0153ur.","**Pr\u00e9chauffer le four \u00e0 160 \u00b0C (325 \u00b0F).**","Sortir une **cocotte en fonte \u00e9maill\u00e9e** (5-6 L) allant au four, avec couvercle. \u00c9viter les cocottes anti-adh\u00e9sives : la saisie exige une chaleur trop haute pour leur enduit.","## Pr\u00e9parer le b\u0153uf (5 min)","**\u00c9ponger les cubes de b\u0153uf \u00e0 fond avec du papier essuie-tout.** \u00c9tape la plus importante pour une belle saisie : le b\u0153uf humide \u00ab bout \u00bb au lieu de saisir.","Saler g\u00e9n\u00e9reusement de tous les c\u00f4t\u00e9s (~1 c. \u00e0 th\u00e9 de sel au total), poivrer (5-6 tours).","Dans un bol large, mettre 4 c. \u00e0 soupe de farine. Rouler chaque cube dedans, en tapotant pour enlever l'exc\u00e9dent \u2014 une fine pellicule cr\u00e9e une cro\u00fbte \u00e0 la saisie et \u00e9paissit la sauce.","## Saisir le b\u0153uf (15 min \u2014 critique pour la saveur)","Chauffer la cocotte \u00e0 feu vif \u00e0 sec 2 min. Ajouter 2 c. \u00e0 soupe d'huile de canola \u2014 elle doit briller et onduler sans fumer noir.","**Saisir le b\u0153uf en 3-4 petits lots** : juste assez de cubes pour couvrir le fond sans se toucher. Trop de cubes fait tomber la temp\u00e9rature et le b\u0153uf bout au lieu de saisir. Si tu vois de la vapeur monter, tu as trop charg\u00e9.","Chaque lot : ne pas toucher **2-3 minutes** (formation de la cro\u00fbte), puis retourner pour saisir un autre c\u00f4t\u00e9 2 min. Au moins 2 c\u00f4t\u00e9s bien dor\u00e9s par cube. Transf\u00e9rer sur une assiette, faire le lot suivant. Ajouter 1 c. \u00e0 soupe d'huile entre les lots au besoin.","Quand tout est saisi et r\u00e9serv\u00e9, il y aura des sucs fonc\u00e9s coll\u00e9s au fond. **Ne pas gratter ni nettoyer** \u2014 c'est de l'or, on le r\u00e9cup\u00e8re au d\u00e9gla\u00e7age.","## Faire les aromates (7 min)","\u00c9plucher 2 gros oignons jaunes, couper en cubes de 1 cm. \u00c9plucher 5 gousses d'ail, hacher finement.","Baisser \u00e0 feu moyen. Ajouter 1\u00bd c. \u00e0 soupe d'huile, puis les oignons avec une pinc\u00e9e de sel. Cuire **6 minutes** en remuant et en raclant le fond pour d\u00e9coller les sucs. Les oignons deviennent translucides puis l\u00e9g\u00e8rement dor\u00e9s.","Ajouter l'ail et 2\u00bd c. \u00e0 soupe de p\u00e2te de tomate. Cuire **1 minute** en remuant : la p\u00e2te fonce et perd son go\u00fbt cru \u2014 c'est **pincer** la p\u00e2te de tomate.","## D\u00e9glacer \u00e0 la bi\u00e8re (2 min)","Verser 750 ml de bi\u00e8re brune dans la cocotte. **Racler vigoureusement le fond** pour dissoudre les sucs. C'est le **d\u00e9gla\u00e7age**. Amener \u00e0 \u00e9bullition et laisser bouillir **1-2 min** pour cuire l'alcool.","## Monter le brais\u00e9 et enfourner","Ajouter : le b\u0153uf r\u00e9serv\u00e9 avec ses jus, 625 ml de bouillon de b\u0153uf, 2\u00bd c. \u00e0 soupe de sauce Worcestershire, 2\u00bd c. \u00e0 soupe de moutarde \u00e0 l'ancienne, 2 feuilles de laurier, 4-5 branches de thym frais (ou 1 c. \u00e0 soupe s\u00e9ch\u00e9).","Le liquide doit couvrir le b\u0153uf presque compl\u00e8tement. Remuer, porter \u00e0 \u00e9bullition \u00e0 feu vif, puis **couvrir et enfourner sur la grille du bas**. R\u00e9gler une minuterie de **1 h 30**.","## Pendant le braisage : les l\u00e9gumes-racines (15 min de travail)","\u00c9plucher 5 carottes, couper en tron\u00e7ons de 4-5 cm (diagonalement). \u00c9plucher 5 panais de la m\u00eame fa\u00e7on (retirer le c\u0153ur central si tr\u00e8s gros).","**Oignons perl\u00e9s** : verser les 15 oignons dans un bol, couvrir d'eau bouillante 2 min, \u00e9goutter, plonger dans l'eau froide. La peau se retire en coupant le pied et en pin\u00e7ant. (Sinon, 2 oignons moyens en gros quartiers.)","Nettoyer 375 g de champignons cremini (brosser, pas d'eau). Couper les gros en deux ou quatre. **R\u00e9server tous ces l\u00e9gumes** dans des bols s\u00e9par\u00e9s.","## Ajouter les l\u00e9gumes-racines","Quand la minuterie de 1 h 30 sonne, sortir la cocotte avec pr\u00e9caution. Retirer le couvercle en le tournant vers l'ext\u00e9rieur pour \u00e9viter la vapeur.","Ajouter carottes, panais, oignons perl\u00e9s et champignons. Enfouir dans le liquide. Remettre le couvercle et au four. R\u00e9gler **45 minutes**.","## Pendant la seconde phase : pur\u00e9e et salade","Peler 1 kg de pommes de terre Yukon Gold, couper en cubes de 3-4 cm. D\u00e9faire le chou-fleur en bouquets. R\u00e9server ensemble.","Salade : romaine en morceaux de 3-4 cm, 75 g d'\u00e9pinards, 1 gros concombre en rondelles de 5 mm, persil hach\u00e9. Vinaigrette dijonnaise : 4 c. \u00e0 soupe d'huile d'olive, 1\u00bc c. \u00e0 soupe de vinaigre de vin rouge, 1\u00bc c. \u00e0 th\u00e9 de moutarde de Dijon, sel, poivre. R\u00e9server.","## Cuire la pur\u00e9e (25 min)","Environ 25 min avant la fin du brais\u00e9 : mettre pommes de terre + chou-fleur dans une grande casserole, couvrir d'eau froide (d\u00e9passer de 2-3 cm), 1 grosse pinc\u00e9e de sel.","Porter \u00e0 \u00e9bullition (7-8 min), baisser \u00e0 feu moyen, cuire **12-15 min** : la pointe d'un couteau entre sans r\u00e9sistance.","Chauffer 155 ml de lait (chaud sans bouillir). \u00c9goutter \u00e0 fond pommes de terre et chou-fleur, remettre dans la casserole chaude \u00e0 feu doux **1 minute** en remuant pour \u00e9vacuer l'humidit\u00e9.","Ajouter 75 g de beurre, le lait chaud, sel, poivre, une grosse pinc\u00e9e de muscade. **\u00c9craser au presse-pur\u00e9e** (jamais au robot \u2014 \u00e7a rend collant). Go\u00fbter et ajuster.","## V\u00e9rification finale du brais\u00e9","Quand la minuterie sonne, sortir la cocotte. Le b\u0153uf : une fourchette s'y enfonce sans r\u00e9sistance. Carottes et panais : tendres mais tenant leur forme.","**Ajuster le liquide** : la sauce doit napper le dos d'une cuill\u00e8re. Si trop liquide, retirer b\u0153uf et l\u00e9gumes et r\u00e9duire 5-8 min \u00e0 feu vif. Si trop \u00e9paisse, ajouter 125 ml de bouillon chaud. Retirer laurier et branches de thym.","## Assemblage et service","Verser la vinaigrette sur la salade, parsemer de persil.","**Dans chaque assiette** : un nid de pur\u00e9e (\u2155), 2-3 morceaux de b\u0153uf, \u2155 des l\u00e9gumes-racines, une louche de sauce, persil frais. Salade \u00e0 c\u00f4t\u00e9.","**Garder la 5\u1d49 portion.** **Le brais\u00e9 est encore meilleur le lendemain.** Il se cong\u00e8le tr\u00e8s bien (3 mois). La pur\u00e9e aussi (r\u00e9chauffer avec un peu de lait).","## Substitutions et hors saison","- **Paleron ou jarret d\u00e9soss\u00e9** (chuck roast / beef shank) : riches en collag\u00e8ne. Alternatives : palette, haut de c\u00f4tes d\u00e9soss\u00e9es, joue de b\u0153uf. **\u00c0 \u00e9viter** : surlonge, filet, faux-filet, contre-filet \u2014 trop maigres, deviennent secs.","- **Bi\u00e8re brune** : Guinness Draught, Coreff Ambr\u00e9e. \u00c9viter blanches/blondes. **Sans alcool** : 375 ml de bouillon de b\u0153uf + 2 c. \u00e0 soupe de m\u00e9lasse.","- **Sauce Worcestershire** : ou 2\u00bd c. \u00e0 soupe de sauce soya + 1 c. \u00e0 soupe de balsamique + pinc\u00e9e de sucre.","- **Moutarde \u00e0 l'ancienne** : ou moutarde de Dijon r\u00e9guli\u00e8re.","- **Panais** : ou rutabaga en cubes, navets blancs, ou doubler les carottes.","- **Oignons perl\u00e9s** : ou 2 oignons moyens en quartiers, ou 6-8 \u00e9chalotes en deux.","- **Champignons cremini** : ou champignons blancs, ou m\u00e9lange de sauvages.","- **Chou-fleur** (pur\u00e9e) : ou c\u00e9leri-rave, ou 1,3 kg de pommes de terre au total."],"nut":[{"l":"\u00c9nergie","v":"780 kcal"},{"l":"Prot\u00e9ines","v":"52 g"},{"l":"Fibres","v":"10 g"},{"l":"Vitamine D","v":"0,5 \u03bcg"}],"ing_raw":["1,5 kg de paleron ou jarret de b\u0153uf d\u00e9soss\u00e9 en cubes de 4 cm, 4 c. \u00e0 soupe de farine, sel/poivre","3 1/2 c. \u00e0 soupe d'huile de canola, 2 gros oignons, 5 gousses d'ail, 2 1/2 c. \u00e0 soupe de p\u00e2te de tomate","1 grande bouteille (750 ml) ou 2 petites (341 ml \u00d7 2) de bi\u00e8re brune (Bor\u00e9ale Noire, McAuslan)","625 ml de bouillon de b\u0153uf, 2 1/2 c. \u00e0 soupe de Worcestershire, 2 1/2 c. \u00e0 soupe de moutarde \u00e0 l'ancienne, 2 feuilles de laurier, thym frais","5 carottes, 5 panais, 15 oignons perl\u00e9s (ou 2 oignons moyens en quartiers), 375 g de champignons cremini","Pur\u00e9e : 1 kg de Yukon Gold + 1 chou-fleur moyen (\u2248 600 g) + 75 g de beurre + 155 ml de lait + sel/poivre/muscade","Salade : 1 grosse romaine, 75 g d'\u00e9pinards, 1 gros concombre, vinaigrette dijonnaise (4 c. \u00e0 soupe d'huile, 1 1/4 c. \u00e0 soupe de vinaigre de vin rouge, 1 1/4 c. \u00e0 th\u00e9 de moutarde), persil"]},{"d":8,"w":2,"n":"Lun","wd":1,"t":"Bol grec aux sardines en bo\u00eete, riz pilaf safran, salade pois chiches-tomates-f\u00e9ta","tt":"30 min","pt":"15 min","ct":"20 min","ing":["5 bo\u00eetes (\u2248 106 g chacune) de sardines \u00e0 l'huile d'olive \u2014 Wild Planet (sans sel ajout\u00e9, id\u00e9al)","Bela ou Conn\u00e9table","## Pour servir","Huile d'olive suppl\u00e9mentaire (3 1/2 c. \u00e0 soupe)","Quartiers de citron","Origan (1 1/4 c. \u00e0 th\u00e9)","Poivre","## Pilaf","Basmati (375 g)","1 oignon","Huile (2 1/2 c. \u00e0 soupe)","12 brins de safran infus\u00e9s","Bouillon de poulet faible en sodium (875 ml)","Pignons grill\u00e9s (50 g)","Raisins secs dor\u00e9s (40 g)","## Salade","1 1/2 bo\u00eete (540 ml) de pois chiches rinc\u00e9s","3 tomates italiennes","1 gros concombre anglais","1 petit oignon rouge","F\u00e9ta (190 g)","Olives Kalamata (100 g)","Menthe (1/3 tasse)","Persil (1/3 tasse)","## Vinaigrette","Huile d'olive (5 c. \u00e0 soupe)","Jus de citron (2 1/2 c. \u00e0 soupe)","Moutarde (1 1/4 c. \u00e0 th\u00e9)","Origan (1 1/4 c. \u00e0 th\u00e9)","1 gousse d'ail r\u00e2p\u00e9e"],"inst":["## Un mot sur les sardines","| Les sardines en bo\u00eete sont parmi les aliments les plus dens\u00e9ment nutritifs : om\u00e9ga-3 (\u00e9quivalents \u00e0 un pav\u00e9 de saumon), vitamine D (200 % de l'AJR par bo\u00eete), calcium (petits os fondants), s\u00e9l\u00e9nium, B12. **Wild Planet** est la r\u00e9f\u00e9rence, mais Bela et Conn\u00e9table sont excellentes. **Ne pas prendre celles \u00e0 la sauce tomate** \u2014 trop sucr\u00e9es pour cette recette.","## Avant tout (mise en place \u2014 3 min)","Sortir tous les ingr\u00e9dients. **Pas de four ce soir** \u2014 tout se fait au comptoir et \u00e0 la cuisini\u00e8re.","Sortir le Zojirushi et son gobelet mesure de 180 ml, une petite po\u00eale pour le riz, un grand saladier.","## Infuser le safran (10 min \u2014 \u00e0 d\u00e9marrer en premier)","\u00c9craser l\u00e9g\u00e8rement 12 brins de safran entre les doigts (lib\u00e8re plus de couleur et de saveur).","Chauffer 60 ml de bouillon de poulet (chaud, pas bouilli). Verser sur le safran, remuer, **laisser infuser au moins 10 min** (id\u00e9al 15-20). Le liquide devient jaune-orang\u00e9 profond.","## Pr\u00e9parer le pilaf au Zojirushi","Mesurer **2 \u00bd tasses Zojirushi** de basmati (~375 g). **Rincer abondamment** (3-4 fois) jusqu'\u00e0 ce que l'eau reste presque claire \u2014 enl\u00e8ve l'amidon de surface, essentiel pour des grains distincts.","\u00c9mincer 1 oignon jaune en cubes de 5 mm. Dans une petite po\u00eale, chauffer 2 \u00bd c. \u00e0 soupe d'huile d'olive \u00e0 feu moyen. Ajouter l'oignon avec une pinc\u00e9e de sel, cuire **3 minutes** jusqu'\u00e0 translucide.","Ajouter le basmati \u00e9goutt\u00e9 dans la po\u00eale. Remuer **1-2 minutes** \u2014 les grains deviennent translucides sur les bords. C'est **nacrer** le riz : le grain absorbe le gras et garde sa forme. Geste-cl\u00e9 du pilaf.","Transf\u00e9rer le m\u00e9lange oignon-riz dans le bol du Zojirushi. Ajouter l'infusion de safran (liquide + brins). Compl\u00e9ter avec du bouillon jusqu'\u00e0 la ligne **WHITE 2 \u00bd cups** (~815-875 ml de bouillon total).","Placer le bol, s\u00e9lectionner **WHITE (regular)**, appuyer sur START. Cycle ~40-50 min, puis KEEP WARM.","## Pr\u00e9parer la salade grecque (10 min)","**Rincer 1 \u00bd bo\u00eete (540 ml) de pois chiches**, bien \u00e9goutter, mettre dans le saladier.","**Couper 3 tomates italiennes** : en deux, \u00e9p\u00e9piner \u00e0 la cuill\u00e8re (\u00e9vite l'exc\u00e8s d'eau), couper en d\u00e9s de 1,5 cm. Ajouter.","**Pr\u00e9parer 1 gros concombre anglais** : en deux dans la longueur, \u00e9p\u00e9piner, couper en demi-lunes de 1 cm. Ajouter.","**Trancher 1 petit oignon rouge finement** (2-3 mm). Si trop piquant, tremper 5 min \u00e0 l'eau froide puis \u00e9goutter. Ajouter.","**\u00c9mietter 190 g de f\u00e9ta** \u00e0 la main. Pr\u00e9f\u00e9rer la f\u00e9ta grecque en saumure. Ajouter **100 g d'olives Kalamata d\u00e9noyaut\u00e9es**.","Hacher **\u2153 tasse de menthe** et **\u2153 tasse de persil**. R\u00e9server \u00e0 part \u2014 **\u00e0 ajouter au moment de servir** pour garder la fra\u00eecheur.","## Pr\u00e9parer la vinaigrette (2 min)","Fouetter : 5 c. \u00e0 soupe d'huile d'olive, 2 \u00bd c. \u00e0 soupe de jus de citron, 1 \u00bc c. \u00e0 th\u00e9 de moutarde de Dijon, 1 \u00bc c. \u00e0 th\u00e9 d'origan s\u00e9ch\u00e9, 1 gousse d'ail r\u00e2p\u00e9e, 1 grosse pinc\u00e9e de sel, 4-5 tours de poivre. La vinaigrette doit \u00eatre franche en acide, sal\u00e9e, herbac\u00e9e.","## Finaliser le pilaf (2 min)","Quand le Zojirushi sonne (~45 min), **laisser reposer 5 min** couvercle ferm\u00e9 \u2014 les grains se raffermissent.","Ouvrir. Ajouter 50 g de pignons grill\u00e9s et 40 g de raisins secs dor\u00e9s. Refermer 2 min pour ramollir les raisins. Puis incorporer \u00e0 la fourchette en mouvements l\u00e9gers.","Si les pignons ne sont pas grill\u00e9s : dorer 3-4 min \u00e0 sec dans une po\u00eale en remuant constamment. **Surveiller** \u2014 de dor\u00e9s \u00e0 br\u00fbl\u00e9s en 30 secondes.","## Assemblage et service (5 min)","**Ajouter menthe et persil** \u00e0 la salade. Verser la vinaigrette, m\u00e9langer. Go\u00fbter et ajuster.","**Ouvrir les 5 bo\u00eetes de sardines.** Drainer un peu l'huile (en garder \u2014 parfum\u00e9e). Sortir les filets d\u00e9licatement.","**Dans chaque bol** : un lit de pilaf au safran (\u2155), 1 bo\u00eete de sardines (5-6 filets) par-dessus. Filet d'huile fra\u00eeche, pinc\u00e9e d'origan, poivre, quartier de citron \u00e0 presser.","Servir la salade grecque \u00e0 c\u00f4t\u00e9.","**Garder la 5\u1d49 portion.** **Ne pas m\u00e9langer les sardines \u00e0 la salade** \u2014 emballer s\u00e9par\u00e9ment. Le pilaf se conserve 3 jours. La salade 1 jour (l'oignon rouge domine le lendemain).","## Substitutions et hors saison","- **Sardines en bo\u00eete** : Wild Planet (la meilleure), Bela, Conn\u00e9table, King Oscar \u2014 toutes \u00e0 l'huile d'olive. Sinon **maquereau en bo\u00eete** (profil similaire). \u00c9viter le thon (trop sec, sans le calcium des os).","- **Basmati** : ou riz jasmin (cuisson identique), riz long grain ordinaire.","- **Safran** : cher. Alternative budget : \u00bd c. \u00e0 th\u00e9 de curcuma (couleur seulement, go\u00fbt tr\u00e8s diff\u00e9rent), ou omettre.","- **Pignons** : ou amandes effil\u00e9es grill\u00e9es, pistaches non sal\u00e9es hach\u00e9es.","- **Raisins secs dor\u00e9s** : ou canneberges s\u00e9ch\u00e9es, abricots secs hach\u00e9s.","- **F\u00e9ta** : pr\u00e9f\u00e9rer grecque en saumure. Ou f\u00e9ta bulgare (plus cr\u00e9meuse).","- **Olives Kalamata** : d\u00e9noyaut\u00e9es. Ou Amfissa, olives noires de Nice.","- **Tomates italiennes** : meilleures en \u00e9t\u00e9. Si fades, ajouter \u00bd c. \u00e0 th\u00e9 de sucre.","- **Menthe fra\u00eeche** : ou basilic frais (profil diff\u00e9rent, tr\u00e8s bon avec f\u00e9ta et tomates)."],"nut":[{"l":"\u00c9nergie","v":"720 kcal"},{"l":"Prot\u00e9ines","v":"42 g"},{"l":"Fibres","v":"11 g"},{"l":"Om\u00e9ga-3 EPA+DHA","v":"2,5 g"}],"ing_raw":["5 bo\u00eetes (\u2248 106 g chacune) de sardines \u00e0 l'huile d'olive \u2014 Wild Planet (sans sel ajout\u00e9, id\u00e9al), Bela ou Conn\u00e9table","Pour servir : 3 1/2 c. \u00e0 soupe d'huile d'olive suppl\u00e9mentaire, quartiers de citron, 1 1/4 c. \u00e0 th\u00e9 d'origan, poivre","Pilaf : 375 g de basmati, 1 oignon, 2 1/2 c. \u00e0 soupe d'huile, 12 brins de safran infus\u00e9s, 875 ml de bouillon de poulet faible en sodium, 50 g de pignons grill\u00e9s, 40 g de raisins secs dor\u00e9s","Salade : 1 1/2 bo\u00eete (540 ml) de pois chiches rinc\u00e9s, 3 tomates italiennes, 1 gros concombre anglais, 1 petit oignon rouge, 190 g de f\u00e9ta, 100 g d'olives Kalamata, 1/3 tasse de menthe, 1/3 tasse de persil","Vinaigrette : 5 c. \u00e0 soupe d'huile d'olive, 2 1/2 c. \u00e0 soupe de jus de citron, 1 1/4 c. \u00e0 th\u00e9 de moutarde, 1 1/4 c. \u00e0 th\u00e9 d'origan, 1 gousse d'ail r\u00e2p\u00e9e"]},{"d":9,"w":2,"n":"Mar","wd":1,"t":"Frittata aux \u00e9pinards, champignons, poivron et fromage de ch\u00e8vre, salade compos\u00e9e, pain complet","tt":"35 min","pt":"10 min","ct":"25 min","ing":["15 gros \u0153ufs (id\u00e9alement om\u00e9ga-3 enrichis \u2014 Burnbrae Naturoeuf)","Lait (75 ml)","Sel et poivre","##","Beurre (1 1/4 c. \u00e0 soupe)","Huile d'olive (1 1/4 c. \u00e0 soupe)","1 oignon","3 gousses d'ail","##","Champignons cremini tranch\u00e9s (375 g)","1 gros poivron rouge en d\u00e9s","B\u00e9b\u00e9s \u00e9pinards (250 g)","##","Ch\u00e8vre frais \u00e9miett\u00e9 (150 g)","Ciboulette (3 c. \u00e0 soupe)","Muscade","## Salade","1 grosse Boston","2 endives","1 gros avocat","1 grosse poire","Noix de Grenoble (75 g)","Bleu (100 g \u00b7 Bleubec)","Vinaigrette aux noix","##","1 miche de pain complet artisanal"],"inst":["## Un mot sur la po\u00eale","| Cette recette exige une **po\u00eale allant au four** de 30-32 cm : fonte (id\u00e9ale), acier inoxydable \u00e0 poign\u00e9e m\u00e9tallique, ou fonte \u00e9maill\u00e9e. **\u00c0 \u00e9viter** : les anti-adh\u00e9sives (l'enduit se d\u00e9grade \u00e0 haute temp\u00e9rature). Si tu n'as qu'une anti-adh\u00e9sive, transf\u00e9rer le m\u00e9lange dans un plat \u00e0 gratin beurr\u00e9 avant d'enfourner.","## Avant tout (mise en place \u2014 5 min)","**Pr\u00e9chauffer le four \u00e0 190 \u00b0C (375 \u00b0F).** Compter 8-10 min.","Sortir les 15 \u0153ufs pour les temp\u00e9rer \u2014 des \u0153ufs \u00e0 temp\u00e9rature ambiante gonflent mieux.","Sortir la po\u00eale ovenproof et v\u00e9rifier que sa poign\u00e9e va au four.","## Pr\u00e9parer les l\u00e9gumes (5 min)","\u00c9mincer 1 oignon jaune en cubes de 5 mm. \u00c9plucher 3 gousses d'ail, hacher finement.","Nettoyer 375 g de champignons cremini (brosser, **pas d'eau**). Trancher en lamelles de 5 mm.","Couper 1 gros poivron rouge en d\u00e9s de 5 mm. Sortir 250 g de b\u00e9b\u00e9s \u00e9pinards, rincer, essorer l\u00e9g\u00e8rement.","## Cuire les aromates et les l\u00e9gumes (14 min)","Dans la po\u00eale \u00e0 feu moyen, faire fondre 1 \u00bc c. \u00e0 soupe de beurre + 1 \u00bc c. \u00e0 soupe d'huile. Quand le beurre mousse et arr\u00eate de cr\u00e9piter, ajouter l'oignon avec une pinc\u00e9e de sel. Cuire **4 minutes** jusqu'\u00e0 translucide.","Ajouter ail et champignons, monter \u00e0 feu moyen-vif. Cuire **6-7 minutes**. Les champignons rel\u00e2chent leur eau puis dorent. **Ne pas continuer tant que l'eau n'est pas \u00e9vapor\u00e9e** \u2014 sinon la frittata sera tremp\u00e9e.","Ajouter le poivron, cuire **2 minutes** (rester croquant).","Ajouter les \u00e9pinards **par poign\u00e9es successives** (3-4 fois), chaque poign\u00e9e tombant en 30 sec. Total ~2-3 min.","Saler l\u00e9g\u00e8rement, poivrer. **\u00c9taler uniform\u00e9ment** les l\u00e9gumes.","## Pr\u00e9parer l'appareil \u00e0 \u0153ufs (2 min)","Dans un grand bol, casser les 15 \u0153ufs. Ajouter 75 ml de lait, 1 grosse pinc\u00e9e de sel, 5-6 tours de poivre, une bonne pinc\u00e9e de muscade. Battre **juste assez pour homog\u00e9n\u00e9iser** \u2014 pas mousseux (les bulles d\u00e9forment la frittata).","## Cuisson combin\u00e9e (20 min)","**Verser les \u0153ufs dans la po\u00eale** sur les l\u00e9gumes chauds. R\u00e9partir en secouant. **Baisser \u00e0 feu doux-moyen.**","\u00c9mietter 150 g de ch\u00e8vre frais sur la surface. Parsemer 3 c. \u00e0 soupe de ciboulette hach\u00e9e.","**Cuire 2 minutes sans toucher** \u2014 les bords figent. Le centre reste liquide.","**Transf\u00e9rer au four sur la grille du milieu.** R\u00e9gler **16 minutes**.","## Pendant la cuisson : la salade compos\u00e9e (10 min)","Pr\u00e9parer la Boston : feuilles rinc\u00e9es, essor\u00e9es, d\u00e9chir\u00e9es dans un saladier. Ajouter 2 endives en tron\u00e7ons de 1 cm.","Couper 1 gros avocat en cubes (arroser de jus de citron). Couper 1 grosse poire en cubes de 1,5 cm.","Casser 75 g de noix de Grenoble. \u00c9mietter 100 g de bleu Bleubec.","Vinaigrette aux noix : 3 c. \u00e0 soupe d'huile de noix, 1 c. \u00e0 soupe de vinaigre de cidre ou x\u00e9r\u00e8s, 1 c. \u00e0 th\u00e9 de miel, \u00bd c. \u00e0 th\u00e9 de moutarde de Dijon, sel, poivre. Fouetter.","Trancher la miche de pain en tranches de 1,5 cm.","## V\u00e9rification et repos (5 min)","Vers 16 min, secouer l\u00e9g\u00e8rement la po\u00eale : le centre doit **fr\u00e9mir l\u00e9g\u00e8rement** mais ne plus onduler. Sinon +2 min. Test alternatif : un cure-dent au centre ressort avec quelques traces prises, pas de liquide.","Sortir la po\u00eale. **La poign\u00e9e reste br\u00fblante 10 min** \u2014 mettre un gant dessus comme rappel.","**Laisser reposer 3-5 minutes** avant de couper.","## Assemblage et service (3 min)","Ajouter noix, avocat, poire et bleu \u00e0 la Boston-endives. Verser la vinaigrette juste avant de servir.","**Couper la frittata en 5 pointes.** Passer une spatule tout autour, incliner la po\u00eale, elle glisse.","**Dans chaque assiette** : 1 pointe de frittata, salade compos\u00e9e, 1-2 tranches de pain complet.","**Garder la 5\u1d49 portion.** **La frittata est excellente froide ou ti\u00e9die** \u2014 l'une des meilleures recettes pour le lunch. Se conserve 3 jours. La salade mieux fra\u00eeche.","## Substitutions et hors saison","- **\u0152ufs om\u00e9ga-3** : Burnbrae Natur\u0153uf (r\u00e9f\u00e9rence au Qu\u00e9bec, poules nourries au lin). Ou Nutri \u0152uf, Bleu Menu.","- **Champignons cremini** : ou blancs de Paris, shiitakes (retirer tiges), portobellos.","- **Ch\u00e8vre frais** : Woolwich, Chevrai, Ch\u00e8vre des Neiges. Ou f\u00e9ta, ricotta salata, mozzarella fra\u00eeche.","- **Bleu Bleubec** : ou Bleu d'\u00c9lizabeth, Gorgonzola dolce, Roquefort, Stilton. Moins fan du bleu : cheddar fort.","- **Poire** : ou pomme croquante, orange en quartiers, figues fra\u00eeches en saison.","- **Ciboulette** : ou partie verte d'oignon vert tranch\u00e9e fin.","- **Pain complet** : boulangerie locale id\u00e9alement, ou bon pain complet en tranches."],"nut":[{"l":"\u00c9nergie","v":"680 kcal"},{"l":"Prot\u00e9ines","v":"36 g"},{"l":"Fibres","v":"9 g"},{"l":"Vitamine D","v":"5,5 \u03bcg (37 %)"}],"ing_raw":["15 gros \u0153ufs (id\u00e9alement om\u00e9ga-3 enrichis \u2014 Burnbrae Naturoeuf), 75 ml de lait, sel/poivre","1 1/4 c. \u00e0 soupe de beurre, 1 1/4 c. \u00e0 soupe d'huile d'olive, 1 oignon, 3 gousses d'ail","375 g de champignons cremini tranch\u00e9s, 1 gros poivron rouge en d\u00e9s, 250 g de b\u00e9b\u00e9s \u00e9pinards","150 g de ch\u00e8vre frais \u00e9miett\u00e9, 3 c. \u00e0 soupe de ciboulette, muscade","Salade : 1 grosse Boston, 2 endives, 1 gros avocat, 1 grosse poire, 75 g de noix de Grenoble, 100 g de bleu (Bleubec), vinaigrette aux noix","1 miche de pain complet artisanal"]},{"d":10,"w":2,"n":"Mer","wd":1,"t":"Bavette de b\u0153uf marin\u00e9e chimichurri, patates douces grill\u00e9es, kale saut\u00e9 \u00e0 l'ail, betteraves marin\u00e9es","tt":"40 min","pt":"15 min","ct":"25 min","ing":["Bavette ou hampe de b\u0153uf (1 kg)","## Chimichurri","Persil plat (1 1/4 tasse)","Coriandre (2/3 tasse)","5 gousses d'ail","Origan (1 1/4 c. \u00e0 th\u00e9)","Piment (1/2 c. \u00e0 th\u00e9)","Vinaigre de vin rouge (75 ml)","Huile d'olive (150 ml)","Sel et poivre","##","1,1 kg de patates douces (4 grosses) en tranches 1,5 cm","Huile (2 1/2 c. \u00e0 soupe)","Paprika fum\u00e9","Cumin","Sel et poivre","##","Kale Lacinato hach\u00e9 (375 g)","Huile (3 1/2 c. \u00e0 soupe)","5 gousses d'ail","Jus de 1 citron","Flocons de piment","##","5 betteraves cuites sous-vide (\u2248 750 g) en tranches","Vinaigre de cidre (4 c. \u00e0 soupe)","Huile d'olive (1 1/4 c. \u00e0 soupe)","Miel (1 1/4 c. \u00e0 th\u00e9)","Moutarde (1 1/4 c. \u00e0 th\u00e9)"],"inst":["## La veille ou 2-4 h avant (optionnel mais recommand\u00e9)","Si tu as le temps : faire le chimichurri, en r\u00e9server la moiti\u00e9 au frigo, utiliser l'autre pour mariner la bavette dans un sac Ziploc. 2-4 h donne un r\u00e9sultat nettement plus tendre. **Ne pas d\u00e9passer 4-5 h** \u2014 au-del\u00e0, l'acide \u00ab cuit \u00bb la surface et la texture devient farineuse.","## Un mot sur la coupe de b\u0153uf","| **Bavette** (flank steak) : muscle plat aux fibres tr\u00e8s marqu\u00e9es. N\u00e9cessite cuisson courte \u00e0 feu vif et tranchage **contre le grain** en fines lamelles. **Hampe** (skirt steak) : coupe voisine, m\u00eames techniques. Toutes deux \u00e9conomiques mais excellentes si bien cuisin\u00e9es.","## Avant tout (mise en place \u2014 3 min)","Sortir la bavette du frigo **1 heure avant**. Une viande temp\u00e9r\u00e9e saisit mieux et reste tendre.","**Pr\u00e9chauffer le four \u00e0 220 \u00b0C (425 \u00b0F).** Tapisser une grande plaque de papier parchemin pour les patates douces.","## Pr\u00e9parer le chimichurri (10 min)","**R\u00e8gle absolue** : le chimichurri se hache **au couteau \u00e0 la main**, pas au robot (qui r\u00e9duit tout en pur\u00e9e et perd la texture). Prendre son temps.","Hacher finement ~1 grosse tasse de persil plat (feuilles et tiges tendres) et \u2154 tasse de coriandre. Si quelqu'un trouve que la coriandre go\u00fbte le savon, remplacer par plus de persil.","\u00c9plucher 5 gousses d'ail, hacher tr\u00e8s finement. Mettre herbes et ail dans un bol.","Ajouter : 1 c. \u00e0 th\u00e9 bomb\u00e9e d'origan s\u00e9ch\u00e9, \u00bd c. \u00e0 th\u00e9 de piment rouge en flocons, 75 ml de vinaigre de vin rouge, 150 ml d'huile d'olive extra-vierge, 1 grosse pinc\u00e9e de sel, 5-6 tours de poivre.","M\u00e9langer. **Laisser reposer au moins 10 minutes.** Go\u00fbter et rectifier (sel, vinaigre, piment).","**Diviser en deux** : \u00bd pour la marinade (sur viande crue), \u00bd pour servir \u00e0 table (fra\u00eeche).","## Mariner la bavette (30 min minimum)","\u00c9ponger la bavette. Dans un sac Ziploc, mettre la bavette et la moiti\u00e9 du chimichurri (marinade). Masser pour enrober. Laisser mariner **30 minutes** \u00e0 temp\u00e9rature ambiante (ou 2-4 h au frigo).","## Pr\u00e9parer les patates douces (5 min + 25 min cuisson)","Laver 1,1 kg de patates douces (~4 grosses). **Ne pas peler.** Trancher en **rondelles de 1,5 cm** (trop mince : br\u00fble; trop \u00e9pais : cuit pas \u00e0 c\u0153ur).","Sur la plaque, m\u00e9langer avec 2 \u00bd c. \u00e0 soupe d'huile d'olive, 1 c. \u00e0 th\u00e9 de paprika fum\u00e9, 1 c. \u00e0 th\u00e9 de cumin, sel, poivre. Enrober des deux c\u00f4t\u00e9s. **\u00c9taler en une seule couche.**","**Enfourner sur la grille du milieu.** R\u00e9gler **12 minutes** pour la mi-cuisson.","## Pr\u00e9parer les betteraves marin\u00e9es (5 min)","Les **betteraves cuites sous-vide** (Love Beets, Compliments) sont un raccourci formidable. 750 g = ~5 betteraves. Trancher en rondelles de 5 mm ou quartiers. **Attention aux taches.**","M\u00e9langer : 4 c. \u00e0 soupe de vinaigre de cidre, 1 \u00bc c. \u00e0 soupe d'huile d'olive, 1 c. \u00e0 th\u00e9 de miel, 1 c. \u00e0 th\u00e9 de moutarde de Dijon, sel, poivre. Verser sur les betteraves. **Laisser mariner 15 minutes minimum.**","## Retourner les patates douces","Quand la minuterie sonne (12 min), retourner chaque rondelle (belle face dor\u00e9e). Remettre pour **13 minutes**.","## Pr\u00e9parer le kale (5 min prep + 5 min cuisson)","**Kale Lacinato** (kale noir/de Toscane) : plus tendre et moins amer que le fris\u00e9. Retirer les c\u00f4tes centrales, empiler, rouler en cigare, trancher en lani\u00e8res de 1,5-2 cm. 375 g pr\u00e9par\u00e9. Rincer et essorer.","\u00c9plucher 5 gousses d'ail, \u00e9mincer. **Ne pas cuire tout de suite** \u2014 on lance le kale pendant que la bavette repose.","## Cuire la bavette (10 min avec repos)","Surface de cuisson : po\u00eale en fonte (id\u00e9ale), acier inox \u00e9pais, ou BBQ. **\u00c0 \u00e9viter** : anti-adh\u00e9sive, po\u00eale mince.","Sortir la bavette de la marinade et **essuyer l'exc\u00e9dent** (les herbes br\u00fbleraient). Saler tr\u00e8s l\u00e9g\u00e8rement.","**Chauffer la po\u00eale \u00e0 feu vif \u00e0 sec 3 minutes** (une goutte d'eau s'\u00e9vapore en 1-2 sec). Ajouter 1 c. \u00e0 soupe d'huile de canola \u2014 elle doit ondoyer et fumer l\u00e9g\u00e8rement.","**D\u00e9poser la bavette sans la bouger.** Cuire **3-4 minutes** sans y toucher (cro\u00fbte). Elle se d\u00e9colle facilement quand pr\u00eate.","Retourner. Cuire **3-4 minutes** pour **saignant \u00e0 mi-saignant** (52-56 \u00b0C \u00e0 c\u0153ur).","**Transf\u00e9rer sur une planche, couvrir sans serrer d'alu. Laisser reposer 5-7 minutes.** Non n\u00e9gociable \u2014 sinon les jus s'\u00e9coulent.","## Cuire le kale (5 min \u2014 pendant que la bavette repose)","Dans la po\u00eale qui vient de servir (chaude et parfum\u00e9e), ajouter 3 \u00bd c. \u00e0 soupe d'huile d'olive, baisser \u00e0 feu moyen. Ajouter l'ail, remuer 30 sec (ne pas brunir).","Ajouter le kale avec une pinc\u00e9e de sel. **Sauter 4-5 minutes** \u2014 il tombe de 60 % et reste vert vif et tendre-croquant. Si le fond s\u00e8che, ajouter 2 c. \u00e0 soupe d'eau.","Hors du feu, presser le jus de 1 citron, ajouter des flocons de piment. Remuer.","## Trancher la bavette (2 min \u2014 critique)","**Identifier le sens du grain** (fibres parall\u00e8les). **Trancher perpendiculairement**, en fines lamelles de 5-7 mm, couteau inclin\u00e9 \u00e0 45\u00b0. R\u00e9cup\u00e9rer les jus de la planche.","## Assemblage et service (2 min)","Sortir les patates douces : caram\u00e9lis\u00e9es \u00e0 l'ext\u00e9rieur, tendres \u00e0 c\u0153ur.","**Dans chaque assiette** : quelques tranches de bavette, patates douces, kale saut\u00e9, rondelles de betteraves marin\u00e9es. **Chimichurri frais \u00e0 part**, \u00e0 volont\u00e9.","**Garder la 5\u1d49 portion.** La bavette 3 jours (bonne froide en salade/sandwich). Kale et patates r\u00e9chauffent bien. Betteraves meilleures apr\u00e8s une nuit. **Emballer le chimichurri \u00e0 part.**","## Substitutions et hors saison","- **Bavette** : ou hampe (skirt steak), flanchet, onglet (hanger). **\u00c0 \u00e9viter** : filet, faux-filet, surlonge.","- **Coriandre** : sensibilit\u00e9 g\u00e9n\u00e9tique = doubler le persil (version argentine puriste).","- **Kale Lacinato** : ou kale fris\u00e9 (cuire 6-7 min), bettes \u00e0 carde, \u00e9pinards (1-2 min).","- **Betteraves sous-vide** : ou betteraves fra\u00eeches r\u00f4ties 45-60 min \u00e0 200 \u00b0C, ou betteraves marin\u00e9es en bocal.","- **Patates douces** : ou courge butternut en d\u00e9s.","- **Paprika fum\u00e9** : La Chinata. Ou paprika doux + pinc\u00e9e de cumin.","## Sur les niveaux de cuisson du b\u0153uf","| Pour la bavette, **saignant \u00e0 mi-saignant** est fortement recommand\u00e9. Saignant 52-54 \u00b0C, **mi-saignant 55-57 \u00b0C (la cible)**, m\u00e9dium 60-62 \u00b0C, bien cuit 68+ \u00b0C (d\u00e9conseill\u00e9). Un thermom\u00e8tre digital est le meilleur investissement en cuisine."],"nut":[{"l":"\u00c9nergie","v":"720 kcal"},{"l":"Prot\u00e9ines","v":"52 g"},{"l":"Fibres","v":"11 g"},{"l":"Vitamine D","v":"0,3 \u03bcg"}],"ing_raw":["1 kg de bavette ou hampe de b\u0153uf","Chimichurri : 1 1/4 tasse de persil plat, 2/3 tasse de coriandre, 5 gousses d'ail, 1 1/4 c. \u00e0 th\u00e9 d'origan, 1/2 c. \u00e0 th\u00e9 de piment, 75 ml de vinaigre de vin rouge, 150 ml d'huile d'olive, sel/poivre","1,1 kg de patates douces (4 grosses) en tranches 1,5 cm, 2 1/2 c. \u00e0 soupe d'huile, paprika fum\u00e9, cumin, sel/poivre","375 g de kale Lacinato hach\u00e9, 3 1/2 c. \u00e0 soupe d'huile, 5 gousses d'ail, jus de 1 citron, flocons de piment","5 betteraves cuites sous-vide (\u2248 750 g) en tranches, 4 c. \u00e0 soupe de vinaigre de cidre, 1 1/4 c. \u00e0 soupe d'huile d'olive, 1 1/4 c. \u00e0 th\u00e9 de miel, 1 1/4 c. \u00e0 th\u00e9 de moutarde"]},{"d":11,"w":2,"n":"Jeu","wd":1,"t":"P\u00e2tes int\u00e9grales au saumon fum\u00e9 all\u00e9g\u00e9, sauce yogourt-aneth-citron, asperges et petits pois, salade roquette","tt":"25 min","pt":"10 min","ct":"15 min","ing":["P\u00e2tes int\u00e9grales (560 g \u00b7 Catelli int\u00e9grale, Barilla bl\u00e9 entier; format Costco \u00e9conomique)","##","Saumon fum\u00e9 sauvage (250 g) \u2014 Mer & Monde","ou Norfin","## Sauce","Yogourt grec 2 % (375 g)","Fromage \u00e0 la cr\u00e8me l\u00e9ger (60 g)","Zeste de 2 citrons + jus de 1 1/2","Aneth (5 c. \u00e0 soupe)","Ciboulette (3 c. \u00e0 soupe)","1 gousse d'ail r\u00e2p\u00e9e","C\u00e2pres (1 1/2 c. \u00e0 soupe)","Poivre","##","1 grosse botte d'asperges (500 g) en tron\u00e7ons de 3 cm","Petits pois surgel\u00e9s (250 g \u00b7 Costco grand format)","## Salade","Roquette (190 g)","Tomates cerises (310 g)","Pistaches non sal\u00e9es (75 g)","Parmesan en copeaux (75 g)","Vinaigrette balsamique blanc \u2014 PAS de sel ajout\u00e9"],"inst":["## Un mot sur cette recette","| La sauce ne cuit **jamais**. Le yogourt et le saumon fum\u00e9 sont incorpor\u00e9s hors du feu, \u00e0 chaud r\u00e9siduel. La chaleur des p\u00e2tes fra\u00eechement \u00e9goutt\u00e9es suffit \u00e0 marier les saveurs sans faire cailler le yogourt ni \u00ab cuire \u00bb le saumon. C'est une technique de type carbonara.","## Point crucial : le sel de l'eau des p\u00e2tes","**Ne pas saler l'eau des p\u00e2tes normalement.** Le saumon fum\u00e9 et les c\u00e2pres apportent d\u00e9j\u00e0 beaucoup de sel. **Cible : ~1 c. \u00e0 th\u00e9 de sel pour 2 L d'eau** \u2014 un salage normal rendrait le plat immangeable.","## Avant tout (mise en place \u2014 3 min)","Sortir tous les ingr\u00e9dients. Sortir le saumon fum\u00e9 pour qu'il temp\u00e8re (10 min).","Remplir une grande casserole (5-6 L) d'eau, couvrir, feu vif. Compter 4-5 L d'eau pour 560 g de p\u00e2tes.","Sortir une passoire et un grand saladier pour recevoir les p\u00e2tes.","## Pr\u00e9parer la sauce (5 min)","Dans un bol moyen, mettre 375 g de yogourt grec 2 %. Ajouter 60 g de fromage \u00e0 la cr\u00e8me l\u00e9ger \u00e0 temp\u00e9rature ambiante (sinon il ne se m\u00e9lange pas).","Ajouter le zeste de 2 citrons et le jus de 1 \u00bd citron.","Hacher finement 5 c. \u00e0 soupe d'aneth frais et 3 c. \u00e0 soupe de ciboulette. Ajouter.","R\u00e2per finement 1 gousse d'ail dans le bol. Ajouter 1 \u00bd c. \u00e0 soupe de c\u00e2pres \u00e9goutt\u00e9es (rincer si tr\u00e8s saumur\u00e9es).","Poivrer g\u00e9n\u00e9reusement. **Ne pas ajouter de sel.** Fouetter jusqu'\u00e0 homog\u00e8ne et l\u00e9g\u00e8rement mousseux. **Go\u00fbter** : franche en acide, sal\u00e9e, herbac\u00e9e.","## Pr\u00e9parer les l\u00e9gumes (3 min)","Rincer les asperges, **casser les bases ligneuses** en pliant. Trancher en tron\u00e7ons de 3 cm.","Sortir 250 g de petits pois surgel\u00e9s \u2014 **ne pas d\u00e9congeler**.","## Pr\u00e9parer la salade (5 min)","Rincer 190 g de roquette, essorer, dans un saladier. Couper 310 g de tomates cerises en deux.","Casser 75 g de pistaches non sal\u00e9es. R\u00e9server \u00e0 part (\u00e0 ajouter au dernier moment).","Faire 75 g de copeaux de parmesan \u00e0 l'\u00e9conome. R\u00e9server.","Vinaigrette : 3 c. \u00e0 soupe d'huile d'olive, 1 c. \u00e0 soupe de vinaigre balsamique blanc, \u00bd c. \u00e0 th\u00e9 de moutarde de Dijon, 1 pinc\u00e9e de sel tr\u00e8s l\u00e9g\u00e8re, poivre. Fouetter.","## Pr\u00e9parer le saumon fum\u00e9 (2 min)","**Trancher le saumon fum\u00e9 en lani\u00e8res de 2 cm** (ou d\u00e9chirer \u00e0 la main). R\u00e9server.","## Cuire les p\u00e2tes (12-14 min)","Quand l'eau bout, ajouter **1 c. \u00e0 th\u00e9 de sel pour 2 L d'eau** (~2-2 \u00bd c. \u00e0 th\u00e9). R\u00e9sister au r\u00e9flexe de saler comme d'habitude.","Ajouter 560 g de p\u00e2tes int\u00e9grales, remuer imm\u00e9diatement. Cuire **al dente** \u2014 v\u00e9rifier 1 min avant la fin indiqu\u00e9e (les int\u00e9grales passent d'al dente \u00e0 trop cuites en 60 sec).","## Ajouter les l\u00e9gumes (3 derni\u00e8res minutes)","**3 minutes avant la fin**, ajouter asperges et petits pois surgel\u00e9s dans l'eau avec les p\u00e2tes. Ils blanchissent en 2-3 min.","## \u00c9goutter et assembler (3 min \u2014 critique)","**Avant d'\u00e9goutter, pr\u00e9lever 250 ml d'eau de cuisson** (laiteuse, charg\u00e9e d'amidon \u2014 onctuosit\u00e9).","\u00c9goutter le tout. **Ne pas rincer.** Transf\u00e9rer dans le grand saladier.","**Verser toute la sauce sur les p\u00e2tes chaudes.** Ajouter ~150 ml d'eau de cuisson. M\u00e9langer vigoureusement \u2014 cr\u00e9meux mais pas soupe.","**Incorporer le saumon fum\u00e9** en le r\u00e9partissant. M\u00e9langer d\u00e9licatement.","**Go\u00fbter** : la salinit\u00e9 est presque toujours parfaite gr\u00e2ce aux c\u00e2pres et au saumon. Poivre, zeste suppl\u00e9mentaire si souhait\u00e9.","## Finaliser et servir (2 min)","Ajouter pistaches et copeaux de parmesan \u00e0 la salade. Verser la vinaigrette juste avant de servir.","**Dans chaque bol** : une bonne portion de p\u00e2tes (\u2155), garnir d'aneth ou ciboulette. Salade \u00e0 c\u00f4t\u00e9.","**Servir imm\u00e9diatement** \u2014 les p\u00e2tes int\u00e9grales absorbent la sauce en refroidissant. Ne pas pr\u00e9parer \u00e0 l'avance.","**La 5\u1d49 portion** sera moins parfaite mais bonne. R\u00e9chauffer 90 sec, arroser d'huile et d'un peu d'eau ou lait. Manger ti\u00e8de.","## Substitutions et hors saison","- **P\u00e2tes int\u00e9grales** : Catelli, Barilla bl\u00e9 entier, format Costco. Ou multigrains, ou blanches r\u00e9guli\u00e8res.","- **Saumon fum\u00e9 sauvage** : Mer & Monde, Norfin. Ou saumon d'\u00e9levage, ou truite arc-en-ciel fum\u00e9e (souvent moins ch\u00e8re).","- **Yogourt grec 2 %** : Fage, Oikos, Libert\u00e9. Ou Skyr, ou labneh.","- **Fromage \u00e0 la cr\u00e8me l\u00e9ger** : Philadelphia l\u00e9ger. Ou ricotta.","- **Aneth frais** : ou 1 \u00bd c. \u00e0 soupe s\u00e9ch\u00e9, ou estragon frais.","- **C\u00e2pres** : au vinaigre (plus douces) ou au sel (rincer).","- **Vinaigre balsamique blanc** : ou balsamique noir, ou x\u00e9r\u00e8s blanc.","- **Asperges** : en saison mai-juin au Qu\u00e9bec. Hors saison : haricots verts (blanchir 4-5 min), brocolinis, brocoli.","- **Petits pois surgel\u00e9s** : ou edamame \u00e9coss\u00e9s surgel\u00e9s.","- **Pistaches non sal\u00e9es** : ou pignons, amandes effil\u00e9es grill\u00e9es.","- **Roquette** : ou mesclun, jeunes \u00e9pinards, cresson.","- **Parmesan** : Parmigiano Reggiano DOP. Ou Grana Padano, Pecorino Romano."],"nut":[{"l":"\u00c9nergie","v":"650 kcal"},{"l":"Prot\u00e9ines","v":"38 g"},{"l":"Fibres","v":"12 g"},{"l":"Om\u00e9ga-3 EPA+DHA","v":"0,9 g"}],"ing_raw":["560 g de p\u00e2tes int\u00e9grales (Catelli int\u00e9grale, Barilla bl\u00e9 entier; format Costco \u00e9conomique)","250 g de saumon fum\u00e9 sauvage \u2014 Mer & Monde ou Norfin","Sauce : 375 g de yogourt grec 2 %, 60 g de fromage \u00e0 la cr\u00e8me l\u00e9ger, zeste de 2 citrons + jus de 1 1/2, 5 c. \u00e0 soupe d'aneth, 3 c. \u00e0 soupe de ciboulette, 1 gousse d'ail r\u00e2p\u00e9e, 1 1/2 c. \u00e0 soupe de c\u00e2pres, poivre","1 grosse botte d'asperges (500 g) en tron\u00e7ons de 3 cm, 250 g de petits pois surgel\u00e9s (Costco grand format)","Salade : 190 g de roquette, 310 g de tomates cerises, 75 g de pistaches non sal\u00e9es, 75 g de parmesan en copeaux, vinaigrette balsamique blanc \u2014 PAS de sel ajout\u00e9"]},{"d":12,"w":2,"n":"Ven","wd":1,"t":"Filet de porc \u00e9rable-moutarde, pur\u00e9e de courge musqu\u00e9e, kale au bacon, pommes r\u00f4ties","tt":"35 min","pt":"10 min","ct":"25 min","ing":["2 filets de porc (\u2248 500 g chacun, 1 kg total) \u2014 Olymel ou du Breton du Qu\u00e9bec","## Sauce","Sirop d'\u00e9rable (3 c. \u00e0 soupe)","Moutarde \u00e0 l'ancienne (2 c. \u00e0 soupe)","Moutarde de Dijon (1 c. \u00e0 soupe)","Huile d'olive (1 c. \u00e0 soupe)","2 gousses d'ail","Thym s\u00e9ch\u00e9 (1 c. \u00e0 th\u00e9)","Sel et poivre","##","1 grosse courge musqu\u00e9e (\u2248 1,5 kg, \u2248 900 g de chair) en cubes","Beurre (2 c. \u00e0 soupe)","Jus et zeste de 1 orange","Sel, poivre et muscade","##","Kale (300 g)","5 tranches de bacon (\u2248 150 g) en lardons","3 gousses d'ail","Jus de 1/2 citron","Sel et poivre","##","3 pommes fermes (Cortland, Empire ou Honeycrisp) en quartiers","Sirop d'\u00e9rable (1 c. \u00e0 soupe)","Cannelle (1/2 c. \u00e0 th\u00e9)","Pinc\u00e9e de sel","##","Huile de canola pour la saisie (1 1/2 c. \u00e0 soupe)"],"inst":["## Un mot sur cette recette","| Le filet de porc est l'une des viandes les plus maigres et rapides. Saisir \u00e0 la po\u00eale puis terminer au four donne une viande juteuse \u00e0 c\u0153ur avec une cro\u00fbte caram\u00e9lis\u00e9e. La courge musqu\u00e9e r\u00f4tie et \u00e9cras\u00e9e avec du jus d'orange devient velout\u00e9e sans cr\u00e8me. Le bacon rend le kale accessible. Les pommes r\u00f4ties apportent une touche acidul\u00e9e qui \u00e9quilibre.","## Avant tout (mise en place \u2014 4 min)","Sortir le filet de porc du frigo **30 minutes avant** pour qu'il temp\u00e8re.","**Pr\u00e9chauffer le four \u00e0 200 \u00b0C (400 \u00b0F).**","Tapisser une plaque de parchemin pour la courge, sortir une po\u00eale en fonte allant au four pour le porc.","## Pr\u00e9parer et r\u00f4tir la courge musqu\u00e9e (~35 min)","**Pr\u00e9parer 1 grosse courge musqu\u00e9e** (~1,5 kg enti\u00e8re, ~900 g de chair). Couper les extr\u00e9mit\u00e9s, peler avec un \u00e9conome robuste, s\u00e9parer col et bulbe, retirer les graines du bulbe.","Couper la chair en **cubes de 3 cm**. Sur la plaque, m\u00e9langer avec 2 c. \u00e0 soupe d'huile d'olive, sel, poivre, une bonne pinc\u00e9e de muscade. \u00c9taler en une seule couche.","**Enfourner sur la grille du bas.** R\u00e9gler **30 minutes**, retourner \u00e0 mi-cuisson (15 min).","## Pr\u00e9parer le filet de porc (5 min)","**Sortir les 2 filets** (~500 g chacun). \u00c9ponger avec du papier essuie-tout.","**Parer les filets** si n\u00e9cessaire : retirer la membrane argent\u00e9e (silverskin) \u2014 glisser la pointe d'un couteau dessous et tirer en coupant. Elle ne fond pas et devient caoutchouteuse.","Saler g\u00e9n\u00e9reusement (~1 c. \u00e0 th\u00e9 total), poivrer.","**Sauce \u00e9rable-moutarde** : fouetter 3 c. \u00e0 soupe de sirop d'\u00e9rable, 2 c. \u00e0 soupe de moutarde \u00e0 l'ancienne, 1 c. \u00e0 soupe de moutarde de Dijon, 1 c. \u00e0 soupe d'huile d'olive, 2 gousses d'ail r\u00e2p\u00e9es, 1 c. \u00e0 th\u00e9 de thym s\u00e9ch\u00e9, sel, poivre. R\u00e9server.","## Saisir le filet de porc (5 min)","Chauffer la po\u00eale en fonte allant au four \u00e0 feu vif \u00e0 sec 2 min. Ajouter 1 \u00bd c. \u00e0 soupe d'huile de canola \u2014 elle doit briller et fumer l\u00e9g\u00e8rement.","D\u00e9poser les filets. **Ne pas bouger 2 minutes** (cro\u00fbte dor\u00e9e). Retourner au quart de tour, saisir 2 min, r\u00e9p\u00e9ter pour couvrir 3-4 faces (le filet \u00e9tant cylindrique).","Couper le feu. **Badigeonner chaque filet** avec la moiti\u00e9 de la sauce (garder l'autre moiti\u00e9).","## Enfourner le porc (15-18 min)","**Transf\u00e9rer la po\u00eale au four** sur la grille du milieu. **Attention \u00e0 la poign\u00e9e br\u00fblante.**","R\u00e9gler **8 minutes**, sortir, badigeonner avec le reste de la sauce, remettre pour **7-10 minutes**.","**Cible : 63 \u00b0C \u00e0 c\u0153ur** \u2014 la nouvelle recommandation sant\u00e9 du porc, chair l\u00e9g\u00e8rement ros\u00e9e, tendre et juteuse (71 \u00b0C donnait une viande s\u00e8che). Sans thermom\u00e8tre : les jus s'\u00e9coulent \u00e0 peine ros\u00e9s, pas rouges vifs.","## Pr\u00e9parer les quartiers de pommes r\u00f4ties","**Couper 3 pommes fermes** (Cortland, Empire ou Honeycrisp) en quartiers, retirer le c\u0153ur, garder la peau. M\u00e9langer avec 1 c. \u00e0 soupe de sirop d'\u00e9rable, \u00bd c. \u00e0 th\u00e9 de cannelle, une pinc\u00e9e de sel.","**Aux 10 min restantes du porc**, disposer les pommes autour du filet dans la po\u00eale \u2014 elles se caram\u00e9lisent dans le jus de porc.","## Pr\u00e9parer le kale au bacon (10 min)","**Trancher 5 tranches de bacon** (~150 g) en lardons de 1 cm.","Chauffer une grande po\u00eale \u00e0 feu moyen. Cuire les lardons **\u00e0 sec** (le bacon rend son gras) **5-6 min** jusqu'\u00e0 croustillants. Retirer avec une \u00e9cumoire, **garder le gras dans la po\u00eale**.","**Pr\u00e9parer 300 g de kale** : retirer les c\u00f4tes, hacher en lani\u00e8res de 2 cm. Rincer et essorer.","\u00c9plucher 3 gousses d'ail, \u00e9mincer. Dans le gras de bacon chaud, ajouter l'ail, cuire **30 sec** sans brunir.","Ajouter le kale par poign\u00e9es, saler l\u00e9g\u00e8rement. Sauter **4-5 min** \u00e0 feu moyen-vif \u2014 vert vif, r\u00e9duit de moiti\u00e9. Si le fond s\u00e8che, ajouter 2 c. \u00e0 soupe d'eau.","**Remettre les lardons**, m\u00e9langer 30 sec. Presser le jus d'un \u00bd citron. R\u00e9server couvert.","## Sortir la courge et faire la pur\u00e9e (5 min)","Quand la courge est cuite (30 min) \u2014 tendre \u00e0 c\u0153ur, caram\u00e9lis\u00e9e aux bords \u2014 **transf\u00e9rer les cubes chauds dans un bol.**","Ajouter 2 c. \u00e0 soupe de beurre, le jus de 1 orange + son zeste, une bonne pinc\u00e9e de muscade, sel et poivre.","**\u00c9craser au presse-pur\u00e9e ou \u00e0 la fourchette** \u2014 pas au robot (collant). Go\u00fbter, ajouter 1 c. \u00e0 th\u00e9 de sirop d'\u00e9rable si la courge \u00e9tait moins sucr\u00e9e.","## Sortir le porc, laisser reposer (7 min)","Quand le porc atteint 63 \u00b0C, transf\u00e9rer sur une planche, **couvrir sans serrer d'alu, laisser reposer 5-7 minutes.** Non n\u00e9gociable. Les pommes restent dans la po\u00eale avec le jus.","## Assemblage et service (3 min)","**Trancher les filets en m\u00e9daillons de 1,5 cm** \u2014 cro\u00fbte dor\u00e9e, chair l\u00e9g\u00e8rement ros\u00e9e. R\u00e9cup\u00e9rer les jus.","**Dans chaque assiette** : pur\u00e9e de courge (\u2155), 4-5 m\u00e9daillons de porc, kale au bacon, quartiers de pommes r\u00f4ties. Napper du jus.","**Garder la 5\u1d49 portion.** Le porc 3 jours (r\u00e9chauffe bien). La pur\u00e9e 3 jours (cong\u00e8le). Kale au bacon perd un peu de croquant. Pommes meilleures fra\u00eeches.","## Substitutions et hors saison","- **Filet de porc** : Costco format double. Ou c\u00f4telettes d\u00e9soss\u00e9es \u00e9paisses (cuisson ~12 min \u00e0 couvert), ou poitrine de poulet (74 \u00b0C interne).","- **Sirop d'\u00e9rable** : ou miel liquide.","- **Moutarde \u00e0 l'ancienne** : ou moutarde de Dijon.","- **Courge musqu\u00e9e** (butternut) : ou courge poivr\u00e9e, kabocha, ou ~1 kg de patates douces (cuisson ~25 min).","- **Kale** : fris\u00e9 ou Lacinato. Ou bettes \u00e0 carde, \u00e9pinards (2 min).","- **Bacon** : ou pancetta. Sans porc : lardons de dinde fum\u00e9e, ou huile d'olive + pinc\u00e9e de piment fum\u00e9.","- **Pommes fermes** : Cortland, Empire, Honeycrisp, Gala. **\u00c0 \u00e9viter** : McIntosh, Red Delicious (trop farineuses).","- **Orange** : ou jus de pomme, ou vinaigre de cidre dilu\u00e9.","## Sur le repos et la cuisson du porc","| Depuis 2011, Sant\u00e9 Canada recommande **63 \u00b0C** pour le porc entier (versus 71 \u00b0C historiquement). \u00c0 63 \u00b0C : tendre, juteux, l\u00e9g\u00e8rement ros\u00e9. Cette recommandation vaut pour les morceaux entiers, **pas le porc hach\u00e9** (toujours 71 \u00b0C)."],"nut":[{"l":"\u00c9nergie","v":"620 kcal"},{"l":"Prot\u00e9ines","v":"48 g"},{"l":"Fibres","v":"9 g"},{"l":"Fer","v":"3,5 mg"}],"ing_raw":["2 filets de porc (\u2248 500 g chacun, 1 kg total) \u2014 Olymel ou du Breton du Q
