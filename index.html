// =================== UTILITIES ===================
function $(sel, root = document) { return root.querySelector(sel); }
function el(tag, attrs = {}, ...children) {
  const node = document.createElement(tag);
  Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'class') node.className = v;
    else if (k === 'html') node.innerHTML = v;
    else if (k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2).toLowerCase(), v);
    else if (v === true) node.setAttribute(k, '');
    else if (v != null && v !== false) node.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c == null || c === false) return;
    if (typeof c === 'string' || typeof c === 'number') node.appendChild(document.createTextNode(c));
    else node.appendChild(c);
  });
  return node;
}

// =================== GLOSSAIRE ===================
// Normalisation (minuscules + sans accents) pour une recherche tolérante.
function glossNorm(s) {
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}
// Index : forme normalisée -> clé canonique du GLOSSARY.
// On indexe aussi quelques variantes fléchies fréquentes (verbes) pour attraper
// « nacrer/nacré », « saisir/saisi », etc. dans le texte des recettes.
// Formes supplémentaires (conjugaisons/variantes) explicitement choisies, pour
// éviter les faux positifs d'une conjugaison automatique (ex. « pincée » de sel
// ne doit PAS pointer vers « Pincer »). On ne relie que des formes non ambiguës.
const GLOSS_VARIANTS = {
  'Nacrer': ['nacré', 'nacrés', 'nacrant'],
  'Fleurir': ['fleurir', 'fleurissent'],
  'Mijoter': ['mijoter', 'mijote', 'mijotent', 'mijotage', 'mijotée', 'mijoté'],
  'Frémir': ['frémir', 'frémit', 'frémissement', 'frémissant'],
  'Blanchir': ['blanchir', 'blanchit', 'blanchissent', 'blanchiment', 'blanchies', 'blanchis'],
  'Déglacer': ['déglacer', 'déglace', 'déglaçage', 'déglacé'],
  'Braiser': ['braiser', 'braisé', 'braisée', 'braisés', 'braisage'],
  'Saisir': ['saisir', 'saisie', 'saisir la', 'saisis'],
  'Sauter': ['sauté', 'sautés', 'sautée', 'sautées', 'sautant'],
  'Pocher': ['pocher', 'poche', 'poché', 'pochés', 'pochée'],
  'Écaler': ['écaler', 'écale', 'écalés'],
  'Dégorger': ['dégorger', 'dégorge', 'dégorgé'],
  'Zester': ['zester', 'zeste', 'zesté'],
  'Émulsion': ['émulsion', 'émulsionner'],
  'Chiffonnade': ['chiffonnade'],
  'Suer': ['suer', 'suée'],
};
const GLOSS_INDEX = (() => {
  const idx = {};
  const add = (form, key) => { const n = glossNorm(form); if (n && !idx[n]) idx[n] = key; };
  Object.keys(GLOSSARY).forEach(key => {
    add(key.replace(/\s*\(.*\)$/, ''), key); // le terme canonique (sans suffixe entre parenthèses)
  });
  Object.entries(GLOSS_VARIANTS).forEach(([key, forms]) => {
    if (GLOSSARY[key]) forms.forEach(f => add(f, key));
  });
  return idx;
})();
// Liste des formes à détecter, triées par longueur décroissante (les plus longues d'abord).
const GLOSS_FORMS = Object.keys(GLOSS_INDEX).sort((a, b) => b.length - a.length);

// Ajoute du texte à un parent en transformant les termes de glossaire reconnus
// en éléments cliquables. Ne modifie jamais le texte affiché, seulement son habillage.
function appendGlossy(parent, text) {
  if (!text) return;
  // Construire un motif : \b(forme1|forme2|...)\b sur le texte normalisé.
  // On travaille sur le texte normalisé pour localiser, puis on découpe le texte original.
  const norm = glossNorm(text);
  const pattern = new RegExp('\\b(' + GLOSS_FORMS.map(f => f.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|') + ')\\b', 'g');
  let last = 0, m;
  const seen = new Set(); // ne lier qu'une fois par occurrence de terme dans un même segment
  while ((m = pattern.exec(norm)) !== null) {
    const key = GLOSS_INDEX[m[1]];
    if (!key || seen.has(key)) { continue; }
    seen.add(key);
    const start = m.index, end = start + m[0].length;
    if (start > last) parent.appendChild(document.createTextNode(text.slice(last, start)));
    const label = text.slice(start, end); // conserve la casse et les accents d'origine
    parent.appendChild(el('span', {
      class: 'gloss-term',
      role: 'button',
      tabindex: '0',
      onclick: (e) => { e.stopPropagation(); openGlossary(key); },
    }, label));
    last = end;
  }
  if (last < text.length) parent.appendChild(document.createTextNode(text.slice(last)));
}

// Ouvre la fiche d'un terme (ou la liste complète si aucun terme n'est fourni).
function openGlossary(term) {
  setModal({ type: 'glossary', term: term || null });
}

// Résumé des « J'aime » d'une recette : nombre de pouces en haut / en bas,
// et si la recette est « aimée » (majorité de pouces en l'air parmi les votes).
function likeSummary(r) {
  const m = STATE.meta[r.id];
  const likes = (m && m.likes) || {};
  let ups = 0, downs = 0;
  Object.values(likes).forEach(v => { if (v === true) ups++; else if (v === false) downs++; });
  return { ups, downs, liked: ups > downs && ups > 0 };
}

function recipeType(r) {
  const t = r.title.toLowerCase();
  if (/saumon|truite|sardine|maquereau|morue|cabillaud|thon|crevette|pétoncle/.test(t)) return 'poisson';
  if (/tofu|bouddha/.test(t)) return 'végé';
  if (/chili|frittata/.test(t)) return /bœuf|porc|chorizo|merguez/.test(t) ? 'mixte' : 'végé/œuf';
  if (/shakshuka/.test(t)) return 'œuf';
  if (/bœuf|tacos|boulette/.test(t)) return 'bœuf';
  if (/porc|côtelette/.test(t)) return 'porc';
  if (/agneau/.test(t)) return 'agneau';
  if (/poulet|tajine|cornish/.test(t)) return 'volaille';
  return 'autre';
}

// Catégories (tags) d'une recette pour le filtrage — une recette peut en avoir plusieurs.
// On regarde le titre ET les ingrédients pour être robuste.
function recipeCategories(r) {
  const t = (r.title + ' ' + (r.ingredients || []).join(' ')).toLowerCase();
  const cats = [];
  if (/saumon|truite|sardine|maquereau|morue|cabillaud|thon|crevette|pétoncle|poisson/.test(r.title.toLowerCase())) cats.push('poisson');
  if (/\bpoulet|volaille|tajine de poulet|cornish|dinde/.test(r.title.toLowerCase())) cats.push('volaille');
  if (/\bbœuf|bavette|tacos|boulette|steak|paleron|braisé à la bière/.test(r.title.toLowerCase())) cats.push('bœuf');
  if (/\bporc|côtelette|filet de porc/.test(r.title.toLowerCase())) cats.push('porc');
  if (/agneau/.test(r.title.toLowerCase())) cats.push('agneau');
  if (/shakshuka|frittata|(^|[^b])œufs?\b/.test(r.title.toLowerCase())) cats.push('œuf');
  if (/tofu|bouddha|végétarien|végé/.test(r.title.toLowerCase())) cats.push('végé');
  // Filet: distinguer poisson vs porc par contexte déjà fait ci-dessus
  return cats.length ? [...new Set(cats)] : ['autre'];
}


function toast(msg) {
  const t = el('div', { class: 'toast' }, msg);
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}
// Toast avec bouton d'action (ex. « Annuler ») : reste affiché 6 secondes.
function toastAction(msg, btnLabel, fn) {
  const t = el('div', { class: 'toast' }, msg);
  t.appendChild(el('button', { class: 'toast-btn', onclick: () => { t.remove(); fn(); } }, btnLabel));
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 6000);
}

// =================== SMART SCALING ===================
function parseFraction(s) {
  s = String(s).replace(',', '.').trim();
  let m = s.match(/^(\d+)\s+(\d+)\/(\d+)$/);
  if (m) return parseInt(m[1]) + parseInt(m[2]) / parseInt(m[3]);
  m = s.match(/^(\d+)\/(\d+)$/);
  if (m) return parseInt(m[1]) / parseInt(m[2]);
  return parseFloat(s);
}

function toFractional(v) {
  const integer = Math.floor(v);
  const frac = v - integer;
  if (frac < 0.08) return String(integer);
  if (frac > 0.92) return String(integer + 1);
  const fracs = [['1/4', 0.25], ['1/3', 0.333], ['1/2', 0.5], ['2/3', 0.667], ['3/4', 0.75]];
  let best = fracs[0], minDiff = 1;
  for (const [s, n] of fracs) {
    const d = Math.abs(frac - n);
    if (d < minDiff) { minDiff = d; best = [s, n]; }
  }
  return integer > 0 ? `${integer} ${best[0]}` : best[0];
}

function formatScaled(v, unit) {
  if (v < 0.1) return '0';
  if (!unit) {
    if (Number.isInteger(v)) return String(v);
    if (v >= 10) return String(Math.round(v));
    return toFractional(v);
  }
  const u = unit.toLowerCase().trim();
  if (/^°[cf]$/.test(u) || /^(min|h|sec|heures?|minutes?|secondes?)/.test(u)) return String(v); // don't scale times/temps
  if (u === 'g' || u === 'gr') {
    if (v < 30) return String(Math.max(5, Math.round(v / 5) * 5));
    if (v < 250) return String(Math.round(v / 10) * 10);
    return String(Math.round(v / 25) * 25);
  }
  if (u === 'kg') return v.toFixed(2).replace('.', ',').replace(/,?0+$/, '');
  if (u === 'ml' || u === 'l') {
    if (u === 'l') return v.toFixed(1).replace('.', ',');
    if (v < 50) return String(Math.max(5, Math.round(v / 5) * 5));
    return String(Math.round(v / 25) * 25);
  }
  if (/c\.?\s*à\s*soupe|^c\.?s\.?$|cuilleres? à soupe/.test(u) || /c\.?\s*à\s*thé|^c\.?t\.?$|cuilleres? à thé/.test(u) || u === 'tasse' || u === 'tasses') {
    return toFractional(v);
  }
  if (/^(filet|filets|oeuf|oeufs|œuf|œufs|gousse|gousses|tranche|tranches|boîte|boites|botte|bottes|pot|pots|sac|sacs|brin|brins)$/.test(u)) {
    return String(Math.max(1, Math.round(v)));
  }
  if (Number.isInteger(v)) return String(v);
  if (v >= 10) return String(Math.round(v));
  return toFractional(v);
}

function scaleIngredient(text, factor) {
  if (factor === 1) return text;
  return text.replace(
    /(\d+\s+\d+\/\d+|\d+\/\d+|\d+(?:[.,]\d+)?)(\s*)(°[CF]|kg|g\b|ml|L\b|l\b|c\.?\s*à\s*soupe|c\.?s\.?|c\.?\s*à\s*thé|c\.?t\.?|tasses?|min(?:utes?)?|h(?:eures?)?|sec(?:ondes?)?|filets?|oeufs?|œufs?|gousses?|tranches?|boîtes?|bottes?|pots?|sacs?|brins?)?/gi,
    (match, num, sp, unit) => {
      // Skip if no unit AND looks like cooking metadata
      const value = parseFraction(num);
      if (isNaN(value) || value === 0) return match;
      const scaled = value * factor;
      const formatted = formatScaled(scaled, unit || '');
      return formatted + (sp || (unit ? ' ' : '')) + (unit || '');
    }
  );
}

// Detect timer durations in instruction text
function detectTimers(text) {
  const timers = [];
  const re = /(\d+(?:[.,]\d+)?)\s*(?:à\s*\d+\s*)?\s*(min(?:utes?)?|h(?:eures?)?|sec(?:ondes?)?|s\b)\b/gi;
  let m;
  while ((m = re.exec(text)) !== null) {
    let seconds = parseFloat(m[1].replace(',', '.'));
    const unit = m[2].toLowerCase();
    if (unit.startsWith('h')) seconds *= 3600;
    else if (unit.startsWith('m')) seconds *= 60;
    if (seconds > 5 && seconds < 14400) {
      timers.push({ seconds: Math.round(seconds), label: m[0] });
    }
  }
  return timers;
}

// =================== STATE & STORAGE ===================
// Version du contenu « graine » (recettes + épicerie). À incrémenter quand on modifie
// SEED_DATA pour que les apps déjà installées rafraîchissent leur contenu sans perdre
// les données personnelles (mentions J'aime, notes, déplacements, coches, sélection).
const DATA_VERSION = 12;

// ---- Dates réelles (rotation ancrée sur une date de départ) ----
const JOURS_FR = ['dim.', 'lun.', 'mar.', 'mer.', 'jeu.', 'ven.', 'sam.'];
const JOURS_FR_LONG = ['dimanche', 'lundi', 'mardi', 'mercredi', 'jeudi', 'vendredi', 'samedi'];
const MOIS_FR = ['janvier', 'février', 'mars', 'avril', 'mai', 'juin', 'juillet', 'août', 'septembre', 'octobre', 'novembre', 'décembre'];

// Lundi de la semaine contenant `d` (par défaut aujourd'hui).
function mondayOf(d) {
  d = d ? new Date(d) : new Date();
  d.setHours(0, 0, 0, 0);
  const dow = d.getDay();                 // 0 = dimanche
  const diff = (dow === 0 ? -6 : 1 - dow); // reculer jusqu'au lundi
  d.setDate(d.getDate() + diff);
  return d;
}
function parseISODate(s) {
  if (!s) return null;
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function toISODate(d) {
  const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
// Date de départ du cycle (lundi). Si absente, on l'initialise au lundi courant.
function getStartDate() {
  let iso = STATE.settings.startDate;
  if (!iso) { iso = toISODate(mondayOf()); STATE.settings.startDate = iso; persist('settings'); }
  return parseISODate(iso);
}
// Date réelle du jour N du cycle (J1 = date de départ).
function dateForDay(n) {
  const d = getStartDate();
  d.setDate(d.getDate() + (n - 1));
  return d;
}
function fmtDateShort(d) { return `${JOURS_FR[d.getDay()]} ${d.getDate()} ${MOIS_FR[d.getMonth()]}`; }
// Format compact pour un badge (ex. "mar. 14")
function fmtDayBadge(d) { return `${JOURS_FR[d.getDay()]} ${d.getDate()}`; }
function fmtDateLong(d) { return `${JOURS_FR_LONG[d.getDay()]} ${d.getDate()} ${MOIS_FR[d.getMonth()]}`; }
// En-tête de semaine : "Semaine du 10 mars"
function fmtWeekLabel(wk) { return `Semaine du ${dateForDay((wk - 1) * 7 + 1).getDate()} ${MOIS_FR[dateForDay((wk - 1) * 7 + 1).getMonth()]}`; }
// Jour du cycle (1-28) correspondant à aujourd'hui, en boucle (rotation).
function todayCycleDay() {
  const start = getStartDate();
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const diffDays = Math.floor((today - start) / 86400000);
  const mod = ((diffDays % 28) + 28) % 28;
  return mod + 1;
}
function todayISO() { const d = new Date(); d.setHours(0, 0, 0, 0); return toISODate(d); }

// ---- Cases à cocher des ingrédients + transposition vers l'épicerie ----
// Purge les cases dont la date de recette est passée (rotation : évite les
// cases restées cochées d'un cycle à l'autre).
function purgePastIngChecks() {
  const tISO = todayISO();
  let changed = false;
  Object.keys(STATE.ingChecks || {}).forEach(rid => {
    const entry = STATE.ingChecks[rid];
    if (entry && entry.d && entry.d < tISO) { delete STATE.ingChecks[rid]; changed = true; }
  });
  if (changed) persist('ingChecks');
}
function ingChecked(recipeId, idx) {
  const e = STATE.ingChecks[recipeId];
  return !!(e && e.c && e.c[idx]);
}
// Trouve un item d'épicerie par son id (S{n}-{i}).
function shopItemById(id) {
  for (const k of ['S1', 'S2', 'S3', 'S4']) {
    const list = STATE.shopping[k] || [];
    for (const it of list) if (it.id === id) return it;
  }
  return null;
}
// Coche/décoche un ingrédient et répercute sur la ligne d'épicerie liée.
function toggleIngCheck(recipe, idx) {
  const rid = recipe.id;
  if (!STATE.ingChecks[rid]) STATE.ingChecks[rid] = { d: toISODate(dateForDay(recipe.day)), c: {} };
  const entry = STATE.ingChecks[rid];
  entry.d = toISODate(dateForDay(recipe.day));
  const nowChecked = !entry.c[idx];
  if (nowChecked) entry.c[idx] = true; else delete entry.c[idx];

  // Transposition vers l'épicerie (si l'ingrédient est lié à une ligne)
  const linkId = (ING_LINKS[recipe.day] || {})[idx];
  if (linkId) {
    const item = shopItemById(linkId);
    if (item) {
      if (nowChecked) {
        item.checked = true;
      } else {
        // Ne décocher que si aucun autre ingrédient coché (même recette ou
        // recette partagée) ne pointe encore vers cette ligne d'épicerie.
        let stillNeeded = false;
        STATE.recipes.forEach(r => {
          const links = ING_LINKS[r.day] || {};
          Object.keys(links).forEach(i => {
            if (links[i] === linkId && ingChecked(r.id, i)) stillNeeded = true;
          });
        });
        if (!stillNeeded) item.checked = false;
      }
      persist('shopping');
    }
  }
  persist('ingChecks');
}

// Ingrédients (recette, index) liés à une ligne d'épicerie donnée (inverse de ING_LINKS).
function linkedIngsForShop(shopId) {
  const out = [];
  STATE.recipes.forEach(r => {
    const links = ING_LINKS[r.day] || {};
    Object.keys(links).forEach(idx => { if (links[idx] === shopId) out.push({ recipe: r, idx }); });
  });
  return out;
}
// Coche/décoche une ligne d'épicerie et répercute sur les cases d'ingrédients liées.
function toggleShopItem(item) {
  item.checked = !item.checked;
  const targets = linkedIngsForShop(item.id);
  targets.forEach(({ recipe, idx }) => {
    const rid = recipe.id;
    if (item.checked) {
      if (!STATE.ingChecks[rid]) STATE.ingChecks[rid] = { d: toISODate(dateForDay(recipe.day)), c: {} };
      STATE.ingChecks[rid].d = toISODate(dateForDay(recipe.day));
      STATE.ingChecks[rid].c[idx] = true;
    } else if (STATE.ingChecks[rid] && STATE.ingChecks[rid].c) {
      delete STATE.ingChecks[rid].c[idx];
      if (Object.keys(STATE.ingChecks[rid].c).length === 0) delete STATE.ingChecks[rid];
    }
  });
  persist('shopping');
  if (targets.length) persist('ingChecks');
}

const SK = {
  recipes: 'mf:recipes',
  schedule: 'mf:schedule',
  shopping: 'mf:shopping',
  meta: 'mf:meta',
  settings: 'mf:settings',
  daySkips: 'mf:daySkips',
  planSel: 'mf:planSel',
  ingChecks: 'mf:ingChecks',
  dataVersion: 'mf:dataVersion',
  pristine: 'mf:pristine',
};

function loadLS(k, fb) {
  try { const v = localStorage.getItem(k); return v === null ? fb : JSON.parse(v); }
  catch { return fb; }
}
function saveLS(k, v) {
  try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) { console.error('Storage:', e); }
}

// =================== SAUVEGARDE (EXPORT / IMPORT JSON) ===================
// Filet de sécurité : exporter toutes les données de l'app dans un fichier,
// et pouvoir les restaurer. Couvre dynamiquement toutes les clés « mf:* »
// (y compris celles qui seront ajoutées plus tard), pas une liste figée.
function collectBackup() {
  const data = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (!k || !k.startsWith('mf:')) continue;
    try { data[k] = JSON.parse(localStorage.getItem(k)); }
    catch { /* valeur illisible : on l'ignore plutôt que de corrompre l'export */ }
  }
  return data;
}

// Exporte via la feuille de partage iOS quand c'est possible, sinon
// retombe sur un téléchargement classique (ordinateur, vieux navigateur).
async function exportBackup() {
  const json = JSON.stringify({
    app: 'menu-famille',
    exportedAt: new Date().toISOString(),
    dataVersion: DATA_VERSION,
    data: collectBackup(),
  }, null, 2);
  const filename = `menu-famille-sauvegarde-${todayISO()}.json`;
  const file = new File([json], filename, { type: 'application/json' });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: 'Sauvegarde Menu famille' });
      return;
    } catch (e) {
      if (e && e.name === 'AbortError') return; // partage annulé par l'utilisateur
      // Autre échec : on continue vers le téléchargement classique.
    }
  }
  const url = URL.createObjectURL(new Blob([json], { type: 'application/json' }));
  const a = el('a', { href: url, download: filename });
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast('Sauvegarde téléchargée');
}

// Lit un fichier de sauvegarde, le valide, demande confirmation, remplace
// toutes les clés mf:* puis relance l'app sur les données restaurées.
function importBackup(fileObj) {
  const reader = new FileReader();
  reader.onerror = () => alert('Impossible de lire ce fichier.');
  reader.onload = () => {
    let bk;
    try { bk = JSON.parse(reader.result); }
    catch { alert('Ce fichier n\'est pas une sauvegarde valide (JSON illisible).'); return; }
    if (!bk || bk.app !== 'menu-famille' || typeof bk.data !== 'object' || bk.data === null) {
      alert('Ce fichier ne semble pas être une sauvegarde de Menu famille.');
      return;
    }
    if (typeof bk.dataVersion === 'number' && bk.dataVersion > DATA_VERSION) {
      if (!confirm(`Cette sauvegarde vient d'une version plus récente de l'app (v${bk.dataVersion}, ici v${DATA_VERSION}). L'import pourrait mal se passer. Continuer quand même ?`)) return;
    }
    let dateTxt = '';
    if (bk.exportedAt) {
      const d = new Date(bk.exportedAt);
      if (!isNaN(d)) dateTxt = ` du ${d.getDate()} ${MOIS_FR[d.getMonth()]} ${d.getFullYear()}`;
    }
    if (!confirm(`Remplacer TOUTES les données actuelles par cette sauvegarde${dateTxt} ? Ce qui se trouve sur cet appareil sera écrasé.`)) return;
    // Purge des clés mf:* actuelles, puis écriture de celles de la sauvegarde.
    const toRemove = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('mf:')) toRemove.push(k);
    }
    toRemove.forEach(k => localStorage.removeItem(k));
    Object.entries(bk.data).forEach(([k, v]) => {
      if (k.startsWith('mf:')) saveLS(k, v);
    });
    location.reload();
  };
  reader.readAsText(fileObj);
}

// Build initial recipes from seed data
function buildSeedRecipes() {
  return SEED_DATA.r.map(r => ({
    id: 'r-' + r.d,
    day: r.d, week: r.w, dayName: r.n, weekday: !!r.wd,
    title: r.t, prepTime: r.pt, cookTime: r.ct, totalTime: r.tt,
    ingredients: r.ing, instructions: r.inst,
    nutrition: r.nut,
    custom: false
  }));
}

function buildSeedShopping() {
  const s = {};
  ['S1','S2','S3','S4'].forEach(k => {
    s[k] = SEED_DATA.s[k].map((it, i) => ({
      id: k + '-' + i, cat: it.c, art: it.a, qte: it.q, spec: it.s || '', checked: false
    }));
  });
  return s;
}

function buildSeedSchedule(recipes) {
  return recipes.filter(r => !r.custom).map(r => ({ day: r.day, recipeId: r.id }));
}

function buildSeedMeta(recipes) {
  const m = {};
  recipes.forEach(r => { m[r.id] = { likes: {}, notes: '', portions: 5, cooked: 0 }; });
  return m;
}

const DEFAULT_SETTINGS = {
  currentDay: 1,
  startDate: null,
  personNames: ['Moi', 'Conjoint·e', 'Enfant 1', 'Enfant 2'],
  defaultPortions: 5,
  stalePantryShown: false,
};

const STATE = {
  recipes: [],
  pristineRecipes: [], // for restore
  schedule: [],
  shopping: {},
  meta: {},
  settings: { ...DEFAULT_SETTINGS },
  daySkips: {}, // {day: {reason: 'resto|restes|reporté', note: ''}}
  view: { name: 'home' },
  modal: null,
  cookingMode: null, // {recipeId, step, timerSeconds, timerRunning, wakeLock}
};

function loadState() {
  STATE.pristineRecipes = buildSeedRecipes();
  STATE.recipes = loadLS(SK.recipes, buildSeedRecipes());
  STATE.shopping = loadLS(SK.shopping, buildSeedShopping());
  STATE.schedule = loadLS(SK.schedule, buildSeedSchedule(STATE.recipes));
  STATE.meta = loadLS(SK.meta, buildSeedMeta(STATE.recipes));
  STATE.settings = loadLS(SK.settings, { ...DEFAULT_SETTINGS });
  // Migration : ajouter Enfant 1 et Enfant 2 aux réglages déjà enregistrés
  // qui ne comptaient que deux personnes.
  if (!STATE.settings.personNames) STATE.settings.personNames = [...DEFAULT_SETTINGS.personNames];
  if (STATE.settings.personNames.length < 4) {
    const defaults = ['Moi', 'Conjoint·e', 'Enfant 1', 'Enfant 2'];
    for (let i = STATE.settings.personNames.length; i < 4; i++) {
      STATE.settings.personNames.push(defaults[i]);
    }
    persist('settings');
  }
  STATE.daySkips = loadLS(SK.daySkips, {});
  // Sélection des recettes à cuisiner (pour filtrer l'épicerie). Par défaut : toutes cochées.
  STATE.planSel = loadLS(SK.planSel, {});
  STATE.recipes.forEach(r => { if (STATE.planSel[r.day] === undefined) STATE.planSel[r.day] = true; });
  // Ordre d'affichage (pour le glisser-déposer). Par défaut : l'ordre des jours.
  STATE.recipes.forEach(r => { if (typeof r.ord !== 'number') r.ord = r.day; });
  // Cases à cocher des ingrédients par recette. Structure : { recipeId: { d: 'ISO', c: {idx:true} } }
  STATE.ingChecks = loadLS(SK.ingChecks, {});
  purgePastIngChecks();
  // Ensure meta entries exist for all recipes
  STATE.recipes.forEach(r => {
    if (!STATE.meta[r.id]) STATE.meta[r.id] = { likes: {}, notes: '', portions: 5, cooked: 0 };
  });

  // --- Migration du contenu graine (recettes + épicerie) ---
  // Si l'app a déjà été utilisée avec une version antérieure de SEED_DATA, on
  // rafraîchit le contenu (ingrédients, instructions, titres, épicerie) SANS
  // effacer les données personnelles.
  const storedVersion = loadLS(SK.dataVersion, 0);
  if (storedVersion < DATA_VERSION) {
    migrateSeedContent();
    // Initialiser la date de départ (lundi courant) et caler « aujourd'hui »
    // sur la vraie date, la première fois qu'on introduit les dates réelles.
    if (!STATE.settings.startDate) {
      STATE.settings.startDate = toISODate(mondayOf());
      STATE.settings.currentDay = todayCycleDay();
      persist('settings');
    }
    saveLS(SK.dataVersion, DATA_VERSION);
  }
}

// Rafraîchit les champs issus de SEED_DATA tout en conservant ce que l'utilisateur
// a personnalisé (déplacements de semaine/ordre, recettes maison, coches d'épicerie).
function migrateSeedContent() {
  const freshRecipes = buildSeedRecipes();
  const freshById = {};
  freshRecipes.forEach(fr => { freshById[fr.id] = fr; });

  const merged = [];
  const seenIds = new Set();
  // 1) Mettre à jour les recettes graines existantes (garder week/ord de l'utilisateur)
  STATE.recipes.forEach(old => {
    seenIds.add(old.id);
    if (old.custom) { merged.push(old); return; }         // recette maison : intacte
    const fr = freshById[old.id];
    if (!fr) { merged.push(old); return; }                // graine disparue : garder l'ancienne
    merged.push({
      ...fr,
      week: (typeof old.week === 'number') ? old.week : fr.week,   // conserver déplacement
      ord:  (typeof old.ord === 'number')  ? old.ord  : fr.day,    // conserver ordre
    });
  });
  // 2) Ajouter les nouvelles recettes graines absentes du stockage
  freshRecipes.forEach(fr => { if (!seenIds.has(fr.id)) merged.push(fr); });
  STATE.recipes = merged;

  // 3) Rafraîchir l'épicerie en conservant l'état « coché » par identifiant
  const checkedById = {};
  Object.values(STATE.shopping || {}).forEach(list => {
    (Array.isArray(list) ? list : []).forEach(it => { if (it && it.id) checkedById[it.id] = it.checked; });
  });
  const freshShopping = buildSeedShopping();
  Object.values(freshShopping).forEach(list => {
    list.forEach(it => { if (checkedById[it.id] !== undefined) it.checked = checkedById[it.id]; });
  });
  STATE.shopping = freshShopping;

  // 4) S'assurer que meta / planSel existent pour toutes les recettes
  STATE.recipes.forEach(r => {
    if (!STATE.meta[r.id]) STATE.meta[r.id] = { likes: {}, notes: '', portions: 5, cooked: 0 };
    if (STATE.planSel[r.day] === undefined) STATE.planSel[r.day] = true;
    if (typeof r.ord !== 'number') r.ord = r.day;
  });

  persist('recipes');
  persist('shopping');
  persist('meta');
  persist('planSel');
}

function persist(key) {
  if (key === 'recipes') saveLS(SK.recipes, STATE.recipes);
  else if (key === 'schedule') saveLS(SK.schedule, STATE.schedule);
  else if (key === 'shopping') saveLS(SK.shopping, STATE.shopping);
  else if (key === 'meta') saveLS(SK.meta, STATE.meta);
  else if (key === 'settings') saveLS(SK.settings, STATE.settings);
  else if (key === 'daySkips') saveLS(SK.daySkips, STATE.daySkips);
  else if (key === 'planSel') saveLS(SK.planSel, STATE.planSel);
  else if (key === 'ingChecks') saveLS(SK.ingChecks, STATE.ingChecks);
  else { // all
    saveLS(SK.recipes, STATE.recipes);
    saveLS(SK.schedule, STATE.schedule);
    saveLS(SK.shopping, STATE.shopping);
    saveLS(SK.meta, STATE.meta);
    saveLS(SK.settings, STATE.settings);
    saveLS(SK.daySkips, STATE.daySkips);
  }
}

function setView(view) {
  STATE.view = view;
  window.scrollTo(0, 0);
  render();
}

function setModal(modal) {
  STATE.modal = modal;
  render();
}

// =================== SYNC LOGIC: schedule → shopping ===================
// When user swaps a recipe in the schedule, mark the relevant week's shopping
// as "stale" (needs review). We don't auto-regenerate because the carefully
// curated shopping list has Quebec brand specs that recipe ingredients alone
// don't carry. The user reviews manually.
function markShoppingStale(week) {
  const wk = `S${week}`;
  if (!STATE.shopping[wk]) return;
  STATE.shopping[wk]._stale = true;
  persist('shopping');
}

function clearShoppingStale(week) {
  const wk = `S${week}`;
  if (!STATE.shopping[wk]) return;
  delete STATE.shopping[wk]._stale;
  persist('shopping');
}

// =================== VIEW: HOME ===================
function renderHome() {
  const main = $('#main');
  main.innerHTML = '';
  const cd = STATE.settings.currentDay;
  const cw = Math.ceil(cd / 7);
  const todayItem = STATE.schedule.find(s => s.day === cd);
  const todayRecipe = todayItem ? STATE.recipes.find(r => r.id === todayItem.recipeId) : null;
  const skip = STATE.daySkips[cd];

  const view = el('div', { class: 'view' });

  // Today header
  view.appendChild(el('div', { class: 'today-eyebrow' }, `${fmtDateLong(dateForDay(cd))} · Jour ${cd} · Semaine ${cw}`));
  view.appendChild(el('div', { class: 'today-title' }, 'Au menu ce soir'));

  // Skip notice
  if (skip) {
    const skipBox = el('div', { class: 'card', style: 'background: var(--accent-soft); border-color: rgba(181,105,75,0.3); margin-bottom: 12px;' });
    skipBox.appendChild(el('div', { class: 'eyebrow', style: 'color: var(--accent);' }, 'Soir sauté'));
    skipBox.appendChild(el('div', { style: 'font-size: 14px; margin: 6px 0 10px;' },
      skip.reason === 'resto' ? 'Vous mangez à l\'extérieur ce soir.' :
      skip.reason === 'restes' ? 'Vous mangez des restes ce soir.' :
      'La recette de ce soir est reportée.'));
    const btnRow = el('div', { class: 'row-gap-2' });
    btnRow.appendChild(el('button', { class: 'btn-ghost', onclick: () => { delete STATE.daySkips[cd]; persist('daySkips'); render(); } }, 'Annuler'));
    if (todayRecipe) btnRow.appendChild(el('button', { class: 'btn-ghost', onclick: () => setView({ name: 'detail', recipeId: todayRecipe.id }) }, 'Voir la recette →'));
    skipBox.appendChild(btnRow);
    view.appendChild(skipBox);
  } else if (todayRecipe) {
    // Today card
    const card = el('button', { class: 'card', style: 'padding: 20px; margin-bottom: 12px;', onclick: () => setView({ name: 'detail', recipeId: todayRecipe.id }) });
    const badges = el('div', { class: 'recipe-card-badges', style: 'margin-bottom: 8px;' });
    badges.appendChild(el('span', { class: 'badge badge-primary' }, fmtDateShort(dateForDay(cd))));
    badges.appendChild(el('span', { class: 'badge badge-accent' }, recipeType(todayRecipe)));
    if (likeSummary(todayRecipe).liked) badges.appendChild(el('span', { class: 'badge badge-fav', html: (I.heart || '♥') + ' <span>Aimée</span>' }));
    if (!todayRecipe.weekday) badges.appendChild(el('span', { class: 'badge badge-warning' }, 'Weekend'));
    card.appendChild(badges);

    card.appendChild(el('h2', { class: 'today-card-title' }, todayRecipe.title));

    const meta = el('div', { class: 'recipe-meta' });
    meta.appendChild(el('span', { class: 'row-gap-2', html: I.clock + `<span style="font-size:12px">${todayRecipe.totalTime}</span>` }));
    meta.appendChild(el('span', { style: 'font-size: 12px;' }, `Prép ${todayRecipe.prepTime} · Cuisson ${todayRecipe.cookTime}`));
    card.appendChild(meta);

    view.appendChild(card);
  } else {
    view.appendChild(el('div', { class: 'card empty' }, 'Aucune recette planifiée pour ce jour.'));
  }

  // Action buttons
  const actions = el('div', { class: 'action-row' });
  if (!skip && todayRecipe) {
    actions.appendChild(el('button', { class: 'btn-primary', onclick: () => markCookedAndAdvance(todayRecipe.id) }, [
      el('span', { html: I.checkInline }), ' Cuisiné · jour suivant'
    ]));
    actions.appendChild(el('button', { class: 'btn-secondary', onclick: () => openSkipMenu(cd) }, [
      el('span', { html: I.skip })
    ]));
  } else if (skip) {
    actions.appendChild(el('button', { class: 'btn-primary', onclick: () => { delete STATE.daySkips[cd]; advanceDay(); persist('daySkips'); render(); toast('Avancé au jour suivant'); } }, 'Passer au jour suivant'));
  }
  if (actions.children.length) view.appendChild(actions);

  // Upcoming days
  const upcoming = [];
  for (let i = 1; i <= 6; i++) {
    const day = ((cd + i - 1) % 28) + 1;
    const it = STATE.schedule.find(s => s.day === day);
    if (!it) continue;
    const r = STATE.recipes.find(r => r.id === it.recipeId);
    if (r) upcoming.push({ day, recipe: r });
  }

  if (upcoming.length) {
    view.appendChild(el('div', { class: 'section-title' }, 'Les jours qui viennent'));
    upcoming.forEach(({ day, recipe }) => {
      const d = dateForDay(day);
      const card = el('button', { class: 'card', style: 'padding: 12px;', onclick: () => setView({ name: 'detail', recipeId: recipe.id }) });
      const row = el('div', { class: 'day-row' });
      const dateBadge = el('div', { class: 'day-num day-num-date' });
      dateBadge.appendChild(el('div', { class: 'day-num-d' }, String(d.getDate())));
      dateBadge.appendChild(el('div', { class: 'day-num-m' }, MOIS_FR[d.getMonth()].slice(0, 4) + '.'));
      row.appendChild(dateBadge);
      const info = el('div', { class: 'day-info' });
      info.appendChild(el('div', { class: 'day-title' }, recipe.title));
      info.appendChild(el('div', { class: 'day-meta' }, `${fmtDateShort(d)} · ${recipe.totalTime} · ${recipeType(recipe)}`));
      row.appendChild(info);
      row.appendChild(el('span', { class: 'day-chev', html: I.chev }));
      card.appendChild(row);
      view.appendChild(card);
    });
  }

  main.appendChild(view);
}

function markCookedAndAdvance(recipeId) {
  const m = STATE.meta[recipeId];
  if (m) { m.cooked = (m.cooked || 0) + 1; persist('meta'); }
  advanceDay();
  toast('Marqué cuisiné. Au jour suivant.');
  render();
}

function advanceDay() {
  STATE.settings.currentDay = (STATE.settings.currentDay % 28) + 1;
  persist('settings');
}

function rewindDay() {
  STATE.settings.currentDay = STATE.settings.currentDay === 1 ? 28 : STATE.settings.currentDay - 1;
  persist('settings');
}

function openSkipMenu(day) {
  setModal({
    type: 'skip', day,
    options: [
      { id: 'resto', label: 'On mange au restaurant', desc: 'Aucun repas à la maison ce soir.' },
      { id: 'restes', label: 'On mange des restes', desc: 'La recette du jour reste prévue mais non cuisinée.' },
      { id: 'reporté', label: 'Reporter la recette à plus tard', desc: 'La recette glisse vers une date ultérieure.' },
    ]
  });
}

function applySkip(day, reason) {
  STATE.daySkips[day] = { reason, ts: Date.now() };
  persist('daySkips');
  if (reason === 'reporté') {
    // Move the current recipe to the last empty/skippable slot
    // Simple version: just mark as skipped, user can swap in calendar later
  }
  setModal(null);
  toast(reason === 'resto' ? 'Sortie planifiée' : reason === 'restes' ? 'Restes notés' : 'Recette reportée');
}

// =================== VIEW: RECIPES LIBRARY ===================
function renderRecipes() {
  const main = $('#main');
  main.innerHTML = '';
  const view = el('div', { class: 'view' });
  const filter = STATE.view.filter || 'all';
  const search = STATE.view.search || '';

  view.appendChild(el('h1', { class: 'page-title' }, 'Bibliothèque'));
  view.appendChild(el('div', { class: 'page-subtitle' }, `${STATE.recipes.length} recettes`));

  // Search
  const searchWrap = el('div', { class: 'search-wrap' });
  searchWrap.appendChild(el('span', { html: I.search }));
  const sinp = el('input', { type: 'text', placeholder: 'Rechercher une recette ou un ingrédient', value: search });
  sinp.oninput = (e) => { STATE.view.search = e.target.value; renderRecipes(); };
  searchWrap.appendChild(sinp);
  view.appendChild(searchWrap);

  // Filter
  const filterRow = el('div', { class: 'filter-wrap' });
  const filters = [
    ['all', 'Toutes'], ['liked', 'Aimées'],
    ['cat:volaille', 'Volaille'], ['cat:poisson', 'Poisson'], ['cat:bœuf', 'Bœuf'],
    ['cat:porc', 'Porc'], ['cat:œuf', 'Œuf'], ['cat:végé', 'Végé'],
    ['w1', 'S1'], ['w2', 'S2'], ['w3', 'S3'], ['w4', 'S4']
  ];
  filters.forEach(([id, label]) => {
    const b = el('button', { class: 'pill' + (filter === id ? ' active' : ''), onclick: () => { STATE.view.filter = id; renderRecipes(); } }, label);
    filterRow.appendChild(b);
  });
  view.appendChild(filterRow);

  // Add recipe
  view.appendChild(el('button', {
    class: 'card',
    style: 'border: 1px dashed rgba(46,95,79,0.5); color: var(--primary); text-align: center; padding: 14px; margin: 8px 0 12px; display: flex; align-items: center; justify-content: center; gap: 6px; font-weight: 500;',
    onclick: () => setView({ name: 'add' })
  }, [el('span', { html: I.plus }), 'Ajouter une recette']));

  // List
  let list = [...STATE.recipes].sort((a, b) => a.day - b.day);
  if (filter.startsWith('w')) list = list.filter(r => r.week === parseInt(filter.slice(1)));
  else if (filter.startsWith('cat:')) {
    const cat = filter.slice(4);
    list = list.filter(r => recipeCategories(r).includes(cat));
  }
  else if (filter === 'liked') list = list.filter(r => likeSummary(r).liked);
  else if (filter === 'custom') list = list.filter(r => r.custom);
  if (search.trim()) {
    const q = search.toLowerCase();
    list = list.filter(r => r.title.toLowerCase().includes(q) || (r.ingredients || []).some(i => i.toLowerCase().includes(q)));
  }

  if (list.length === 0) {
    view.appendChild(el('div', { class: 'card empty' }, 'Aucune recette trouvée.'));
  } else {
    list.forEach(r => view.appendChild(recipeCard(r)));
  }

  main.appendChild(view);
}

function recipeCard(r) {
  const m = STATE.meta[r.id] || { likes: {}, cooked: 0 };
  const card = el('button', { class: 'card', onclick: () => setView({ name: 'detail', recipeId: r.id }) });

  const badges = el('div', { class: 'recipe-card-badges' });
  badges.appendChild(el('span', { class: 'badge badge-primary' }, `J${r.day} · S${r.week}`));
  badges.appendChild(el('span', { class: 'badge badge-accent' }, recipeType(r)));
  if (!r.weekday) badges.appendChild(el('span', { class: 'badge badge-warning' }, 'Weekend'));
  if (r.custom) badges.appendChild(el('span', { class: 'badge', style: 'background: rgba(46,95,79,0.1); color: var(--primary);' }, 'Maison'));
  card.appendChild(badges);

  card.appendChild(el('h3', { class: 'recipe-title', style: 'margin-top: 8px;' }, r.title));

  const meta = el('div', { class: 'recipe-meta', style: 'margin-top: 8px;' });
  meta.appendChild(el('span', { class: 'row-gap-2', html: I.clock + `<span>${r.totalTime}</span>` }));
  if (m.cooked > 0) meta.appendChild(el('span', { class: 'row-gap-2', html: I.checkInline + `<span>${m.cooked}×</span>` }));
  // Résumé des « J'aime »
  const ls = likeSummary(r);
  if (ls.ups > 0 || ls.downs > 0) {
    const likeWrap = el('span', { class: 'card-like-summary' });
    if (ls.liked) likeWrap.appendChild(el('span', { class: 'card-fav', html: I.heart || '♥', title: 'Coup de cœur familial' }));
    if (ls.ups > 0) likeWrap.appendChild(el('span', { class: 'card-like up', html: I.thumbsUp + `<span>${ls.ups}</span>` }));
    if (ls.downs > 0) likeWrap.appendChild(el('span', { class: 'card-like down', html: I.thumbsDown + `<span>${ls.downs}</span>` }));
    meta.appendChild(likeWrap);
  }
  card.appendChild(meta);

  return card;
}

// =================== VIEW: RECIPE DETAIL ===================
function renderDetail() {
  const main = $('#main');
  main.innerHTML = '';
  const r = STATE.recipes.find(x => x.id === STATE.view.recipeId);
  if (!r) { setView({ name: 'recipes' }); return; }
  const m = STATE.meta[r.id] || { likes: {}, notes: '', portions: 5, cooked: 0 };
  const tab = STATE.view.tab || 'ing';
  const portions = m.portions || 5;
  const factor = portions / 5;

  // Header
  const headerWrap = el('div', { class: 'header' });
  headerWrap.appendChild(el('button', { class: 'header-back', onclick: () => goBack(), html: I.back }));
  const titleWrap = el('div', { class: 'header-title-wrap' });
  titleWrap.appendChild(el('div', { class: 'header-title' }, fmtDateLong(dateForDay(r.day))));
  titleWrap.appendChild(el('div', { class: 'header-subtitle' }, `Jour ${r.day} · Semaine ${r.week}`));
  headerWrap.appendChild(titleWrap);
  headerWrap.appendChild(el('button', { class: 'header-action', onclick: () => setView({ name: 'edit', recipeId: r.id }), html: I.pencil }));
  main.appendChild(headerWrap);

  const view = el('div', { class: 'view' });

  // Title block
  const badges = el('div', { class: 'recipe-card-badges' });
  badges.appendChild(el('span', { class: 'badge badge-accent' }, recipeType(r)));
  const lsD = likeSummary(r);
  if (lsD.liked) badges.appendChild(el('span', { class: 'badge badge-fav', html: (I.heart || '♥') + ' <span>Aimée</span>' }));
  if (!r.weekday) badges.appendChild(el('span', { class: 'badge badge-warning' }, 'Weekend'));
  if (r.custom) badges.appendChild(el('span', { class: 'badge badge-primary' }, 'Maison'));
  if (m.cooked > 0) badges.appendChild(el('span', { class: 'badge badge-success' }, `Cuisiné ${m.cooked}×`));
  view.appendChild(badges);

  view.appendChild(el('h1', { style: 'font-family: var(--serif); font-size: 24px; font-weight: 500; line-height: 1.2; margin: 12px 0;' }, r.title));

  const metaRow = el('div', { class: 'recipe-meta', style: 'margin-bottom: 14px;' });
  metaRow.appendChild(el('span', { class: 'row-gap-2', html: I.clock + `<span style="font-size:13px">${r.totalTime}</span>` }));
  metaRow.appendChild(el('span', { style: 'font-size: 13px;' }, `Prép ${r.prepTime} · Cuisson ${r.cookTime}`));
  view.appendChild(metaRow);

  // Cook mode button
  view.appendChild(el('button', {
    class: 'btn-primary',
    style: 'width: 100%; margin-bottom: 14px; padding: 14px;',
    onclick: () => startCookingMode(r.id)
  }, [el('span', { html: I.flame }), ' Mode cuisine']));

  // Portions row
  const portionsRow = el('div', { class: 'portions-row' });
  const portionsInfo = el('div');
  portionsInfo.appendChild(el('div', { class: 'portions-label' }, 'Portions'));
  const valWrap = el('div', { class: 'portions-value' });
  valWrap.appendChild(document.createTextNode(String(portions)));
  if (portions !== 5) valWrap.appendChild(el('span', { class: 'portions-multiplier' }, `(×${factor.toFixed(2).replace(/\.?0+$/, '')})`));
  portionsInfo.appendChild(valWrap);
  portionsRow.appendChild(portionsInfo);
  const portionsBtns = el('div', { class: 'portions-buttons' });
  [4, 5, 6, 8].forEach(p => {
    portionsBtns.appendChild(el('button', {
      class: 'portions-btn' + (p === portions ? ' active' : ''),
      onclick: () => { STATE.meta[r.id] = { ...m, portions: p }; persist('meta'); render(); }
    }, String(p)));
  });
  portionsRow.appendChild(portionsBtns);
  view.appendChild(portionsRow);

  // Tabs
  const tabRow = el('div', { class: 'tab-row' });
  [['ing', 'Ingrédients'], ['inst', 'Préparation'], ['nut', 'Nutrition'], ['notes', 'Notes']].forEach(([id, label]) => {
    tabRow.appendChild(el('button', {
      class: 'pill' + (tab === id ? ' active' : ''),
      onclick: () => { STATE.view.tab = id; renderDetail(); }
    }, label));
  });
  view.appendChild(tabRow);

  // Matériel : bouton dépliant sous les onglets (recettes graines seulement).
  // Les appareils à ne pas rater restent visibles en permanence sur le bouton.
  const mat = !r.custom && MATERIEL[r.day];
  if (mat && (tab === 'ing' || tab === 'inst')) {
    const matOpen = !!STATE.view.matOpen;
    const matBtn = el('button', {
      class: 'mat-btn',
      onclick: () => { STATE.view.matOpen = !matOpen; renderDetail(); }
    });
    matBtn.appendChild(el('span', { class: 'mat-btn-label' }, 'Matériel'));
    mat.a.forEach(x => matBtn.appendChild(el('span', { class: 'mat-chip' }, x)));
    matBtn.appendChild(el('span', { class: 'mat-arrow' + (matOpen ? ' open' : '') }, '▾'));
    view.appendChild(matBtn);
    if (matOpen) {
      const matCard = el('div', { class: 'card mat-card' });
      const ul = el('ul', { class: 'mat-list' });
      mat.a.forEach(x => ul.appendChild(el('li', { class: 'mat-imp' }, x)));
      mat.m.forEach(x => ul.appendChild(el('li', {}, x)));
      matCard.appendChild(ul);
      view.appendChild(matCard);
    }
  }

  // Tab content
  if (tab === 'ing') {
    const card = el('div', { class: 'card' });
    card.appendChild(el('div', { class: 'ing-hint' }, 'Cochez ce que vous avez déjà — la ligne se coche aussi dans l\'épicerie.'));
    let curList = null;
    let seenInBlock = new Set();
    r.ingredients.forEach((ing, idx) => {
      const s = String(ing);
      if (s === '##') {
        curList = el('ul', { class: 'ing-list ing-list-break' });
        card.appendChild(curList);
        seenInBlock = new Set();
      } else if (s.startsWith('## ')) {
        card.appendChild(el('div', { class: 'ing-group-title' }, s.slice(3)));
        curList = el('ul', { class: 'ing-list' });
        card.appendChild(curList);
        seenInBlock = new Set();
      } else {
        if (!curList) { curList = el('ul', { class: 'ing-list' }); card.appendChild(curList); }
        // Garde-fou : ne pas réafficher un ingrédient identique déjà présent dans ce bloc
        const key = s.trim().toLowerCase();
        if (seenInBlock.has(key)) return;
        seenInBlock.add(key);
        const checked = ingChecked(r.id, idx);
        const li = el('li', { class: 'ing-item ing-item-check' + (checked ? ' checked' : '') });
        const box = el('span', { class: 'ing-check' + (checked ? ' checked' : ''), html: checked ? I.check : '' });
        li.appendChild(box);
        li.appendChild(el('span', { class: 'ing-text' }, factor === 1 ? s : scaleIngredient(s, factor)));
        li.onclick = () => { toggleIngCheck(r, idx); render(); };
        curList.appendChild(li);
      }
    });
    if (factor !== 1) {
      card.appendChild(el('div', { class: 'text-xs italic', style: 'margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--divider); color: var(--muted);' },
        'Quantités ajustées automatiquement. À vérifier avant la cuisson — l\'arrondi peut affecter certaines proportions délicates.'));
    }
    view.appendChild(card);
  } else if (tab === 'inst') {
    const card = el('div', { class: 'card' });
    const list = el('div', { class: 'inst-list' });
    // Moteur de rendu riche :
    //   "## Titre"      -> titre de section
    //   "### Titre"     -> sous-titre (substitutions, etc.)
    //   "> Note"        -> encadré / note importante
    //   "| Paragraphe"  -> paragraphe libre (sans numéro)
    //   "- item"        -> puce (dans substitutions)
    //   "N. texte" ou texte simple -> étape numérotée automatique
    // Le gras **texte** est converti en <b>.
    function renderInline(parent, text) {
      // découpe sur **...** pour créer des <b>, puis lie les termes de glossaire
      const parts = text.split(/\*\*(.+?)\*\*/g);
      parts.forEach((p, i) => {
        if (i % 2 === 1) { const b = el('b', {}); appendGlossy(b, p); parent.appendChild(b); }
        else if (p) appendGlossy(parent, p);
      });
    }
    let stepNum = 0;
    (r.instructions || []).forEach((raw) => {
      const step = String(raw);
      if (step.startsWith('## ')) {
        list.appendChild(el('div', { class: 'inst-section' }, step.slice(3)));
      } else if (step.startsWith('### ')) {
        const d = el('div', { class: 'inst-sub-title' });
        renderInline(d, step.slice(4));
        list.appendChild(d);
      } else if (step.startsWith('> ')) {
        const note = el('div', { class: 'inst-note' });
        renderInline(note, step.slice(2));
        list.appendChild(note);
      } else if (step.startsWith('| ')) {
        const para = el('div', { class: 'inst-para' });
        renderInline(para, step.slice(2));
        list.appendChild(para);
      } else if (step.startsWith('- ')) {
        const li = el('div', { class: 'inst-item' });
        li.appendChild(el('div', { class: 'inst-num', style: 'background:transparent;color:var(--primary);' }, '•'));
        const sp = el('span', {});
        renderInline(sp, step.slice(2));
        li.appendChild(sp);
        list.appendChild(li);
      } else {
        stepNum += 1;
        const li = el('li', { class: 'inst-item' });
        li.appendChild(el('div', { class: 'inst-num' }, String(stepNum)));
        const sp = el('span', {});
        // retirer un éventuel préfixe "N. " déjà présent dans les données
        renderInline(sp, step.replace(/^\d+\.\s+/, ''));
        li.appendChild(sp);
        list.appendChild(li);
      }
    });
    card.appendChild(list);
    view.appendChild(card);
  } else if (tab === 'nut') {
    const card = el('div', { class: 'card' });
    if (r.nutrition && r.nutrition.length) {
      card.appendChild(el('div', { class: 'text-xs text-muted', style: 'margin-bottom: 10px;' }, 'Par portion (base 5)'));
      const grid = el('div', { class: 'nut-grid' });
      r.nutrition.forEach(n => {
        const item = el('div', { class: 'nut-item' });
        item.appendChild(el('span', { class: 'nut-label' }, n.l));
        item.appendChild(el('span', { class: 'nut-value' }, n.v));
        grid.appendChild(item);
      });
      card.appendChild(grid);
    } else {
      card.appendChild(el('div', { class: 'empty' }, 'Aucune donnée nutritionnelle pour cette recette.'));
    }
    view.appendChild(card);
  } else if (tab === 'notes') {
    // Likes
    const likesCard = el('div', { class: 'card mb-3' });
    likesCard.appendChild(el('h3', { style: 'font-size: 14px; font-weight: 500; margin-bottom: 4px;' }, 'J\'ai aimé'));
    const lsCard = likeSummary(r);
    const sumTxt = (lsCard.ups === 0 && lsCard.downs === 0)
      ? 'Aucun vote pour l\'instant'
      : `${lsCard.ups} 👍 · ${lsCard.downs} 👎` + (lsCard.liked ? ' · coup de cœur familial' : '');
    likesCard.appendChild(el('div', { class: 'text-xs text-muted', style: 'margin-bottom: 10px;' }, sumTxt));
    STATE.settings.personNames.forEach((_, idx) => {
      const status = m.likes[`p${idx}`];
      const row = el('div', { class: 'like-row' });
      row.appendChild(el('span', { style: 'font-size: 14px;' }, STATE.settings.personNames[idx] || `P${idx + 1}`));
      const btns = el('div', { class: 'like-btns' });
      const btnYes = el('button', { class: 'like-btn' + (status === true ? ' active-yes' : ''), html: I.thumbsUp, style: 'width:34px;height:34px;' });

      btnYes.querySelector('svg').setAttribute('height', '14');

      class: 'textarea',
      placeholder: 'Substitutions essayées, ce qui a marché, ce qui n\'a pas marché, observations sur l\'appétit des enfants...'

    ta.value = m.notes || '';
    ta.onblur = () => { m.notes = ta.value; persist('meta'); };
    notesCard.appendChild(ta);
    view.appendChild(notesCard);

    // Delete or restore button
    if (r.custom) {
      view.appendChild(el('button', {
        class: 'btn-danger-ghost', style: 'margin-top: 14px;',
        onclick: () => {
          if (confirm('Supprimer définitivement cette recette ?')) {
            STATE.recipes = STATE.recipes.filter(x => x.id !== r.id);
            delete STATE.meta[r.id];
            persist();
            goBack();
            toast('Recette supprimée');
          }
        }
      }, [el('span', { html: I.trash }), ' Supprimer cette recette']));
    } else {
      // Restore individual recipe
      const pristine = STATE.pristineRecipes.find(p => p.id === r.id);
      const isModified = pristine && JSON.stringify(pristine) !== JSON.stringify({
        ...r,
        // ignore non-content fields if any
      });
      if (isModified) {
        view.appendChild(el('button', {
          class: 'btn-secondary', style: 'width: 100%; margin-top: 14px; color: var(--accent); border-color: rgba(181,105,75,0.3);',
          onclick: () => {
            if (confirm('Rétablir cette recette à sa version originale ? Vos notes et préférences sont conservées.')) {
              const idx = STATE.recipes.findIndex(x => x.id === r.id);
              STATE.recipes[idx] = { ...pristine };

              render();
              toast('Recette rétablie');
            }
          }
        }, [el('span', { html: I.refresh }), ' Rétablir l\'original']));
      }
    }
  }

  main.appendChild(view);
}

// =================== VIEW: SHOPPING ===================
// Jours (numéros J) associés à un item d'épicerie, extraits de son libellé.
function itemDays(art) {
  const days = new Set();
  const re = /J(\d+)/g; let m;
  while ((m = re.exec(art)) !== null) days.add(parseInt(m[1]));
  return [...days];
}
// Semaine courante d'une recette (peut avoir été déplacée par l'utilisateur).
function recipeWeekOf(day) {
  const r = STATE.recipes.find(x => x.day === day);
  return r ? r.week : Math.ceil(day / 7);
}
// Recettes assignées à une semaine donnée, triées par jour.
function recipesInWeek(wk) {
  return STATE.recipes.filter(r => !r.custom && r.week === wk).sort((a, b) => (a.ord - b.ord) || (a.day - b.day));
}
// Items d'épicerie à afficher pour la semaine wk, en tenant compte des
// déplacements de recettes et des recettes cochées.
// - Item « staple » (aucun jour) : reste dans sa semaine d'origine.
// - Item tagué : routé selon la semaine actuelle de ses jours; visible si au
//   moins un de ses jours est (a) assigné à wk et (b) coché dans le plan.
function weekShoppingItems(wk) {
  const out = [];
  ['S1', 'S2', 'S3', 'S4'].forEach((sk, i) => {
    const originWeek = i + 1;
    (STATE.shopping[sk] || []).forEach(item => {
      if (!item.cat || item.cat === '⚠ AVIS') return;
      const days = itemDays(item.art);
      if (days.length === 0) {
        // Article de fond (« toute la semaine ») : rattaché à sa semaine
        // d'origine, mais seulement si au moins une recette de cette semaine
        // est encore cochée — sinon il ne sert à rien.
        const uneRecetteCochee = recipesInWeek(wk).some(r => STATE.planSel[r.day] !== false);
        if (originWeek === wk && uneRecetteCochee) out.push({ item, relDays: [] });
        return;
      }
      // Jours de cet item qui tombent dans la semaine wk ET sont cochés.
      const relDays = days.filter(d => recipeWeekOf(d) === wk && STATE.planSel[d] !== false);
      if (relDays.length > 0) out.push({ item, relDays: relDays.sort((a, b) => a - b) });
    });
  });
  return out;
}

// Parse une quantité curée en {num, unit, prefix, suffix}. Gère "5", "650 g", "1 L",
// "4 boîtes", "2,25 kg", "≈ 100 ml", "1 sac de 2 kg", "310 g (1 grand casseau)".
function parseQty(q) {
  if (!q) return null;
  // fractions unicode et "1 1/2"
  let s = q.replace(/(\d)\s+(\d)\/(\d)/g, (m,a,b,c)=> (parseInt(a)+parseInt(b)/parseInt(c)).toString())
           .replace(/(\d)\/(\d)/g, (m,a,b)=> (parseInt(a)/parseInt(b)).toString())
           .replace(',', '.');
  const m = s.match(/(\d+(?:\.\d+)?)\s*(kg|g|ml|l|boîtes?|boite?s?)?/i);
  if (!m) return null;
  return { num: parseFloat(m[1]), unit: (m[2]||'').toLowerCase() };
}
// Formate une quantité recalculée pour l'affichage.
function fmtQty(num, type, unit) {
  if (type === 'count') { const n = Math.max(1, Math.ceil(num - 1e-9)); return String(n); }
  if (type === 'box')   { const n = Math.max(1, Math.ceil(num - 1e-9)); return n + ' ' + (n>1?'boîtes':'boîte'); }
  // mass : g / ml / kg / l
  if (unit === 'kg' || unit === 'l') {
    // travailler en unité de base puis reconvertir
    const disp = unit === 'l' ? 'L' : unit;
    return (Math.round(num*100)/100).toString().replace('.', ',') + ' ' + disp;
  }
  // g ou ml : arrondir à 5 g/ml près
  const r = Math.round(num/5)*5;
  return r + (unit ? ' ' + unit : '');
}
// Quantité à afficher pour un item selon les jours sélectionnés (relDays).
// Retourne { text, reduced } ou null si pas de recalcul (article non décomposé).
function computeSharedQty(item, relDays) {
  const c = SHARED_CONTRIB[item.art];
  if (!c) return null;
  const by = c.by;
  const allDays = Object.keys(by).map(Number);
  const totalW = allDays.reduce((s,d)=> s + by[d], 0);
  if (totalW <= 0) return null;
  const selW = relDays.filter(d => by[d] != null).reduce((s,d)=> s + by[d], 0);
  if (selW <= 0) return null;
  const parsed = parseQty(item.qte);
  if (!parsed) return null;
  const frac = selW / totalW;
  // Pour un item mass, on recompose à partir des poids réels (qui SONT en unité de base)
  let value;
  if (c.type === 'mass') {
    // les poids by sont déjà dans l'unité de base de l'item (g ou ml) ; sommer directement
    const base = relDays.filter(d => by[d] != null).reduce((s,d)=> s + by[d], 0);
    // si l'item est en kg/L, convertir
    if (parsed.unit === 'kg' || parsed.unit === 'l') value = base/1000;
    else value = base;
    const reduced = frac < 0.999;
    return { text: fmtQty(value, 'mass', parsed.unit), reduced };
  } else {
    value = parsed.num * frac;
    const reduced = frac < 0.999;
    return { text: fmtQty(value, c.type, parsed.unit), reduced };
  }
}

function renderShopping() {
  const main = $('#main');
  main.innerHTML = '';
  const view = el('div', { class: 'view' });
  const wk = STATE.view.week || Math.ceil(STATE.settings.currentDay / 7);
  STATE.view.week = wk;
  const pool = weekShoppingItems(wk);           // [{item, relDays}]
  const list = pool.map(p => p.item);
  const relByItem = new Map(pool.map(p => [p.item, p.relDays]));
  const stale = STATE.shopping[`S${wk}`] && STATE.shopping[`S${wk}`]._stale;
  const total = list.length;
  const checked = list.filter(i => i.checked).length;

  // Header row
  const summary = el('div', { class: 'shop-summary' });
  const summaryInfo = el('div');
  summaryInfo.appendChild(el('h1', { class: 'page-title' }, 'Épicerie'));
  summaryInfo.appendChild(el('div', { class: 'shop-counts' }, `${checked} / ${total} cochés`));
  summary.appendChild(summaryInfo);
  summary.appendChild(el('button', {
    class: 'btn-ghost',
    onclick: () => {
      if (confirm('Réinitialiser toutes les coches de la semaine ' + wk + ' ?')) {
        list.forEach(i => i.checked = false);
        persist('shopping');
        render();

  }, [el('span', { html: I.rotate, style: 'vertical-align: middle; margin-right: 4px;' }), 'Réinitialiser']));
  view.appendChild(summary);

    banner.appendChild(el('span', { html: I.bell, style: 'flex-shrink: 0; color: var(--warning);' }));
    const body = el('div', { style: 'flex: 1;' });
    body.appendChild(el('div', { style: 'font-weight: 600; margin-bottom: 4px;' }, 'Liste à réviser'));
    body.appendChild(el('div', { style: 'font-size: 12px;' }, 'Vous avez changé une recette pour cette semaine. La liste d\'épicerie d\'origine peut contenir des items inutiles ou il peut en manquer. Vérifiez avant de partir.'));
    body.appendChild(el('button', {
      class: 'btn-ghost', style: 'padding: 4px 0; margin-top: 4px; font-size: 12px;',
      onclick: () => { clearShoppingStale(wk); render(); }

    banner.appendChild(body);
    view.appendChild(banner);

  // Week selector
  const wkSel = el('div', { class: 'week-selector' });
  [1, 2, 3, 4].forEach(w => {
    wkSel.appendChild(el('button', {
      class: 'week-btn' + (w === wk ? ' active' : ''),
      onclick: () => { STATE.view.week = w; render(); }

  // Plage de dates réelles de la semaine sélectionnée
  const wkStart = dateForDay((wk - 1) * 7 + 1);
  const wkEnd = dateForDay(wk * 7);
  view.appendChild(el('div', { class: 'shop-week-dates' },
    `${fmtDateShort(wkStart)} au ${fmtDateShort(wkEnd)}`));

  // ---- Panneau : recettes à cuisiner cette semaine (filtre l'épicerie) ----

    const selCount = wkRecipes.filter(r => STATE.planSel[r.day] !== false).length;
    const panel = el('div', { class: 'plan-panel' });
    const phead = el('div', { class: 'plan-panel-head' });

    const allOn = selCount === wkRecipes.length;
    phead.appendChild(el('button', {
      class: 'plan-toggle-all',
      onclick: () => {
        wkRecipes.forEach(r => { STATE.planSel[r.day] = !allOn; });
        persist('planSel'); render();

    }, allOn ? 'Tout décocher' : 'Tout cocher'));
    panel.appendChild(phead);
    panel.appendChild(el('div', { class: 'plan-panel-hint' }, 'Décochez une recette pour la retirer de la liste. Les quantités partagées s\'ajustent automatiquement.'));

    wkRecipes.forEach(r => {
      const on = STATE.planSel[r.day] !== false;
      const chip = el('button', {
        class: 'plan-chip' + (on ? ' on' : ''),

      });

      chip.appendChild(el('span', { class: 'plan-chip-day' }, fmtDayBadge(dateForDay(r.day))));

      chips.appendChild(chip);
    });
    panel.appendChild(chips);
    view.appendChild(panel);
  }

  // Group by category
  const groups = {};
  list.forEach(item => { if (!groups[item.cat]) groups[item.cat] = []; groups[item.cat].push(item); });

  if (list.length === 0) {
    view.appendChild(el('div', { class: 'card empty', style: 'text-align:center;' }, 'Aucune recette sélectionnée pour cette semaine. Cochez au moins une recette ci-dessus pour voir les ingrédients.'));
  }

  Object.entries(groups).forEach(([cat, items]) => {
    const block = el('div', { class: 'shop-cat-block' });
    block.appendChild(el('h3', { class: 'shop-cat-title' }, cat));
    const card = el('div', { class: 'shop-items-card' });
    items.forEach(item => {
      const btn = el('button', {
        class: 'shop-item',
        onclick: () => {
          toggleShopItem(item);
          render();
        }
      });
      btn.appendChild(el('div', { class: 'shop-check' + (item.checked ? ' checked' : ''), html: item.checked ? I.check : '' }));
      const info = el('div', { class: 'shop-item-info' });
      info.appendChild(el('div', { class: 'shop-item-name' + (item.checked ? ' checked' : '') }, item.art));
      // Quantité : recalculée si l'article est partagé et qu'on n'a pas tout sélectionné
      const rel = relByItem.get(item) || [];
      const recomputed = computeSharedQty(item, rel);
      let qteText = item.qte;
      let reduced = false;
      if (recomputed) { qteText = recomputed.text; reduced = recomputed.reduced; }
      const metaParts = [qteText];
      if (item.spec) metaParts.push(item.spec);
      const metaEl = el('div', { class: 'shop-item-meta' }, metaParts.join(' · '));
      info.appendChild(metaEl);
      if (reduced) {
        info.appendChild(el('div', { class: 'shop-qty-note' }, `↓ ajusté · plan complet : ${item.qte}`));
      }
      // Badges des jours (recettes) que cet item sert dans cette semaine
      const allDays = itemDays(item.art);
      if (rel.length) {
        const badges = el('div', { class: 'shop-day-badges' });
        rel.forEach(d => badges.appendChild(el('span', { class: 'shop-day-badge', title: fmtDateShort(dateForDay(d)) }, fmtDayBadge(dateForDay(d)))));
        const elsewhere = allDays.filter(d => !rel.includes(d) && recipeWeekOf(d) !== wk);
        if (elsewhere.length) {
          badges.appendChild(el('span', { class: 'shop-day-badge muted', title: 'Aussi utilisé une autre semaine' }, 'partagé'));
        }
        info.appendChild(badges);
      } else if (allDays.length === 0) {
        // Article de base sans jour précis (ail, huile…) : badge neutre pour
        // que chaque ligne affiche une indication de moment, sans exception.

        badges.appendChild(el('span', { class: 'shop-day-badge muted' }, 'toute la semaine'));

// ---- Glisser-déposer (Pointer Events : marche au tactile et à la souris) ----
// Le glissement démarre UNIQUEMENT depuis la poignée ⠿ : le reste de la carte
// défile normalement. Une ligne d'insertion montre exactement où la recette
// atterrira (le dépôt utilise le même calcul que la ligne). Un toast permet
// d'annuler le déplacement pendant 6 secondes.
const DRAG = { active: false, day: null, ghost: null, line: null, moved: false, startX: 0, startY: 0, lastX: 0, lastY: 0, scrollTimer: null };

function attachDrag(handle, cell, day) {
  // Un simple toucher de la poignée ne doit pas ouvrir la fiche du jour.
  handle.addEventListener('click', (e) => e.stopPropagation());
  handle.addEventListener('pointerdown', (e) => {
    // Ignorer le clic droit
    if (e.button && e.button !== 0) return;
    e.preventDefault();
    DRAG.active = false; DRAG.moved = false;
    DRAG.day = day; DRAG.startX = e.clientX; DRAG.startY = e.clientY;
    const onMove = (ev) => {
      DRAG.lastX = ev.clientX; DRAG.lastY = ev.clientY;
      const dx = ev.clientX - DRAG.startX, dy = ev.clientY - DRAG.startY;
      if (!DRAG.active && Math.hypot(dx, dy) > 3) {
        // Démarrer le glissement
        DRAG.active = true; DRAG.moved = true;
        try { handle.setPointerCapture && handle.setPointerCapture(ev.pointerId); } catch {}
        cell.classList.add('dragging');
        DRAG.ghost = el('div', { class: 'cal-ghost' }, cell.querySelector('.cal-recipe-title').textContent);
        document.body.appendChild(DRAG.ghost);
        DRAG.line = el('div', { class: 'cal-drop-line' });
        startAutoScroll();
      }
      if (DRAG.active) {
        ev.preventDefault();
        positionGhost(ev.clientX, ev.clientY);
        showDropLine(ev.clientX, ev.clientY);
      }
    };
    const onUp = (ev) => {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      document.removeEventListener('pointercancel', onUp);
      stopAutoScroll();
      if (DRAG.active) { finishDrag(ev.clientX, ev.clientY); }
      cell.classList.remove('dragging');
      if (DRAG.ghost) { DRAG.ghost.remove(); DRAG.ghost = null; }
      if (DRAG.line) { DRAG.line.remove(); DRAG.line = null; }
      DRAG.active = false;
      // réinitialiser moved après le cycle de clic
      setTimeout(() => { DRAG.moved = false; }, 0);
    };
    document.addEventListener('pointermove', onMove, { passive: false });
    document.addEventListener('pointerup', onUp);
    document.addEventListener('pointercancel', onUp);
  });
}

function positionGhost(x, y) {
  if (!DRAG.ghost) return;
  DRAG.ghost.style.left = (x + 12) + 'px';
  DRAG.ghost.style.top = (y + 12) + 'px';
}

// Cible d'insertion : { list, beforeCell } — beforeCell est la carte devant
// laquelle insérer (null = fin de la liste). Moitié haute d'une carte
// survolée = au-dessus d'elle, moitié basse = en dessous.
function computeDrop(x, y) {
  const node = document.elementFromPoint(x, y);
  if (!node) return null;
  const cell = node.closest('.cal-cell');
  if (cell) {
    const list = cell.closest('.cal-list');
    const rect = cell.getBoundingClientRect();
    if (y < rect.top + rect.height / 2) return { list, beforeCell: cell };
    let next = cell.nextElementSibling;
    while (next && !next.classList.contains('cal-cell')) next = next.nextElementSibling;
    return { list, beforeCell: next };
  }
  const wkBlock = node.closest('.cal-week');
  if (wkBlock) return { list: wkBlock.querySelector('.cal-list'), beforeCell: null };
  return null;
}

function showDropLine(x, y) {
  if (!DRAG.line) return;
  const drop = computeDrop(x, y);
  if (!drop || !drop.list) { DRAG.line.remove(); return; }
  if (drop.beforeCell) drop.list.insertBefore(DRAG.line, drop.beforeCell);
  else drop.list.appendChild(DRAG.line);
}

// Défilement automatique quand le doigt approche du haut ou du bas de
// l'écran pendant un glissement (sinon impossible d'atteindre une semaine
// éloignée sans lâcher la carte).
function startAutoScroll() {
  stopAutoScroll();
  DRAG.scrollTimer = setInterval(() => {
    if (!DRAG.active) return;
    const marge = 90, vitesseMax = 14, h = window.innerHeight;
    let dy = 0;
    if (DRAG.lastY < marge) dy = -Math.ceil((marge - DRAG.lastY) / marge * vitesseMax);
    else if (DRAG.lastY > h - marge) dy = Math.ceil((DRAG.lastY - (h - marge)) / marge * vitesseMax);
    if (dy) {
      window.scrollBy(0, dy);
      showDropLine(DRAG.lastX, DRAG.lastY);
    }
  }, 16);
}
function stopAutoScroll() {
  if (DRAG.scrollTimer) { clearInterval(DRAG.scrollTimer); DRAG.scrollTimer = null; }
}

function finishDrag(x, y) {
  const dragged = STATE.recipes.find(r => r.day === DRAG.day);
  const drop = computeDrop(x, y);
  if (!dragged || !drop || !drop.list) return;
  const wk = parseInt(drop.list.getAttribute('data-week'));
  if (!wk) return;
  const beforeDay = drop.beforeCell ? parseInt(drop.beforeCell.getAttribute('data-day')) : null;
  if (beforeDay === dragged.day) return; // déposé sur sa propre position
  // Instantané des positions pour pouvoir annuler
  const avant = STATE.recipes.map(r => ({ id: r.id, week: r.week, ord: r.ord }));
  dragged.week = wk;
  if (beforeDay) {
    const target = STATE.recipes.find(r => r.day === beforeDay);
    if (target) reorderInsertBefore(dragged, target);
  } else {
    // Déposé en fin de semaine
    const inWeek = recipesInWeek(wk).filter(r => r.day !== dragged.day);
    dragged.ord = inWeek.length ? Math.max(...inWeek.map(r => r.ord)) + 1 : dragged.day;
  }
  normalizeOrds();
  persist('recipes');
  render();
  toastAction('Recette déplacée', 'Annuler', () => {
    avant.forEach(s => { const r = STATE.recipes.find(x => x.id === s.id); if (r) { r.week = s.week; r.ord = s.ord; } });
    persist('recipes');
    render();
  });
}

function reorderInsertBefore(dragged, target) {
  // Reconstruire les ord de la semaine cible avec dragged juste avant target
  const wk = target.week;
  const others = recipesInWeek(wk).filter(r => r.day !== dragged.day);
  const seq = [];
  others.forEach(r => { if (r.day === target.day) seq.push(dragged); seq.push(r); });
  if (!seq.includes(dragged)) seq.push(dragged);
  seq.forEach((r, i) => { r.ord = i; });
}

function normalizeOrds() {
  // Réattribuer des ord propres (0,1,2…) semaine par semaine
  for (let w = 1; w <= 4; w++) {
    recipesInWeek(w).forEach((r, i) => { r.ord = w * 100 + i; });
  }
}

  setModal({ type: 'calendar', day });

  function updateTypeBtns() {
    wdBtn.style.cssText = isWeekday ? 'background:var(--primary);color:white;border-color:var(--primary);' : '';
    weBtn.style.cssText = !isWeekday ? 'background:var(--warning);color:white;border-color:var(--warning);' : '';
  }
  wdBtn.onclick = () => { isWeekday = true; updateTypeBtns(); };
  weBtn.onclick = () => { isWeekday = false; updateTypeBtns(); };
  updateTypeBtns();
  dayTypeRow.appendChild(wdBtn); dayTypeRow.appendChild(weBtn);
  timeSec.appendChild(dayTypeRow);
  view.appendChild(timeSec);

  addField('ingredients', 'Ingrédients · une par ligne', (existing?.ingredients || []).join('\n'),
    { textarea: true, rows: 8, placeholder: '5 filets de saumon\n2 c. à soupe d\'huile d\'olive\n...', style: 'font-family: monospace; font-size: 14px;' });

  addField('instructions', 'Préparation · une étape par ligne', (existing?.instructions || []).join('\n'),
    { textarea: true, rows: 8, placeholder: 'Préchauffer le four à 200 °C\nMélanger huile et moutarde\n...', style: 'font-size: 14px;' });

  saveBtn.onclick = () => {
    if (!fields.title.value.trim()) { toast('Donnez un titre'); return; }
    const id = existing?.id || ('c-' + Date.now());
    const day = existing?.day || (Math.max(0, ...STATE.recipes.map(r => r.day)) + 1);
    const week = Math.ceil(day / 7);
    const dayNames = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
    const recipe = {
      id, day, week,
      dayName: existing?.dayName || dayNames[(day - 1) % 7],
      weekday: isWeekday,
      title: fields.title.value.trim(),
      prepTime: fields.prepTime.value.trim(),
      cookTime: fields.cookTime.value.trim(),
      totalTime: ((p, c) => {
        const pm = parseInt(p) || 0, cm = parseInt(c) || 0;
        const total = pm + cm;
        return total >= 60 ? `${Math.floor(total/60)} h ${total%60 ? (total%60) + ' min' : ''}`.trim() : `${total} min`;
      })(fields.prepTime.value, fields.cookTime.value),
      ingredients: fields.ingredients.value.split('\n').map(s => s.trim()).filter(Boolean),
      instructions: fields.instructions.value.split('\n').map(s => s.trim()).filter(Boolean),
      nutrition: existing?.nutrition || [],
      custom: existing ? existing.custom : true,
    };
    if (existing) {
      const idx = STATE.recipes.findIndex(r => r.id === existing.id);
      STATE.recipes[idx] = recipe;
    } else {
      STATE.recipes.push(recipe);
      if (!STATE.meta[id]) STATE.meta[id] = { likes: {}, notes: '', portions: 5, cooked: 0 };
    }
    persist();
    toast(existing ? 'Recette mise à jour' : 'Recette ajoutée');
    setView({ name: existing ? 'detail' : 'recipes', recipeId: existing ? existing.id : null });
  };

  main.appendChild(view);
}

      // Autres termes reliés dans la définition (liens croisés)
      const related = Object.keys(GLOSSARY).filter(k => {
        if (k === STATE.modal.term) return false;
        const base = glossNorm(k.replace(/\s*\(.*\)$/, ''));
        return glossNorm(def || '').includes(base);
