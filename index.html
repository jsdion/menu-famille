    }
    sheet.appendChild(body);
  }

  ov.appendChild(sheet);
  document.body.appendChild(ov);
}

const GLOSS_LIST_HINT = 'Les termes techniques sont soulignés dans les recettes — touchez-les pour voir leur définition. Voici la liste complète :';

// Rend la liste alphabétique des termes (filtrée par STATE.glossQuery).
function renderGlossList(wrap) {
  wrap.innerHTML = '';
  const q = glossNorm(STATE.glossQuery || '');
  const keys = Object.keys(GLOSSARY)
    .filter(k => !q || glossNorm(k).includes(q) || glossNorm(GLOSSARY[k]).includes(q))
    .sort((a, b) => a.localeCompare(b, 'fr'));
  if (!keys.length) { wrap.appendChild(el('div', { class: 'text-sm text-muted' }, 'Aucun terme trouvé.')); return; }
  keys.forEach(k => {
    const row = el('button', { class: 'gloss-row', onclick: () => setModal({ type: 'glossary', term: k }) });
    row.appendChild(el('div', { class: 'gloss-row-term' }, k.replace(/\s*\(.*\)$/, '')));
    row.appendChild(el('div', { class: 'gloss-row-def' }, GLOSSARY[k]));
    wrap.appendChild(row);
  });
}

// =================== COOKING MODE ===================
function startCookingMode(recipeId) {
  STATE.cookingMode = { recipeId, step: 0, timer: null, timerRemaining: 0, timerInterval: null, wakeLock: null };
  // Try wake lock
  if ('wakeLock' in navigator) {
    navigator.wakeLock.request('screen').then(wl => {
      STATE.cookingMode.wakeLock = wl;
    }).catch(() => {});
  }
  renderCookingMode();
}

function exitCookingMode() {
  if (STATE.cookingMode?.wakeLock) STATE.cookingMode.wakeLock.release().catch(() => {});
  if (STATE.cookingMode?.timerInterval) clearInterval(STATE.cookingMode.timerInterval);
  STATE.cookingMode = null;
  document.querySelectorAll('.cooking-mode').forEach(n => n.remove());
}

function startTimer(seconds, label) {
  if (STATE.cookingMode.timerInterval) clearInterval(STATE.cookingMode.timerInterval);
  STATE.cookingMode.timerRemaining = seconds;
  STATE.cookingMode.timerLabel = label;
  STATE.cookingMode.timerInterval = setInterval(() => {
    STATE.cookingMode.timerRemaining -= 1;
    if (STATE.cookingMode.timerRemaining <= 0) {
      clearInterval(STATE.cookingMode.timerInterval);
      STATE.cookingMode.timerInterval = null;
      playBeep();
      toast('⏰ Minuterie terminée');
      try { if ('vibrate' in navigator) navigator.vibrate([200, 100, 200, 100, 200]); } catch {}
    }
    renderCookingMode();
  }, 1000);
  renderCookingMode();
}

function stopTimer() {
  if (STATE.cookingMode.timerInterval) clearInterval(STATE.cookingMode.timerInterval);
  STATE.cookingMode.timerInterval = null;
  STATE.cookingMode.timerRemaining = 0;
  renderCookingMode();
}

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);
    osc.start();
    osc.stop(ctx.currentTime + 1.5);
    // Second beep
    setTimeout(() => {
      const osc2 = ctx.createOscillator(); const gain2 = ctx.createGain();
      osc2.connect(gain2); gain2.connect(ctx.destination);
      osc2.frequency.value = 660;
      gain2.gain.setValueAtTime(0.3, ctx.currentTime);
      gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);
      osc2.start(); osc2.stop(ctx.currentTime + 1.5);
    }, 600);
  } catch (e) { /* silent */ }
}

function fmtTime(s) {
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

function renderCookingMode() {
  document.querySelectorAll('.cooking-mode').forEach(n => n.remove());
  if (!STATE.cookingMode) return;
  const cm = STATE.cookingMode;
  const r = STATE.recipes.find(x => x.id === cm.recipeId);
  if (!r) { exitCookingMode(); return; }
  const m = STATE.meta[r.id] || { portions: 5 };
  const factor = (m.portions || 5) / 5;
  // Le mode cuisine ne montre que les VRAIES étapes cuisinables :
  // on exclut les titres de section (## ), sous-titres (### ), encadrés (> ),
  // paragraphes libres (| ) et puces de substitution (- ). On s'arrête aussi
  // aux sections "Substitution" / "hors saison" qui ne sont pas des étapes.
  const cookSteps = [];
  for (const raw of (r.instructions || [])) {
    const s = String(raw);
    if (s.startsWith('## ')) {
      const low = s.slice(3).toLowerCase().trim();
      // Sections de fin qui marquent l'arrêt des étapes cuisinables :
      if (low.startsWith('substitution') || low.includes('hors saison')) break;
      // Sections explicatives / notes : on les ignore comme étapes, sans arrêter
      // (elles peuvent apparaître au début « Un mot sur… », « Sur le… » ou à la fin).
      continue;
    }
    if (s.startsWith('### ') || s.startsWith('> ') || s.startsWith('| ') || s.startsWith('- ')) continue;
    cookSteps.push(s);
  }
  const stepsSrc = cookSteps.length ? cookSteps : (r.instructions || []);
  const totalSteps = stepsSrc.length;
  const step = Math.min(cm.step, totalSteps - 1);
  const rawStep = factor === 1 ? stepsSrc[step] : scaleIngredient(stepsSrc[step], factor);
  const stepText = String(rawStep).replace(/^\d+\.\s+/, '');
  const timers = detectTimers(stepText);

  const overlay = el('div', { class: 'cooking-mode' });
  const hdr = el('div', { class: 'cooking-header' });
  hdr.appendChild(el('button', { class: 'cooking-exit', html: I.x, onclick: exitCookingMode }));
  hdr.appendChild(el('div', { class: 'cooking-title' }, r.title));
  hdr.appendChild(el('div', { style: 'width: 36px;' }));
  overlay.appendChild(hdr);

  const prog = el('div', { class: 'cooking-progress' });
  const progBar = el('div', { class: 'cooking-progress-bar' });
  progBar.appendChild(el('div', { class: 'cooking-progress-fill', style: `width: ${((step + 1) / totalSteps) * 100}%` }));
  prog.appendChild(progBar);
  prog.appendChild(el('div', { class: 'cooking-step-num' }, `Étape ${step + 1} sur ${totalSteps}`));
  overlay.appendChild(prog);

  const body = el('div', { class: 'cooking-step-body' });
  // Convertir **gras** en <b> pour le mode cuisine (avec échappement HTML)
  const escHtml = (t) => String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const boldHtml = escHtml(stepText).replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
  body.appendChild(el('div', { class: 'cooking-step-text', html: boldHtml }));

  // Timer section
  if (cm.timerInterval || cm.timerRemaining > 0 || timers.length) {
    const timerBox = el('div', { class: 'cooking-timer-section' });
    if (cm.timerInterval || cm.timerRemaining > 0) {
      // Active timer
      const active = el('div', { class: 'cooking-timer-active' });
      if (cm.timerLabel) active.appendChild(el('div', { class: 'cooking-timer-suggested' }, cm.timerLabel));
      active.appendChild(el('div', { class: 'cooking-timer-display' }, fmtTime(cm.timerRemaining)));
      const acts = el('div', { class: 'cooking-timer-actions' });
      acts.appendChild(el('button', { class: 'cooking-timer-action', onclick: stopTimer }, 'Arrêter'));
      active.appendChild(acts);
      timerBox.appendChild(active);
    } else if (timers.length) {
      timerBox.appendChild(el('div', { class: 'cooking-timer-suggested' }, 'Minuteries proposées'));
      const ctls = el('div', { class: 'cooking-timer-controls' });
      timers.forEach(t => {
        const btn = el('button', { class: 'cooking-timer-btn', onclick: () => startTimer(t.seconds, t.label) });
        btn.innerHTML = I.clock + ' ' + t.label;
        ctls.appendChild(btn);
      });
      // Custom timer
      const custom = el('button', { class: 'cooking-timer-btn', onclick: () => {
        const v = prompt('Durée en minutes :', '5');
        const n = parseFloat(v);
        if (n > 0) startTimer(Math.round(n * 60), `${n} min`);
      }});
      custom.innerHTML = I.plus + ' Autre durée';
      ctls.appendChild(custom);
      timerBox.appendChild(ctls);
    }
    body.appendChild(timerBox);
  }

  overlay.appendChild(body);

  const nav = el('div', { class: 'cooking-nav' });
  const prevBtn = el('button', { class: 'cooking-nav-btn' });
  prevBtn.innerHTML = I.chev.replace('width="18"', 'width="14"').replace('points="9 18 15 12 9 6"', 'points="15 18 9 12 15 6"') + ' Précédent';
  prevBtn.disabled = step === 0;
  prevBtn.onclick = () => { cm.step = step - 1; renderCookingMode(); };
  nav.appendChild(prevBtn);

  if (step < totalSteps - 1) {
    const nextBtn = el('button', { class: 'cooking-nav-btn next' });
    nextBtn.innerHTML = 'Suivant ' + I.chev.replace('width="18"', 'width="14"');
    nextBtn.onclick = () => { cm.step = step + 1; renderCookingMode(); };
    nav.appendChild(nextBtn);
  } else {
    const doneBtn = el('button', { class: 'cooking-nav-btn next', onclick: () => {
      markCookedAndAdvance(r.id);
      exitCookingMode();
      setView({ name: 'home' });
    }});
    doneBtn.innerHTML = I.checkInline + ' Terminé · cuisiné';
    nav.appendChild(doneBtn);
  }

  overlay.appendChild(nav);
  document.body.appendChild(overlay);

  // Swipe support
  let startX = null;
  body.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
  body.addEventListener('touchend', e => {
    if (startX === null) return;
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 60) {
      if (dx < 0 && step < totalSteps - 1) { cm.step = step + 1; renderCookingMode(); }
      else if (dx > 0 && step > 0) { cm.step = step - 1; renderCookingMode(); }
    }
    startX = null;
  });
}

// =================== TAB BAR ===================
function renderTabBar() {
  const tb = $('#tabbar-inner');
  tb.innerHTML = '';
  const tabs = [
    ['home', 'Aujourd\'hui', I.home],
    ['recipes', 'Recettes', I.book],
    ['shopping', 'Épicerie', I.cart],
    ['calendar', 'Calendrier', I.cal],
    ['settings', 'Réglages', I.settings],
  ];
  tabs.forEach(([id, label, icon]) => {
    const active = STATE.view.name === id || (id === 'recipes' && (STATE.view.name === 'add' || STATE.view.name === 'edit' || (STATE.view.name === 'detail' && STATE.tab === 'recipes')));
    const btn = el('button', {
      class: 'tab-btn' + (STATE.view.name === id ? ' active' : ''),
      onclick: () => {
        STATE.tab = id;
        setView({ name: id });
      },
      html: icon + `<span>${label}</span>`
    });
    tb.appendChild(btn);
  });
}

// =================== MAIN RENDER ===================
function render() {
  const v = STATE.view.name;
  if (v === 'home') renderHome();
  else if (v === 'recipes') renderRecipes();
  else if (v === 'detail') renderDetail();
  else if (v === 'shopping') renderShopping();
  else if (v === 'calendar') renderCalendar();
  else if (v === 'settings') renderSettings();
  else if (v === 'add' || v === 'edit') renderAddEdit();
  renderTabBar();
  renderModal();
}

// =================== INIT ===================
loadState();
STATE.tab = 'home';
render();

// =================== PWA : SERVICE WORKER ===================
// Actif seulement quand l'app est servie par un serveur (https ou localhost).
// Ouvert directement en fichier, index.html reste pleinement fonctionnel :
// ce bloc ne fait alors simplement rien.
if ('serviceWorker' in navigator &&
    (location.protocol === 'https:' || location.hostname === 'localhost')) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .catch(err => console.error('Service worker :', err));
  });
}

</script>
</body>
</html>
